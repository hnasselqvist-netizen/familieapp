// ── Google Drive-tilkobling (infrastruktur) ──────────────────────
// Én tydelig konstant for OAuth Client ID — bytt her ved behov.
// Dette er offentlig klientkonfigurasjon (ikke en hemmelighet), men
// skal likevel ligge samlet ett sted i koden.
const GOOGLE_DRIVE_CLIENT_ID = "1075494790067-p5v2co7p6u9gvo60sok7lffisvumn4j4.apps.googleusercontent.com";
const GOOGLE_DRIVE_SCOPE = "https://www.googleapis.com/auth/drive.file";

// Token ligger KUN i minnet for denne modulen — aldri i Firebase eller
// localStorage. Forsvinner ved refresh; brukeren ma koble til pa nytt.
let _driveAccessToken = null;
let _driveTokenClient = null;
let _gapiClientLoaded = false;

// Laster gapi sin Drive-v3-klient. Kalles kun én gang (idempotent via
// _gapiClientLoaded-flagget). Bruker promise-mønster, ingen async/await.
function lastGapiDriveClient() {
  return new Promise(function(resolve, reject){
    if(_gapiClientLoaded) { resolve(); return; }
    if(typeof gapi === "undefined") { reject(new Error("gapi er ikke lastet")); return; }
    gapi.load("client", function(){
      gapi.client.init({}).then(function(){
        return gapi.client.load("https://www.googleapis.com/discovery/v1/apis/drive/v3/rest");
      }).then(function(){
        _gapiClientLoaded = true;
        resolve();
      }).catch(reject);
    });
  });
}

// Bygger (én gang) GIS sin token-klient. requestAccessToken() ma kalles
// fra en direkte brukerhandling (knappetrykk) — GIS krever dette, saerlig
// paa mobil der bakgrunns-popup/redirect ellers blokkeres.
function hentDriveTokenClient(paaToken, paaFeil) {
  if(_driveTokenClient) return _driveTokenClient;
  _driveTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_DRIVE_CLIENT_ID,
    scope: GOOGLE_DRIVE_SCOPE,
    callback: function(resp){
      if(resp && resp.access_token) {
        _driveAccessToken = resp.access_token;
        if(gapi && gapi.client) gapi.client.setToken({access_token: resp.access_token});
        paaToken(resp);
      } else {
        paaFeil(resp);
      }
    },
    error_callback: function(err){
      paaFeil(err);
    },
  });
  return _driveTokenClient;
}

// Fjerner tokenet fra appokten (kobler fra). Prover ogsaa aa be Google
// om aa revokere tokenet server-side, men appens egen "tilkoblet"-status
// avhenger kun av at _driveAccessToken settes til null lokalt.
function kobleFraDrive(callback) {
  if(_driveAccessToken && typeof google !== "undefined") {
    google.accounts.oauth2.revoke(_driveAccessToken, function(){
      _driveAccessToken = null;
      if(gapi && gapi.client) gapi.client.setToken(null);
      if(callback) callback();
    });
  } else {
    _driveAccessToken = null;
    if(gapi && gapi.client) gapi.client.setToken(null);
    if(callback) callback();
  }
}

// ── Finn eller opprett mappe i Google Drive ──────────────────────
// Ren hjelpefunksjon (kjenner Drive API, ikke UI eller Firebase direkte).
// Soker etter en mappe med gitt navn under gitt parent; oppretter den
// hvis den ikke finnes. Returnerer et Promise som gir mappe-id-en.
function finnEllerOpprettMappe(navn, parentId) {
  const q = "name='"+navn.replace(/'/g,"\\'")+"' and mimeType='application/vnd.google-apps.folder'"
    + (parentId ? " and '"+parentId+"' in parents" : " and 'root' in parents")
    + " and trashed=false";
  return gapi.client.drive.files.list({q: q, fields: "files(id, name)", pageSize: 1}).then(function(res){
    const treff = res.result.files;
    if(treff && treff.length>0) return treff[0].id;
    const metadata = {name: navn, mimeType: "application/vnd.google-apps.folder"};
    if(parentId) metadata.parents = [parentId];
    return gapi.client.drive.files.create({resource: metadata, fields: "id"}).then(function(res2){
      return res2.result.id;
    });
  });
}

// Bygger (finner/oppretter) hele stien Hverdagsflyt/Kvitteringer/{aar}/{maaned}
// og returnerer mappe-id-en for maaneden. Aar og maaned er strenger, f.eks.
// "2026" og "07".
function finnEllerOpprettKvitteringsmappe(aar, maaned) {
  return finnEllerOpprettMappe("Hverdagsflyt", null).then(function(hverdagsflytId){
    return finnEllerOpprettMappe("Kvitteringer", hverdagsflytId);
  }).then(function(kvitteringerId){
    return finnEllerOpprettMappe(aar, kvitteringerId);
  }).then(function(aarId){
    return finnEllerOpprettMappe(maaned, aarId);
  });
}

// Laster opp en bildefil (File/Blob) til riktig aar/maaned-mappe i Drive.
// Returnerer et Promise som gir {driveFileId, driveWebViewLink, driveFolderId}.
// Bruker kun promise-kjeder, ingen async/await.
function lastOppKvitteringsbilde(file, dato) {
  const d = dato ? new Date(dato) : new Date();
  const aar = String(d.getFullYear());
  const maaned = String(d.getMonth()+1).padStart(2,"0");
  return finnEllerOpprettKvitteringsmappe(aar, maaned).then(function(mappeId){
    const metadata = {name: file.name||("kvittering-"+Date.now()), parents:[mappeId]};
    const boundary = "-------familieapp"+Date.now();
    const reader = new FileReader();
    return new Promise(function(resolve, reject){
      reader.onload = function(){
        const base64Data = reader.result.split(",")[1];
        const body =
          "--"+boundary+"\r\n"+
          "Content-Type: application/json; charset=UTF-8\r\n\r\n"+
          JSON.stringify(metadata)+"\r\n"+
          "--"+boundary+"\r\n"+
          "Content-Type: "+(file.type||"image/jpeg")+"\r\n"+
          "Content-Transfer-Encoding: base64\r\n\r\n"+
          base64Data+"\r\n"+
          "--"+boundary+"--";
        gapi.client.request({
          path: "/upload/drive/v3/files",
          method: "POST",
          params: {uploadType: "multipart", fields: "id, webViewLink"},
          headers: {"Content-Type": "multipart/related; boundary="+boundary},
          body: body,
        }).then(function(res){
          resolve({
            driveFileId: res.result.id,
            driveWebViewLink: res.result.webViewLink,
            driveFolderId: mappeId,
          });
        }).catch(reject);
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  });
}


// ── Bredde-basert layout (Sprint 17a) ────────────────────────────
// Delt grunnmur for prinsippet "mobil utforer, web administrerer".
// Terskelen er bevisst breddebasert, ikke user-agent-basert — et smalt
// vindu paa en PC oppforer seg som "mobil", et bredt nettbrett oppforer
// seg som "web". Dette stemmer bedre med det egentlige prinsippet
// (arbeidsmodus/tilgjengelig plass) enn en fysisk enhetstype ville gjort.
// Ingen manuell overstyring i v1.
const LAYOUT_BREDDE_TERSKEL = 768;

function useErBred() {
  const [erBred, setErBred] = useState(
    typeof window!=="undefined" ? window.innerWidth>=LAYOUT_BREDDE_TERSKEL : true
  );
  React.useEffect(() => {
    const sjekk = () => setErBred(window.innerWidth>=LAYOUT_BREDDE_TERSKEL);
    window.addEventListener("resize", sjekk);
    return () => window.removeEventListener("resize", sjekk);
  }, []);
  return erBred;
}

// Utvidet versjon (Sprint 17-justering): tre soner i stedet for en enkel
// boolean, slik at administrasjonsflater kan gi et reelt mellomoppsett i
// tillegg til mobil/web, og faktisk utnytte bred skjerm i stedet for aa
// bare vise mobilinnholdet midt i et stort tomt vindu.
// "mobil" < 768, "mellom" 768–1199, "web" >= 1200.
const LAYOUT_SONER = {mobil:0, mellom:768, web:1200};

function useLayoutBredde() {
  const [bredde, setBredde] = useState(
    typeof window!=="undefined" ? window.innerWidth : 1024
  );
  React.useEffect(() => {
    const sjekk = () => setBredde(window.innerWidth);
    window.addEventListener("resize", sjekk);
    return () => window.removeEventListener("resize", sjekk);
  }, []);
  const sone = bredde>=LAYOUT_SONER.web ? "web" : bredde>=LAYOUT_SONER.mellom ? "mellom" : "mobil";
  return {bredde, sone, erMobil:sone==="mobil", erMellom:sone==="mellom", erWeb:sone==="web"};
}

// ── InlineNum — viser formatert tall, klikk for redigering ───────
function InlineNum({value, onChange, colorStyle, style}) {
  const [editing, setEditing] = React.useState(false);
  const [raw, setRaw] = React.useState(String(value||0));
  const fmtN = n => new Intl.NumberFormat("nb-NO",{maximumFractionDigits:0}).format(n||0);
  if(editing) {
    return (
      <input type="number" value={raw}
        autoFocus
        onFocus={e=>e.target.select()}
        onChange={e=>setRaw(e.target.value)}
        onBlur={()=>{onChange(raw);setEditing(false);}}
        onKeyDown={e=>{if(e.key==="Enter"){onChange(raw);setEditing(false);}}}
        enterKeyHint="done"
        style={{fontSize:11,textAlign:"right",background:P.sand,width:"100%",
          boxSizing:"border-box",...(style||{}),...(colorStyle||{})}}/>
    );
  }
  return (
    <span onClick={()=>{setRaw(String(value||0));setEditing(true);}}
      style={{fontSize:11,textAlign:"right",display:"block",cursor:"text",
        padding:"2px 4px",borderRadius:4,background:P.sand,
        fontVariantNumeric:"tabular-nums",...(style||{}),...(colorStyle||{})}}>
      {fmtN(value)}
    </span>
  );
}

// ── Ukeberegning ──────────────────────────────────────────────────
function getWeekKey(date) {
  const d=new Date(date); d.setHours(0,0,0,0);
  d.setDate(d.getDate()+3-(d.getDay()+6)%7);
  const w1=new Date(d.getFullYear(),0,4);
  const wn=1+Math.round(((d-w1)/86400000-3+(w1.getDay()+6)%7)/7);
  return `${d.getFullYear()}-W${String(wn).padStart(2,"0")}`;
}
function getMondayOfWeek(wk) {
  const [yr,w]=wk.split("-W").map(Number);
  const j4=new Date(yr,0,4); const m=new Date(j4);
  m.setDate(j4.getDate()-(j4.getDay()+6)%7+(w-1)*7); return m;
}
function getDayDate(wk,di) { const m=getMondayOfWeek(wk); const d=new Date(m); d.setDate(m.getDate()+di); return d; }
function addWeeks(wk,n) { const m=getMondayOfWeek(wk); m.setDate(m.getDate()+n*7); return getWeekKey(m); }
function fmtShort(d) { return d.toLocaleDateString("nb-NO",{day:"numeric",month:"short"}); }

// ── Modal med drag-to-resize (pkt 3) ─────────────────────────────
function Modal({onClose,title,children}) {
  const [height,setHeight] = useState(70);
  const drag = React.useRef({active:false,startY:0,startH:0});
  const onDragStart = (e) => {
    drag.current = {active:true, startY:e.touches?e.touches[0].clientY:e.clientY, startH:height};
    const move = (ev) => {
      if(!drag.current.active) return;
      const y = ev.touches?ev.touches[0].clientY:ev.clientY;
      const newH = Math.min(95,Math.max(25,drag.current.startH+(drag.current.startY-y)/window.innerHeight*100));
      setHeight(newH);
    };
    const up = () => { drag.current.active=false; window.removeEventListener("mousemove",move); window.removeEventListener("mouseup",up); window.removeEventListener("touchmove",move); window.removeEventListener("touchend",up); };
    window.addEventListener("mousemove",move); window.addEventListener("mouseup",up);
    window.addEventListener("touchmove",move,{passive:false}); window.addEventListener("touchend",up);
  };
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(44,35,24,0.35)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200,backdropFilter:"blur(2px)"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:P.linen,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:460,height:`${height}vh`,display:"flex",flexDirection:"column",boxShadow:"0 -8px 32px rgba(44,35,24,0.12)"}}>
        <div onMouseDown={onDragStart} onTouchStart={onDragStart} style={{padding:"10px 0 6px",cursor:"row-resize",flexShrink:0,touchAction:"none"}}>
          <div style={{width:40,height:4,borderRadius:2,background:P.hazelL,margin:"0 auto"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0 16px 12px",borderBottom:`1px solid ${P.border}`,flexShrink:0}}>
          <span style={{fontSize:15,fontWeight:600,color:P.ink}}>{title}</span>
          <button onClick={onClose} style={{background:P.mist,border:"none",cursor:"pointer",color:P.stone,width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}><Em e="✕"/></button>
        </div>
        <div style={{overflowY:"auto",padding:"14px 16px 36px",flex:1}}>{children}</div>
      </div>
    </div>
  );
}

// ── AdminTabell (arkitektur-vurdering, steg C) ───────────────────
// Ekte webtabell for administrasjonsflater — IKKE en bredere versjon
// av mobilkortet/RadTabell. Faste kolonnebredder + ellipsis PER
// KOLONNE (ikke la nettleseren avgjore radhoyde ut fra innhold — det
// var arsaken til at forrige forsok brot sammen visuelt selv med
// riktig containerbredde). Kolonner defineres som prop, saa Regler,
// Aarsbudsjett, Metadata og Kontoer kan bruke samme komponent senere
// uten aa finne opp sin egen tabellstil.
//
// kolonner: [{key, label, bredde, align, render(rad)}]
// rader: liste med vilkaarlige objekter, hver med en unik "id"
function AdminTabell({kolonner, rader, onRadKlikk, uthevRad}) {
  return (
    <div style={{border:"1px solid "+P.border,borderRadius:10}}>
      {/* borderCollapse:"separate" (i stedet for "collapse") er trygt her —
          tabellen tegner kun horisontale radlinjer (borderBottom), ingen
          kolonne-til-kolonne- eller konkurrerende linjer aa kollapse.
          Byttet er nodvendig for at border-radius i det hele tatt skal
          rendres paa <th>/<td> — CSS ignorerer border-radius paa celler
          naar border-collapse:"collapse" er aktivt, uansett nettleser. */}
      <table style={{width:"100%",borderCollapse:"separate",borderSpacing:0,tableLayout:"fixed",fontSize:12.5}}>
        <colgroup>
          {kolonner.map(k=><col key={k.key} style={{width:k.bredde}}/>)}
        </colgroup>
        <thead>
          <tr style={{borderBottom:"2px solid "+P.border}}>
            {kolonner.map((k,ki)=>(
              // Steg 4: sticky per celle (ikke paa <tr>/<thead> — det
              // har inkonsistent nettleserstotte). Feiler mot den reelle
              // scrollende forelderen (AdminArbeidsomrade sin scrolleboks),
              // siden wrapperen over ikke lenger etablerer sin egen
              // overflow-kontekst. Egen bakgrunn her er nodvendig slik at
              // rader som scroller under ikke skinner gjennom.
              // borderTopLeft/Right-radius paa ytterste celler gjenoppretter
              // avrundingen som gikk tapt da overflow:hidden ble fjernet fra
              // wrapperen (nodvendig for at sticky skal fungere riktig).
              <th key={k.key} style={{position:"sticky",top:0,zIndex:2,
                padding:"9px 10px",color:P.dust,fontWeight:600,
                textAlign:k.align||"left",fontSize:11.5,whiteSpace:"nowrap",
                background:P.mist,
                borderTopLeftRadius:ki===0?10:0,
                borderTopRightRadius:ki===kolonner.length-1?10:0,
                borderBottomLeftRadius:(ki===0&&rader.length===0)?10:0,
                borderBottomRightRadius:(ki===kolonner.length-1&&rader.length===0)?10:0}}>
                {k.label}
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rader.map((rad,idx)=>{
            const sisteRad = idx===rader.length-1;
            return (
              <tr key={rad.id||idx}
                onClick={onRadKlikk?()=>onRadKlikk(rad):undefined}
                style={{borderBottom:"1px solid "+P.border,
                  background:uthevRad&&uthevRad(rad)?"#FFF8F0":(idx%2===0?P.linen:"transparent"),
                  cursor:onRadKlikk?"pointer":"default"}}>
                {kolonner.map((k,ki)=>(
                  <td key={k.key} style={{padding:"9px 10px",textAlign:k.align||"left",
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                    borderBottomLeftRadius:(ki===0&&sisteRad)?10:0,
                    borderBottomRightRadius:(ki===kolonner.length-1&&sisteRad)?10:0}}>
                    {k.render(rad)}
                  </td>
                ))}
              </tr>
            );
          })}
        </tbody>
      </table>
      {rader.length===0 && (
        <div style={{textAlign:"center",padding:"24px",color:P.dust,fontSize:13}}>
          Ingen rader å vise.
        </div>
      )}
    </div>
  );
}

// ── AdminArbeidsomrade (scrollarkitektur steg 3) ─────────────────
// Delt kontrakt: "fast" er beslutningsverktoyene (tittel, status,
// faner, sok/filter) — de star fast. "children" er arbeidsinnholdet
// (tabeller, lister) — det scroller. Prinsipp: beslutningsverktoyene
// star fast, datamengden scroller.
//
// Strukturell losning, samme prinsipp som steg 1+2 (ikke sticky):
// komponenten er selv en flex-kolonne med bundet hoyde (flex:1,
// minHeight:0, height:100% — arves fra AdminSkall sin content-div,
// som na gir bundet hoyde videre i stedet for aa scrolle selv).
// "fast" er et vanlig flexShrink:0-flexbarn. "children" faar sin
// egen flex:1,minHeight:0,overflowY:auto-sone. Dette gir én
// konsistent scrollmodell — sticky forbeholdes reelle sticky-behov
// INNI en scrollflate (f.eks. tabelloverskrifter i steg 4).
function AdminArbeidsomrade({fast, children}) {
  return (
    <div style={{flex:1,minHeight:0,display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{flexShrink:0}}>
        {fast}
      </div>
      <div style={{flex:1,minHeight:0,overflowY:"auto"}}>{children}</div>
    </div>
  );
}

// nivaKeyForMeta tar imot et meta-objekt direkte (fra budsjett-/inntekts-
// posten selv, ELLER fra en post regelmotoren peker mot) og returnerer
// samme nivaa-nokkel uansett hvilken vei den ble funnet.
const nivaKeyForMeta = (meta) => {
  if(!meta||!meta.niva) return "ukjent";
  if(meta.niva==="opprettholde") {
    return meta.opprettholdType==="valgfritt" ? "opprettholde-valgfri" : "opprettholde-nodvendig";
  }
  return meta.niva;
};

// ── Regeltyper (etappe 2 — domenemodell for regelmotoren) ─────────
// Gjenbruker det eksisterende, tidligere inerte feltet rule.type
// (som alltid var hardkodet til "leverandor") — gir det et reelt
// domenevokabular i stedet for aa legge til et nytt feltnavn.
// "leverandor" forblir standardverdien for nye regler (uendret
// oppforsel ved opprettelse), saa ingen migrering trengs: enhver
// eksisterende regel ER allerede korrekt klassifisert som en
// leverandorregel, siden det er nokyaktig det den alltid har gjort.
//
// Dette er bevisst IKKE bare en etikett — hver type har en egen,
// navngitt hensikt (feltet "hensikt" under) som beskriver HVORFOR
// regelen finnes, og typen er redigerbar i RegelSenter slik at en

  const [pw,setPw]       = useState("");

  const [loading,setLoading] = useState(false);
  const login = async () => {
    if(!email.trim()||!pw.trim()) return;
    setLoading(true); setErr("");
    try { await signInWithEmailAndPassword(_auth,email.trim(),pw); }
    catch(e) { setErr("Feil e-post eller passord."); }
    setLoading(false);
  };
  return (
    <div style={{minHeight:"100vh",background:P.sand,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{width:"100%",maxWidth:360}}>
        <div style={{textAlign:"center",marginBottom:32}}>

          <div style={{fontSize:24,fontWeight:600,color:P.ink}}>Familieappen</div>
          <div style={{fontSize:13,color:P.stone,marginTop:6}}>Logg inn for å fortsette</div>
        </div>
        <Card style={{padding:"20px 20px 24px"}}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div>
              <div style={{fontSize:11.5,fontWeight:600,color:P.stone,marginBottom:5}}>E-post</div>
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()} placeholder="din@epost.no" style={{width:"100%",boxSizing:"border-box",fontSize:14,padding:"10px 12px"}}/>
            </div>
            <div>
              <div style={{fontSize:11.5,fontWeight:600,color:P.stone,marginBottom:5}}>Passord</div>
              <input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()} placeholder="••••••••" style={{width:"100%",boxSizing:"border-box",fontSize:14,padding:"10px 12px"}}/>

              {loading?"Logger inn…":"Logg inn"}

      </div>
    </div>
  );
}

// ── Handlelistegenerator ──────────────────────────────────────────
const SHOP_UNITS = ["stk","g","kg","ml","dl","l","ss","ts","pk","boks","pose","etter behov"];

function ShoppingGenerator({allMeals,weekKey,recipes,itemHistory,staples,onClose,onAddToList}) {
  const todayIdx = (new Date().getDay()+6)%7;
  const todayKey = getWeekKey(new Date());

  // Samle kommende dager med oppskrifter
  const candidates = [];
  [weekKey, addWeeks(weekKey,1)].forEach(wk => {
    const wkMeals = allMeals[wk]||{};
    DAYS.forEach((day,i) => {
      const val = wkMeals[day];
      if(!val || isEvent(val)) return;
      if(wk===todayKey && i<todayIdx) return;
      candidates.push({wk, day, i, val, dayDate:getDayDate(wk,i)});
    });
  });

  const [checked,setChecked] = useState(()=>new Set(candidates.map((_,i)=>i)));
  const [step,setStep]       = useState("select");
  const [reviewItems,setReviewItems] = useState([]);

  const toggle = idx => setChecked(p=>{const n=new Set(p);n.has(idx)?n.delete(idx):n.add(idx);return n;});

  // Slå opp kategori fra historikk
  const lookupCat = (name) => {
    const h = (itemHistory||[]).find(h=>h.name.toLowerCase()===name.toLowerCase());
    return (h&&h.cat) || "Diverse";
  };

  // Bygg ingrediensliste
  const buildIngredients = () => {
    const items = [];
    candidates.forEach((c,idx) => {
      if(!checked.has(idx)) return;
      getMealRecipes(c.val).forEach(recRef => {
        const recipe = recipes.find(r=>r.id===recRef.recipeId||r.name.toLowerCase()===recRef.name.toLowerCase());
        if(!recipe) return;
        getIngredients(recipe).forEach(ing => {
          if(!ing.name.trim()) return;
          const resolvedCat = ing.cat&&ing.cat!=="Diverse" ? ing.cat : lookupCat(ing.name);
          const isStaple = !!(staples||{})[ing.name.toLowerCase()];
          items.push({name:ing.name.trim(), amount:ing.amount||"", unit:ing.unit||"", cat:resolvedCat, fromRecipe:recipe.name, isStaple});
        });
      });
    });
    // Slå sammen like varer
    const merged = [];
    items.forEach(item => {
      const key = item.name.toLowerCase()+"__"+(item.unit||"").toLowerCase();
      const ex = merged.find(m=>m.key===key);
      if(ex) {
        const a=parseFloat(ex.amount)||0, b=parseFloat(item.amount)||0;
        if(a>0&&b>0) ex.amount=String(Math.round((a+b)*100)/100);
        ex.fromRecipes=[...new Set([...ex.fromRecipes,item.fromRecipe])];
        ex.isStaple = ex.isStaple && item.isStaple;
      } else {
        merged.push({id:uid(), key, name:item.name, amount:item.amount, unit:item.unit,
          cat:item.cat, fromRecipes:[item.fromRecipe], isStaple:item.isStaple, done:false});
      }
    });
    return merged;
  };

  const goToReview = () => {
    const items = buildIngredients();
    // Basisvarer avhukes som standard
    setRemoved(new Set(items.filter(i=>i.isStaple).map(i=>i.id)));
    setReviewItems(items);
    setStep("review");
  };

  const [removed,setRemoved]         = useState(new Set());
  const [staplePrompt,setStaplePrompt] = useState(null); // {id, name}
  // Redigerbare felt i gjennomgang
  const [edits,setEdits] = useState({}); // {id: {amount, unit, cat}}
  const getEdit = (item, field) => { const e=edits[item.id]; return (e&&e[field]!==undefined)?e[field]:item[field]; };
  const setEdit = (id, field, val) => setEdits(p=>({...p,[id]:{...(p[id]||{}), [field]:val}}));

  const toggleRemove = (id, name) => {
    setRemoved(p=>{
      const n=new Set(p);
      if(n.has(id)) { n.delete(id); return n; }
      // Første gang man fjerner: spør om basisvare
      setStaplePrompt({id, name});
      n.add(id);
      return n;
    });
  };
  const confirmStaple = async (isStaple) => {
    if(isStaple && staplePrompt) {
      // Lagre til Firebase
      await _db.ref(`${FAM}/staples/${staplePrompt.name.toLowerCase()}`).set(true);
    }
    setStaplePrompt(null);
  };

  const addToList = () => {
    const toAdd = reviewItems.filter(i=>!removed.has(i.id)).map(i=>{
      const amt = getEdit(i,"amount")||i.amount;
      const unt = getEdit(i,"unit")||i.unit;
      const cat = getEdit(i,"cat")||i.cat;
      return {id:uid(), name:i.name, amount:amt&&unt?`${amt} ${unt}`.trim():(amt||""), cat, done:false};
    });
    onAddToList(toAdd);
    onClose();
  };

  const dayLabel = c => `${DAY_FULL[c.day]} ${c.dayDate.getDate()}. ${c.dayDate.toLocaleDateString("nb-NO",{month:"short"})}`;
  const normalItems = reviewItems.filter(i=>!i.isStaple);
  const stapleItems = reviewItems.filter(i=>i.isStaple);
  const [showStaples,setShowStaples] = useState(false);
  const activeCount = reviewItems.filter(i=>!removed.has(i.id)).length;

  return (
    <Modal title="Lag handleliste" onClose={onClose}>
      {step==="select" && (
        <div>
          <div style={{fontSize:12,color:P.stone,marginBottom:12,lineHeight:1.6}}>
            Velg hvilke middager du vil handle for.
          </div>
          {candidates.length===0 ? (
            <div style={{textAlign:"center",padding:"24px",color:P.dust,fontSize:13}}>
              Ingen kommende middager er planlagt.
            </div>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:16}}>
              {candidates.map((c,idx) => {
                const on = checked.has(idx);
                return (
                  <div key={idx} onClick={()=>toggle(idx)}
                    style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",
                      background:on?`${P.olive}08`:P.mist,border:`1px solid ${on?P.oliveL:P.border}`,
                      borderRadius:9,cursor:"pointer"}}>
                    <div style={{width:22,height:22,borderRadius:6,flexShrink:0,
                      background:on?P.olive:"transparent",border:`1.5px solid ${on?P.olive:P.hazelL}`,
                      display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {on&&<Em e="✓" s={{fontSize:12,color:"white"}}/>}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:600,color:P.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{getMealName(c.val)}</div>
                      <div style={{fontSize:11,color:P.dust,marginTop:1}}>{dayLabel(c)}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
          <div style={{display:"flex",gap:8}}>
            <button onClick={onClose} style={{flex:1,padding:"10px",background:P.mist,border:`1px solid ${P.border}`,borderRadius:9,fontSize:13,cursor:"pointer",color:P.stone}}>Avbryt</button>
            <button onClick={goToReview} disabled={checked.size===0||candidates.length===0}
              style={{flex:2,padding:"10px",background:checked.size>0?P.hazel:P.mist,color:checked.size>0?"white":P.dust,
                border:"none",borderRadius:9,fontSize:13,cursor:checked.size>0?"pointer":"default",fontWeight:600}}>
              Hent ingredienser ({checked.size}) →
            </button>
          </div>
        </div>
      )}

      {step==="review" && (
        <div style={{position:"relative"}}>
          <button onClick={()=>setStep("select")}
            style={{fontSize:12,color:P.hazel,background:"none",border:"none",cursor:"pointer",padding:"0 0 10px",fontWeight:500}}>
            ← Tilbake
          </button>
          <div style={{fontSize:12,color:P.stone,marginBottom:12,lineHeight:1.5}}>
            Trykk på en vare for å fjerne den. Du kan endre mengde, enhet og kategori.
          </div>

          {reviewItems.length===0 ? (
            <div style={{textAlign:"center",padding:"20px",color:P.dust,fontSize:13}}>Ingen ingredienser funnet.</div>
          ) : (
            <div style={{marginBottom:14}}>
              {/* Vanlige varer */}
              {[...new Set(normalItems.map(i=>i.cat))].map(cat => (
                <div key={cat} style={{marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                    <Em e={CAT_EMOJI[cat]||"📦"} s={{fontSize:11}}/>
                    <span style={{fontSize:10,fontWeight:600,color:P.dust,textTransform:"uppercase",letterSpacing:"0.07em"}}>{cat}</span>
                    <div style={{flex:1,height:"0.5px",background:P.border}}/>
                  </div>
                  {normalItems.filter(i=>i.cat===cat).map(item => {
                    const rem = removed.has(item.id);
                    return (
                      <div key={item.id} style={{marginBottom:4,borderRadius:9,border:`1px solid ${rem?P.border:P.oliveL}`,
                        background:rem?P.mist:`${P.olive}06`,opacity:rem?0.5:1}}>
                        {/* Øverste rad: avhuk + navn */}
                        <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",cursor:"pointer"}} onClick={()=>toggleRemove(item.id, item.name)}>
                          <div style={{width:20,height:20,borderRadius:5,flexShrink:0,
                            background:rem?"transparent":P.olive,border:`1.5px solid ${rem?P.hazelL:P.olive}`,
                            display:"flex",alignItems:"center",justifyContent:"center"}}>
                            {!rem&&<Em e="✓" s={{fontSize:11,color:"white"}}/>}
                          </div>
                          <span style={{flex:1,fontSize:13,fontWeight:500,color:P.ink,textDecoration:rem?"line-through":"none"}}>{item.name}</span>
                          <span style={{fontSize:10,color:P.dust}}>{item.fromRecipes.join(", ")}</span>
                        </div>
                        {/* Nedre rad: mengde + enhet + kategori (kun hvis ikke fjernet) */}
                        {!rem && (
                          <div style={{display:"flex",gap:5,padding:"0 10px 8px",alignItems:"center"}} onClick={e=>e.stopPropagation()}>
                            <input type="number" value={getEdit(item,"amount")} onChange={e=>setEdit(item.id,"amount",e.target.value)}
                              style={{width:60,fontSize:12,background:P.sand,padding:"4px 6px",textAlign:"right"}}/>
                            <select value={getEdit(item,"unit")} onChange={e=>setEdit(item.id,"unit",e.target.value)}
                              style={{fontSize:12,background:P.sand,padding:"4px 4px",flex:1}}>
                              {SHOP_UNITS.map(u=><option key={u} value={u}>{u}</option>)}
                            </select>
                            <select value={getEdit(item,"cat")} onChange={e=>setEdit(item.id,"cat",e.target.value)}
                              style={{fontSize:12,background:P.sand,padding:"4px 4px",flex:1.5}}>
                              {SHOP_CATS.map(c=><option key={c} value={c}>{c}</option>)}
                            </select>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              ))}

              {/* Basisvarer — skjult som standard */}
              {stapleItems.length>0 && (
                <div style={{marginTop:8}}>
                  <button onClick={()=>setShowStaples(p=>!p)}
                    style={{display:"flex",alignItems:"center",gap:8,width:"100%",background:"none",border:"none",cursor:"pointer",padding:"4px 0",marginBottom:4}}>
                    <div style={{flex:1,height:"0.5px",background:P.border}}/>
                    <span style={{fontSize:10.5,fontWeight:600,color:P.dust,whiteSpace:"nowrap"}}>
                      {showStaples?"▴":"▾"} {stapleItems.length} BASISVARER (har vanligvis hjemme)
                    </span>
                    <div style={{flex:1,height:"0.5px",background:P.border}}/>
                  </button>
                  {showStaples && stapleItems.map(item => {
                    const rem = removed.has(item.id);
                    return (
                      <div key={item.id} onClick={()=>toggleRemove(item.id)}
                        style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",marginBottom:3,
                          borderRadius:8,border:`1px solid ${rem?P.border:P.goldL}`,
                          background:rem?P.mist:P.goldXL,cursor:"pointer",opacity:rem?0.5:1}}>
                        <div style={{width:20,height:20,borderRadius:5,flexShrink:0,
                          background:rem?"transparent":P.gold,border:`1.5px solid ${rem?P.hazelL:P.gold}`,
                          display:"flex",alignItems:"center",justifyContent:"center"}}>
                          {!rem&&<Em e="✓" s={{fontSize:11,color:"white"}}/>}
                        </div>
                        <span style={{flex:1,fontSize:13,color:P.ink,textDecoration:rem?"line-through":"none"}}>{item.name}</span>
                        <span style={{fontSize:11,color:P.dust}}>{item.amount}{item.unit?" "+item.unit:""}</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {/* Basisvare-spørsmål */}
          {staplePrompt && (
            <div style={{position:"absolute",inset:0,background:"rgba(44,35,24,0.4)",display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"20px 20px 0 0",zIndex:10,padding:24}}>
              <div style={{background:P.linen,borderRadius:12,padding:"20px",width:"100%",maxWidth:320,boxShadow:"0 4px 24px rgba(44,35,24,0.15)"}}>
                <div style={{fontSize:14,fontWeight:600,color:P.ink,marginBottom:6}}>Har du vanligvis «{staplePrompt.name}» hjemme?</div>
                <div style={{fontSize:12,color:P.stone,marginBottom:16,lineHeight:1.6}}>Basisvarer avhukes automatisk neste gang de dukker opp i en handleliste.</div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>confirmStaple(false)}
                    style={{flex:1,padding:"10px",background:P.mist,border:`1px solid ${P.border}`,borderRadius:9,fontSize:13,cursor:"pointer",color:P.stone,fontWeight:500}}>
                    Nei
                  </button>
                  <button onClick={()=>confirmStaple(true)}
                    style={{flex:1,padding:"10px",background:P.hazel,color:"white",border:"none",borderRadius:9,fontSize:13,cursor:"pointer",fontWeight:600}}>
                    Ja, basisvare
                  </button>
                </div>
              </div>
            </div>
          )}
          <div style={{display:"flex",gap:8}}>
            <button onClick={onClose} style={{flex:1,padding:"10px",background:P.mist,border:`1px solid ${P.border}`,borderRadius:9,fontSize:13,cursor:"pointer",color:P.stone}}>Avbryt</button>
            <button onClick={addToList}
              style={{flex:2,padding:"10px",background:P.hazel,color:"white",border:"none",borderRadius:9,fontSize:13,cursor:"pointer",fontWeight:600}}>
              Legg til {activeCount} varer →
            </button>
          </div>
        </div>
      )}
    </Modal>
  );
}


// ── Bekreft middag-modal ──────────────────────────────────────────
const MEAL_RATINGS = [
  {id:"favorite", emoji:"❤️", label:"Familiefavoritt"},
  {id:"good",     emoji:"🙂", label:"Fungerte fint"},
  {id:"unsure",   emoji:"🤔", label:"Usikker"},
  {id:"no",       emoji:"👎", label:"Lager neppe igjen"},
];

function BekreftMiddag({mealVal, recipes, onClose, onConfirm}) {
  const mealName = getMealName(mealVal);
  const [step,setStep]     = useState("confirm"); // "confirm"|"rating"
  const [rating,setRating] = useState(null);

  const handleYes = () => setStep("rating");
  const handleNo  = () => { onConfirm(null, null); onClose(); };
  const handleRating = (r) => {
    setRating(r);
    onConfirm("yes", r);
    onClose();
  };

  return (
    <Modal title="Bekreft middag" onClose={onClose}>
      {step==="confirm" && (
        <div>
          <div style={{fontSize:15,fontWeight:600,color:P.ink,marginBottom:4}}>{mealName}</div>
          <div style={{fontSize:13,color:P.stone,marginBottom:20}}>Ble dette dagens middag?</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <button onClick={handleYes}
              style={{padding:"13px",background:P.hazel,color:"white",border:"none",
                borderRadius:9,fontSize:14,cursor:"pointer",fontWeight:600}}>
              ✓ Ja
            </button>
            <button onClick={handleNo}
              style={{padding:"13px",background:P.mist,border:`1px solid ${P.border}`,
                borderRadius:9,fontSize:14,cursor:"pointer",color:P.stone,fontWeight:500}}>
              Nei, vi spiste noe annet
            </button>
          </div>
        </div>
      )}
      {step==="rating" && (
        <div>
          <div style={{fontSize:15,fontWeight:600,color:P.ink,marginBottom:4}}>{mealName}</div>
          <div style={{fontSize:13,color:P.stone,marginBottom:16}}>Hvordan fungerte den?</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {MEAL_RATINGS.map(r=>(
              <button key={r.id} onClick={()=>handleRating(r.id)}
                style={{display:"flex",alignItems:"center",gap:12,padding:"13px 16px",
                  background:P.mist,border:`1px solid ${P.border}`,borderRadius:9,
                  fontSize:14,cursor:"pointer",textAlign:"left",fontWeight:500,color:P.ink}}>
                <span style={{fontSize:22}}>{r.emoji}</span>
                <span>{r.label}</span>
              </button>
            ))}
          </div>
        </div>
      )}
    </Modal>
  );
}

// ── Plan Screen ───────────────────────────────────────────────────
function PlanScreen({allMeals,setWeekMeals,recipes,shopping,setShopping,itemHistory,staples,onOpenRecipe}) {
  const todayKey = getWeekKey(new Date());
  const [weekKey,setWeekKey] = useState(todayKey);
  const [editing,setEditing] = useState(null);
  const [query,setQuery]     = useState("");
  const [showEvents,setShowEvents] = useState(null);
  const [addingRec,setAddingRec]     = useState(null);
  const [addQuery,setAddQuery]       = useState("");
  const [showGenerator,setShowGenerator] = useState(false);
  const [confirmDay,setConfirmDay]   = useState(null); // dag som skal bekreftes
  const meals = allMeals[weekKey] || {};
  const isCurrentWeek = weekKey===todayKey;
  const todayIdx = (new Date().getDay()+6)%7;

  const setMeal = (day,val) => setWeekMeals(weekKey,{...meals,[day]:val});
  const startEdit = d => { setEditing(d); setQuery(getMealName(meals[d])); };
  const closeEdit = () => { setEditing(null); setQuery(""); };
  const pickRec = (day,r) => {
    setMeal(day, {type:"recipe", name:r.name, recipeId:r.id});
    setEditing(null); setQuery("");
  };
  const addRecToMenu = (day, r) => {
    const cur = meals[day];
    const existing = getMealRecipes(cur);
    // Ikke legg til duplikat
    if(existing.some(e=>e.recipeId===r.id||e.name===r.name)) { setAddingRec(null); setAddQuery(""); return; }
    const newRecipes = [...existing, {name:r.name, recipeId:r.id}];
    const menuName = newRecipes.map(e=>e.name).join(" · ");
    setMeal(day, {type:"menu", name:menuName, recipes:newRecipes});
    setAddingRec(null); setAddQuery("");
  };
  const removeRecFromMenu = (day, idx) => {
    const cur = meals[day];
    const recs = getMealRecipes(cur).filter((_,i)=>i!==idx);
    if(recs.length===0) { setMeal(day,""); return; }
    if(recs.length===1) { setMeal(day,{type:"recipe",name:recs[0].name,recipeId:recs[0].recipeId}); return; }
    setMeal(day,{type:"menu",name:recs.map(r=>r.name).join(" · "),recipes:recs});
  };
  const clearDay = (day,e) => { e.stopPropagation(); setMeal(day,""); };

  const hits = query.length>0
    ? recipes.filter(r=>r.name.toLowerCase().includes(query.toLowerCase())||(r.tags||[]).some(t=>t.toLowerCase().includes(query.toLowerCase())))
    : [];

  const mon=getMondayOfWeek(weekKey); const sun=new Date(mon); sun.setDate(mon.getDate()+6);

  return (
    <div>
      <div style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontSize:20,fontWeight:600,color:P.ink}}>Middagsplan</div>
          <button onClick={()=>setShowGenerator(true)}
            style={{background:P.hazel,color:"white",border:"none",borderRadius:9,
              padding:"7px 13px",fontSize:12.5,cursor:"pointer",fontWeight:600,
              display:"flex",alignItems:"center",gap:5}}>
            🛒 Lag handleliste
          </button>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:isCurrentWeek?0:8}}>
          <button onClick={()=>setWeekKey(addWeeks(weekKey,-1))} style={{background:P.mist,border:`1px solid ${P.border}`,borderRadius:8,padding:"5px 12px",cursor:"pointer",color:P.stone,fontSize:16}}>‹</button>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:12,fontWeight:600,color:isCurrentWeek?P.hazel:P.stone}}>{isCurrentWeek?"Denne uken":weekKey.replace("-W"," · Uke ")}</div>
            <div style={{fontSize:11,color:P.dust}}>{fmtShort(mon)} – {fmtShort(sun)}</div>
          </div>
          <button onClick={()=>setWeekKey(addWeeks(weekKey,1))} style={{background:P.mist,border:`1px solid ${P.border}`,borderRadius:8,padding:"5px 12px",cursor:"pointer",color:P.stone,fontSize:16}}>›</button>
        </div>
        {!isCurrentWeek && (
          <button onClick={()=>setWeekKey(todayKey)} style={{width:"100%",padding:"5px",background:P.hazelXL,border:`1px solid ${P.hazelL}`,borderRadius:8,fontSize:11.5,cursor:"pointer",color:P.hazel,fontWeight:500}}>
            📅 Gå til denne uken
          </button>
        )}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {DAYS.map((day,i) => {
          const isEd=editing===day;
          const mealVal=meals[day];
          const mealName=getMealName(mealVal);
          const mealIsEvent=isEvent(mealVal);
          const has=!!mealVal;
          const isToday=isCurrentWeek&&i===todayIdx, isPast=isCurrentWeek&&i<todayIdx;
          const matchRec=!mealIsEvent && recipes.find(r=>r.name.toLowerCase()===mealName.toLowerCase());
          const dayDate=getDayDate(weekKey,i);
          return (
            <div key={day}>
              <div onClick={()=>!isEd&&startEdit(day)} style={{background:isPast?"#F5F2EE":P.linen,borderRadius:isEd&&hits.length>0?"11px 11px 0 0":11,border:`1px solid ${isEd?P.hazel:isToday?P.hazel:P.border}`,borderLeft:isToday&&!isEd?`3px solid ${P.hazel}`:`1px solid ${isEd?P.hazel:P.border}`,padding:"10px 12px",cursor:isEd?"default":"pointer",opacity:isPast?0.7:1}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{minWidth:44,height:44,borderRadius:9,flexShrink:0,background:isToday?P.hazel:isPast?P.hazelL:P.mist,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                    <span style={{fontSize:9,fontWeight:600,color:isToday?"rgba(255,255,255,0.7)":P.dust}}>{DAY_S[day]}</span>
                    <span style={{fontSize:15,fontWeight:600,color:isToday?"white":P.ink}}>{dayDate.getDate()}</span>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    {isEd ? (
                      <div onClick={e=>e.stopPropagation()}>
                        <input autoFocus value={query} onChange={e=>{setMeal(day,e.target.value);setQuery(e.target.value);}}
                          onKeyDown={e=>{if(e.key==="Escape")closeEdit();if(e.key==="Enter"&&hits.length===0)closeEdit();}}
                          placeholder="Søk i kokebok eller skriv inn…"
                          style={{width:"100%",fontSize:13,boxSizing:"border-box",background:P.sand,border:`1px solid ${P.hazel}`,padding:"7px 10px",borderRadius:7,color:P.ink,outline:"none"}}/>
                      </div>
                    ) : (
                      <div>
                        {/* Visning: hendelse, meny, enkeltoppskrift eller tom */}
                        {!has && <div style={{fontSize:13.5,fontWeight:400,color:P.dust}}>Legg til middag…</div>}
                        {has && mealIsEvent && (
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <div style={{fontSize:13.5,fontWeight:600,color:P.ink,flex:1}}>{mealName}</div>
                            <span style={{fontSize:10,background:P.duskXL,color:P.dusk,borderRadius:5,padding:"1px 6px",fontWeight:500}}>hendelse</span>
                          </div>
                        )}
                        {has && !mealIsEvent && (() => {
                          const recs = getMealRecipes(mealVal);
                          return (
                            <div>
                              {recs.map((rec,ri) => (
                                <div key={ri} style={{display:"flex",alignItems:"center",gap:4,marginBottom:ri<recs.length-1?2:0}}>
                                  <span style={{fontSize:13.5,fontWeight:600,color:P.ink,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{rec.name}</span>
                                  {recs.length>1 && <button onClick={e=>{e.stopPropagation();removeRecFromMenu(day,ri);}}
                                    style={{background:"none",border:"none",cursor:"pointer",color:P.dust,fontSize:12,padding:"0 2px",opacity:.5,flexShrink:0}}>✕</button>}
                                </div>
                              ))}
                              {recs.length===1 && recipes.find(r=>r.name.toLowerCase()===recs[0].name.toLowerCase()) &&
                                <div style={{fontSize:11,color:P.dust,marginTop:1}}>
                                  ⏱ {recipes.find(r=>r.name.toLowerCase()===recs[0].name.toLowerCase()).time} min
                                </div>
                              }
                            </div>
                          );
                        })()}
                      </div>
                    )}
                  </div>
                  <div style={{display:"flex",gap:5,alignItems:"center",flexShrink:0}}>
                    {isEd ? (
                      <div style={{display:"flex",gap:5}}>
                        <button onClick={()=>{setShowEvents(day);setEditing(null);setQuery("");}}
                          style={{background:P.duskXL,border:`1px solid ${P.duskL}`,borderRadius:7,padding:"5px 8px",fontSize:11,cursor:"pointer",color:P.dusk,fontWeight:500}}>
                          🏡 Hendelse
                        </button>
                        <button onClick={closeEdit} style={{background:P.mist,border:`1px solid ${P.border}`,borderRadius:7,padding:"5px 10px",fontSize:11.5,cursor:"pointer",color:P.stone,fontWeight:500}}>Ferdig</button>
                      </div>
                    ) : (
                      <>
                        {has && !mealIsEvent && isToday && (
                          <button onClick={e=>{e.stopPropagation();setConfirmDay(day);}}
                            style={{background:P.hazelXL,border:`1px solid ${P.hazelL}`,borderRadius:7,padding:"5px 8px",fontSize:11,cursor:"pointer",color:P.hazel,fontWeight:500,whiteSpace:"nowrap"}}>
                            ✓ Bekreft
                          </button>
                        )}
                        {has && !mealIsEvent && !isToday && (
                          <button onClick={e=>{e.stopPropagation();setAddingRec(day);setAddQuery("");}}
                            style={{background:P.oliveXL,border:`1px solid ${P.oliveL}`,borderRadius:7,padding:"5px 8px",fontSize:11,cursor:"pointer",color:P.olive,fontWeight:500,whiteSpace:"nowrap"}}>
                            ＋ Rett
                          </button>
                        )}
                        {has && !mealIsEvent && (() => {
                          const firstRec = recipes.find(r=>r.name.toLowerCase()===(getMealRecipes(mealVal)[0]&&getMealRecipes(mealVal)[0].name).toLowerCase());
                          return firstRec && onOpenRecipe ? (
                            <button onClick={e=>{e.stopPropagation();onOpenRecipe(firstRec.id);}}
                              style={{background:P.hazelXL,border:`1px solid ${P.hazelL}`,borderRadius:7,padding:"5px 8px",fontSize:11,cursor:"pointer",color:P.hazel,fontWeight:500}}>
                              📖
                            </button>
                          ) : null;
                        })()}
                        {has && <button onClick={e=>clearDay(day,e)} style={{background:"none",border:"none",color:P.dust,cursor:"pointer",fontSize:15,padding:"2px",opacity:.6}}>✕</button>}
                        {!has && <Em e="＋" s={{color:P.dust,fontSize:16}}/>}
                      </>
                    )}
                  </div>
                </div>
              </div>
              {isEd && hits.length>0 && (
                <div style={{border:`1px solid ${P.hazel}`,borderTop:"none",borderRadius:"0 0 11px 11px",background:P.linen,overflow:"hidden"}}>
                  {hits.map((r,ri) => {
                    const wkMeals = allMeals[weekKey]||{};
                    const plannedDay = DAYS.find(d=>d!==day&&getMealName(wkMeals[d]).toLowerCase()===r.name.toLowerCase());
                    return (
                      <div key={r.id} onClick={()=>!plannedDay&&pickRec(day,r)}
                        style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderTop:ri>0?`1px solid ${P.border}`:"none",cursor:plannedDay?"default":"pointer",opacity:plannedDay?0.5:1}}
                        onMouseEnter={e=>{if(!plannedDay)e.currentTarget.style.background=P.hazelXL;}}
                        onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                        <IBox emoji="🍳" color={plannedDay?P.hazelL:P.dusk} size={30}/>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:500,color:plannedDay?P.dust:P.ink}}>{r.name}</div>
                          <div style={{fontSize:11,color:P.dust}}>
                            {plannedDay
                              ? <span style={{color:P.clay}}>⚠️ Planlagt {DAY_FULL[plannedDay].toLowerCase()}</span>
                              : <span>⏱ {r.time} min · 👥 {r.servings} pers</span>}
                          </div>
                        </div>
                        {!plannedDay && <Em e="↵" s={{color:P.hazelL,fontSize:14}}/>}
                      </div>
                    );
                  })}
                </div>
              )}
              {/* Søk etter ekstra rett på dagen */}
              {addingRec===day && (
                <div style={{border:`1px solid ${P.hazel}`,borderTop:"none",background:P.linen,borderRadius:"0 0 11px 11px",overflow:"hidden"}}>
                  <div style={{padding:"8px 12px",borderBottom:`1px solid ${P.border}`}} onClick={e=>e.stopPropagation()}>
                    <input autoFocus value={addQuery} onChange={e=>setAddQuery(e.target.value)}
                      placeholder="Søk etter rett å legge til…"
                      style={{width:"100%",fontSize:13,boxSizing:"border-box",background:P.sand,
                        border:`1px solid ${P.hazel}`,padding:"7px 10px",borderRadius:7,color:P.ink,outline:"none"}}/>
                  </div>
                  {addQuery.length>0 && recipes
                    .filter(r=>r.name.toLowerCase().includes(addQuery.toLowerCase()))
                    .slice(0,6)
                    .map((r,ri)=>(
                      <div key={r.id} onClick={()=>addRecToMenu(day,r)}
                        style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",
                          borderTop:ri>0?`1px solid ${P.border}`:"none",cursor:"pointer"}}
                        onMouseEnter={e=>e.currentTarget.style.background=P.hazelXL}
                        onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                        <IBox emoji="🍳" color={P.dusk} size={28}/>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:500,color:P.ink}}>{r.name}</div>
                          <div style={{fontSize:11,color:P.dust}}>⏱ {r.time} min · 👥 {r.servings} pers</div>
                        </div>
                        <Em e="↵" s={{color:P.hazelL,fontSize:14}}/>
                      </div>
                    ))
                  }
                  {addQuery.length===0 && (
                    <div style={{padding:"10px 12px",fontSize:12,color:P.dust,textAlign:"center"}}>
                      Skriv for å søke i kokebok
                    </div>
                  )}
                  <div style={{padding:"8px 12px",borderTop:`1px solid ${P.border}`}}>
                    <button onClick={()=>{setAddingRec(null);setAddQuery("");}}
                      style={{fontSize:12,color:P.stone,background:"none",border:"none",cursor:"pointer",padding:0}}>
                      Avbryt
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {confirmDay && (
        <BekreftMiddag
          mealVal={meals[confirmDay]}
          recipes={recipes}
          onClose={()=>setConfirmDay(null)}
          onConfirm={async (result, rating) => {
            if(result==="yes") {
              const mealName = getMealName(meals[confirmDay]);
              const recipe = recipes.find(r=>r.name.toLowerCase()===mealName.toLowerCase());
              const now = Date.now();
              // Logg hendelse
              await _db.ref(`${FAM}/events/${now}_confirm`).set({
                type:"meal_confirmed", meal:mealName, rating, ts:now
              });
              // Oppdater oppskrift: sist laget + antall ganger
              if(recipe) {
                const timesCooked = (recipe.timesCooked||0)+1;
                const updatedRecipe = {...recipe, lastCooked:now, timesCooked};
                setRecipes(p=>p.map(r=>r.id===recipe.id?updatedRecipe:r));
              }
            }
          }}
        />
      )}
      {showGenerator && (
        <ShoppingGenerator
          allMeals={allMeals}
          weekKey={weekKey}
          recipes={recipes}
          itemHistory={itemHistory}
          staples={staples}
          onClose={()=>setShowGenerator(false)}
          onAddToList={newItems => setShopping(prev=>{
            // Slå sammen med existing2 — behold manuelle varer
            const list = [...prev];
            newItems.forEach(ni => {
              const existing = list.findIndex(e=>e.name.toLowerCase()===ni.name.toLowerCase()&&!e.done);
              if(existing>=0) {
                // Legg til mengde
                const a=parseFloat(list[existing].amount)||0;
                const b=parseFloat(ni.amount)||0;
                if(a>0&&b>0) list[existing]={...list[existing],amount:String(Math.round((a+b)*100)/100)};
              } else {
                list.push(ni);
              }
            });
            return list;
          })}
        />
      )}
      {showEvents && (
        <Modal title="Velg hendelse" onClose={()=>setShowEvents(null)}>
          <div style={{fontSize:12,color:P.stone,marginBottom:12,lineHeight:1.6}}>
            Hendelser markerer dagen som planlagt, men genererer ikke ingredienser til handlelisten.
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {MEAL_EVENTS.map(ev=>(
              <button key={ev.name} onClick={()=>{
                setMeal(showEvents, {type:"event", name:ev.name, emoji:ev.emoji});
                setShowEvents(null);
              }} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",
                background:P.mist,border:`1px solid ${P.border}`,borderRadius:9,
                cursor:"pointer",textAlign:"left",fontSize:13,color:P.ink,fontWeight:500}}>
                <span style={{fontSize:20,flexShrink:0}}>{ev.emoji}</span>
                <span>{ev.name}</span>
              </button>
            ))}
          </div>
        </Modal>
      )}
    </div>
  );
}



// ── Oppskriftshjelper ─────────────────────────────────────────────
const getIngredients = (recipe) => {
  if(!recipe) return [];
  if(recipe.ingredientGroups && recipe.ingredientGroups.length>0)
    return recipe.ingredientGroups.flatMap(g=>g.ingredients||[]);
  return recipe.ingredients||[];
};
const flatToGroups = (ingredients, groupName="Ingredienser") => [
  {id:uid(), name:groupName, ingredients: ingredients||[]}
];

// Global ingredienshistorikk (oppdateres av RecipesScreen)
let _globalRecipes = [];

// ── IngredientRows ────────────────────────────────────────────────
function IngredientRows({rows, setRows, allRecipes}) {
  const UNITS = ["stk","g","kg","ml","dl","l","ss","ts","pk","boks","pose","etter behov"];
  const emptyRow = () => ({id:uid(), name:"", amount:"", unit:"stk"});

  const allIngNames = React.useMemo(() => {
    const names = new Set();
    (allRecipes||[]).forEach(r => {
      getIngredients(r).forEach(i => { if(i.name) names.add(i.name); });
    });
    return [...names];
  }, [allRecipes]);

  const [focusId, setFocusId] = React.useState(null);
  const [suggestions, setSuggestions] = React.useState([]);

  const updateRow = (id, field, val) => {
    setRows(prev => {
      const next = prev.map(r => r.id===id ? {...r,[field]:val} : r);
      const last = next[next.length-1];
      if(last.name.trim() && field==="name") return [...next, emptyRow()];
      return next;
    });
    if(field==="name" && val.length>=2) {
      const s = allIngNames.filter(n=>n.toLowerCase().startsWith(val.toLowerCase())&&n.toLowerCase()!==val.toLowerCase());
      setSuggestions(s.slice(0,5).map(n=>({rowId:id, n})));
    } else {
      setSuggestions([]);
    }
  };

  const moveRow = (idx, dir) => {
    setRows(prev => {
      const next=[...prev]; const to=idx+dir;
      if(to<0||to>=next.length) return prev;
      [next[idx],next[to]]=[next[to],next[idx]];
      return next;
    });
  };
  const removeRow = (id) => setRows(prev => prev.length>1 ? prev.filter(r=>r.id!==id) : prev);

  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 60px 80px 52px",gap:5,marginBottom:4,paddingLeft:2}}>
        <span style={{fontSize:10,color:P.dust}}>Ingrediens</span>
        <span style={{fontSize:10,color:P.dust}}>Mengde</span>
        <span style={{fontSize:10,color:P.dust}}>Enhet</span>
        <span/>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:5}}>
        {rows.map((row,idx) => {
          const rowSugs = focusId===row.id ? suggestions.filter(s=>s.rowId===row.id) : [];
          return (
            <div key={row.id}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 60px 80px 52px",gap:5,alignItems:"center"}}>
                <div style={{position:"relative"}}>
                  <input value={row.name}
                    onChange={e=>updateRow(row.id,"name",e.target.value)}
                    onFocus={()=>setFocusId(row.id)}
                    onBlur={()=>setTimeout(()=>setSuggestions([]),150)}
                    placeholder={idx===0?"f.eks. Kjøttdeig":""}
                    autoComplete="off"
                    style={{fontSize:13,background:P.sand,padding:"7px 9px",width:"100%",boxSizing:"border-box"}}/>
                  {rowSugs.length>0 && (
                    <div style={{position:"absolute",top:"100%",left:0,right:0,background:P.linen,
                      border:`1px solid ${P.hazel}`,borderTop:"none",borderRadius:"0 0 8px 8px",zIndex:10,overflow:"hidden"}}>
                      {rowSugs.map((s,i)=>(
                        <div key={i} onMouseDown={()=>{ updateRow(row.id,"name",s.n); setSuggestions([]); }}
                          style={{padding:"6px 10px",fontSize:12,cursor:"pointer",color:P.ink}}
                          onMouseEnter={e=>e.currentTarget.style.background=P.hazelXL}
                          onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                          {s.n}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                <input value={row.amount} onChange={e=>updateRow(row.id,"amount",e.target.value)}
                  placeholder="500" type="number" min="0"
                  style={{fontSize:13,background:P.sand,padding:"7px 6px",textAlign:"right"}}/>
                <select value={row.unit} onChange={e=>updateRow(row.id,"unit",e.target.value)}
                  style={{fontSize:12,background:P.sand,padding:"7px 4px"}}>
                  {UNITS.map(u=><option key={u} value={u}>{u}</option>)}
                </select>
                <div style={{display:"flex",gap:2,justifyContent:"center"}}>
                  <button onClick={()=>moveRow(idx,-1)} disabled={idx===0}
                    style={{background:"none",border:"none",cursor:idx===0?"default":"pointer",color:idx===0?"transparent":P.dust,fontSize:13,padding:"2px 3px",lineHeight:1}}>↑</button>
                  <button onClick={()=>moveRow(idx,1)} disabled={idx===rows.length-1}
                    style={{background:"none",border:"none",cursor:idx===rows.length-1?"default":"pointer",color:idx===rows.length-1?"transparent":P.dust,fontSize:13,padding:"2px 3px",lineHeight:1}}>↓</button>
                  <button onClick={()=>removeRow(row.id)}
                    style={{background:"none",border:"none",cursor:rows.length>1?"pointer":"default",color:rows.length>1?P.dust:"transparent",fontSize:13,padding:"2px 3px",lineHeight:1}}>✕</button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      <button onClick={()=>setRows(p=>[...p,emptyRow()])}
        style={{marginTop:8,fontSize:12,color:P.hazel,background:"none",border:"none",cursor:"pointer",padding:"4px 0",fontWeight:500}}>
        ＋ Legg til ingrediens
      </button>
    </div>
  );
}

// ── Legg til oppskrift — ny enkel flyt ───────────────────────────
function AddRecipeModal({onSave,onClose,logEvent}) {
  const RECIPE_TYPES = [
    {id:"Middag",  emoji:"🍽️"}, {id:"Frokost", emoji:"🍳"},
    {id:"Lunsj",   emoji:"🥪"}, {id:"Dessert",  emoji:"🍰"},
    {id:"Bakst",   emoji:"🍪"}, {id:"Tilbehør", emoji:"🥗"},
    {id:"Drikke",  emoji:"🥤"}, {id:"Annet",    emoji:"⭐"},
  ];
  const UNITS = ["stk","g","kg","ml","dl","l","ss","ts","pk","boks","pose","etter behov"];
  const emptyRow = () => ({id:uid(), name:"", amount:"", unit:"stk"});
  const emptyGroup = (n="Ingredienser") => ({id:uid(), name:n, rows:[emptyRow()]});

  const [mode,setMode]     = useState("quick");
  const [cat,setCat]       = useState("Middag");
  const [name,setName]     = useState("");
  const [rows,setRows]     = useState([emptyRow()]);    // brukes naar ingen grupper
  const [groups,setGroups] = useState([]);              // tom = ingen grupper
  const [instructions,setInstructions] = useState("");
  const [url,setUrl]       = useState("");
  const [urlSt,setUrlSt]   = useState("");
  const [urlData,setUrlData] = useState(null);
  const [imgPreview,setImgPreview] = useState(null);
  const fileRef = React.useRef();
  const nameRef = React.useRef();

  // Auto-legg til ny rad naar siste rad fylles ut
  const updateRow = (id, field, val) => {
    setRows(prev => {
      const next = prev.map(r => r.id===id ? {...r,[field]:val} : r);
      const last = next[next.length-1];
      if(last.name.trim() && field==="name") return [...next, emptyRow()];
      return next;
    });
  };
  const removeRow = (id) => setRows(prev => prev.length>1 ? prev.filter(r=>r.id!==id) : prev);

  const rowsToIngs = (rws) => rws.filter(r=>r.name.trim()).map(r=>({
    name: r.name.trim(),
    amount: r.amount ? `${r.amount} ${r.unit}`.trim() : "",
    unit: r.unit,
    cat: "Diverse",
  }));

  const buildRecipe = (extra={}) => {
    const hasGroups = groups.length>0;
    return {
      name: name.trim(),
      cat,
      ingredients: hasGroups ? [] : rowsToIngs(rows),
      ingredientGroups: hasGroups
        ? groups.map(g=>({id:g.id, name:g.name, ingredients:rowsToIngs(g.rows)}))
        : [],
      instructions: instructions.trim(),
      time:0, servings:0, tags:[], url:"", imageUrl:null,
      source:"quick", createdAt:Date.now(),
      ...extra,
    };
  };

  const addGroup = () => {
    if(groups.length===0) {
      // Første gruppe: flytt existing2 ingredienser inn i "Ingredienser"
      setGroups([{...emptyGroup("Ingredienser"), rows: rows.length>0&&rows[0].name.trim() ? rows : [emptyRow()]}]);
      setRows([emptyRow()]); // reset flat rows (ikke lenger i bruk)
    } else {
      setGroups(p=>[...p, emptyGroup("Ny gruppe")]);
    }
  };

  const updateGroup = (gid, field, val) =>
    setGroups(p=>p.map(g=>g.id===gid?{...g,[field]:val}:g));
  const removeGroup = (gid) =>
    setGroups(p=>p.filter(g=>g.id!==gid));
  const setGroupRows = (gid, updater) =>
    setGroups(p=>p.map(g=>g.id===gid?{...g,rows:typeof updater==="function"?updater(g.rows):updater}:g));

  const saveQuick = () => {
    if(!name.trim()) return;
    const recipe = buildRecipe();
    onSave(recipe);
    if(logEvent) logEvent("recipe_added",{source:"quick",name:recipe.name,cat});
    onClose();
  };

  // URL
  const fetchUrl = async () => {
    if(!url.trim()){setUrlSt("Lim inn en URL");return;}
    setUrlSt("loading");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,
          tools:[{type:"web_search_20250305",name:"web_search"}],
          messages:[{role:"user",content:"Besøk denne siden og hent oppskriften: "+url+"\nReturner KUN JSON: {\"name\":\"...\",\"time\":20,\"servings\":4,\"cat\":\"Middag\",\"tags\":[\"enkel\"],\"ingredients\":[{\"name\":\"Pasta\",\"amount\":\"400g\",\"cat\":\"Tørrvarer\"}]}"}]})
      });
      const d=await res.json();
      const txt=d.content&&d.content.filter(c=>c.type==="text").map(c=>c.text).join("").replace(/```json|```/g,"").trim();
      const s=txt.indexOf("{"),e=txt.lastIndexOf("}");
      if(s===-1) throw 0;
      const p=JSON.parse(txt.slice(s,e+1));
      setUrlData({name:p.name||"",time:p.time||0,servings:p.servings||0,cat:p.cat||"Middag",
        tags:p.tags||[],url,ingredients:(p.ingredients||[]).map(i=>({name:i.name,amount:i.amount||"",cat:i.cat||"Diverse"})),
        imageUrl:null,source:"url",createdAt:Date.now()});
      setUrlSt("ok");
    } catch { setUrlSt("error"); }
  };

  const saveUrl = () => {
    if(!urlData) return;
    onSave(urlData);
    if(logEvent) logEvent("recipe_added",{source:"url",name:urlData.name});
    onClose();
  };

  // Bilde
  const onFileChange = (e) => {
    const file=e.target.files&&e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>setImgPreview(ev.target.result);
    reader.readAsDataURL(file);
  };
  const saveImage = () => {
    if(!imgPreview) return;
    const recipe={name:name.trim()||"Oppskrift fra bilde",cat,ingredients:[],
      time:0,servings:0,tags:[],url:"",imageUrl:imgPreview,source:"image",createdAt:Date.now()};
    onSave(recipe);
    if(logEvent) logEvent("recipe_added",{source:"image"});
    onClose();
  };

  const tabBtn = (id,emoji,label) => (
    <button onClick={()=>setMode(id)} style={{flex:1,padding:"8px 4px",border:"none",cursor:"pointer",
      background:mode===id?P.linen:"transparent",borderRadius:8,fontWeight:mode===id?600:400,
      color:mode===id?P.ink:P.stone,fontSize:11.5,
      boxShadow:mode===id?"0 1px 4px rgba(44,35,24,0.08)":"none",
      display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
      <span style={{fontSize:17}}>{emoji}</span><span>{label}</span>
    </button>
  );

  const quickReady = name.trim().length>0;

  return (
    <Modal title="Ny oppskrift" onClose={onClose}>
      {/* ── Type oppskrift ── */}
      <div style={{marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:600,color:P.dust,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Type</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {RECIPE_TYPES.map(t=>(
            <button key={t.id} onClick={()=>setCat(t.id)} style={{
              display:"flex",alignItems:"center",gap:5,padding:"6px 10px",
              borderRadius:8,border:`1px solid ${cat===t.id?P.hazel:P.border}`,
              background:cat===t.id?P.hazelXL:"transparent",
              color:cat===t.id?P.hazel:P.stone,
              fontSize:12.5,cursor:"pointer",fontWeight:cat===t.id?600:400}}>
              <span>{t.emoji}</span><span>{t.id}</span>
            </button>
          ))}
        </div>
      </div>

      {/* ── Modus-tabs ── */}
      <div style={{display:"flex",gap:4,background:P.mist,borderRadius:10,padding:3,
        border:`1px solid ${P.border}`,marginBottom:14}}>
        {tabBtn("quick","⚡","Hurtig")}
        {tabBtn("url","🔗","URL")}
        {tabBtn("image","📷","Bilde")}
      </div>

      {/* ── HURTIGREGISTRERING ── */}
      {mode==="quick" && (
        <div>
          <div style={{marginBottom:10}}>
            <input ref={nameRef} autoFocus value={name} onChange={e=>setName(e.target.value)}
              placeholder="Navn på retten…" autoComplete="off"
              style={{width:"100%",boxSizing:"border-box",fontSize:16,fontWeight:600,
                background:P.sand,border:`1.5px solid ${quickReady?P.hazel:P.border}`,
                borderRadius:9,padding:"11px 13px",color:P.ink,outline:"none"}}/>
          </div>

          <div style={{fontSize:11,fontWeight:600,color:P.dust,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Ingredienser</div>

          {groups.length===0 ? (
            <IngredientRows rows={rows} setRows={setRows} allRecipes={_globalRecipes}/>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {groups.map((g,gi)=>(
                <div key={g.id} style={{border:`1px solid ${P.border}`,borderRadius:9,padding:"10px 12px",background:P.sand}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                    <input value={g.name} onChange={e=>updateGroup(g.id,"name",e.target.value)}
                      onFocus={e=>e.target.select()}
                      style={{flex:1,fontSize:13,fontWeight:600,background:"transparent",border:"none",
                        outline:"none",color:P.ink,padding:0}}/>
                    {groups.length>1 && (
                      <button onClick={()=>removeGroup(g.id)}
                        style={{background:"none",border:"none",cursor:"pointer",color:P.dust,fontSize:12,padding:2}}>✕</button>
                    )}
                  </div>
                  <IngredientRows rows={g.rows} setRows={(u)=>setGroupRows(g.id,u)} allRecipes={_globalRecipes}/>
                </div>
              ))}
            </div>
          )}

          <button onClick={addGroup}
            style={{marginTop:8,fontSize:12,color:P.dusk,background:"none",border:"none",
              cursor:"pointer",padding:"4px 0",fontWeight:500}}>
            ＋ Legg til gruppe
          </button>

          <div style={{marginTop:14}}>
            <div style={{fontSize:11,fontWeight:600,color:P.dust,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Fremgangsmåte <span style={{fontWeight:400,textTransform:"none",letterSpacing:0,color:P.hazelL}}>(valgfritt)</span></div>
            <textarea value={instructions} onChange={e=>setInstructions(e.target.value)}
              placeholder="Skriv fremgangsmåte her…"
              rows={4}
              style={{width:"100%",boxSizing:"border-box",fontSize:13,resize:"vertical",
                background:P.sand,border:`1px solid ${P.border}`,borderRadius:9,
                padding:"9px 12px",color:P.ink,lineHeight:1.6,outline:"none",
                fontFamily:"-apple-system,sans-serif"}}/>
          </div>

          <button onClick={saveQuick} disabled={!quickReady}
            style={{width:"100%",marginTop:14,padding:"13px",
              background:quickReady?P.hazel:P.mist,
              color:quickReady?"white":P.dust,
              border:"none",borderRadius:9,fontSize:14,
              cursor:quickReady?"pointer":"default",fontWeight:600}}>
            {quickReady?`Lagre «${name.trim()}»`:"Skriv navn på retten"}
          </button>
        </div>
      )}

      {/* ── URL ── */}
      {mode==="url" && (
        <div>
          <div style={{fontSize:12,color:P.stone,marginBottom:10,lineHeight:1.6}}>
            Lim inn lenke fra matprat.no, godt.no eller andre oppskriftssider.
          </div>
          <div style={{display:"flex",gap:6,marginBottom:10}}>
            <input value={url} onChange={e=>setUrl(e.target.value)} onFocus={e=>e.target.select()}
              placeholder="https://www.matprat.no/…" autoComplete="off"
              style={{flex:1,fontSize:13,background:P.sand}}/>
            <button onClick={fetchUrl} disabled={urlSt==="loading"}
              style={{background:P.dusk,color:"white",border:"none",borderRadius:8,
                padding:"0 14px",fontSize:13,cursor:"pointer",
                opacity:urlSt==="loading"?.6:1,whiteSpace:"nowrap"}}>
              {urlSt==="loading"?"Henter…":"→ Hent"}
            </button>
          </div>
          {urlSt==="ok" && urlData && (
            <div style={{padding:"12px",background:P.oliveXL,border:`1px solid ${P.oliveL}`,borderRadius:9,marginBottom:10}}>
              <div style={{fontSize:11,color:P.olive,fontWeight:600,marginBottom:4}}>✓ Hentet</div>
              <div style={{fontSize:14,fontWeight:600,color:P.ink,marginBottom:3}}>{urlData.name}</div>
              <div style={{fontSize:12,color:P.stone}}>{urlData.ingredients.map(i=>i.name).join(" · ")}</div>
            </div>
          )}
          {urlSt==="error" && (
            <div style={{padding:"12px",background:P.clayXL,border:`1px solid ${P.clayL}`,borderRadius:9,marginBottom:10}}>
              <div style={{fontSize:12,color:P.clay,fontWeight:600,marginBottom:6}}>⚠️ Kunne ikke hente fra denne siden</div>
              <div style={{fontSize:11.5,color:P.stone,marginBottom:8}}>Prøv hurtigtekst i stedet.</div>
              <button onClick={()=>setMode("quick")}
                style={{background:P.hazel,color:"white",border:"none",borderRadius:7,
                  padding:"7px 14px",fontSize:12,cursor:"pointer",fontWeight:500}}>
                ⚡ Bytt til hurtigtekst
              </button>
            </div>
          )}
          <button onClick={saveUrl} disabled={!urlData}
            style={{width:"100%",padding:"13px",background:urlData?P.hazel:P.mist,
              color:urlData?"white":P.dust,border:"none",borderRadius:9,fontSize:14,
              cursor:urlData?"pointer":"default",fontWeight:600}}>
            {urlData?`Lagre «${urlData.name}»`:"Hent oppskrift først"}
          </button>
        </div>
      )}

      {/* ── BILDE ── */}
      {mode==="image" && (
        <div>
          <div style={{marginBottom:10}}>
            <input value={name} onChange={e=>setName(e.target.value)}
              placeholder="Navn på retten (kan fylles ut etterpå)" autoComplete="off"
              style={{width:"100%",boxSizing:"border-box",fontSize:14,background:P.sand,
                borderRadius:9,padding:"10px 13px",marginBottom:10}}/>
          </div>
          <input ref={fileRef} type="file" accept="image/*"
            onChange={onFileChange} style={{display:"none"}}/>
          {!imgPreview ? (
            <div style={{display:"flex",gap:8,marginBottom:10}}>
              <button onClick={()=>{fileRef.current.removeAttribute("capture");fileRef.current.click();}}
                style={{flex:1,padding:"16px 8px",background:P.mist,
                  border:`1.5px dashed ${P.border}`,borderRadius:9,
                  cursor:"pointer",fontSize:13,color:P.stone,fontWeight:500}}>
