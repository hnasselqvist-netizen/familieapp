            </button>
          </div>

          {/* Én post: sok+velg, deretter beskrivelse */}
          {nyAllocationMode==="single" && (
            <div style={{marginBottom:10}}>
              {nySplits.length>0 ? (
                <div style={{padding:"8px 10px",background:"#F0FFF4",border:"1px solid "+P.oliveL,borderRadius:7}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{flex:1,minWidth:0,fontSize:12,fontWeight:600,color:P.olive,
                      overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{nySplits[0].targetName}</div>
                    <NySplitBelopFelt sp={nySplits[0]} idx={0}/>
                    <button onClick={()=>setNySplits([])}
                      style={{background:"none",border:"none",cursor:"pointer",color:P.dust,fontSize:11}}>Endre</button>
                  </div>
                  <NySplitBeskrivelseFelt sp={nySplits[0]} idx={0}/>
                </div>
              ) : (
                <div>
                  <input value={nySokTekst} onChange={e=>setNySokTekst(e.target.value)}
                    placeholder="Søk budsjett-/inntektspost…" autoComplete="off"
                    style={{width:"100%",boxSizing:"border-box",fontSize:12,background:P.mist,
                      padding:"7px 9px",borderRadius:7,marginBottom:6}}/>
                  {nySokTekst.trim().length>0 && (
                    <div style={{maxHeight:140,overflowY:"auto"}}>
                      {alleMalPoster.filter(p=>p.name.toLowerCase().includes(nySokTekst.trim().toLowerCase())).slice(0,15).map(p=>(
                        <div key={p.targetType+"-"+p.id} onClick={()=>nyLeggTilSplit(p)}
                          style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",
                            padding:"5px 8px",borderRadius:6,marginBottom:2,
                            background:P.linen,border:"1px solid "+P.border}}>
                          <div style={{flex:1}}>
                            <div style={{fontSize:11.5,color:P.ink}}>{p.name}</div>
                            <div style={{fontSize:9.5,color:P.dust}}>{p.gruppe}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
          )}

          {/* Splitt: flere linjer, hver med post, belop og beskrivelse */}
          {nyAllocationMode==="split" && (
            <div style={{marginBottom:10}}>
              {nySplits.map((sp,idx)=>(
                <div key={idx} style={{marginBottom:6,padding:"6px 8px",
                  background:P.linen,border:"1px solid "+P.border,borderRadius:7}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{flex:1,minWidth:0,fontSize:12,color:P.ink,
                      overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sp.targetName}</div>
                    <NySplitBelopFelt sp={sp} idx={idx}/>
                    <button onClick={()=>nyFjernSplit(idx)}
                      style={{background:"none",border:"none",cursor:"pointer",color:P.dust,fontSize:12,opacity:.6}}>🗑️</button>
                  </div>
                  <NySplitBeskrivelseFelt sp={sp} idx={idx}/>
                </div>
              ))}

              <div style={{fontSize:11,marginBottom:8,color:nyDiff===0?P.olive:P.clay}}>
                Splittsum: {fmt(nySplitTotal)} {nyDiff!==0 && ("· gjenstår "+fmt(nyDiff))}
              </div>

              <input value={nySokTekst} onChange={e=>setNySokTekst(e.target.value)}
                placeholder="Søk budsjett-/inntektspost for å legge til splitt…" autoComplete="off"
                style={{width:"100%",boxSizing:"border-box",fontSize:12,background:P.mist,
                  padding:"7px 9px",borderRadius:7,marginBottom:6}}/>
              {nySokTekst.trim().length>0 && (
                <div style={{maxHeight:140,overflowY:"auto"}}>
                  {alleMalPoster.filter(p=>p.name.toLowerCase().includes(nySokTekst.trim().toLowerCase())).slice(0,15).map(p=>(
                    <div key={p.targetType+"-"+p.id} onClick={()=>nyLeggTilSplit(p)}
                      style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",
                        padding:"5px 8px",borderRadius:6,marginBottom:2,
                        background:P.linen,border:"1px solid "+P.border}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:11.5,color:P.ink}}>{p.name}</div>
                        <div style={{fontSize:9.5,color:P.dust}}>{p.gruppe}</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {feilmelding && (
            <div style={{fontSize:11,color:P.clay,background:"#FFF4F0",border:"1px solid #F0C4B0",
              borderRadius:7,padding:"8px 10px",marginBottom:10}}>
              {feilmelding}
            </div>
          )}

          <button onClick={registrerKvittering} disabled={lasterOpp}
            style={{width:"100%",padding:"9px",background:P.hazel,color:"white",border:"none",
              borderRadius:8,fontSize:13,cursor:lasterOpp?"default":"pointer",fontWeight:600,
              opacity:lasterOpp?0.7:1}}>
            {lasterOpp?"⏳ Laster opp…":"Registrer kvittering"}
          </button>
        </Card>
      )}

      {alle.length===0 && !visNy && (
        <div style={{textAlign:"center",padding:"32px 16px",color:P.dust,fontSize:13}}>
          Ingen kvitteringer registrert ennå.
        </div>
      )}

      {alle.slice().sort((a,b)=>new Date(b.purchaseDate||b.createdAt)-new Date(a.purchaseDate||a.createdAt)).map(r=>{
        const apen = apenId===r.id;
        const splitTotal = calculateSplitTotal(r);
        const foreslattTrans = r.matchingStatus==="suggested" && r.suggestedTransactionId
          ? (transaksjoner||[]).find(t=>t.id===r.suggestedTransactionId)
          : null;
        const konflikt = konflikter[r.id];
        // Skiller "koblet" fra "faktisk ferdig behandlet" — en kvittering
        // kan vaere lenket til en transaksjon uten at den er lukket ennaa
        // (mangler fordeling, belopsavvik). Se kobleKvitteringTilTransaksjon.
        const koblettTransaksjon = r.matchedTransactionId
          ? (transaksjoner||[]).find(t=>t.id===r.matchedTransactionId) : null;
        const erFerdigBehandlet = !!(koblettTransaksjon &&
          koblettTransaksjon.status==="behandlet" && koblettTransaksjon.behandlingstype==="kvittering");
        const statusTekst = erFerdigBehandlet ? "Ferdig behandlet"
          : r.matchingStatus==="matched" ? "Koblet"
          : r.matchingStatus==="suggested" ? "Foreslått" : "Ikke koblet";
        const statusFarge = erFerdigBehandlet ? P.olive
          : r.matchingStatus==="matched" ? "#9A7A00"
          : r.matchingStatus==="suggested" ? "#9A7A00" : P.dust;
        return (
          <div key={r.id} style={{marginBottom:6}}>
            <div onClick={()=>setApenId(apen?null:r.id)}
              style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",
                borderRadius:apen?"10px 10px 0 0":10,cursor:"pointer",
                background:P.linen,border:"1px solid "+P.border}}>
              <IBox emoji="🧾" color={P.hazel} size={32}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:500,color:P.ink,
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {r.merchant||"(ukjent leverandør)"}
                </div>
                <div style={{fontSize:10,color:P.dust}}>
                  {fmtD(r.purchaseDate)}
                  {" · "}{(r.splits||[]).length} splitt{(r.splits||[]).length!==1?"er":""}
                  {" · "}
                  <span style={{color:statusFarge}}>{statusTekst}</span>
                </div>
              </div>
              <span style={{fontSize:13,fontWeight:700,color:P.ink,flexShrink:0}}>{fmt(r.total||0)}</span>
              <span style={{color:P.dust,fontSize:10}}>{apen?"▴":"▾"}</span>
            </div>

            {foreslattTrans && !konflikt && !apen && (
              <div style={{padding:"8px 12px",background:"#FFFBE0",border:"1px solid #D4C060",
                borderTop:"none",borderRadius:"0 0 10px 10px",display:"flex",alignItems:"center",gap:8}}>
                <div style={{flex:1,fontSize:11,color:"#9A7A00"}}>
                  <div style={{fontWeight:600,marginBottom:1}}>Foreslått match</div>
                  <div>{fmtD(foreslattTrans.dato)} · {foreslattTrans.tekst} · {fmt(foreslattTrans.belop||0)}</div>
                </div>
                <button onClick={(e)=>{
                    e.stopPropagation();
                    kobleKvitteringTilTransaksjon(r, r.suggestedTransactionId);
                  }}
                  style={{background:P.hazel,color:"white",border:"none",borderRadius:7,
                    padding:"6px 12px",fontSize:11,cursor:"pointer",fontWeight:600,flexShrink:0}}>
                  Koble
                </button>
              </div>
            )}

            {konflikt && !apen && (
              <div style={{padding:"8px 12px",
                background:konflikt.kunLenke?"#FFFBE0":"#FFF4F0",
                border:"1px solid "+(konflikt.kunLenke?"#D4C060":"#F0C4B0"),
                borderTop:"none",borderRadius:"0 0 10px 10px"}}>
                <div style={{fontSize:11,color:konflikt.kunLenke?"#9A7A00":P.clay,
                  marginBottom:(konflikt.kode==="transaksjon_har_avvikende_actual"||konflikt.kunLenke)?8:0}}>
                  {KONFLIKT_TEKST[konflikt.kode]||"Kunne ikke fullføre koblingen."}
                </div>
                {konflikt.kode==="transaksjon_har_avvikende_actual" && (
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={(e)=>{e.stopPropagation();
                        kobleKvitteringTilTransaksjon(r,konflikt.transactionId,"bruk_kvittering");}}
                      style={{flex:1,padding:"6px 8px",background:P.hazel,color:"white",border:"none",
                        borderRadius:6,fontSize:10.5,cursor:"pointer",fontWeight:600}}>
                      Bruk kvitteringens fordeling
                    </button>
                    <button onClick={(e)=>{e.stopPropagation();
                        kobleKvitteringTilTransaksjon(r,konflikt.transactionId,"behold_eksisterende");}}
                      style={{flex:1,padding:"6px 8px",background:"none",border:"1px solid "+P.border,
                        borderRadius:6,fontSize:10.5,cursor:"pointer",color:P.stone}}>
                      Behold eksisterende
                    </button>
                  </div>
                )}
                {konflikt.kunLenke && (
                  <button onClick={(e)=>{e.stopPropagation();
                      kobleKvitteringTilTransaksjon(r,konflikt.transactionId);}}
                    style={{width:"100%",padding:"6px 8px",background:"none",border:"1px solid #D4C060",
                      borderRadius:6,fontSize:10.5,cursor:"pointer",color:"#9A7A00",fontWeight:600}}>
                    Prøv igjen
                  </button>
                )}
              </div>
            )}

            {apen && <KvitteringDetalj r={r}/>}
          </div>
        );
      })}
    </div>
  );
}


function BankimportScreen({transaksjoner,setTransaksjoner,rules,setRules,actual,setActual,receipts,setReceipts,liquidity,budgetGroups,incomeGroups}) {
  // ── Import-state ─────────────────────────────────────────────────
  const [visImport,setVisImport] = useState(false);
  const [kilde,setKilde]         = useState("sparebank1");
  const [preview,setPreview]     = useState(null);

  // ── Behandlings-state ────────────────────────────────────────────
  const [seksjon,setSeksjon]     = useState("vurdering");
  const [valgtKonto,setValgtKonto] = useState("alle");
  const [apenId,setApenId]       = useState(null);

  const KILDER = [
    {id:"sparebank1",label:"SpareBank 1"},
    {id:"dnb",       label:"DNB / Mastercard"},
    {id:"annet",     label:"Annet"},
  ];

  const KONTOER = [
    {id:"alle",          label:"Alle"},
    {id:"MC",            label:"MC"},
    {id:"regningskonto", label:"Regningskonto"},
    {id:"felleskonto",   label:"Felleskonto"},
    {id:"helen",         label:"Helen"},
    {id:"eivind",        label:"Eivind"},
  ];

  // ── Leverandor-laering (lagres i Firebase via transaksjoner) ─────
  // Regelbasert oppslag — brukes til forhandsvisning ved import
  const finnRegelForTekst = (tekst) => {
    const norm = normaliserTransaksjonstekst(tekst);
    return findMatchingRule({normalizedText:norm}, rules||[]);
  };

  // ── Normaliser transaksjonstekst for stabil laering ──────────────
  const normaliserTransaksjonstekst = (tekst) => {
    if(!tekst) return "";
    let t = tekst.toLowerCase();
    // Fjern maaneder (norsk, forkortet og fullt)
    t = t.replace(/\b(jan|feb|mar|apr|mai|jun|jul|aug|sep|okt|nov|des)\.?\s*\d{0,4}\b/g,"");
    t = t.replace(/\b(januar|februar|mars|april|mai|juni|juli|august|september|oktober|november|desember)\b/g,"");
    // Fjern aartall (2020-2099)
    t = t.replace(/\b20\d{2}\b/g,"");
    // Fjern datoer DD.MM.YYYY, DD.MM, DD/MM
    t = t.replace(/\b\d{1,2}[.\/]\d{1,2}([.\/]\d{2,4})?\b/g,"");
    // Fjern KID og referansenummer (lange tallsekvenser, 6+ siffer)
    t = t.replace(/\b\d{6,}\b/g,"");
    // Fjern loepenummer i parentes eller etter #
    t = t.replace(/#\d+/g,"");
    t = t.replace(/\(\d+\)/g,"");
    // Normaliser mellomrom
    t = t.replace(/\s+/g," ").trim();
    return t;
  };

  const leverandorKey = (tekst) => normaliserTransaksjonstekst(tekst).split(/\s+/)[0]||"";
  const laeringsKey    = (tekst) => normaliserTransaksjonstekst(tekst);

  // ── Felles hjelpere ──────────────────────────────────────────────
  const fmtD = d=>d?new Date(d).toLocaleDateString("nb-NO",{day:"numeric",month:"short"}):"";
  const fmtB = n=>new Intl.NumberFormat("nb-NO",{maximumFractionDigits:0}).format(n);

  const normaliserKonto = (t) => {
    const k = (t.konto||t.importkilde||"").toLowerCase();
    if(k==="mc"||k==="dnb"||k==="mastercard") return "MC";
    if(k.includes("regning")) return "regningskonto";
    if(k.includes("felles"))  return "felleskonto";
    if(k.includes("helen"))   return "helen";
    if(k.includes("eivind"))  return "eivind";
    return k||"?";
  };

  const settStatus = (id, status, extra) =>
    setTransaksjoner(prev=>prev.map(t=>t.id!==id?t:{...t,status,...(extra||{})}));

  // ── Alle budsjett+inntektsposter for matching ───────────────────
  const mnd = new Date().getMonth();
  const allePoster = [
    ...(budgetGroups||[]).flatMap(g=>g.items.map(it=>({
      id:it.id, name:it.name, gruppe:g.label, retning:"ut",
      belop:(it.months&&it.months[mnd]?it.months[mnd].budget:0)||0,
    }))),
    ...(incomeGroups||[]).flatMap(g=>g.items.map(it=>({
      id:it.id, name:it.name, gruppe:g.label, retning:"inn",
      belop:(it.months&&it.months[mnd]?it.months[mnd].budget:0)||0,
    }))),
  ];

  const finnKandidater = (t) => {
    const a = (t.tekst||"").toLowerCase().split(/[,\s]+/).filter(w=>w.length>3);
    const scored = allePoster
      .filter(p=>p.retning===t.retning) // riktig retning er alltid et krav
      .map(p=>{
        const b = (p.name||"").toLowerCase().split(/[,\s]+/).filter(w=>w.length>3);
        const tekstMatch = a.some(w=>b.some(x=>x.includes(w)||w.includes(x)));
        const belopMatch = p.belop>0 && Math.abs(p.belop-t.belop)<=t.belop*0.15;
        let score = 0;
        if(tekstMatch) score += 2;
        if(belopMatch) score += 1;
        return {...p, _score:score, _tekstMatch:tekstMatch, _belopMatch:belopMatch};
      })
      .filter(p=>p._score>0) // krev minst ett treff (tekst eller belop)
      .sort((x,y)=>y._score-x._score);
    return scored;
  };

  // ── Parse-logikk (uendret fra v-bankimport-8) ────────────────────
  const dupKey = (t) => [t.dato,String(t.belop),(t.tekst||"").slice(0,30).trim(),t.konto||""].join("|");

  const parseCSV = (tekst) => {
    const renset = tekst.replace(/^\uFEFF/,"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
    const lines = renset.trim().split("\n");
    if(lines.length<2) return [];
    const sep = lines[0].includes(";") ? ";" : ",";
    const hdr = lines[0].endsWith(sep)?lines[0].slice(0,-1):lines[0];
    const headers = hdr.split(sep).map(h=>h.replace(/"/g,"").trim().toLowerCase());
    return lines.slice(1).filter(l=>l.trim()).map(line=>{
      const cl = line.endsWith(sep)?line.slice(0,-1):line;
      const vals = cl.split(sep).map(v=>v.replace(/"/g,"").trim());
      const obj = {};
      headers.forEach((h,i)=>{obj[h]=vals[i]||"";});
      return obj;
    });
  };

  const mapRad = (rad, kilde) => {
    let dato="",tekst="",belop=0,retning="ut";
    if(kilde==="sparebank1") {
      dato  = rad["dato"]||rad["rentedato"]||"";
      tekst = rad["beskrivelse"]||rad["forklaring"]||rad["tekst"]||"";
      const rawInn = (rad["inn"]||rad["inn paa konto"]||"").replace(/\s/g,"").replace(",",".");
      const rawUt  = (rad["ut"]||rad["ut fra konto"]||"").replace(/\s/g,"").replace(",",".");
      const valInn = parseFloat(rawInn)||0;
      const valUt  = parseFloat(rawUt)||0;
      if(valInn>0){ belop=valInn; retning="inn"; }
      else if(valUt<0){ belop=Math.abs(valUt); retning="ut"; }
      else if(valUt>0){ belop=valUt; retning="ut"; }
    } else if(kilde==="dnb") {
      const rawDato = rad["dato"]||rad["transaksjonsdato"]||"";
      const excelNum = parseFloat(rawDato);
      if(!isNaN(excelNum)&&excelNum>40000) {
        const d = new Date(Date.UTC(1899,11,30)+Math.floor(excelNum)*86400000);
        dato = d.toISOString().slice(0,10);
      } else { dato = rawDato; }
      if(dato&&/^\d{2}\.\d{2}\.\d{4}$/.test(dato)) {
        const [dd,mm,yyyy]=dato.split("."); dato=yyyy+"-"+mm+"-"+dd;
      }
      tekst = rad["beløpet gjelder"]||rad["belopet gjelder"]||rad["beskrivelse"]||rad["tekst"]||"";
      const valInn = parseFloat((rad["inn"]||"").replace(/\s/g,"").replace(",","."))||0;
      const valUt  = parseFloat((rad["ut"]||"").replace(/\s/g,"").replace(",","."))||0;
      if(valInn>0){ belop=valInn; retning="inn"; }
      else if(valUt>0){ belop=valUt; retning="ut"; }
    } else {
      dato  = rad["dato"]||rad["date"]||rad["transaksjonsdato"]||"";
      tekst = rad["tekst"]||rad["beskrivelse"]||rad["description"]||rad["forklaring"]||"";
      const rawB = parseFloat((rad["belop"]||rad["amount"]||"0").replace(/\s/g,"").replace(",","."))||0;
      belop=Math.abs(rawB); retning=rawB<0?"inn":"ut";
    }
    if(dato&&/^\d{2}\.\d{2}\.\d{4}$/.test(dato)) {
      const [dd,mm,yyyy]=dato.split("."); dato=yyyy+"-"+mm+"-"+dd;
    }
    return {dato,tekst:tekst.slice(0,120),belop,retning};
  };

  const prosesserTekst = (tekst) => {
    const rader = parseCSV(tekst);
    const eksKeys = new Set((transaksjoner||[]).map(t=>dupKey(t)));
    const parsed = rader.map(rad=>{
      const mapped = mapRad(rad, kilde);
      if(!mapped.dato||!mapped.belop) return null;
      if(mapped.tekst&&mapped.tekst.trim().toLowerCase()==="innbetaling") return null;
      const konto2 = kilde==="dnb"?"MC":kilde;
      const t = {dato:mapped.dato,tekst:mapped.tekst,belop:mapped.belop,
                 retning:mapped.retning,konto:konto2,originalRad:JSON.stringify(rad),
                 laeringsKey:laeringsKey(mapped.tekst)};
      const key = dupKey(t);
      return {...t,_dupKey:key,erDuplikat:eksKeys.has(key),status:"ny"};
    }).filter(Boolean);
    setPreview(parsed);
  };

  const lesFil = (e) => {
    const fil = e.target.files&&e.target.files[0];
    if(!fil) return;
    const ext = fil.name.split(".").pop().toLowerCase();
    if(ext==="csv"||ext==="txt") {
      const reader = new FileReader();
      reader.onload = (ev) => prosesserTekst(ev.target.result);
      reader.readAsText(fil,"utf-8");
    } else if(ext==="xlsx"||ext==="xls") {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const wb = XLSX.read(ev.target.result,{type:"binary"});
        const ws = wb.Sheets[wb.SheetNames[0]];
        prosesserTekst(XLSX.utils.sheet_to_csv(ws,{FS:";"}));
      };
      reader.readAsBinaryString(fil);
    } else { alert("Stoetter kun CSV, TXT og Excel (.xlsx/.xls)"); }
  };

  const finnMatchForPreview = (t) => {
    const pp = Object.values((liquidity&&liquidity.posts)||{});
    const tDato = t.dato?new Date(t.dato):null;
    return pp.find(p=>{
      if(!p.date||!p.amount) return false;
      const dagDiff = tDato?Math.abs((tDato-new Date(p.date))/(1000*60*60*24)):99;
      if(dagDiff>3) return false;
      const belopLikt = Math.abs(p.amount-t.belop)<1;
      const navnLigner = t.tekst&&p.name&&(
        t.tekst.toLowerCase().includes(p.name.toLowerCase().slice(0,6))||
        p.name.toLowerCase().includes(t.tekst.toLowerCase().slice(0,6)));
      return belopLikt&&(navnLigner||dagDiff===0);
    })||null;
  };

  const gjorImport = () => {
    if(!preview) return;
    const nyActualPoster = [];
    const nyeTrans = preview.filter(t=>!t.erDuplikat).map(t=>{
      const match = finnMatchForPreview(t);
      const treff = finnRegelForTekst(t.tekst);
      const lk = (treff.rule&&treff.confidence>=60) ? {budgetItemId:treff.rule.targetId,navn:treff.rule.targetName,gruppe:treff.rule.targetGruppe,flerbruk:!!treff.rule.multiUse} : null;
      const status = lk
        ? (lk.flerbruk ? "krever_vurdering" : "laert_match")
        : (match ? "foresoatt_match" : "ny");
      const nyId = uid();
      const nyTrans = {
        ...t, id:nyId,
        status,
        behandlingstype: lk ? "fast" : null,
        matchetMot:  lk ? treff.rule.targetId : (match?match.id:null),
        matchetNavn: lk ? treff.rule.targetName : null,
        laertKobling:lk||null,
        laeringsKey:laeringsKey(t.tekst),
        importkilde: kilde,
        importertDato:new Date().toISOString().slice(0,10),
      };
      // Automatisk lart match ved import = ferdig behandlet -> opprett Actual
      if(status==="laert_match") {
        const nyActual = createActualFromTransaction({...nyTrans, ruleId:treff.rule.id});
        if(nyActual) nyActualPoster.push(nyActual);
      }
      return nyTrans;
    });
    setTransaksjoner(prev=>[...(prev||[]),...nyeTrans]);
    if(nyActualPoster.length>0) {
      setActual(prev=>{
        const kjenteTransIds = new Set((prev||[]).map(a=>a.transactionId));
        const filtrert = nyActualPoster.filter(a=>!kjenteTransIds.has(a.transactionId));
        return [...(prev||[]), ...filtrert];
      });
    }
    setPreview(null);
    setVisImport(false);
    setSeksjon("vurdering");
  };

  // ── Behandlings-logikk ───────────────────────────────────────────
  const alle = transaksjoner||[];
  // ── Regel-CRUD — kun Bankimport oppretter/oppdaterer regler ──────
  const opprettEllerOppdaterRegel = (transaksjon, post, multiUse, regelType) => {
    const normPattern = normaliserTransaksjonstekst(transaksjon.tekst);
    setRules(prev=>{
      const eksisterende = (prev||[]).find(r=>r.normalizedPattern===normPattern && r.targetId===post.id);
      const naa = new Date().toISOString();
      if(eksisterende) {
        return prev.map(r=>r.id!==eksisterende.id?r:{
          ...r,
          timesUsed:(r.timesUsed||0)+1,
          lastMatched:naa,
          updatedAt:naa,
          multiUse: multiUse!==undefined ? !!multiUse : r.multiUse,
          mode: (multiUse!==undefined?!!multiUse:r.multiUse) ? "review" : "auto",
        });
      }
      const nyRegel = {
        id: uid(),
        pattern: transaksjon.tekst,
        normalizedPattern: normPattern,
        type: regelType||"leverandor", // standardverdien uendret — se REGELTYPE_REKKEFOLGE
        targetType: post.retning==="inn" ? "income" : "budget",
        targetId: post.id,
        targetName: post.name,
        targetGruppe: post.gruppe,
        mode: multiUse ? "review" : "auto",
        confidence: 100,
        timesUsed: 1,
        lastMatched: naa,
        multiUse: !!multiUse,
        active: true,
        createdAt: naa,
        updatedAt: naa,
      };
      return [...(prev||[]), nyRegel];
    });
  };

  const merkRegelFlerbruk = (normalizedPattern) => {
    setRules(prev=>(prev||[]).map(r=>r.normalizedPattern!==normalizedPattern?r:{
      ...r, multiUse:true, mode:"review", updatedAt:new Date().toISOString(),
    }));
  };

  const merkFlerbruk = (normalizedPattern) => {
    merkRegelFlerbruk(normalizedPattern);
    setTransaksjoner(prev=>prev.map(t=>{
      if(normaliserTransaksjonstekst(t.tekst)!==normalizedPattern) return t;
      const lk = {...(t.laertKobling||{}), flerbruk:true};
      return {...t, laertKobling:lk, status:"krever_vurdering"};
    }));
  };

  const grupper = {
    vurdering: alle.filter(t=>t.status==="ny"||t.status==="krever_vurdering"),
    forslag:   alle.filter(t=>t.status==="foresoatt_match"),
    laert:     alle.filter(t=>(t.status==="matchet"||t.status==="laert_match")&&t.behandlingstype!=="engang"),
    // "behandlet" dekker na baade engangshendelser OG kvittering-lukkede
    // kjop (etappe 1) — samme status, ikke et nytt statusbegrep. Begge
    // representerer "ferdig, med forklaring", bare fra ulik kilde.
    // "behandlet" dekker na engangshendelser, kvittering-lukkede kjop
    // (etappe 1) OG interne overforinger (etappe 3) — samme status,
    // ikke et nytt statusbegrep. Alle representerer "ferdig, med
    // forklaring", bare fra ulik kilde.
    behandlet: alle.filter(t=>t.status==="behandlet"&&
      (t.behandlingstype==="engang"||t.behandlingstype==="kvittering"||t.behandlingstype==="intern_overforing")),
    ignorert:  alle.filter(t=>t.status==="ignorert"),
  };

  const kontoFilter = (liste) => valgtKonto==="alle" ? liste
    : liste.filter(t=>normaliserKonto(t)===valgtKonto);

  const SEKSJONER = [
    {id:"vurdering", label:"Krever vurdering", n:grupper.vurdering.length, farge:grupper.vurdering.length>0?P.clay:P.stone},
    {id:"forslag",   label:"Forslag til match", n:grupper.forslag.length,   farge:grupper.forslag.length>0?"#9A7A00":P.stone},
    {id:"laert",     label:"Larte koblinger",  n:grupper.laert.length,     farge:P.olive},
    {id:"behandlet", label:"Engangshendelser",  n:grupper.behandlet.length, farge:P.dusk},
    {id:"ignorert",  label:"Arkiv",             n:grupper.ignorert.length,   farge:P.dust},
  ];

  // ── Behandlingstyper ────────────────────────────────────────────
  const BEHANDLING = [
    {id:"fast",        emoji:"🔁", label:"Fast / gjentakende",
     hint:"Kjent post, stabil leverandor. Kan kobles til regel og laeres."},
    {id:"variabel",    emoji:"📊", label:"Variabel budsjettert",
     hint:"Horer til en budsjettkategori, men varierer. Kobles til gruppe."},
    {id:"sparing",     emoji:"🐷", label:"Sparing",
     hint:"En disponering, ikke en kostnad — pengene forlater ikke familiens formue, de flytter bare plass."},
    {id:"intern_overforing", emoji:"↔️", label:"Intern overføring",
     hint:"Penger flyttet mellom familiens egne kontoer. Påvirker ikke resultat, kostnad eller inntekt."},
    {id:"engang",      emoji:"🎯", label:"Ikke budsjettert / engang",
     hint:"Avvik eller ekstra. Forklares, men laeres ikke."},
    {id:"uklar",       emoji:"❓", label:"Uklar / sammensatt",
     hint:"Venter pa kvittering, splitt eller manuell forklaring."},
  ];

  const BEHANDLING_STATUS = {
    fast:     "foresoatt_match",
    variabel: "foresoatt_match",
    engang:   "matchet",
    uklar:    "krever_vurdering",
  };

  const BEHANDLING_BADGE_COL = {
    fast:"#228B44", variabel:P.hazel, engang:P.clay, uklar:"#9A7A00"
  };

  // ── Lagre hele beslutningen paa en gang. Flytter transaksjonen
  //    til riktig seksjon FORST naar brukeren har fullfort.
  //    Laering skjer via regelmotoren — ikke direkte pa transaksjonen. ──
  const lagreBehandling = (tranId, utkast) => {
    const t = alle.find(x=>x.id===tranId);
    if(!t) return;
    const {type, post, laer, uklarValg} = utkast;

    let nyStatus, extra = {behandlingstype:type};
    let ferdigBehandlet = null; // transaksjon-objektet som skal danne Actual, hvis noen

    if(type==="uklar") {
      nyStatus = "krever_vurdering";
      extra.uklarStatus = uklarValg||null;
      // Ingen Actual opprettes for uklar/venter_paa_kvittering/maa_splittes
    } else if(type==="engang") {
      // Engang er alltid ferdig behandlet naar den lagres — enten
      // koblet til en post (forklaring), eller ren avvik uten kobling.
      // Aldri "matchet"/"laert_match" — de statusene betyr lart kobling.
      nyStatus = "behandlet";
      extra.matchetMot  = post ? post.id   : null;
      extra.matchetNavn = post ? post.name : "Engangshendelse / avvik";
      extra.laertKobling = null; // engang laeres aldri, uansett
      ferdigBehandlet = {...t, ...extra};
    } else if(post) {
      // fast eller variabel, med kobling
      nyStatus = laer ? "laert_match" : "matchet";
      extra.matchetMot  = post.id;
      extra.matchetNavn = post.name;
      extra.laertKobling = laer ? {budgetItemId:post.id,navn:post.name,gruppe:post.gruppe,flerbruk:false} : null;
      let ruleIdBrukt = null;
      if(laer) {
        // Fast med laering: opprett/oppdater regel i regelmotoren.
        // ruleId slaas opp synkront fra kjent rules-state (ny regel far
        // samme normaliserte monster+maal, saa oppslaget treffer etter oppdatering
        // pa neste render — her brukes eksisterende id hvis regelen allerede finnes).
        const normPattern2 = normaliserTransaksjonstekst(t.tekst);
        const eksisterendeRegel = (rules||[]).find(r=>r.normalizedPattern===normPattern2 && r.targetId===post.id);
        ruleIdBrukt = eksisterendeRegel ? eksisterendeRegel.id : null;
        opprettEllerOppdaterRegel(t, post, false, type==="sparing"?"sparing":undefined);
      }
      ferdigBehandlet = {...t, ...extra, ruleId:ruleIdBrukt};
    } else {
      // fast/variabel uten kobling ennaa — behold i forslag, ingen Actual
      nyStatus = "foresoatt_match";
    }

    // Opprett Actual-post naar behandlingen faktisk er ferdig (kobling eller engang).
    // Idempotent: én transactionId skal kun kunne gi én Actual-post.
    if(ferdigBehandlet) {
      setActual(prev=>{
        const eksisterendeActual = (prev||[]).find(a=>a.transactionId===ferdigBehandlet.id);
        if(eksisterendeActual) return prev; // allerede opprettet — ikke dupliser
        const nyActual = createActualFromTransaction(ferdigBehandlet);
        return nyActual ? [...(prev||[]), nyActual] : (prev||[]);
      });
    }

    const normPattern = normaliserTransaksjonstekst(t.tekst);
    setTransaksjoner(prev=>prev.map(x=>{
      if(x.id===tranId) return {...x, status:nyStatus, ...extra};
      // Hvis "laer" er valgt: andre med samme normaliserte monster faar samme kobling
      if(laer && post && normaliserTransaksjonstekst(x.tekst)===normPattern && x.id!==tranId) {
        return {...x, status:nyStatus,
          matchetMot:post.id, matchetNavn:post.name,
          laertKobling:{budgetItemId:post.id,navn:post.name,gruppe:post.gruppe,flerbruk:false}};
      }
      return x;
    }));
    setApenId(null);
  };

  const VisRad = ({t}) => {
    const apen = apenId===t.id;
    const nk   = normaliserKonto(t);

    // ── Lokal utkast-state: hele beslutningen samles her for LAGRE ──
    const [utkastType,setUtkastType]     = useState(t.behandlingstype||null);
    const [utkastPost,setUtkastPost]     = useState(null);
    const [utkastLaer,setUtkastLaer]     = useState(false);
    const [utkastUklar,setUtkastUklar]   = useState(t.uklarStatus||null);
    const [utkastMotpart,setUtkastMotpart] = useState(null); // valgt motpart-transaksjon for intern overforing
    const eksisterendeReceipt = findReceipt(t.id, receipts);
    const [kvitteringLagret,setKvitteringLagret] = useState(!!eksisterendeReceipt);
    // Kvittering koblet via den nye matchingen (Sprint 16) — separat
    // fra eksisterendeReceipt over, som er den eldre, direkte
    // opplastingskoblingen (receipt.transactionId).
    const koblettMatchetReceipt = (receipts||[]).find(r=>r.matchedTransactionId===t.id);

    const [kvitteringLaster,setKvitteringLaster] = useState(false);
    const leggTilKvittering = (e) => {
      const file = e.target.files&&e.target.files[0]; if(!file) return;
      const eksisterende = (receipts||[]).find(r=>r.transactionId===t.id);
      const receiptId = eksisterende ? eksisterende.id : uid();
      setKvitteringLaster(true);
      const reader = new FileReader();
      reader.onload = (ev) => {
        const naa = new Date().toISOString();
        setReceipts(prev=>{
          const funnet = (prev||[]).find(r=>r.id===receiptId);
          if(funnet) {
            return (prev||[]).map(r=>r.id!==receiptId?r:{
              ...r, imageUrl:ev.target.result, ocrStatus:"uploaded", updatedAt:naa,
            });
          }
          const nyReceipt = {
            id: receiptId, transactionId: t.id, imageUrl: ev.target.result,
            ocrStatus: "uploaded", ocrText: "", merchant: "", purchaseDate: t.dato||"",
            total: t.belop||0, createdAt: naa, updatedAt: naa,
          };
          return [...(prev||[]), nyReceipt];
        });
        setKvitteringLagret(true);
        setKvitteringLaster(false);
      };
      reader.readAsDataURL(file);
    };
    const [sokTekst,setSokTekst]         = useState("");

    // Nullstill utkast naar raden lukkes
    const lukkOgNullstill = () => {
      setApenId(null);
      setUtkastType(t.behandlingstype||null);
      setUtkastPost(null);
      setUtkastLaer(false);
      setUtkastUklar(t.uklarStatus||null);
      setUtkastMotpart(null);
      setSokTekst("");
    };

    const kandidater = (utkastType==="fast"||utkastType==="variabel"||utkastType==="sparing") ? finnKandidater(t) : [];
    const alleForRetning = allePoster.filter(p=>p.retning===t.retning);
    const sokTreff = sokTekst.trim().length>0
      ? alleForRetning.filter(p=>p.name.toLowerCase().includes(sokTekst.trim().toLowerCase()))
      : [];

    // Kandidater for intern overforing (etappe 3) — kun beregnet naar
    // relevant, siden finnInterneOverforingsKandidater looper alle
    // transaksjoner og ikke trenger kjores for hver rad hele tiden.
    const overforingKandidater = utkastType==="intern_overforing"
      ? finnInterneOverforingsKandidater(t, alle) : [];
    const overforingSokTreff = utkastType==="intern_overforing" && sokTekst.trim().length>0
      ? alle.filter(o=>o.id!==t.id && !o.motpartTransaksjonId &&
          (o.tekst||"").toLowerCase().includes(sokTekst.trim().toLowerCase()))
      : [];

    const erFlerbruk = t.laertKobling&&t.laertKobling.flerbruk;
    const harLagretBehandling = !!t.behandlingstype;

    const rowBg = t.status==="krever_vurdering" ? "#FFF8F0"
                : t.status==="foresoatt_match"   ? "#FFFBE0"
                : P.linen;
    const rowBd = t.status==="krever_vurdering" ? "#E8C4A0"
                : t.status==="foresoatt_match"   ? "#D4C060"
                : P.border;

    const kanLagre =
      utkastType==="engang" ||
      utkastType==="uklar" ||
      utkastType==="intern_overforing" && !!utkastMotpart ||
      ((utkastType==="fast"||utkastType==="variabel"||utkastType==="sparing") && !!utkastPost);

    return (
      <div style={{marginBottom:5}}>
        {/* Rad-header */}
        <div onClick={()=>apen?lukkOgNullstill():setApenId(t.id)}
          style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",
            borderRadius:apen?"9px 9px 0 0":9,cursor:"pointer",
            background:rowBg, border:"1px solid "+rowBd}}>
          <span style={{fontSize:12,fontWeight:700,flexShrink:0,width:14,
            color:t.retning==="inn"?P.olive:P.clay}}>
            {t.retning==="inn"?"+":"-"}
          </span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:500,color:P.ink,
              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
              {t.tekst||"(ukjent)"}
              {t.behandlingstype && (
                <span style={{marginLeft:5,fontSize:9,borderRadius:4,padding:"1px 5px",
                  background:BEHANDLING_BADGE_COL[t.behandlingstype]+"22",
                  color:BEHANDLING_BADGE_COL[t.behandlingstype],fontWeight:600}}>
                  {BEHANDLING.find(b=>b.id===t.behandlingstype)&&
                   BEHANDLING.find(b=>b.id===t.behandlingstype).emoji+" "+
                   BEHANDLING.find(b=>b.id===t.behandlingstype).label}
                </span>
              )}
              {erFlerbruk && (
                <span style={{marginLeft:5,fontSize:9,color:"#9A7A00",
                  background:"#FFFBE0",borderRadius:4,padding:"1px 5px"}}>flerbruk</span>
              )}
              {eksisterendeReceipt && (
                <span style={{marginLeft:5,fontSize:9,color:P.olive,
                  background:"#F0FFF4",borderRadius:4,padding:"1px 5px"}}>🧾 Kvittering lagt til</span>
              )}
              {!eksisterendeReceipt && koblettMatchetReceipt && (
                <span style={{marginLeft:5,fontSize:9,color:P.olive,
                  background:"#F0FFF4",borderRadius:4,padding:"1px 5px"}}>🧾 Kvittering</span>
              )}
            </div>
            <div style={{fontSize:10,color:P.dust,marginTop:1}}>
              {fmtD(t.dato)}{nk?" · "+nk:""}
              {t.behandlingstype!=="engang"&&t.matchetNavn?" · →"+t.matchetNavn:""}
              {t.behandlingstype==="engang"?(t.matchetMot?" · engang: "+t.matchetNavn:" · engang/avvik"):""}
              {t.uklarStatus==="venter_paa_kvittering"?" · venter pa kvittering":""}
              {t.uklarStatus==="maa_splittes"?" · maa splittes":""}
            </div>
          </div>
          <span style={{fontSize:13,fontWeight:700,flexShrink:0,
            color:t.retning==="inn"?P.olive:P.clay}}>{fmtB(t.belop)}</span>
          <span style={{color:P.dust,fontSize:10}}>{apen?"▴":"▾"}</span>
        </div>

        {/* Detaljpanel — hele beslutningen i ett skjermbilde, MED MINDRE
            transaksjonen allerede er lukket via en kvittering (etappe 1).
            Da vises en enkel, skrivebeskyttet oppsummering med sporbarhet
            til kvitteringen, i stedet for aa be brukeren behandle paa nytt. */}
        {apen && t.behandlingstype==="kvittering" && (
          <div style={{border:"1px solid "+P.border,borderTop:"none",
            borderRadius:"0 0 9px 9px",padding:"14px",background:P.sand}}>
            <div style={{fontSize:12,color:P.stone,marginBottom:10,lineHeight:1.6}}>
              Dette kjøpet er ferdig behandlet via en kvittering — ingen ny behandling er nødvendig.
            </div>
            {koblettMatchetReceipt ? (
              <div style={{padding:"10px 12px",background:P.linen,border:"1px solid "+P.border,borderRadius:9}}>
                <div style={{fontSize:12,fontWeight:600,color:P.ink,marginBottom:2}}>
                  {koblettMatchetReceipt.merchant||"(ukjent leverandør)"}
                </div>
                <div style={{fontSize:11,color:P.dust,marginBottom:8}}>
                  {(koblettMatchetReceipt.splits||[]).length} splitt{(koblettMatchetReceipt.splits||[]).length!==1?"er":""} · {fmtB(koblettMatchetReceipt.total||0)}
                </div>
                {(koblettMatchetReceipt.splits||[]).map((sp,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:11.5,
                    padding:"4px 0",borderTop:i>0?"1px solid "+P.border:"none",color:P.stone}}>
                    <span>{sp.targetName}</span>
                    <span style={{fontWeight:500,color:P.ink}}>{fmtB(sp.amount||0)}</span>
                  </div>
                ))}
                {koblettMatchetReceipt.driveWebViewLink && (
                  <a href={koblettMatchetReceipt.driveWebViewLink} target="_blank" rel="noopener noreferrer"
                    style={{display:"block",marginTop:8,fontSize:11,color:P.hazel,textDecoration:"none"}}>
                    📎 Åpne kvittering
                  </a>
                )}
              </div>
            ) : (
              <div style={{fontSize:12,color:P.dust}}>Fant ikke den koblede kvitteringen.</div>
            )}
          </div>
        )}
        {apen && t.behandlingstype==="intern_overforing" && (
          <div style={{border:"1px solid "+P.border,borderTop:"none",
            borderRadius:"0 0 9px 9px",padding:"14px",background:P.sand}}>
            <div style={{fontSize:12,color:P.stone,marginBottom:10,lineHeight:1.6}}>
              Dette er en intern overføring mellom familiens egne kontoer — påvirker ikke resultat, kostnad eller inntekt.
            </div>
            {(() => {
              const motpart = t.motpartTransaksjonId ? alle.find(x=>x.id===t.motpartTransaksjonId) : null;
              return motpart ? (
                <div style={{padding:"10px 12px",background:P.linen,border:"1px solid "+P.border,borderRadius:9}}>
                  <div style={{fontSize:10,color:P.dust,marginBottom:3}}>Motpart</div>
                  <div style={{fontSize:12,fontWeight:600,color:P.ink}}>
                    {motpart.tekst} · {fmt(motpart.belop||0)}
                  </div>
                  <div style={{fontSize:10,color:P.dust,marginTop:1}}>
                    {fmtD(motpart.dato)} · {normaliserKonto(motpart)}
                  </div>
                </div>
              ) : (
                <div style={{fontSize:12,color:P.dust}}>Fant ikke motpart-transaksjonen.</div>
              );
            })()}
          </div>
        )}
        {apen && t.behandlingstype!=="kvittering" && t.behandlingstype!=="intern_overforing" && (
          <div style={{border:"1px solid "+P.border,borderTop:"none",
            borderRadius:"0 0 9px 9px",padding:"12px 14px",background:P.sand}}>

            {/* STEG 1: Behandlingstype (alltid synlig, kan endres) */}
            <div style={{fontSize:11,fontWeight:600,color:P.dust,
              textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:8}}>
              1. Hva slags hendelse er dette?
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:12}}>
              {BEHANDLING.map(b=>(
                <button key={b.id} onClick={()=>{setUtkastType(b.id);setUtkastPost(null);setSokTekst("");}}
                  style={{display:"flex",alignItems:"flex-start",gap:10,
                    width:"100%",padding:"8px 10px",borderRadius:8,cursor:"pointer",textAlign:"left",
                    background:utkastType===b.id?BEHANDLING_BADGE_COL[b.id]+"18":"transparent",
                    border:"1px solid "+(utkastType===b.id?BEHANDLING_BADGE_COL[b.id]:P.border)}}>
                  <span style={{fontSize:16,flexShrink:0,marginTop:1}}>{b.emoji}</span>
                  <div>
                    <div style={{fontSize:12,fontWeight:600,
                      color:utkastType===b.id?BEHANDLING_BADGE_COL[b.id]:P.ink}}>{b.label}</div>
                    <div style={{fontSize:10.5,color:P.stone,marginTop:1}}>{b.hint}</div>
                  </div>
                </button>
              ))}
            </div>

            {/* STEG 2: Kobling for fast/variabel/sparing */}
            {(utkastType==="fast"||utkastType==="variabel"||utkastType==="sparing") && (
              <div style={{marginBottom:12}}>
                <div style={{fontSize:11,fontWeight:600,color:P.dust,
                  textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:6}}>
                  2. Koble til post
                </div>

                {kandidater.length>0 && !utkastPost && (
                  <div style={{marginBottom:8}}>
                    {kandidater.slice(0,5).map(k=>(
                      <div key={k.id} onClick={()=>setUtkastPost(k)}
                        style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",
                          padding:"6px 8px",borderRadius:7,marginBottom:4,
                          background:P.hazelXL,border:"1px solid "+P.hazelL}}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:12,fontWeight:500,color:P.ink}}>{k.name}</div>
                          <div style={{fontSize:10,color:P.dust}}>
                            {k.gruppe}
                            {k._tekstMatch&&k._belopMatch?" · tekst+belop":k._tekstMatch?" · tekst":" · belop"}
                          </div>
                        </div>
                        <span style={{fontSize:10,color:P.hazel,fontWeight:600}}>Velg</span>
                      </div>
                    ))}
                  </div>
                )}

                {/* Sokbar manuell kobling */}
                {!utkastPost && (
                  <div>
                    <input value={sokTekst} onChange={e=>setSokTekst(e.target.value)}
                      placeholder="Sok blant budsjett-/inntektsposter…"
                      autoComplete="off"
                      style={{width:"100%",boxSizing:"border-box",fontSize:12,
                        background:P.mist,padding:"7px 10px",borderRadius:7,marginBottom:6}}/>
                    {sokTreff.length>0 && (
                      <div style={{maxHeight:160,overflowY:"auto"}}>
                        {sokTreff.slice(0,20).map(p=>(
                          <div key={p.id} onClick={()=>{setUtkastPost(p);setSokTekst("");}}
                            style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",
                              padding:"5px 8px",borderRadius:6,marginBottom:2,
                              background:P.linen,border:"1px solid "+P.border}}>
                            <div style={{flex:1}}>
                              <div style={{fontSize:11.5,color:P.ink}}>{p.name}</div>
                              <div style={{fontSize:9.5,color:P.dust}}>{p.gruppe}</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                    {sokTekst.trim().length>0 && sokTreff.length===0 && (
                      <div style={{fontSize:11,color:P.dust,padding:"6px 0"}}>Ingen treff.</div>
                    )}
                  </div>
                )}

                {/* Valgt post */}
                {utkastPost && (
                  <div style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",
                    background:"#F0FFF4",border:"1px solid "+P.oliveL,borderRadius:7,marginBottom:8}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:600,color:P.olive}}>{utkastPost.name}</div>
                      <div style={{fontSize:10,color:P.dust}}>{utkastPost.gruppe}</div>
                    </div>
                    <button onClick={()=>setUtkastPost(null)}
                      style={{background:"none",border:"none",cursor:"pointer",color:P.dust,fontSize:11}}>
                      Endre
                    </button>
                  </div>
                )}

                {/* STEG 3: Laering — for fast og sparing */}
                {(utkastType==="fast"||utkastType==="sparing")&&utkastPost && (
                  <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",
                    background:P.mist,borderRadius:8,border:"1px solid "+P.border,cursor:"pointer"}}
                    onClick={()=>setUtkastLaer(v=>!v)}>
                    <div style={{width:20,height:20,borderRadius:5,flexShrink:0,
                      background:utkastLaer?P.hazel:"transparent",
                      border:"1.5px solid "+(utkastLaer?P.hazel:P.hazelL),
                      display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {utkastLaer&&<Em e="✓" s={{fontSize:11,color:"white"}}/>}
                    </div>
                    <div>
                      <div style={{fontSize:12,fontWeight:500,color:P.ink}}>Lær denne koblingen</div>
                      <div style={{fontSize:10,color:P.dust}}>Fremtidige transaksjoner fra samme type kobles automatisk.</div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* STEG 2d: Intern overforing — velg motpart-transaksjon, ikke en post */}
            {utkastType==="intern_overforing" && (
              <div style={{marginBottom:12}}>
                <div style={{fontSize:11,fontWeight:600,color:P.dust,

// ── GeneratorSenter ───────────────────────────────────────────────
function GeneratorSenter({budgetGroups,setBudgetGroups,incomeGroups,setIncomeGroups,liquidity,month}) {
  const {sone, erMobil, erWeb} = useLayoutBredde();
  const [fane,setFane] = useState("oppmerksomhet"); // "oppmerksomhet" | "oversikt"
  const [sok,setSok] = useState("");
  const [filter,setFilter] = useState("alle");
  const [editModal,setEditModal] = useState(null); // {type:"inn"|"ut",groupId,item}
  const [mobilIndeks,setMobilIndeks] = useState(0); // hvilken "krever oppmerksomhet"-post vises paa mobil

  // NIVA_LABEL og NIVA_REKKEFOLGE er na globale (delt med Regelsenter
  // og fremtidige administrasjonsflater) — se toppen av filen.

  // ── Delt datalogikk (samme uansett bredde) ───────────────────────
  const allePoster = [
    ...(incomeGroups||[]).flatMap(g=>g.items.map(it=>({
      type:"inn", gruppe:g.label, groupId:g.id, item:it,
      // Manglende maaned-data (strukturell mangel) -> null.
      // Eksisterende maaned med budget:0 (brukerens eksplisitte valg) -> 0, gyldig.
      budget: (it.months && it.months[month]) ? it.months[month].budget : null,
    }))),
    ...(budgetGroups||[]).flatMap(g=>g.items.map(it=>({
      type:"ut", gruppe:g.label, groupId:g.id, item:it,
      budget: (it.months && it.months[month]) ? it.months[month].budget : null,
    }))),
  ];

  // Strukturerte mangler per felt — én sann kilde. Returnerer hvilke
  // FELT som mangler, ikke bare en tekstliste, slik at bade tabellen og
  // redigeringskortet kan vise varsel direkte ved feltet som utloser det.
  // Null er data. Tomt er mangel. Et budsjettert belop pa eksplisitt 0
  // betyr at brukeren har tatt stilling og valgt null — det skal ALDRI
  // utlose varsel. Kun fravaer av verdi (null/undefined) er en mangel.
  const feilFelter = (p) => {
    const m = p.item.meta;
    if(!m) return {niva:true, konto:true, forfallsdag:true, belop:false, metadata:true};
    const belopMangler = m.automatisk && (p.budget===null || p.budget===undefined);
    return {
      niva: !m.niva,
      konto: !m.konto,
      forfallsdag: !m.forfallsdag,
      belop: !!belopMangler,
      metadata: false,
    };
  };
  // Bakoverkompatibel tekstliste, avledet av feilFelter — samme kilde,
  // kun en annen form. Brukes der en enkel oppsummeringstekst er nok.
  const feilTekster = (p) => {
    const f = feilFelter(p);
    const ut = [];
    if(f.metadata) ut.push("mangler all metadata");
    if(f.niva) ut.push("mangler nivå");
    if(f.konto) ut.push("mangler konto");
    if(f.forfallsdag) ut.push("mangler forfallsdag");
    if(f.belop) ut.push("mangler beløp");
    return ut;
  };
  const harFeil = (p) => Object.values(feilFelter(p)).some(Boolean);

  const posterMedFeil = allePoster.filter(p=>harFeil(p));

  // Nivaa-nokkel for gruppering i Oversikt — delt logikk (nivaKeyForMeta)
  const nivaKey = (p) => nivaKeyForMeta(p.item.meta);

  const saveMeta = (type,groupId,itemId,meta) => {
    if(type==="inn") {
      setIncomeGroups(p=>p.map(g=>g.id!==groupId?g:{
        ...g, items:g.items.map(it=>it.id!==itemId?it:{...it,meta})
      }));
    } else {
      setBudgetGroups(p=>p.map(g=>g.id!==groupId?g:{
        ...g, items:g.items.map(it=>it.id!==itemId?it:{...it,meta})
      }));
    }
  };

  const FILTERS = [
    {id:"alle",      label:"Alle"},
    {id:"mangler",   label:"⚠️ Mangler"},
    {id:"automatisk",label:"⚡ Automatisk"},
    {id:"inntekter", label:"↑ Inntekter"},
    {id:"kostnader", label:"↓ Kostnader"},
  ];

  const Pill = ({id,label}) => (
    <button onClick={()=>setFilter(id)}
      style={{padding:"5px 12px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:filter===id?600:400,
        background:filter===id?P.hazel:P.mist,color:filter===id?"white":P.stone,
        border:"1px solid "+(filter===id?P.hazel:P.border)}}>
      {label}
    </button>
  );

  // Filter + sok — brukt i Oversikt, virker PAA TVERS av nivaagruppene
  // uten at selve grupperingen forsvinner (filtrerer innholdet i hver
  // gruppe, fjerner kun tomme grupper fra visningen).
  const matcherFilterOgSok = (p) => {
    if(filter==="inntekter" && p.type!=="inn") return false;
    if(filter==="kostnader" && p.type!=="ut") return false;

    const sek = Math.round((Date.now()-ts)/1000);
    if(sek<60) return "for "+sek+" sekunder siden";
    const min = Math.round(sek/60);
    if(min<60) return "for "+min+" min siden";
    return new Date(ts).toLocaleTimeString("nb-NO",{hour:"2-digit",minute:"2-digit"});
