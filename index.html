// ── Ukeberegning ──────────────────────────────────────────────────
function getWeekKey(date) {
  const d=new Date(date); d.setHours(0,0,0,0);
  d.setDate(d.getDate()+3-(d.getDay()+6)%7);
  const w1=new Date(d.getFullYear(),0,4);
  const wn=1+Math.round(((d-w1)/86400000-3+(w1.getDay()+6)%7)/7);
  return `${d.getFullYear()}-W${String(wn).padStart(2,"0")}`;
}
function getMondayOfWeek(wk) {
  const [yr,w]=wk.split("-W").map(Number);
  const j4=new Date(yr,0,4); const m=new Date(j4);
  m.setDate(j4.getDate()-(j4.getDay()+6)%7+(w-1)*7); return m;
}
function getDayDate(wk,di) { const m=getMondayOfWeek(wk); const d=new Date(m); d.setDate(m.getDate()+di); return d; }
function addWeeks(wk,n) { const m=getMondayOfWeek(wk); m.setDate(m.getDate()+n*7); return getWeekKey(m); }
function fmtShort(d) { return d.toLocaleDateString("nb-NO",{day:"numeric",month:"short"}); }

// ── Modal med drag-to-resize (pkt 3) ─────────────────────────────
function Modal({onClose,title,children}) {
  const [height,setHeight] = useState(70);
  const drag = React.useRef({active:false,startY:0,startH:0});
  const onDragStart = (e) => {
    drag.current = {active:true, startY:e.touches?e.touches[0].clientY:e.clientY, startH:height};
    const move = (ev) => {
      if(!drag.current.active) return;
      const y = ev.touches?ev.touches[0].clientY:ev.clientY;
      const newH = Math.min(95,Math.max(25,drag.current.startH+(drag.current.startY-y)/window.innerHeight*100));
      setHeight(newH);
    };
    const up = () => { drag.current.active=false; window.removeEventListener("mousemove",move); window.removeEventListener("mouseup",up); window.removeEventListener("touchmove",move); window.removeEventListener("touchend",up); };
    window.addEventListener("mousemove",move); window.addEventListener("mouseup",up);
    window.addEventListener("touchmove",move,{passive:false}); window.addEventListener("touchend",up);
  };
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(44,35,24,0.35)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200,backdropFilter:"blur(2px)"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:P.linen,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:460,height:`${height}vh`,display:"flex",flexDirection:"column",boxShadow:"0 -8px 32px rgba(44,35,24,0.12)"}}>
        <div onMouseDown={onDragStart} onTouchStart={onDragStart} style={{padding:"10px 0 6px",cursor:"row-resize",flexShrink:0,touchAction:"none"}}>
          <div style={{width:40,height:4,borderRadius:2,background:P.hazelL,margin:"0 auto"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0 16px 12px",borderBottom:`1px solid ${P.border}`,flexShrink:0}}>
          <span style={{fontSize:15,fontWeight:600,color:P.ink}}>{title}</span>
          <button onClick={onClose} style={{background:P.mist,border:"none",cursor:"pointer",color:P.stone,width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}><Em e="✕"/></button>
        </div>
        <div style={{overflowY:"auto",padding:"14px 16px 36px",flex:1}}>{children}</div>
      </div>
    </div>
  );
}

              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()} placeholder="din@epost.no" style={{width:"100%",boxSizing:"border-box",fontSize:14,padding:"10px 12px"}}/>
            </div>
            <div>
              <div style={{fontSize:11.5,fontWeight:600,color:P.stone,marginBottom:5}}>Passord</div>
              <input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()} placeholder="••••••••" style={{width:"100%",boxSizing:"border-box",fontSize:14,padding:"10px 12px"}}/>
            </div>
            {err && <div style={{fontSize:12,color:P.clay,background:P.clayXL,border:`1px solid ${P.clayL}`,borderRadius:8,padding:"8px 12px"}}>⚠️ {err}</div>}
            <button onClick={login} disabled={loading} style={{padding:"11px",background:loading?P.hazelL:P.hazel,color:"white",border:"none",borderRadius:9,fontSize:14,cursor:loading?"default":"pointer",fontWeight:600,marginTop:4}}>
              {loading?"Logger inn…":"Logg inn"}
            </button>
          </div>
        </Card>
      </div>
    </div>
  );
}

// ── Plan Screen ───────────────────────────────────────────────────
function PlanScreen({allMeals,setWeekMeals,recipes,setShopping}) {
  const todayKey = getWeekKey(new Date());
  const [weekKey,setWeekKey] = useState(todayKey);
  const [editing,setEditing] = useState(null);
  const [query,setQuery]     = useState("");
  const [picker,setPicker]   = useState(null);
  const meals = allMeals[weekKey] || {};
  const isCurrentWeek = weekKey===todayKey;
  const todayIdx = (new Date().getDay()+6)%7;

  const setMeal = (day,val) => setWeekMeals(weekKey,{...meals,[day]:val});
  const startEdit = d => { setEditing(d); setQuery(meals[d]||""); };
  const closeEdit = () => { setEditing(null); setQuery(""); };
  const pickRec = (day,r) => { setMeal(day,r.name); setPicker({day,recipe:r}); setEditing(null); setQuery(""); };
  const clearDay = (day,e) => { e.stopPropagation(); setMeal(day,""); };

  const addToShopping = ings => setShopping(prev => {
    let list=[...prev];
    ings.forEach(ing => {
      const idx=list.findIndex(s=>s.name.toLowerCase()===ing.name.toLowerCase());
      if(idx>=0) list[idx]={...list[idx],amount:`${list[idx].amount} + ${ing.amount}`};
      else list=[...list,{id:uid(),name:ing.name,amount:ing.amount,cat:ing.cat,done:false}];
    });
    return list;
  });

  const hits = query.length>0
    ? recipes.filter(r=>r.name.toLowerCase().includes(query.toLowerCase())||r.tags.some(t=>t.toLowerCase().includes(query.toLowerCase())))
    : [];

  const mon=getMondayOfWeek(weekKey); const sun=new Date(mon); sun.setDate(mon.getDate()+6);

  return (
    <div>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:20,fontWeight:600,color:P.ink,marginBottom:8}}>Middagsplan</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:isCurrentWeek?0:8}}>
          <button onClick={()=>setWeekKey(addWeeks(weekKey,-1))} style={{background:P.mist,border:`1px solid ${P.border}`,borderRadius:8,padding:"5px 12px",cursor:"pointer",color:P.stone,fontSize:16}}>‹</button>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:12,fontWeight:600,color:isCurrentWeek?P.hazel:P.stone}}>{isCurrentWeek?"Denne uken":weekKey.replace("-W"," · Uke ")}</div>
            <div style={{fontSize:11,color:P.dust}}>{fmtShort(mon)} – {fmtShort(sun)}</div>
          </div>
          <button onClick={()=>setWeekKey(addWeeks(weekKey,1))} style={{background:P.mist,border:`1px solid ${P.border}`,borderRadius:8,padding:"5px 12px",cursor:"pointer",color:P.stone,fontSize:16}}>›</button>
        </div>
        {!isCurrentWeek && (
          <button onClick={()=>setWeekKey(todayKey)} style={{width:"100%",padding:"5px",background:P.hazelXL,border:`1px solid ${P.hazelL}`,borderRadius:8,fontSize:11.5,cursor:"pointer",color:P.hazel,fontWeight:500}}>
            📅 Gå til denne uken
          </button>
        )}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {DAYS.map((day,i) => {
          const isEd=editing===day, has=!!meals[day], isToday=isCurrentWeek&&i===todayIdx, isPast=isCurrentWeek&&i<todayIdx;
          const matchRec=recipes.find(r=>r.name.toLowerCase()===(meals[day]||"").toLowerCase());
          const dayDate=getDayDate(weekKey,i);
          return (
            <div key={day}>
              <div onClick={()=>!isEd&&startEdit(day)} style={{background:isPast?"#F5F2EE":P.linen,borderRadius:isEd&&hits.length>0?"11px 11px 0 0":11,border:`1px solid ${isEd?P.hazel:isToday?P.hazel:P.border}`,borderLeft:isToday&&!isEd?`3px solid ${P.hazel}`:`1px solid ${isEd?P.hazel:P.border}`,padding:"10px 12px",cursor:isEd?"default":"pointer",opacity:isPast?0.7:1}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{minWidth:44,height:44,borderRadius:9,flexShrink:0,background:isToday?P.hazel:isPast?P.hazelL:P.mist,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                    <span style={{fontSize:9,fontWeight:600,color:isToday?"rgba(255,255,255,0.7)":P.dust}}>{DAY_S[day]}</span>
                    <span style={{fontSize:15,fontWeight:600,color:isToday?"white":P.ink}}>{dayDate.getDate()}</span>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    {isEd ? (
                      <div onClick={e=>e.stopPropagation()}>
                        <input autoFocus value={query} onChange={e=>{setMeal(day,e.target.value);setQuery(e.target.value);}}
                          onKeyDown={e=>{if(e.key==="Escape")closeEdit();if(e.key==="Enter"&&hits.length===0)closeEdit();}}
                          placeholder="Søk i kokebok eller skriv inn…"
                          style={{width:"100%",fontSize:13,boxSizing:"border-box",background:P.sand,border:`1px solid ${P.hazel}`,padding:"7px 10px",borderRadius:7,color:P.ink,outline:"none"}}/>
                      </div>
                    ) : (
                      <div>
                        <div style={{fontSize:13.5,fontWeight:has?600:400,color:has?P.ink:P.dust,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{has?meals[day]:"Legg til middag…"}</div>
                        {matchRec && <div style={{fontSize:11,color:P.dust,marginTop:2}}>⏱ {matchRec.time} min · 👥 {matchRec.servings} pers</div>}
                      </div>
                    )}
                  </div>
                  <div style={{display:"flex",gap:5,alignItems:"center",flexShrink:0}}>
                    {isEd ? (
                      <button onClick={closeEdit} style={{background:P.mist,border:`1px solid ${P.border}`,borderRadius:7,padding:"5px 10px",fontSize:11.5,cursor:"pointer",color:P.stone,fontWeight:500}}>Ferdig</button>
                    ) : (
                      <>
                        {has && matchRec && (
                          <button onClick={e=>{e.stopPropagation();setPicker({day,recipe:matchRec});}} style={{background:P.oliveXL,border:`1px solid ${P.oliveL}`,borderRadius:7,padding:"5px 8px",fontSize:11,cursor:"pointer",color:P.olive}}>🛒</button>
                        )}
                        {has && <button onClick={e=>clearDay(day,e)} style={{background:"none",border:"none",color:P.dust,cursor:"pointer",fontSize:15,padding:"2px",opacity:.6}}>✕</button>}
                        {!has && <Em e="＋" s={{color:P.dust,fontSize:16}}/>}
                      </>
                    )}
                  </div>
                </div>
              </div>
              {isEd && hits.length>0 && (
                <div style={{border:`1px solid ${P.hazel}`,borderTop:"none",borderRadius:"0 0 11px 11px",background:P.linen,overflow:"hidden"}}>
                  {hits.map((r,ri) => {
                    const wkMeals = allMeals[weekKey]||{};
                    const plannedDay = DAYS.find(d=>d!==day&&wkMeals[d]?.toLowerCase()===r.name.toLowerCase());
                    return (
                      <div key={r.id} onClick={()=>!plannedDay&&pickRec(day,r)}
                        style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderTop:ri>0?`1px solid ${P.border}`:"none",cursor:plannedDay?"default":"pointer",opacity:plannedDay?0.5:1}}
                        onMouseEnter={e=>{if(!plannedDay)e.currentTarget.style.background=P.hazelXL;}}
                        onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                        <IBox emoji="🍳" color={plannedDay?P.hazelL:P.dusk} size={30}/>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:500,color:plannedDay?P.dust:P.ink}}>{r.name}</div>
                          <div style={{fontSize:11,color:P.dust}}>
                            {plannedDay
                              ? <span style={{color:P.clay}}>⚠️ Planlagt {DAY_FULL[plannedDay].toLowerCase()}</span>
                              : <span>⏱ {r.time} min · 👥 {r.servings} pers</span>}
                          </div>
                        </div>
                        {!plannedDay && <Em e="↵" s={{color:P.hazelL,fontSize:14}}/>}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>
      {picker && <IngredientPicker recipe={picker.recipe} onClose={()=>setPicker(null)} onAdd={addToShopping}/>}
    </div>
  );
}


// ── Legg til oppskrift — ny enkel flyt ───────────────────────────
function AddRecipeModal({onSave,onClose,logEvent}) {
  const [mode,setMode]   = useState("quick"); // "quick"|"url"|"image"
  const [quick,setQuick] = useState("");
  const [url,setUrl]     = useState("");
  const [urlSt,setUrlSt] = useState(""); // ""|"loading"|"ok"|"error"
  const [urlData,setUrlData] = useState(null); // parsed recipe from URL
  const [imgFile,setImgFile] = useState(null);
  const [imgPreview,setImgPreview] = useState(null);
  const fileRef = React.useRef();

  // ── Hurtigtekst: parse navn + ingredienser fra fritekst ─────────
  const parseQuick = (text) => {
    const lines = text.trim().split(/\n/).map(l=>l.trim()).filter(Boolean);
    if(!lines.length) return null;
    const name = lines[0];
    // Resten: splitt på komma eller linjeskift
    const rawIngs = lines.slice(1).join(",").split(/,/).map(s=>s.trim()).filter(Boolean);
    const ingredients = rawIngs.map(n=>({name:n, amount:"", cat:"Diverse"}));
    return {name, ingredients};
  };

  const saveQuick = () => {
    const parsed = parseQuick(quick);
    if(!parsed) return;
    const recipe = {
      name: parsed.name,
      ingredients: parsed.ingredients,
      // Støtter metadata senere — tomme felt nå
      time: 0, servings: 0, cat: "Middag", tags: [], url: "",
      imageUrl: null,
      source: "quick",
      createdAt: Date.now(),
    };
    onSave(recipe);
    if(logEvent) logEvent("recipe_added", {source:"quick", name:recipe.name});
    onClose();
  };

  // ── URL-modus ────────────────────────────────────────────────────
  const fetchUrl = async () => {
    if(!url.trim()){setUrlSt("Lim inn en URL");return;}
    setUrlSt("loading");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-6", max_tokens:1000,
          tools:[{type:"web_search_20250305",name:"web_search"}],
          messages:[{role:"user",content:`Besøk denne siden og hent oppskriften: ${url}\nReturner KUN JSON: {"name":"...","time":20,"servings":4,"cat":"Middag","tags":["enkel"],"ingredients":[{"name":"Pasta","amount":"400g","cat":"Tørrvarer"}]}`}]
        })
      });
      const d = await res.json();
      const txt = d.content?.filter(c=>c.type==="text").map(c=>c.text).join("").replace(/\`\`\`json|\`\`\`/g,"").trim();
      const s=txt.indexOf("{"), e=txt.lastIndexOf("}");
      if(s===-1) throw 0;
      const p = JSON.parse(txt.slice(s,e+1));
      setUrlData({
        name: p.name||"",
        time: p.time||0, servings: p.servings||0, cat: p.cat||"Middag",
        tags: p.tags||[], url,
        ingredients: (p.ingredients||[]).map(i=>({name:i.name,amount:i.amount||"",cat:i.cat||"Diverse"})),
        imageUrl: null, source:"url", createdAt: Date.now(),
      });
      setUrlSt("ok");
    } catch { setUrlSt("error"); }
  };

  const saveUrl = () => {
    if(!urlData) return;
    onSave(urlData);
    if(logEvent) logEvent("recipe_added", {source:"url", name:urlData.name});
    onClose();
  };

  // ── Bilde-modus ──────────────────────────────────────────────────
  const onFileChange = (e) => {
    const file = e.target.files?.[0];
    if(!file) return;
    setImgFile(file);
    const reader = new FileReader();
    reader.onload = ev => setImgPreview(ev.target.result);
    reader.readAsDataURL(file);
  };

  const saveImage = () => {
    if(!imgPreview) return;
    // Lagrer bildet som base64 i Firebase for nå (< 1MB anbefalt)
    // Fremtidig: bytt til Firebase Storage URL
    const recipe = {
      name: "Oppskrift fra bilde", // Brukeren kan redigere navn etterpå
      ingredients: [],
      time:0, servings:0, cat:"Middag", tags:[], url:"",
      imageUrl: imgPreview, // base64 — byttes til Storage URL i fase 2
      source:"image", createdAt: Date.now(),
    };
    onSave(recipe);
    if(logEvent) logEvent("recipe_added", {source:"image"});
    onClose();
  };

  // ── Hjelpefunksjoner ─────────────────────────────────────────────
  const parsed = parseQuick(quick);
  const quickValid = parsed && parsed.name.length>0;

  const tabBtn = (id,emoji,label) => (
    <button onClick={()=>setMode(id)} style={{
      flex:1, padding:"10px 4px", border:"none", cursor:"pointer",
      background: mode===id ? P.linen : "transparent",
      borderRadius:8, fontWeight: mode===id ? 600 : 400,
      color: mode===id ? P.ink : P.stone, fontSize:12,
      boxShadow: mode===id ? "0 1px 4px rgba(44,35,24,0.08)" : "none",
      display:"flex", flexDirection:"column", alignItems:"center", gap:3,
    }}>
      <span style={{fontSize:18}}>{emoji}</span>
      <span>{label}</span>
    </button>
  );

  return (
    <Modal title="Legg til oppskrift" onClose={onClose}>
      {/* Mode tabs */}
      <div style={{display:"flex",gap:4,background:P.mist,borderRadius:10,padding:3,border:`1px solid ${P.border}`,marginBottom:16}}>
        {tabBtn("quick","⚡","Hurtig")}
        {tabBtn("url","🔗","URL")}
        {tabBtn("image","📷","Bilde")}
      </div>

      {/* ── HURTIGTEKST ── */}
      {mode==="quick" && (
        <div>
          <div style={{fontSize:12,color:P.stone,marginBottom:8,lineHeight:1.6}}>
            Skriv navn på retten på første linje.<br/>
            Deretter ingredienser, separert med komma eller linjeskift.
          </div>
          <textarea
            autoFocus
            value={quick}
            onChange={e=>setQuick(e.target.value)}
            placeholder={"Taco\nkjøttdeig, tacokrydder, tortilla\nrømme, salsa, revet ost"}
            rows={6}
            style={{width:"100%",boxSizing:"border-box",fontSize:14,resize:"none",
              background:P.sand,border:`1.5px solid ${quickValid?P.olive:P.border}`,
              borderRadius:9,padding:"10px 12px",color:P.ink,lineHeight:1.6,
              fontFamily:"-apple-system,sans-serif",outline:"none"}}
          />
          {parsed && parsed.name && (
            <div style={{marginTop:10,padding:"10px 12px",background:P.oliveXL,border:`1px solid ${P.oliveL}`,borderRadius:9}}>
              <div style={{fontSize:11,color:P.olive,fontWeight:600,marginBottom:4}}>Forhåndsvisning</div>
              <div style={{fontSize:14,fontWeight:600,color:P.ink,marginBottom:4}}>{parsed.name}</div>

          )}

            onClick={saveQuick}

            style={{width:"100%",marginTop:12,padding:"13px",background:quickValid?P.hazel:P.mist,
              color:quickValid?"white":P.dust,border:"none",borderRadius:9,fontSize:14,
              cursor:quickValid?"pointer":"default",fontWeight:600}}>
            {quickValid ? `Lagre «${parsed.name}»` : "Skriv navn på retten"}
          </button>
        </div>
      )}

      {/* ── URL ── */}
      {mode==="url" && (
        <div>
          <div style={{fontSize:12,color:P.stone,marginBottom:10,lineHeight:1.6}}>
            Lim inn lenke fra matprat.no, godt.no eller andre oppskriftssider.
          </div>
          <div style={{display:"flex",gap:6,marginBottom:10}}>
            <input value={url} onChange={e=>setUrl(e.target.value)} onFocus={e=>e.target.select()}
              placeholder="https://www.matprat.no/…" autoComplete="off"
              style={{flex:1,fontSize:13,background:P.sand}}/>
            <button onClick={fetchUrl} disabled={urlSt==="loading"}
              style={{background:P.dusk,color:"white",border:"none",borderRadius:8,
                padding:"0 14px",fontSize:13,cursor:"pointer",opacity:urlSt==="loading"?.6:1,whiteSpace:"nowrap"}}>
              {urlSt==="loading"?"Henter…":"→ Hent"}
            </button>
          </div>
          {urlSt==="ok" && urlData && (
            <div style={{padding:"12px",background:P.oliveXL,border:`1px solid ${P.oliveL}`,borderRadius:9,marginBottom:10}}>
              <div style={{fontSize:11,color:P.olive,fontWeight:600,marginBottom:4}}>✓ Hentet</div>
              <div style={{fontSize:14,fontWeight:600,color:P.ink,marginBottom:3}}>{urlData.name}</div>
              <div style={{fontSize:12,color:P.stone}}>{urlData.ingredients.map(i=>i.name).join(" · ")}</div>
            </div>
          )}
          {urlSt==="error" && (
            <div style={{padding:"12px",background:P.clayXL,border:`1px solid ${P.clayL}`,borderRadius:9,marginBottom:10}}>
              <div style={{fontSize:12,color:P.clay,fontWeight:600,marginBottom:6}}>⚠️ Kunne ikke hente fra denne siden</div>
              <div style={{fontSize:11.5,color:P.stone,marginBottom:8}}>Mange nettsider blokkerer automatisk henting. Prøv hurtigtekst i stedet.</div>
              <button onClick={()=>setMode("quick")} style={{background:P.hazel,color:"white",border:"none",borderRadius:7,padding:"7px 14px",fontSize:12,cursor:"pointer",fontWeight:500}}>
                ⚡ Bytt til hurtigtekst
              </button>
            </div>
          )}
          {typeof urlSt==="string"&&urlSt&&urlSt!=="ok"&&urlSt!=="error"&&urlSt!=="loading"&&(
            <div style={{fontSize:11,color:P.clay,marginBottom:8}}>{urlSt}</div>
          )}
          <button onClick={saveUrl} disabled={!urlData}
            style={{width:"100%",padding:"13px",background:urlData?P.hazel:P.mist,
              color:urlData?"white":P.dust,border:"none",borderRadius:9,fontSize:14,
              cursor:urlData?"pointer":"default",fontWeight:600}}>
            {urlData?`Lagre «${urlData.name}»`:"Hent oppskrift først"}
          </button>
        </div>
      )}

      {/* ── BILDE ── */}
      {mode==="image" && (
        <div>
          <div style={{fontSize:12,color:P.stone,marginBottom:10,lineHeight:1.6}}>
            Ta bilde av en oppskrift fra kokebok eller blad. Bildet lagres med oppskriften.
            Du kan legge til navn og ingredienser etterpå.
          </div>
          <input ref={fileRef} type="file" accept="image/*" capture="environment"
            onChange={onFileChange} style={{display:"none"}}/>
          {!imgPreview ? (
            <div style={{display:"flex",gap:8,marginBottom:10}}>
              <button onClick={()=>{fileRef.current.removeAttribute("capture");fileRef.current.click();}}
                style={{flex:1,padding:"14px",background:P.mist,border:`1.5px dashed ${P.border}`,borderRadius:9,cursor:"pointer",fontSize:13,color:P.stone,fontWeight:500}}>
                📁 Velg fra bibliotek
              </button>
              <button onClick={()=>{fileRef.current.setAttribute("capture","environment");fileRef.current.click();}}
                style={{flex:1,padding:"14px",background:P.mist,border:`1.5px dashed ${P.border}`,borderRadius:9,cursor:"pointer",fontSize:13,color:P.stone,fontWeight:500}}>
                📷 Ta bilde
              </button>
            </div>
          ) : (
            <div style={{marginBottom:10}}>
              <img src={imgPreview} alt="Oppskrift" style={{width:"100%",borderRadius:9,border:`1px solid ${P.border}`,maxHeight:240,objectFit:"cover"}}/>
              <button onClick={()=>{setImgFile(null);setImgPreview(null);}}
                style={{marginTop:6,fontSize:11.5,color:P.clay,background:"none",border:"none",cursor:"pointer",padding:0}}>
                ✕ Fjern bilde
              </button>
            </div>
          )}
          <button onClick={saveImage} disabled={!imgPreview}
            style={{width:"100%",padding:"13px",background:imgPreview?P.hazel:P.mist,
              color:imgPreview?"white":P.dust,border:"none",borderRadius:9,fontSize:14,
              cursor:imgPreview?"pointer":"default",fontWeight:600}}>
            {imgPreview?"Lagre oppskrift med bilde":"Velg bilde først"}
          </button>
        </div>
      )}
    </Modal>
  );
}

// ── Recipe Form (legg til / rediger) ─────────────────────────────
function RecipeForm({onSave,onClose,initial}) {
  const empty = {name:"",time:"",servings:"",cat:"Middag",tags:"",url:"",ingredients:[]};
  const toForm = r => ({...empty,...r,time:String(r.time||""),servings:String(r.servings||""),tags:(r.tags||[]).join(", "),ingredients:[...(r.ingredients||[])]});
  const [form,setForm] = useState(initial?toForm(initial):empty);
  const [aiSt,setAiSt] = useState("");
  const [iName,setIName] = useState(""); const [iAmt,setIAmt] = useState(""); const [iCat,setICat] = useState("Diverse");

  const fetchUrl = async () => {
    if(!form.url.trim()){setAiSt("Lim inn en URL");return;}
    setAiSt("loading");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,tools:[{type:"web_search_20250305",name:"web_search"}],
          messages:[{role:"user",content:`Besøk denne siden og hent oppskriften: ${form.url}\nReturner KUN JSON: {"name":"...","time":20,"servings":4,"cat":"Middag","tags":["enkel"],"ingredients":[{"name":"Pasta","amount":"400g","cat":"Tørrvarer"}]}`}]})});
      const d=await res.json();
      const txt=d.content?.filter(c=>c.type==="text").map(c=>c.text).join("").replace(/```json|```/g,"").trim();
      const s=txt.indexOf("{"),e=txt.lastIndexOf("}");if(s===-1)throw 0;
      const p=JSON.parse(txt.slice(s,e+1));
      setForm(f=>({...f,name:p.name||f.name,time:String(p.time||f.time),servings:String(p.servings||f.servings),cat:p.cat||f.cat,tags:(p.tags||[]).join(", "),
        ingredients:(p.ingredients||[]).map(i=>({name:i.name,amount:i.amount||"",cat:i.cat||"Diverse"}))}));
      setAiSt("ok");
    } catch { setAiSt("error"); }
  };

  const addIng = () => {
    if(!iName.trim()) return;
    setForm(f=>({...f,ingredients:[...f.ingredients,{name:iName.trim(),amount:iAmt.trim(),cat:iCat}]}));
    setIName(""); setIAmt(""); setICat("Diverse");
  };
  const removeIng = i => setForm(f=>({...f,ingredients:f.ingredients.filter((_,j)=>j!==i)}));

  const save = () => {
    const recipe = {name:form.name,time:parseInt(form.time)||0,servings:parseInt(form.servings)||4,cat:form.cat,
      tags:form.tags.split(",").map(s=>s.trim()).filter(Boolean),url:form.url,ingredients:form.ingredients};
    onSave(recipe);
    onClose();
  };

  return (
    <Modal title={initial?"Rediger oppskrift":"Legg til oppskrift"} onClose={onClose}>
      <div style={{marginBottom:14,padding:"11px 12px",background:P.mist,borderRadius:9,border:`1px solid ${P.border}`}}>
        <div style={{fontSize:11.5,fontWeight:600,color:P.stone,marginBottom:7}}>🌐 Hent fra nettside (valgfritt)</div>
        <div style={{display:"flex",gap:6}}>
          <input value={form.url} onChange={e=>setForm(f=>({...f,url:e.target.value}))} onFocus={e=>e.target.select()}
            placeholder="https://www.matprat.no/…" autoComplete="off" style={{flex:1,fontSize:12,background:P.linen}}/>
          <button onClick={fetchUrl} disabled={aiSt==="loading"} style={{background:P.dusk,color:"white",border:"none",borderRadius:7,padding:"0 12px",fontSize:12,cursor:"pointer",opacity:aiSt==="loading"?.6:1}}>
            {aiSt==="loading"?"Henter…":"→ Hent"}
          </button>
        </div>
        {aiSt==="ok"&&<div style={{fontSize:11,marginTop:6,color:P.olive}}>✓ Hentet — sjekk feltene</div>}
        {aiSt==="error"&&<div style={{fontSize:11,marginTop:6,color:P.clay}}>⚠️ Kunne ikke hente. Fyll inn manuelt.</div>}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div>
          <div style={{fontSize:11.5,color:P.stone,marginBottom:4,fontWeight:600}}>Navn *</div>
          <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} autoComplete="off" placeholder="Tomatsuppe…" style={{width:"100%",boxSizing:"border-box",fontSize:14,padding:"9px 11px"}}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          <div>
            <div style={{fontSize:11.5,color:P.stone,marginBottom:4,fontWeight:600}}>Tid (min)</div>
            <input type="number" value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))} autoComplete="off" placeholder="30" style={{width:"100%",boxSizing:"border-box",fontSize:13}}/>
          </div>
          <div>
            <div style={{fontSize:11.5,color:P.stone,marginBottom:4,fontWeight:600}}>Porsjoner</div>
            <input type="number" value={form.servings} onChange={e=>setForm(f=>({...f,servings:e.target.value}))} autoComplete="off" placeholder="4" style={{width:"100%",boxSizing:"border-box",fontSize:13}}/>
          </div>
          <div>
            <div style={{fontSize:11.5,color:P.stone,marginBottom:4,fontWeight:600}}>Kategori</div>
            <select value={form.cat} onChange={e=>setForm(f=>({...f,cat:e.target.value}))} style={{width:"100%",boxSizing:"border-box",fontSize:13}}>
              {["Middag","Frokost","Lunsj","Dessert","Snacks"].map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
        </div>
        <div>
          <div style={{fontSize:11.5,color:P.stone,marginBottom:6,fontWeight:600}}>Ingredienser</div>
          {form.ingredients.map((ing,i) => (
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:`1px solid ${P.border}`}}>
              <div style={{width:7,height:7,borderRadius:"50%",flexShrink:0,background:CAT_COLOR[ing.cat]||P.hazel}}/>
              <span style={{flex:1,fontSize:13,color:P.ink,fontWeight:500}}>{ing.name}</span>
              <span style={{fontSize:12,color:P.stone}}>{ing.amount}</span>
              <span style={{fontSize:10,color:P.dust}}>{ing.cat}</span>
              <button onClick={()=>removeIng(i)} style={{background:"none",border:"none",cursor:"pointer",color:P.dust,fontSize:13,opacity:.6}}>✕</button>
            </div>
          ))}
          <div style={{marginTop:8,padding:"10px",background:P.sand,borderRadius:9,border:`1px solid ${P.border}`}}>
            <div style={{fontSize:11,color:P.dust,marginBottom:6,fontWeight:500}}>Legg til ingrediens</div>
            <div style={{display:"flex",gap:6,marginBottom:6}}>
              <input value={iName} onChange={e=>setIName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addIng()} autoComplete="off" placeholder="Navn" style={{flex:2,fontSize:12,background:P.linen}}/>
              <input value={iAmt} onChange={e=>setIAmt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addIng()} autoComplete="off" placeholder="Mengde" style={{flex:1,fontSize:12,background:P.linen}}/>
            </div>
            <div style={{display:"flex",gap:6}}>
              <select value={iCat} onChange={e=>setICat(e.target.value)} style={{flex:1,fontSize:12,background:P.linen}}>
                {SHOP_CATS.map(c=><option key={c}>{c}</option>)}
              </select>
              <button onClick={addIng} style={{background:iName.trim()?P.hazel:P.mist,color:iName.trim()?"white":P.dust,border:"none",borderRadius:8,padding:"0 14px",cursor:iName.trim()?"pointer":"default",fontSize:13,fontWeight:600}}>＋ Legg til</button>
            </div>
          </div>
        </div>
        <div>
          <div style={{fontSize:11.5,color:P.stone,marginBottom:4,fontWeight:600}}>Tagger</div>
          <input value={form.tags} onChange={e=>setForm(f=>({...f,tags:e.target.value}))} autoComplete="off" placeholder="enkel, favoritt…" style={{width:"100%",boxSizing:"border-box",fontSize:13}}/>
        </div>
        <button onClick={save} disabled={!form.name.trim()} style={{padding:"12px",background:form.name.trim()?P.hazel:P.mist,color:form.name.trim()?"white":P.dust,border:"none",borderRadius:9,fontSize:13,cursor:form.name.trim()?"pointer":"default",fontWeight:600}}>
          💾 {initial?"Lagre endringer":"Lagre oppskrift"}
        </button>
      </div>
    </Modal>
  );
}

// ── AddToPlanCard (pkt 2+6) ───────────────────────────────────────
function AddToPlanCard({recipe,meals,setMeals,onPickIngredients}) {
  const alreadyThisWeek = Object.values(meals).some(m=>m&&m.toLowerCase()===recipe.name.toLowerCase());
  return (
    <Card style={{marginBottom:12,padding:"10px 14px"}}>
      <div style={{fontSize:12,fontWeight:600,color:P.stone,marginBottom:8}}>📅 Legg til i middagsplanen</div>
      {alreadyThisWeek && (
        <div style={{fontSize:11,color:P.clay,background:P.clayXL,border:`1px solid ${P.clayL}`,borderRadius:7,padding:"5px 9px",marginBottom:8}}>⚠️ Allerede planlagt denne uken</div>
      )}
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {DAYS.map(d => {
          const isThisRecipe = meals[d]?.toLowerCase()===recipe.name.toLowerCase();
          const hasOther = !!meals[d]&&!isThisRecipe;
          if(hasOther) return null;
          return (
            <button key={d} onClick={()=>{setMeals(p=>({...p,[d]:recipe.name}));onPickIngredients();}}
              style={{padding:"5px 12px",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:500,
                background:isThisRecipe?P.olive:P.hazelXL,color:isThisRecipe?"white":P.hazel,
                border:`1px solid ${isThisRecipe?P.olive:P.hazelL}`}}>
              {DAY_S[d]}{isThisRecipe?" ✓":""}
            </button>
          );
        })}
      </div>
    </Card>
  );
}

// ── Recipes Screen ────────────────────────────────────────────────
function RecipesScreen({recipes,setRecipes,meals,setMeals,setShopping}) {
  const [sel,setSel]         = useState(null);
  const [showAdd,setShowAdd]   = useState(false);  // ny enkel flyt
  const [showForm,setShowForm] = useState(false);  // avansert redigering
  const [editRecipe,setEditRecipe] = useState(null);
  const [filter,setFilter]   = useState("Alle");
  const [search,setSearch]   = useState("");
  const [picker,setPicker]   = useState(null);

  const cats = ["Alle","Middag","Frokost","Lunsj","Dessert","Snacks"];
  const visible = recipes.filter(r=>filter==="Alle"||r.cat===filter).filter(r=>!search||r.name.toLowerCase().includes(search.toLowerCase())||r.tags.some(t=>t.toLowerCase().includes(search.toLowerCase())));

  const saveRecipe = (data) => {
    const now = Date.now();
    if(editRecipe) {
      setRecipes(p=>p.map(r=>r.id===editRecipe.id?{...r,...data,updatedAt:now}:r));
    } else {
      setRecipes(p=>[...p,{id:uid(),...data,createdAt:now}]);
    }
    setEditRecipe(null);
  };

  const logEvent = async (type, meta={}) => {
    try {
      await dbSet(`${FAM}/events/${Date.now()}_${uid()}`, {type, meta, ts:Date.now()});
    } catch(e) {}
  };

  const addToShopping = ings => setShopping(prev => {
    let list=[...prev];
    ings.forEach(ing => {
      const idx=list.findIndex(s=>s.name.toLowerCase()===ing.name.toLowerCase());
      if(idx>=0) list[idx]={...list[idx],amount:`${list[idx].amount} + ${ing.amount}`};
      else list=[...list,{id:uid(),name:ing.name,amount:ing.amount,cat:ing.cat,done:false}];
    });
    return list;
  });

  if(sel) {
    const r = recipes.find(x=>x.id===sel);
    if(!r){setSel(null);return null;}
    return (
      <div>
        <button onClick={()=>setSel(null)} style={{display:"flex",alignItems:"center",gap:5,fontSize:12.5,color:P.hazel,marginBottom:16,background:"none",border:"none",cursor:"pointer",padding:0,fontWeight:500}}>← Tilbake</button>
        <div style={{fontSize:20,fontWeight:600,color:P.ink,marginBottom:8}}>{r.name}</div>
        <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
          <Chip color={P.olive}>⏱ {r.time} min</Chip>
          <Chip color={P.dusk}>👥 {r.servings} pers</Chip>
          <Chip color={P.hazel}>{r.cat}</Chip>
          {r.tags.map(t=><Chip key={t} color={P.hazelL}>{t}</Chip>)}
        </div>
        {r.imageUrl && (
          <img src={r.imageUrl} alt={r.name} style={{width:"100%",borderRadius:10,marginBottom:12,maxHeight:200,objectFit:"cover",border:`1px solid ${P.border}`}}/>
        )}
        {r.url && <a href={r.url} target="_blank" rel="noreferrer" style={{fontSize:12,color:P.dusk,display:"block",marginBottom:12}}>↗ Originaloppskrift</a>}

        <AddToPlanCard recipe={r} meals={meals} setMeals={setMeals} onPickIngredients={()=>setPicker(r)}/>

        <Card style={{marginBottom:12}}>
          <SL style={{marginBottom:10}}>Ingredienser</SL>
          {r.ingredients.map((ing,i) => (
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:i<r.ingredients.length-1?`1px solid ${P.border}`:"none"}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:CAT_COLOR[ing.cat]||P.hazel,flexShrink:0}}/>
              <span style={{flex:1,fontSize:13,fontWeight:500,color:P.ink}}>{ing.name}</span>
              <span style={{fontSize:12,color:P.stone}}>{ing.amount}</span>
            </div>
          ))}
        </Card>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>{setEditRecipe(r);setShowForm(true);}} style={{flex:1,padding:"10px",background:P.hazelXL,color:P.hazel,border:`1px solid ${P.hazelL}`,borderRadius:9,fontSize:13,cursor:"pointer",fontWeight:500}}>✏️ Rediger</button>
          <button onClick={()=>{setRecipes(p=>p.filter(x=>x.id!==r.id));setSel(null);}} style={{flex:1,padding:"10px",background:P.clayXL,color:P.clay,border:`1px solid ${P.clayL}`,borderRadius:9,fontSize:13,cursor:"pointer",fontWeight:500}}>🗑️ Slett</button>
        </div>
        {picker && <IngredientPicker recipe={picker} onClose={()=>setPicker(null)} onAdd={addToShopping}/>}
        {showForm && <RecipeForm initial={editRecipe} onSave={saveRecipe} onClose={()=>{setShowForm(false);setEditRecipe(null);}}/>}
      </div>
    );
  }

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div>
          <div style={{fontSize:20,fontWeight:600,color:P.ink}}>Kokebok</div>
          <div style={{fontSize:12,color:P.stone,marginTop:2}}>🍳 {recipes.length} oppskrifter</div>
        </div>
        <button onClick={()=>setShowAdd(true)} style={{background:P.hazel,color:"white",border:"none",borderRadius:9,padding:"8px 14px",fontSize:12.5,cursor:"pointer",fontWeight:600}}>＋ Legg til</button>
      </div>
      <div style={{position:"relative",marginBottom:12}}>
        <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:14,color:P.dust}}>🔍</span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Søk i kokebok…"
          style={{width:"100%",boxSizing:"border-box",paddingLeft:32,fontSize:13,background:P.mist,border:`1px solid ${P.border}`,borderRadius:9,color:P.ink}}/>
        {search && <button onClick={()=>setSearch("")} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:P.dust,fontSize:14}}>✕</button>}
      </div>
      <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:2}}>
        {cats.map(c=><Pill key={c} active={filter===c} onClick={()=>setFilter(c)}>{c}</Pill>)}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {visible.length===0 && recipes.length===0 && (
          <div style={{textAlign:"center",padding:"32px 16px",background:P.linen,borderRadius:12,border:`1px solid ${P.border}`}}>
            <div style={{fontSize:32,marginBottom:12}}>📖</div>
            <div style={{fontSize:15,fontWeight:600,color:P.ink,marginBottom:6}}>Kokeboken er tom</div>
            <div style={{fontSize:13,color:P.stone,marginBottom:16,lineHeight:1.6}}>
              Start med en rett du lager ofte.<br/>Skriv navn + ingredienser — ferdig på 15 sekunder.
            </div>
            <button onClick={()=>setShowAdd(true)} style={{background:P.hazel,color:"white",border:"none",borderRadius:9,padding:"10px 20px",fontSize:13,cursor:"pointer",fontWeight:600}}>
              ⚡ Legg inn første oppskrift
            </button>
          </div>
        )}
        {visible.length===0 && recipes.length>0 && (
          <div style={{textAlign:"center",padding:"32px 0",color:P.dust,fontSize:13}}>Ingen oppskrifter matcher søket</div>
        )}
        {visible.map(r => (
          <Card key={r.id} onClick={()=>setSel(r.id)} accent={CAT_COLOR[r.ingredients[0]?.cat]||P.hazel} style={{cursor:"pointer",padding:"10px 14px"}}>
            <div style={{display:"flex",alignItems:"center",gap:11}}>
              <IBox emoji="🍳" color={P.dusk} size={38}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13.5,fontWeight:600,color:P.ink}}>{r.name}</div>
                <div style={{fontSize:11,color:P.dust,marginTop:2}}>⏱ {r.time} min · 👥 {r.servings} pers · {r.cat}</div>
              </div>
              {r.url && <span style={{fontSize:13,color:P.dusk}}>🔗</span>}
              <Em e="›" s={{color:P.dust,fontSize:16,flexShrink:0}}/>
            </div>
          </Card>
        ))}
      </div>
      {showAdd && <AddRecipeModal onSave={saveRecipe} onClose={()=>setShowAdd(false)} logEvent={logEvent}/>}
      {showForm && <RecipeForm initial={editRecipe} onSave={saveRecipe} onClose={()=>{setShowForm(false);setEditRecipe(null);}}/>}
    </div>
  );
}

// ── Shopping Screen ───────────────────────────────────────────────
function ShoppingScreen({shopping,setShopping,itemHistory}) {
  const [newItem,setNewItem] = useState("");
  const [newAmt,setNewAmt]   = useState("");
  const [newCat,setNewCat]   = useState("Diverse");
  const [showDone,setShowDone] = useState(false);

  const pending  = shopping.filter(i=>!i.done);
  const done     = shopping.filter(i=>i.done);
  const catOrder = [...new Set(pending.map(i=>i.cat))];
  const toggle   = id => setShopping(p=>p.map(i=>i.id===id?{...i,done:!i.done}:i));
  const remove   = id => setShopping(p=>p.filter(i=>i.id!==id));
  const clearDone = () => setShopping(p=>p.filter(i=>!i.done));
  const add = () => {
    if(!newItem.trim()) return;
    setShopping(p=>[...p,{id:uid(),name:newItem.trim(),amount:newAmt.trim(),cat:newCat,done:false}]);
    setNewItem(""); setNewAmt("");
  };

  const suggestions = newItem.length>1
    ? (itemHistory||[]).filter(h=>h.name.toLowerCase().includes(newItem.toLowerCase())&&!shopping.some(s=>s.name.toLowerCase()===h.name.toLowerCase())).slice(0,5)
    : [];

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div>
          <div style={{fontSize:20,fontWeight:600,color:P.ink}}>Handleliste</div>
          <div style={{fontSize:12,color:P.stone,marginTop:2}}>✓ {done.length} fullført · ⏱ {pending.length} gjenstår</div>
        </div>
        {done.length>0 && <button onClick={clearDone} style={{fontSize:11.5,color:P.clay,background:P.clayXL,border:`1px solid ${P.clayL}`,padding:"5px 10px",borderRadius:7,cursor:"pointer",fontWeight:500}}>🗑️ Fjern fullførte</button>}
      </div>

      {shopping.length>0 && (
        <div style={{marginBottom:14}}>
          <Bar value={done.length} max={shopping.length} color={P.olive} h={3}/>
          <div style={{display:"flex",justifyContent:"flex-end",marginTop:4}}>
            <span style={{fontSize:10.5,color:P.dust}}>{Math.round(done.length/shopping.length*100)}% ferdig</span>
          </div>
        </div>
      )}

      <div style={{marginBottom:14}}>
        <div style={{background:P.mist,padding:"8px",borderRadius:suggestions.length>0?"10px 10px 0 0":10,border:`1px solid ${P.border}`,display:"flex",gap:6,alignItems:"center"}}>
          <Em e="＋" s={{fontSize:15,color:P.dust,flexShrink:0}}/>
          <input value={newItem} onChange={e=>setNewItem(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} autoComplete="off" placeholder="Hva trenger du?" style={{flex:2,fontSize:13,background:"transparent",border:"none",outline:"none",color:P.ink,padding:"0 2px"}}/>
          <input value={newAmt} onChange={e=>setNewAmt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} autoComplete="off" placeholder="Mengde" style={{width:65,fontSize:12,background:"transparent",border:"none",outline:"none",color:P.stone,borderLeft:`1px solid ${P.border}`,paddingLeft:8}}/>
          <select value={newCat} onChange={e=>setNewCat(e.target.value)} style={{fontSize:11,background:"transparent",border:"none",outline:"none",color:P.stone,maxWidth:95,borderLeft:`1px solid ${P.border}`,paddingLeft:6}}>
            {SHOP_CATS.map(c=><option key={c}>{c}</option>)}
          </select>
          <button onClick={add} style={{background:P.hazel,color:"white",border:"none",borderRadius:7,width:30,height:30,cursor:"pointer",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>→</button>
        </div>
        {suggestions.length>0 && (
          <div style={{border:`1px solid ${P.border}`,borderTop:"none",borderRadius:"0 0 10px 10px",background:P.linen,overflow:"hidden"}}>
            {suggestions.map((s,i) => (
              <div key={i} onClick={()=>{setNewItem(s.name);setNewCat(s.cat);}}
                style={{display:"flex",alignItems:"center",gap:10,padding:"7px 12px",borderTop:i>0?`1px solid ${P.border}`:"none",cursor:"pointer"}}
                onMouseEnter={e=>e.currentTarget.style.background=P.hazelXL}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <div style={{width:7,height:7,borderRadius:"50%",background:CAT_COLOR[s.cat]||P.hazel,flexShrink:0}}/>
                <span style={{flex:1,fontSize:13,color:P.ink}}>{s.name}</span>
                <span style={{fontSize:11,color:P.dust}}>{s.cat}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      {shopping.length===0 && (
        <div style={{textAlign:"center",padding:"48px 0",color:P.dust}}>
          <div style={{fontSize:32,marginBottom:10,opacity:.35}}>🛍️</div>
          <div style={{fontSize:14,fontWeight:500,color:P.stone}}>Listen er tom</div>
        </div>
      )}

      {catOrder.map(cat => {
        const items=pending.filter(i=>i.cat===cat);
        const cc=CAT_COLOR[cat]||P.hazel;
        return (
          <div key={cat} style={{marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
              <Em e={CAT_EMOJI[cat]||"📦"} s={{fontSize:12}}/>
              <span style={{fontSize:10.5,fontWeight:600,color:P.dust,textTransform:"uppercase",letterSpacing:"0.08em"}}>{cat}</span>
              <div style={{flex:1,height:"0.5px",background:P.border}}/>
              <span style={{fontSize:10,color:P.dust}}>{items.length}</span>
            </div>
            {items.map((item,idx) => (
              <div key={item.id} style={{display:"flex",alignItems:"center",gap:9,padding:"6px 2px",borderBottom:idx<items.length-1?`1px solid ${P.border}`:"none"}}>
                <button onClick={()=>toggle(item.id)} style={{width:20,height:20,borderRadius:5,flexShrink:0,cursor:"pointer",background:"transparent",border:`1.5px solid ${P.hazelL}`,display:"flex",alignItems:"center",justifyContent:"center"}}/>
                <span style={{flex:1,fontSize:13,color:P.ink}}>{item.name}</span>
                {item.amount && <span style={{fontSize:11.5,color:P.dust,flexShrink:0}}>{item.amount}</span>}
                <button onClick={()=>remove(item.id)} style={{background:"none",border:"none",color:P.dust,cursor:"pointer",fontSize:14,padding:"0 2px",opacity:.45}}>✕</button>
              </div>
            ))}
          </div>
        );
      })}

      {done.length>0 && (
        <div style={{marginTop:6}}>
          <button onClick={()=>setShowDone(p=>!p)} style={{display:"flex",alignItems:"center",gap:8,width:"100%",background:"none",border:"none",cursor:"pointer",padding:"6px 0",marginBottom:6}}>
            <div style={{flex:1,height:"0.5px",background:P.border}}/>
            <span style={{fontSize:10.5,fontWeight:600,color:P.dust,whiteSpace:"nowrap"}}>{showDone?"▴":"▾"} {done.length} FULLFØRT</span>
            <div style={{flex:1,height:"0.5px",background:P.border}}/>
          </button>
          {showDone && (
            <div style={{opacity:0.6}}>
              {done.map((item,idx) => (
                <div key={item.id} style={{display:"flex",alignItems:"center",gap:9,padding:"6px 2px",borderBottom:idx<done.length-1?`1px solid ${P.border}`:"none"}}>
                  <button onClick={()=>toggle(item.id)} style={{width:20,height:20,borderRadius:5,flexShrink:0,cursor:"pointer",background:P.olive,border:`1.5px solid ${P.olive}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <Em e="✓" s={{fontSize:11,color:"white"}}/>
                  </button>
                  <span style={{flex:1,fontSize:13,color:P.dust,textDecoration:"line-through"}}>{item.name}</span>
                  {item.amount && <span style={{fontSize:11.5,color:P.dust}}>{item.amount}</span>}
                  <button onClick={()=>remove(item.id)} style={{background:"none",border:"none",color:P.dust,cursor:"pointer",fontSize:14,padding:"0 2px",opacity:.35}}>✕</button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Economy Screen ────────────────────────────────────────────────
function AddItemRow({onAdd,color}) {
  const [n,setN]=useState(""); const [b,setB]=useState(""); const [s,setS]=useState("");
  const go=()=>{if(!n.trim())return;onAdd(n,b,s);setN("");setB("");setS("");};
  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 68px 68px 30px",gap:5,marginTop:9,alignItems:"center"}}>
      <input value={n} onChange={e=>setN(e.target.value)} placeholder="Ny post…" style={{fontSize:11,background:P.sand}}/>
      <input type="number" value={b} onChange={e=>setB(e.target.value)} placeholder="Budsjett" style={{fontSize:11,textAlign:"right",background:P.sand}}/>
      <input type="number" value={s} onChange={e=>setS(e.target.value)} placeholder="Faktisk" style={{fontSize:11,textAlign:"right",background:P.sand}}/>
      <button onClick={go} style={{background:color||P.hazel,color:"white",border:"none",borderRadius:7,padding:"5px",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>＋</button>
    </div>
  );
}

function EconomyScreen({budgetGroups,setBudgetGroups,incomeMonths,setIncomeMonths,month,setMonth}) {
  const [econTab,setEconTab] = useState("overview");
  const [expanded,setExpanded] = useState(null);

  const gBudget  = (g,m) => g.items.reduce((s,i)=>s+(i.months[m]?.budget||0),0);
  const gSpent   = (g,m) => g.items.reduce((s,i)=>s+(i.months[m]?.spent||0),0);
  const totalInc = (incomeMonths[month]||[]).reduce((s,i)=>s+i.amount,0);
  const totalBud = budgetGroups.reduce((s,g)=>s+gBudget(g,month),0);
  const leftover = totalInc-totalBud;

  const updItem=(gid,iid,f,v)=>setBudgetGroups(p=>p.map(g=>g.id!==gid?g:{...g,items:g.items.map(it=>it.id!==iid?it:{...it,months:it.months.map((mo,mi)=>mi!==month?mo:{...mo,[f]:parseFloat(v)||0})})}));
  const addItem=(gid,n,b,s)=>setBudgetGroups(p=>p.map(g=>g.id!==gid?g:{...g,items:[...g.items,{id:uid(),name:n,months:Array.from({length:12},(_,mi)=>({budget:mi===month?parseFloat(b)||0:0,spent:mi===month?parseFloat(s)||0:0}))}]}));
  const delItem=(gid,iid)=>setBudgetGroups(p=>p.map(g=>g.id!==gid?g:{...g,items:g.items.filter(it=>it.id!==iid)}));
  const updInc=(id,f,v)=>setIncomeMonths(p=>p.map((arr,mi)=>mi!==month?arr:arr.map(i=>i.id!==id?i:{...i,[f]:f==="amount"?parseFloat(v)||0:v})));
  const addInc=(n,a)=>setIncomeMonths(p=>p.map((arr,mi)=>mi!==month?arr:[...arr,{id:uid(),name:n,amount:parseFloat(a)||0}]));

  function GRow({g,edit}) {
    const gb=gBudget(g,month), gs=gSpent(g,month), over=isOver(gs,gb), open=expanded===g.id;
    return (
      <div>
        <Card onClick={()=>setExpanded(open?null:g.id)} accent={g.color} style={{cursor:"pointer",borderRadius:open?"11px 11px 0 0":11,marginBottom:open?0:undefined,borderBottom:open?"none":undefined,padding:"10px 14px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <IBox emoji={GROUP_EMOJI[g.id]||"📁"} color={g.color} size={34}/>
            <div style={{flex:1}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:5}}>
                <span style={{fontSize:13,fontWeight:600,color:P.ink}}>{g.label}</span>
                <div>
                  <span style={{fontSize:12,fontWeight:500,color:over?P.clay:P.ink}}>{fmt(gs)}</span>
                  <span style={{fontSize:10.5,color:P.dust}}> / {fmt(gb)}</span>
                  {over && <span style={{marginLeft:4,fontSize:10,color:P.clay,fontWeight:600}}>↑</span>}
                </div>
              </div>
              <Bar value={gs} max={gb||1} color={g.color} h={3} over={over}/>
            </div>
            <Em e={open?"▴":"▾"} s={{color:P.dust,fontSize:13,marginLeft:6}}/>
          </div>
        </Card>
        {open && (
          <div style={{border:`1px solid ${P.border}`,borderTop:"none",borderRadius:"0 0 11px 11px",background:P.linen,padding:"6px 14px 12px",marginBottom:6}}>
            {edit && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 68px 68px 30px",gap:5,padding:"4px 0 7px",borderBottom:`1px solid ${P.border}`,marginBottom:4}}>
                <span style={{fontSize:10,color:P.dust}}>Post</span>
                <span style={{fontSize:10,color:P.dust,textAlign:"right"}}>Budsjett</span>
                <span style={{fontSize:10,color:P.dust,textAlign:"right"}}>Faktisk</span>
                <span/>
              </div>
            )}
            {g.items.map((it,idx) => {
              const mo=it.months[month], o=isOver(mo.spent,mo.budget);
              return (
                <div key={it.id} style={{padding:"6px 0",borderBottom:idx<g.items.length-1?`1px solid ${P.border}`:"none"}}>
                  {edit ? (
                    <div style={{display:"grid",gridTemplateColumns:"1fr 68px 68px 30px",gap:5,alignItems:"center"}}>
                      <span style={{fontSize:12,color:o?P.clay:P.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it.name}</span>
                      <input type="number" value={mo.budget} onChange={e=>updItem(g.id,it.id,"budget",e.target.value)} style={{fontSize:11,textAlign:"right",background:P.sand}}/>
                      <input type="number" value={mo.spent}  onChange={e=>updItem(g.id,it.id,"spent",e.target.value)}  style={{fontSize:11,textAlign:"right",background:P.sand,color:o?P.clay:"inherit"}}/>
                      <button onClick={()=>delItem(g.id,it.id)} style={{background:"none",border:"none",cursor:"pointer",color:P.dust,fontSize:12,padding:2,opacity:.5}}>🗑️</button>
                    </div>
                  ) : (
                    <div>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:2}}>
                        <span style={{fontSize:12,color:P.stone}}>{it.name}</span>
                        <div>
                          <span style={{fontSize:12,fontWeight:500,color:o?P.clay:P.ink}}>{fmt(mo.spent)}</span>
                          <span style={{fontSize:10.5,color:P.dust}}> / {fmt(mo.budget)}</span>
                        </div>
                      </div>
                      {mo.budget>0 && <Bar value={mo.spent} max={mo.budget} color={g.color} h={2.5} over={o}/>}
                    </div>
                  )}
                </div>
              );
            })}
            {edit && <AddItemRow onAdd={(n,b,s)=>addItem(g.id,n,b,s)} color={g.color}/>}
          </div>
        )}
      </div>
    );
  }

  const curInc = incomeMonths[month]||[];
  const totalInc2 = curInc.reduce((s,i)=>s+i.amount,0);

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <div style={{fontSize:20,fontWeight:600,color:P.ink}}>Økonomi</div>
          <div style={{fontSize:12,color:P.stone,marginTop:2}}>📅 {MONTHS[month]} 2026</div>
        </div>
        <select value={month} onChange={e=>setMonth(+e.target.value)} style={{fontSize:12,background:P.mist,border:`1px solid ${P.border}`,borderRadius:8,padding:"6px 10px",color:P.ink,fontWeight:500}}>
          {MONTHS.map((m,i)=><option key={i} value={i}>{m} 2026</option>)}
        </select>
      </div>
      <div style={{display:"flex",gap:4,marginBottom:16,background:P.mist,borderRadius:10,padding:3,border:`1px solid ${P.border}`}}>
        {[{id:"overview",label:"⊞ Oversikt"},{id:"budget",label:"🔧 Budsjett"},{id:"income",label:"📥 Inntekter"}].map(t=>(
          <button key={t.id} onClick={()=>setEconTab(t.id)} style={{flex:1,padding:"7px 0",fontSize:11.5,borderRadius:8,border:"none",cursor:"pointer",background:econTab===t.id?P.linen:"transparent",color:econTab===t.id?P.ink:P.stone,fontWeight:econTab===t.id?600:400,boxShadow:econTab===t.id?"0 1px 4px rgba(44,35,24,0.08)":"none"}}>
            {t.label}
          </button>
        ))}
      </div>

      {econTab==="overview" && (
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <div style={{padding:"18px 16px",background:leftover>=0?`${P.olive}12`:P.clayXL,border:`1px solid ${leftover>=0?P.oliveL:P.clayL}`,borderRadius:12,textAlign:"center"}}>
            <div style={{fontSize:10.5,color:leftover>=0?P.olive:P.clay,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>{leftover>=0?"🐷":"⚠️"} Til overs i {MONTHS[month].toLowerCase()}</div>
            <div style={{fontSize:34,fontWeight:600,color:leftover>=0?P.olive:P.clay}}>{fmt(leftover)}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <Card style={{padding:"12px 14px"}}><div style={{fontSize:10.5,color:P.dust,marginBottom:3}}>↑ Inntekter</div><div style={{fontSize:19,fontWeight:600,color:P.olive}}>{fmt(totalInc2)}</div></Card>
            <Card style={{padding:"12px 14px"}}><div style={{fontSize:10.5,color:P.dust,marginBottom:3}}>↓ Budsjettert</div><div style={{fontSize:19,fontWeight:600,color:P.clay}}>{fmt(totalBud)}</div></Card>
          </div>
          <SL style={{marginTop:4}}>Kategorier</SL>
          {budgetGroups.map(g=>{const gb=gBudget(g,month),gs=gSpent(g,month);if(!gb&&!gs)return null;return <GRow key={g.id} g={g} edit={false}/>;  })}
          <div style={{background:P.mist,border:`1px solid ${P.border}`,borderRadius:11,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:13,fontWeight:600,color:P.ink}}>👛 Til overs</span>
            <span style={{fontSize:15,fontWeight:600,color:leftover>=0?P.olive:P.clay}}>{leftover>=0?"+":""}{fmt(leftover)}</span>
          </div>
        </div>
      )}

      {econTab==="budget" && (
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          <div style={{fontSize:12,color:P.stone,marginBottom:4}}>ℹ️ Trykk for å redigere {MONTHS[month].toLowerCase()}-tallene.</div>
          {budgetGroups.map(g=><GRow key={g.id} g={g} edit={true}/>)}
        </div>
      )}

      {econTab==="income" && (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{background:`${P.olive}12`,border:`1px solid ${P.oliveL}`,borderRadius:12,padding:"16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:10.5,color:P.olive,fontWeight:600,marginBottom:3}}>↑ Inntekter {MONTHS[month].toLowerCase()}</div>
              <div style={{fontSize:28,fontWeight:600,color:P.olive}}>{fmt(totalInc2)}</div>
            </div>
            <IBox emoji="🪙" color={P.gold} size={42}/>
          </div>
          <Card>
            <SL style={{marginBottom:10}}>Inntektsposter</SL>
            <div style={{display:"grid",gridTemplateColumns:"1fr 100px 28px",gap:6,marginBottom:6,paddingBottom:6,borderBottom:`1px solid ${P.border}`}}>
              <span style={{fontSize:10,color:P.dust}}>Kilde</span>
              <span style={{fontSize:10,color:P.dust,textAlign:"right"}}>Beløp</span>
              <span/>
            </div>
            {curInc.map((inc,idx) => (
              <div key={inc.id} style={{display:"grid",gridTemplateColumns:"1fr 100px 28px",gap:6,alignItems:"center",padding:"7px 0",borderBottom:idx<curInc.length-1?`1px solid ${P.border}`:"none"}}>
                <input value={inc.name} onChange={e=>updInc(inc.id,"name",e.target.value)} style={{fontSize:13,border:"none",background:"transparent",padding:0,outline:"none",color:P.ink}}/>
                <input type="number" value={inc.amount} onChange={e=>updInc(inc.id,"amount",e.target.value)} style={{fontSize:13,textAlign:"right",color:P.olive,fontWeight:600,background:P.sand,boxSizing:"border-box"}}/>
                <button onClick={()=>setIncomeMonths(p=>p.map((arr,mi)=>mi!==month?arr:arr.filter(i=>i.id!==inc.id)))} style={{background:"none",border:"none",cursor:"pointer",color:P.dust,fontSize:12,opacity:.5}}>🗑️</button>
              </div>
            ))}
            <div style={{display:"flex",gap:6,marginTop:10}}>
              <input id="ni_n" placeholder="Ny inntektskilde…" autoComplete="off" style={{flex:2,fontSize:12,background:P.sand}}/>
              <input id="ni_a" type="number" placeholder="Beløp" style={{flex:1,fontSize:12,textAlign:"right",background:P.sand}}/>
              <button onClick={()=>{const n=document.getElementById("ni_n"),a=document.getElementById("ni_a");if(n.value.trim()){addInc(n.value,a.value);n.value="";a.value="";}}} style={{background:P.olive,color:"white",border:"none",borderRadius:7,padding:"6px 10px",cursor:"pointer",fontSize:14}}>＋</button>
            </div>
          </Card>
        </div>
      )}
    </div>
  );
}

function App() {
  const [user,setUser]       = useState(undefined);
  const [tab,setTab]         = useState("home");
  const [month,setMonth]     = useState(4);

  const [allMeals,setAllMealsLocal]         = useState({[getWeekKey(new Date())]:INIT_MEALS});
  const [recipes,setRecipesLocal]           = useState(INIT_RECIPES);
  const [shopping,setShoppingLocal]         = useState(INIT_SHOPPING);
  const [budgetGroups,setBudgetGroupsLocal] = useState(BUDGET_TEMPLATE);
  const [incomeMonths,setIncomeMonthsLocal] = useState(INIT_INCOME_MONTHS);
  const [itemHistory,setItemHistoryLocal]   = useState([]);

  useEffect(() => {
    const unsub = onAuthStateChanged(_auth, u => setUser(u||null));
    return unsub;
  }, []);

  useEffect(() => {
    if(!user) return;
    const offs = [];
    const listen = (path,setter) => {
      const off = dbListen(`${FAM}/${path}`, snap => { if(snap.exists()) setter(snap.val()); });
      offs.push(off);
    };
    listen("meals",       v => setAllMealsLocal(v||{}));
    listen("recipes",     v => setRecipesLocal(Object.values(v||{})));
    listen("shopping",    v => setShoppingLocal(Object.values(v||{})));
    listen("itemHistory", v => setItemHistoryLocal(Object.values(v||{})));
    listen("budget",      v => setBudgetGroupsLocal(prev => prev.map(g => {
      const fg=v?.[g.id]; if(!fg) return g;
      return {...g, items:g.items.map(it=>{const fi=fg[it.id];if(!fi)return it;return {...it,months:it.months.map((mo,mi)=>fi[mi]?fi[mi]:mo)};})};
    })));
    listen("income",      v => { if(Array.isArray(v)) setIncomeMonthsLocal(v); });
    return () => offs.forEach(f=>f());
  }, [user]);

  const setWeekMeals = async (weekKey,weekData) => {
    setAllMealsLocal(p=>({...p,[weekKey]:weekData}));
    await dbSet(`${FAM}/meals/${weekKey}`, weekData);
  };

  const setRecipes = async (updater) => {
    const next = typeof updater==="function"?updater(recipes):updater;
    setRecipesLocal(next);
    await dbSet(`${FAM}/recipes`, Object.fromEntries(next.map(r=>[r.id,r])));
  };

  const setShopping = async (updater) => {
    const next = typeof updater==="function"?updater(shopping):updater;
    setShoppingLocal(next);
    await dbSet(`${FAM}/shopping`, Object.fromEntries(next.map(i=>[i.id,i])));
    const newItems = next.filter(i=>!(itemHistory||[]).some(h=>h.name.toLowerCase()===i.name.toLowerCase()));
    if(newItems.length>0) {
      const updated = [...(itemHistory||[]), ...newItems.map(i=>({name:i.name,cat:i.cat}))];
      setItemHistoryLocal(updated);
      await dbSet(`${FAM}/itemHistory`, Object.fromEntries(updated.map((h,i)=>[i,h])));
    }
  };

  const setBudgetGroups = async (updater) => {
    const next = typeof updater==="function"?updater(budgetGroups):updater;
    setBudgetGroupsLocal(next);
    const flat = {};
    next.forEach(g=>{ flat[g.id]={}; g.items.forEach(it=>{ flat[g.id][it.id]=it.months; }); });
    await dbSet(`${FAM}/budget`, flat);
  };

  const setIncomeMonths = async (updater) => {
    const next = typeof updater==="function"?updater(incomeMonths):updater;
    setIncomeMonthsLocal(next);
    await dbSet(`${FAM}/income`, next);
  };

  const currentWeekMeals = allMeals[getWeekKey(new Date())]||{};
  const setCurrentWeekMeals = (upd) => {
    const wk=getWeekKey(new Date()); const cur=allMeals[wk]||{};
    const next=typeof upd==="function"?upd(cur):upd;
    setWeekMeals(wk,next);
  };

  if(user===undefined) return (
    <div style={{minHeight:"100vh",background:P.sand,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
      <div style={{fontSize:40}}>🏡</div>
      <div style={{fontSize:14,color:P.stone}}>Laster…</div>
    </div>
  );
  if(user===null) return <LoginScreen/>;

  const today = new Date();
  const dateStr = today.toLocaleDateString("nb-NO",{weekday:"long",day:"numeric",month:"long",year:"numeric"});

  return (
    <div style={{fontFamily:"-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif",maxWidth:460,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column",background:P.sand}}>
      <div style={{background:P.linen,borderBottom:`1px solid ${P.border}`,padding:"13px 16px 11px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10,boxShadow:"0 1px 8px rgba(44,35,24,0.05)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:9,background:P.hazelXL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>🏡</div>
          <div>
            <div style={{fontSize:16,fontWeight:600,color:P.ink}}>Familieappen</div>
            <div style={{fontSize:10,color:P.dust,marginTop:1}}>{dateStr.charAt(0).toUpperCase()+dateStr.slice(1)}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <span style={{fontSize:10,color:P.dust}}>{user.email?.split("@")[0]}</span>
          <button onClick={()=>signOut(_auth)} style={{background:P.mist,border:`1px solid ${P.border}`,cursor:"pointer",padding:"5px 10px",borderRadius:8,fontSize:11,color:P.stone,fontWeight:500}}>Logg ut</button>
        </div>
      </div>

      <div style={{flex:1,padding:"18px 16px 92px",overflowY:"auto"}}>
        {tab==="home"     && <HomeScreen meals={currentWeekMeals} shopping={shopping} setTab={setTab} budgetGroups={budgetGroups} month={month}/>}
        {tab==="plan"     && <PlanScreen allMeals={allMeals} setWeekMeals={setWeekMeals} recipes={recipes} setShopping={setShopping}/>}
        {tab==="recipes"  && <RecipesScreen recipes={recipes} setRecipes={setRecipes} meals={currentWeekMeals} setMeals={setCurrentWeekMeals} setShopping={setShopping}/>}
        {tab==="shopping" && <ShoppingScreen shopping={shopping} setShopping={setShopping} itemHistory={itemHistory}/>}
        {tab==="economy"  && <EconomyScreen budgetGroups={budgetGroups} setBudgetGroups={setBudgetGroups} incomeMonths={incomeMonths} setIncomeMonths={setIncomeMonths} month={month} setMonth={setMonth}/>}
      </div>

      <BottomNav tab={tab} setTab={setTab}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if("serviceWorker" in navigator) {
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("/familieapp/sw.js",{scope:"/familieapp/"})
      .then(r=>console.log("SW:",r.scope)).catch(e=>console.log("SW feil:",e));
  });
}
</script>
</body>
</html>
