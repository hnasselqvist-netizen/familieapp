// ── RegelSenter ───────────────────────────────────────────────────
// Kontrollpanel for Regelmotoren. Oppretter ALDRI regler selv —
// regler oppstaar kun i Bankimport naar brukeren velger "Koble + laer".
function RegelSenter({rules,setRules,budgetGroups,incomeGroups}) {
  const {erMobil, erWeb} = useLayoutBredde();
  const [sok,setSok] = useState("");
  const [redigerId,setRedigerId] = useState(null);

  const MODE_LABEL = {auto:"Auto",suggest:"Foresla",disabled:"Deaktivert",review:"Vurder"};
  const MODE_COL = {auto:P.olive,suggest:P.hazel,disabled:P.dust,review:"#9A7A00"};

  // Finn nivaa for en regel ved aa slaa opp maalposten (targetType +
  // targetId) i budgetGroups/incomeGroups og lese dens meta.niva.
  // Reglene har ikke sitt eget nivaa-felt — de arver nivaaet fra
  // posten de er koblet til, akkurat som brukeren orienterer seg
  // etter den samme okonomiske strukturen uansett hvor i appen de er.
  const finnMalpost = (r) => {
    const kilde = r.targetType==="income" ? (incomeGroups||[]) : (budgetGroups||[]);
    for(const g of kilde) {
      const it = g.items.find(x=>x.id===r.targetId);
      if(it) return it;
    }
    return null;
  };
  const nivaKeyForRegel = (r) => {
    const it = finnMalpost(r);
    return nivaKeyForMeta(it?it.meta:null);
  };

  const alle = rules||[];
  const filtrert = alle.filter(r=>{
    if(!sok.trim()) return true;
    const s = sok.trim().toLowerCase();
    return (r.pattern||"").toLowerCase().includes(s)
        || (r.normalizedPattern||"").toLowerCase().includes(s)
        || (r.targetName||"").toLowerCase().includes(s);
  });

  // Sortering: 1. aktiv  2. flest bruk  3. sist brukt
  const sortert = [...filtrert].sort((a,b)=>{
    const aAktiv = a.active!==false ? 1 : 0;
    const bAktiv = b.active!==false ? 1 : 0;
    if(aAktiv!==bAktiv) return bAktiv-aAktiv;
    const aBruk = a.timesUsed||0, bBruk = b.timesUsed||0;
    if(aBruk!==bBruk) return bBruk-aBruk;
    const aTid = a.lastMatched ? new Date(a.lastMatched).getTime() : 0;
    const bTid = b.lastMatched ? new Date(b.lastMatched).getTime() : 0;
    return bTid-aTid;
  });

  const oppdaterRegel = (id, felt) => {
    setRules(prev=>(prev||[]).map(r=>r.id!==id?r:{...r,...felt,updatedAt:new Date().toISOString()}));
  };
  const slettRegel = (id) => {
    setRules(prev=>(prev||[]).filter(r=>r.id!==id));
    setRedigerId(null);
  };

  const fmtD = d => d ? new Date(d).toLocaleDateString("nb-NO",{day:"numeric",month:"short",year:"numeric"}) : "—";

  // Status avledet av eksisterende regel-felt — ingen ny datamodell.
  const antallAktive = alle.filter(r=>r.active!==false).length;
  const antallAuto   = alle.filter(r=>r.mode==="auto").length;
  const antallVurder = alle.filter(r=>r.mode==="review").length;

  // Delt redigeringsinnhold — samme felt (mode/confidence/aktiv/
  // flerbruk/slett) brukes av BADE mobilens inline-utvidelse (uendret
  // fra i dag) OG web sin modal. Ingen duplisert redigeringslogikk.
  const RegelRedigeringsFelt = ({r, onLukk}) => (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
        <div>
          <div style={{fontSize:10,color:P.dust,marginBottom:3}}>Normalisert mønster</div>
          <div style={{fontSize:12,color:P.stone,padding:"6px 8px",background:P.linen,borderRadius:6}}>
            {r.normalizedPattern||"—"}
          </div>
        </div>
        <div>
          <div style={{fontSize:10,color:P.dust,marginBottom:3}}>Koblet mot</div>
          <div style={{fontSize:12,color:P.stone,padding:"6px 8px",background:P.linen,borderRadius:6}}>
            {r.targetName||"—"} <span style={{color:P.dust}}>({r.targetType||"?"})</span>
          </div>
        </div>
        <div>
          <div style={{fontSize:10,color:P.dust,marginBottom:3}}>Antall ganger brukt</div>
          <div style={{fontSize:12,color:P.stone,padding:"6px 8px",background:P.linen,borderRadius:6}}>
            {r.timesUsed||0}
          </div>
        </div>
      </div>

      <div style={{marginBottom:10}}>
        <div style={{fontSize:10,color:P.dust,marginBottom:5}}>Regeltype</div>
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          {REGELTYPE_REKKEFOLGE.map(rt=>{
            const valgt = (r.type||"leverandor")===rt.id;
            return (
              <button key={rt.id} onClick={()=>oppdaterRegel(r.id,{type:rt.id})}
                style={{display:"flex",alignItems:"flex-start",gap:8,width:"100%",
                  padding:"7px 9px",borderRadius:8,cursor:"pointer",textAlign:"left",
                  background:valgt?P.hazelXL:"transparent",
                  border:"1px solid "+(valgt?P.hazel:P.border)}}>
                <span style={{fontSize:14,flexShrink:0}}>{rt.emoji}</span>
                <div>
                  <div style={{fontSize:11.5,fontWeight:valgt?600:500,color:valgt?P.hazel:P.ink}}>{rt.label}</div>
                  <div style={{fontSize:9.5,color:P.dust,marginTop:1,lineHeight:1.4}}>{rt.hensikt}</div>
                </div>
              </button>
            );
          })}
        </div>
      </div>

      <div style={{marginBottom:10}}>
        <div style={{fontSize:10,color:P.dust,marginBottom:5}}>Mode</div>
        <div style={{display:"flex",gap:6}}>
          {["auto","suggest","review","disabled"].map(m=>(
            <button key={m} onClick={()=>oppdaterRegel(r.id,{mode:m})}
              style={{flex:1,padding:"6px 4px",borderRadius:7,fontSize:11,cursor:"pointer",
                fontWeight:r.mode===m?600:400,
                background:r.mode===m?MODE_COL[m]+"22":"transparent",
                color:r.mode===m?MODE_COL[m]:P.stone,
                border:"1px solid "+(r.mode===m?MODE_COL[m]:P.border)}}>
              {MODE_LABEL[m]}
            </button>
          ))}
        </div>
      </div>

      <div style={{marginBottom:10}}>
        <div style={{fontSize:10,color:P.dust,marginBottom:5}}>
          Confidence: {r.confidence!==undefined?r.confidence:100}%
        </div>
        <input type="range" min="0" max="100" value={r.confidence!==undefined?r.confidence:100}
          onChange={e=>oppdaterRegel(r.id,{confidence:parseInt(e.target.value)})}
          style={{width:"100%"}}/>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <div onClick={()=>oppdaterRegel(r.id,{active:r.active===false})}
          style={{flex:1,display:"flex",alignItems:"center",gap:8,padding:"8px 10px",
            background:P.mist,borderRadius:8,border:"1px solid "+P.border,cursor:"pointer"}}>
          <div style={{width:18,height:18,borderRadius:5,flexShrink:0,
            background:r.active!==false?P.hazel:"transparent",
            border:"1.5px solid "+(r.active!==false?P.hazel:P.hazelL),
            display:"flex",alignItems:"center",justifyContent:"center"}}>
            {r.active!==false && <Em e="✓" s={{fontSize:10,color:"white"}}/>}
          </div>
          <span style={{fontSize:11.5,color:P.ink}}>Aktiv</span>
        </div>
        <div onClick={()=>oppdaterRegel(r.id,{multiUse:!r.multiUse})}
          style={{flex:1,display:"flex",alignItems:"center",gap:8,padding:"8px 10px",
            background:P.mist,borderRadius:8,border:"1px solid "+P.border,cursor:"pointer"}}>
          <div style={{width:18,height:18,borderRadius:5,flexShrink:0,
            background:r.multiUse?"#9A7A00":"transparent",
            border:"1.5px solid "+(r.multiUse?"#9A7A00":P.hazelL),
            display:"flex",alignItems:"center",justifyContent:"center"}}>
            {r.multiUse && <Em e="✓" s={{fontSize:10,color:"white"}}/>}
          </div>
          <span style={{fontSize:11.5,color:P.ink}}>Flerbruk</span>
        </div>
      </div>

      <div style={{display:"flex",gap:6}}>
        <button onClick={onLukk}
          style={{flex:1,padding:"8px",background:P.mist,border:"1px solid "+P.border,
            borderRadius:8,fontSize:12,cursor:"pointer",color:P.stone}}>
          Lukk
        </button>
        <button onClick={()=>slettRegel(r.id)}
          style={{flex:1,padding:"8px",background:"none",border:"1px solid #E8A0A0",
            borderRadius:8,fontSize:12,cursor:"pointer",color:P.clay}}>
          Slett regel
        </button>
      </div>
    </div>
  );

  // ── Web/mellom: AdminTabell-kolonner ─────────────────────────────
  // "Kilde" fra den opprinnelige kolonneskissen finnes ikke som eget
  // felt paa regel-modellen (kun paa budsjett-metadata) — droppet til
  // fordel for feltene som faktisk finnes, i stedet for aa dikte opp
  // et nytt datafelt for aa fylle en kolonne.
  const ADMIN_KOLONNER_REGLER = [
    {key:"pattern", label:"Leverandør / mønster", bredde:"19%", render:r=>(
      <span style={{fontWeight:500,color:P.ink}}>{r.pattern||"(uten mønster)"}</span>
    )},
    {key:"kobling", label:"Kobles til", bredde:"18%", render:r=>(
      <span style={{color:P.stone}}>{r.targetName||"—"} <span style={{color:P.dust,fontSize:10.5}}>({r.targetType||"?"})</span></span>
    )},
    {key:"type", label:"Regeltype", bredde:"12%", render:r=>{
      const rt = r.type||"leverandor";
      return <span style={{color:P.stone}}>{REGELTYPE_EMOJI[rt]||""} {REGELTYPE_LABEL[rt]||rt}</span>;
    }},
    {key:"bruk", label:"Antall bruk", bredde:"10%", align:"right", render:r=><span style={{color:P.stone}}>{r.timesUsed||0}</span>},
    {key:"sikkerhet", label:"Sikkerhet", bredde:"16%", render:r=>(
      <span>
        <span style={{fontWeight:600,color:MODE_COL[r.mode]||P.stone}}>{MODE_LABEL[r.mode]||r.mode}</span>
        <span style={{color:P.dust}}> · {r.confidence!==undefined?r.confidence:100}%</span>
      </span>
    )},
    {key:"sistbrukt", label:"Sist brukt", bredde:"10%", render:r=><span style={{color:P.stone}}>{fmtD(r.lastMatched)}</span>},
    {key:"status", label:"Status", bredde:"15%", render:r=>(
      <span style={{display:"inline-flex",gap:4,flexWrap:"wrap"}}>
        {r.active===false && <span style={{fontSize:9,color:P.dust,background:P.mist,borderRadius:4,padding:"1px 5px"}}>deaktivert</span>}
        {r.multiUse && <span style={{fontSize:9,color:"#9A7A00",background:"#FFFBE0",borderRadius:4,padding:"1px 5px"}}>flerbruk</span>}
        {r.active!==false && !r.multiUse && <span style={{fontSize:10,color:P.olive}}>✓</span>}
      </span>
    )},
  ];

  const redigerRegel = redigerId ? alle.find(r=>r.id===redigerId) : null;

  // ── Steg 3: fast beslutningsomraade vs. scrollende arbeidsomraade ──
  // Samme kontrakt som GeneratorSenter — beregnet en gang, mobil
  // rendrer delene rett etter hverandre (identisk med tidligere
  // rekkefolge), web/mellom bruker AdminArbeidsomrade.
  const fastInnhold = (
    <>
      <div style={{fontSize:15,fontWeight:600,color:P.ink,marginBottom:4}}>📐 Regelsenter</div>
      <div style={{fontSize:12,color:P.stone,marginBottom:14}}>
        Oversikt over det Regelmotoren har lært. Endringer paavirker kun fremtidige transaksjoner —
        historiske transaksjoner endres aldri.
      </div>

      <AdminStatusPanel erWeb={erWeb} tittel="Status" felter={[
        {label:"Totalt", verdi: alle.length},
        {label:"Aktive", verdi: antallAktive, farge: P.hazel},
        {label:"Automatiske", verdi: antallAuto, farge: P.olive},
        {label:"Krever vurdering", verdi: antallVurder, farge: antallVurder>0?"#9A7A00":P.stone},
      ]}/>

      <AdminSokFelt verdi={sok} setVerdi={setSok} placeholder="Sok i mønster eller kobling…"/>
    </>
  );

  const scrollendeInnhold = (
    <>
      {sortert.length===0 && (
        <div style={{textAlign:"center",padding:"28px",color:P.dust,fontSize:13}}>
          {alle.length===0
            ? "Ingen regler er laert ennaa. Regler oppstaar i Bankimport naar du velger «Koble + laer»."
            : "Ingen regler matcher soket."}
        </div>
      )}

      {erMobil ? (
        // Mobil: uendret — inline utvidelse per rad, akkurat som i dag.
        sortert.map(r=>{
          const apen = redigerId===r.id;
          const inaktiv = r.active===false;
          return (
            <div key={r.id} style={{marginBottom:6}}>
              <div onClick={()=>setRedigerId(apen?null:r.id)}
                style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",
                  borderRadius:apen?"10px 10px 0 0":10,cursor:"pointer",
                  background:inaktiv?P.mist:P.linen,
                  border:"1px solid "+P.border,opacity:inaktiv?0.6:1}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:13,fontWeight:500,color:P.ink,
                      overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {r.pattern||"(uten monster)"}
                    </span>
                    {r.multiUse && (
                      <span style={{fontSize:9,color:"#9A7A00",background:"#FFFBE0",
                        borderRadius:4,padding:"1px 5px",flexShrink:0}}>flerbruk</span>
                    )}
                    {inaktiv && (
                      <span style={{fontSize:9,color:P.dust,background:P.sand,
                        borderRadius:4,padding:"1px 5px",flexShrink:0}}>deaktivert</span>
                    )}
                  </div>
                  <div style={{fontSize:10,color:P.dust,marginTop:1}}>
                    {REGELTYPE_EMOJI[r.type||"leverandor"]} {REGELTYPE_LABEL[r.type||"leverandor"]} · → {r.targetName||"ukjent"} · {r.timesUsed||0}x brukt · sist {fmtD(r.lastMatched)}
                  </div>
                </div>
                <span style={{fontSize:10,fontWeight:600,color:MODE_COL[r.mode]||P.stone,flexShrink:0}}>
                  {MODE_LABEL[r.mode]||r.mode}
                </span>
                <span style={{fontSize:10,color:P.dust,flexShrink:0}}>{r.confidence!==undefined?r.confidence:100}%</span>
                <span style={{color:P.dust,fontSize:10}}>{apen?"▴":"▾"}</span>
              </div>

              {apen && (
                <div style={{border:"1px solid "+P.border,borderTop:"none",
                  borderRadius:"0 0 10px 10px",padding:"12px 14px",background:P.sand}}>
                  <RegelRedigeringsFelt r={r} onLukk={()=>setRedigerId(null)}/>
                </div>
              )}
            </div>
          );
        })
      ) : (
        // Web/mellom: nivaagruppert AdminTabell — samme okonomiske
        // mentale modell (Beskytte -> Velge) som Generator-senteret.
        // Regler uten noen klar maalpost/niva havner under "Uten nivå".
        NIVA_REKKEFOLGE.map(niva=>{
          const reglerHer = sortert.filter(r=>nivaKeyForRegel(r)===niva.key);
          if(reglerHer.length===0) return null;
          return (
            <div key={niva.key} style={{marginBottom:20}}>
              <div style={{fontSize:13,fontWeight:600,color:P.ink,marginBottom:8}}>
                {niva.label} <span style={{color:P.dust,fontWeight:400}}>({reglerHer.length})</span>
              </div>
              <AdminTabell
                kolonner={ADMIN_KOLONNER_REGLER}
                rader={reglerHer}
                onRadKlikk={r=>setRedigerId(r.id)}
                uthevRad={r=>r.mode==="review"}/>
            </div>
          );
        })
      )}
    </>
  );

  return (
    <div style={erMobil ? undefined : {flex:1,minHeight:0,display:"flex",flexDirection:"column",height:"100%"}}>
      {erMobil ? (
        <>{fastInnhold}{scrollendeInnhold}</>
      ) : (
        <AdminArbeidsomrade fast={fastInnhold}>{scrollendeInnhold}</AdminArbeidsomrade>
      )}

      {!erMobil && redigerRegel && (
        <Modal title={"Regel — "+(redigerRegel.pattern||"(uten mønster)")} onClose={()=>setRedigerId(null)}>
          <RegelRedigeringsFelt r={redigerRegel} onLukk={()=>setRedigerId(null)}/>
        </Modal>
      )}
    </div>
  );
}


// ── ArsbudsjettScreen ─────────────────────────────────────────────
// Planleggingsflate for budsjett gjennom hele aaret.
// Viser kun budsjettbeloep — ingen Faktisk, ingen analyse.
function ArsbudsjettScreen({budgetGroups,setBudgetGroups,incomeGroups,setIncomeGroups}) {
  const [visning,setVisning] = useState("kostnader"); // "kostnader" | "inntekter"
  const [ekspandert,setEkspandert] = useState(null);
  const [fordelModal,setFordelModal] = useState(null); // {gid,iid,name}
  const [varselModal,setVarselModal] = useState(null); // {gid,iid,mi,val,name}
  const origVerdiRef = React.useRef({}); // holder opprinnelig verdi per celle ved fokus

  // Cellene refereres med data-cell="gid|iid|mi" for tastaturnavigasjon
  const cellRef = (gid,iid,mi) => gid+"|"+iid+"|"+mi;

  const flyttFokus = (gid, itemsIRekkefolge, iid, mi, retning) => {
    // retning: 1 = neste (Tab), -1 = forrige (Shift+Tab)
    let nyMi = mi + retning;
    let nyIid = iid;
    if(nyMi > 11) {
      const idx = itemsIRekkefolge.findIndex(x=>x.id===iid);
      const neste = itemsIRekkefolge[idx+1];
      if(!neste) return; // siste post, siste maaned — ingenting mer aa hoppe til
      nyIid = neste.id; nyMi = 0;
    } else if(nyMi < 0) {
      const idx = itemsIRekkefolge.findIndex(x=>x.id===iid);
      const forrige = itemsIRekkefolge[idx-1];
      if(!forrige) return; // forste post, forste maaned
      nyIid = forrige.id; nyMi = 11;
    }
    const el = document.querySelector('[data-cell="'+cellRef(gid,nyIid,nyMi)+'"]');
    if(el) el.focus();
  };

  const anvendResten = (type, gid, iid, fraMi, val) => {
    const setter = type==="inntekt" ? setIncomeGroups : setBudgetGroups;
    setter(prev=>prev.map(g=>g.id!==gid?g:{
      ...g, items:g.items.map(it=>it.id!==iid?it:{
        ...it, months:it.months.map((mo,m2)=>m2<fraMi?mo:{...mo,budget:parseFloat(val)||0})
      })
    }));
  };

  const updMonth = (gid,iid,mi,val,item,opprinneligVerdi) => {
    const nyVerdi = parseFloat(val)||0;
    setBudgetGroups(prev=>prev.map(g=>g.id!==gid?g:{
      ...g, items:g.items.map(it=>it.id!==iid?it:{
        ...it, months:it.months.map((mo,m2)=>m2!==mi?mo:{...mo,budget:nyVerdi})
      })
    }));
    // Sporr om resten av aaret KUN naar verdien faktisk er endret,
    // og KUN for maanedlige, faste poster — ikke siste maaned
    const faktiskEndret = opprinneligVerdi===undefined || nyVerdi!==opprinneligVerdi;
    const erFast = !item.meta || item.meta.oppforsel==="fast" || !item.meta.oppforsel;
    if(faktiskEndret && erFast && mi<11) {
      setVarselModal({type:"kostnad",gid,iid,mi,val:nyVerdi,name:item.name});
    }
  };

  const updIncMonth = (gid,iid,mi,val,item,opprinneligVerdi) => {
    const nyVerdi = parseFloat(val)||0;
    setIncomeGroups(prev=>prev.map(g=>g.id!==gid?g:{
      ...g, items:g.items.map(it=>it.id!==iid?it:{
        ...it, months:it.months.map((mo,m2)=>m2!==mi?mo:{...mo,budget:nyVerdi})
      })
    }));
    const faktiskEndret = opprinneligVerdi===undefined || nyVerdi!==opprinneligVerdi;
    const erFast = !item.meta || item.meta.oppforsel==="fast" || !item.meta.oppforsel;
    if(faktiskEndret && erFast && mi<11) {
      setVarselModal({type:"inntekt",gid,iid,mi,val:nyVerdi,name:item.name});
    }
  };

  const fordelArskostnad = (type, gid,iid,totalBelop) => {
    const total = parseFloat(totalBelop)||0;
    const perManed = Math.floor(total/12);
    const diff = total - perManed*12; // avrundingsdifferanse -> desember
    const setter = type==="inntekt" ? setIncomeGroups : setBudgetGroups;
    setter(prev=>prev.map(g=>g.id!==gid?g:{
      ...g, items:g.items.map(it=>it.id!==iid?it:{
        ...it, months:it.months.map((mo,mi)=>({...mo, budget: mi===11 ? perManed+diff : perManed}))
      })
    }));
    setFordelModal(null);
  };

  const arsSum = (it) => it.months.reduce((s,mo)=>s+(mo.budget||0),0);

  const updPaymentPattern = (gid,iid,pattern) => setBudgetGroups(prev=>prev.map(g=>g.id!==gid?g:{
    ...g, items:g.items.map(it=>it.id!==iid?it:{
      ...it, meta: {...(it.meta||defaultMeta()), paymentPattern:pattern}
    })
  }));
  const gruppeArsSum = (g) => g.items.reduce((s,it)=>s+arsSum(it),0);

  return (
    <div>
      <div style={{fontSize:15,fontWeight:600,color:P.ink,marginBottom:4}}>📅 Årsbudsjett</div>
      <div style={{fontSize:12,color:P.stone,marginBottom:12}}>
        Planlegg budsjettet for hele året. Dette er en planleggingsflate — ikke en oversikt
        over faktisk forbruk. Trykk på et beløp for å redigere. Tab flytter til neste måned,
        Shift+Tab til forrige.
      </div>

      <div style={{display:"flex",gap:6,marginBottom:14}}>
        <button onClick={()=>{setVisning("kostnader");setEkspandert(null);}}
          style={{flex:1,padding:"8px",borderRadius:9,fontSize:12.5,cursor:"pointer",
            fontWeight:visning==="kostnader"?600:400,
            background:visning==="kostnader"?P.hazelXL:P.mist,
            color:visning==="kostnader"?P.hazel:P.stone,
            border:"1px solid "+(visning==="kostnader"?P.hazel:P.border)}}>
          💸 Kostnader
        </button>
        <button onClick={()=>{setVisning("inntekter");setEkspandert(null);}}
          style={{flex:1,padding:"8px",borderRadius:9,fontSize:12.5,cursor:"pointer",
            fontWeight:visning==="inntekter"?600:400,
            background:visning==="inntekter"?P.hazelXL:P.mist,
            color:visning==="inntekter"?P.hazel:P.stone,
            border:"1px solid "+(visning==="inntekter"?P.hazel:P.border)}}>
          📥 Inntekter
        </button>
      </div>

      {visning==="kostnader" && (
      <div style={{overflowX:"auto"}}>
        {(budgetGroups||[]).map(g=>{
          const apen = ekspandert===g.id;
          return (
            <div key={g.id} style={{marginBottom:6}}>
              <div onClick={()=>setEkspandert(apen?null:g.id)}
                style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",
                  borderRadius:apen?"11px 11px 0 0":11,cursor:"pointer",
                  background:P.linen,border:"1px solid "+P.border}}>
                <IBox emoji={GROUP_EMOJI[g.id]||"📁"} color={g.color} size={30}/>
                <div style={{flex:1}}>
                  <span style={{fontSize:13,fontWeight:600,color:P.ink}}>{g.label}</span>
                </div>
                <span style={{fontSize:12,fontWeight:500,color:P.stone}}>{fmt(gruppeArsSum(g))} / år</span>
                <span style={{color:P.dust,fontSize:13}}>{apen?"▴":"▾"}</span>
              </div>

              {apen && (
                <div style={{border:"1px solid "+P.border,borderTop:"none",
                  borderRadius:"0 0 11px 11px",background:P.sand,padding:"10px 14px"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:900}}>
                    <thead>
                      <tr style={{borderBottom:"2px solid "+P.border}}>
                        <th style={{padding:"4px 6px",textAlign:"left",color:P.dust,fontWeight:600,
                          position:"sticky",left:0,background:P.sand,minWidth:130}}>Post</th>
                        {MONTHS.map((m,mi)=>(
                          <th key={mi} style={{padding:"4px 6px",textAlign:"right",color:P.dust,fontWeight:600,minWidth:64}}>
                            {m.slice(0,3)}
                          </th>
                        ))}
                        <th style={{padding:"4px 6px",textAlign:"right",color:P.dust,fontWeight:600,minWidth:80}}>Sum år</th>
                        <th style={{minWidth:70}}></th>
                        <th style={{minWidth:90}}></th>
                      </tr>
                    </thead>
                    <tbody>
                      {g.items.map(it=>{
                        const pmnster = (it.meta&&it.meta.paymentPattern)||"monthly";
                        return (
                        <tr key={it.id} style={{borderBottom:"1px solid "+P.border}}>
                          <td style={{padding:"4px 6px",color:P.ink,whiteSpace:"nowrap",
                            position:"sticky",left:0,background:P.sand,fontWeight:500}}>
                            {it.name}
                          </td>
                          {it.months.map((mo,mi)=>(
                            <td key={mi} style={{padding:"2px 3px"}}>
                              <input type="number"
                                key={"kb-"+it.id+"-"+mi+"-"+mo.budget}
                                data-cell={cellRef(g.id,it.id,mi)}
                                defaultValue={mo.budget}
                                onFocus={e=>{e.target.select(); origVerdiRef.current[cellRef(g.id,it.id,mi)]=mo.budget;}}
                                onBlur={e=>updMonth(g.id,it.id,mi,e.target.value,it,origVerdiRef.current[cellRef(g.id,it.id,mi)])}
                                onKeyDown={e=>{
                                  if(e.key==="Tab") {
                                    e.preventDefault();
                                    e.target.blur();
                                    flyttFokus(g.id, g.items, it.id, mi, e.shiftKey?-1:1);
                                  } else if(e.key==="Enter") {
                                    e.target.blur();
                                  }
                                }}
                                style={{width:"100%",boxSizing:"border-box",fontSize:11,
                                  textAlign:"right",background:P.mist,border:"1px solid "+P.border,
                                  borderRadius:4,padding:"3px 4px"}}/>
                            </td>
                          ))}
                          <td style={{padding:"4px 6px",textAlign:"right",color:P.stone,fontWeight:600}}>
                            {fmt(arsSum(it))}
                          </td>
                          <td style={{padding:"4px 6px",textAlign:"center"}}>
                            <button onClick={()=>setFordelModal({type:"kostnad",gid:g.id,iid:it.id,name:it.name})}
                              style={{background:P.mist,border:"1px solid "+P.border,borderRadius:6,
                                padding:"3px 8px",fontSize:10,cursor:"pointer",color:P.stone,whiteSpace:"nowrap"}}>
                              Fordel år
                            </button>
                          </td>
                          <td style={{padding:"4px 6px"}}>
                            <select value={pmnster}
                              onChange={e=>updPaymentPattern(g.id,it.id,e.target.value)}
                              style={{fontSize:10,background:P.mist,border:"1px solid "+P.border,
                                borderRadius:6,padding:"3px 4px",color:P.stone,whiteSpace:"nowrap"}}>
                              <option value="monthly">Månedlig</option>
                              <option value="quarterly">Kvartalsvis</option>
                              <option value="yearly">Årlig</option>
                            </select>
                          </td>
                        </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          );
        })}
      </div>
      )}

      {visning==="inntekter" && (
      <div style={{overflowX:"auto"}}>
        {(incomeGroups||[]).map(g=>{
          const apen = ekspandert==="inc-"+g.id;
          const gruppeArsSumInc = (grp) => grp.items.reduce((s,it)=>s+it.months.reduce((s2,mo)=>s2+(mo.budget||0),0),0);
          return (
            <div key={g.id} style={{marginBottom:6}}>
              <div onClick={()=>setEkspandert(apen?null:"inc-"+g.id)}
                style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",
                  borderRadius:apen?"11px 11px 0 0":11,cursor:"pointer",
                  background:P.linen,border:"1px solid "+P.border}}>
                <IBox emoji={INCOME_GROUP_EMOJI[g.id]||"📋"} color={g.color} size={30}/>
                <div style={{flex:1}}>
                  <span style={{fontSize:13,fontWeight:600,color:P.ink}}>{g.label}</span>
                </div>
                <span style={{fontSize:12,fontWeight:500,color:P.stone}}>{fmt(gruppeArsSumInc(g))} / år</span>
                <span style={{color:P.dust,fontSize:13}}>{apen?"▴":"▾"}</span>
              </div>

              {apen && (
                <div style={{border:"1px solid "+P.border,borderTop:"none",
                  borderRadius:"0 0 11px 11px",background:P.sand,padding:"10px 14px"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:900}}>
                    <thead>
                      <tr style={{borderBottom:"2px solid "+P.border}}>
                        <th style={{padding:"4px 6px",textAlign:"left",color:P.dust,fontWeight:600,
                          position:"sticky",left:0,background:P.sand,minWidth:130}}>Post</th>
                        {MONTHS.map((m,mi)=>(
                          <th key={mi} style={{padding:"4px 6px",textAlign:"right",color:P.dust,fontWeight:600,minWidth:64}}>
                            {m.slice(0,3)}
                          </th>
                        ))}
                        <th style={{padding:"4px 6px",textAlign:"right",color:P.dust,fontWeight:600,minWidth:80}}>Sum år</th>
                        <th style={{minWidth:70}}></th>
                      </tr>
                    </thead>
                    <tbody>
                      {g.items.map(it=>{
                        const arsSumInc = it.months.reduce((s,mo)=>s+(mo.budget||0),0);
                        return (
                        <tr key={it.id} style={{borderBottom:"1px solid "+P.border}}>
                          <td style={{padding:"4px 6px",color:P.ink,whiteSpace:"nowrap",
                            position:"sticky",left:0,background:P.sand,fontWeight:500}}>
                            {it.name}
                          </td>
                          {it.months.map((mo,mi)=>(
                            <td key={mi} style={{padding:"2px 3px"}}>
                              <input type="number"
                                key={"ib-"+it.id+"-"+mi+"-"+mo.budget}
                                data-cell={cellRef("inc-"+g.id,it.id,mi)}
                                defaultValue={mo.budget}
                                onFocus={e=>{e.target.select(); origVerdiRef.current[cellRef("inc-"+g.id,it.id,mi)]=mo.budget;}}
                                onBlur={e=>updIncMonth(g.id,it.id,mi,e.target.value,it,origVerdiRef.current[cellRef("inc-"+g.id,it.id,mi)])}
                                onKeyDown={e=>{
                                  if(e.key==="Tab") {
                                    e.preventDefault();
                                    e.target.blur();
                                    flyttFokus("inc-"+g.id, g.items, it.id, mi, e.shiftKey?-1:1);
                                  } else if(e.key==="Enter") {
                                    e.target.blur();
                                  }
                                }}
                                style={{width:"100%",boxSizing:"border-box",fontSize:11,
                                  textAlign:"right",background:P.mist,border:"1px solid "+P.border,
                                  borderRadius:4,padding:"3px 4px"}}/>
                            </td>
                          ))}
                          <td style={{padding:"4px 6px",textAlign:"right",color:P.stone,fontWeight:600}}>
                            {fmt(arsSumInc)}
                          </td>
                          <td style={{padding:"4px 6px",textAlign:"center"}}>

// ── KontoerScreen ─────────────────────────────────────────────────
// Viser tilkoblingsstatus til eksterne kontoer/tjenester. I v1: kun
// Google Drive (for fremtidig kvitteringslagring). Token ligger kun
// i minnet (modul-scope-variabler i lastGapiDriveClient-blokken over)
// — ingen ting lagres i Firebase eller localStorage her.
function KontoerScreen() {
  const [status,setStatus]   = useState("ikke_tilkoblet"); // ikke_tilkoblet | kobler_til | tilkoblet | utlopt | feil
  const [feilmelding,setFeilmelding] = useState("");
  const [diagnostikk,setDiagnostikk] = useState([]);
  const [gapiKlar,setGapiKlar] = useState(false);
  // Merk: access_token fra drive.file-scopet alene gir ikke kontoinfo
  // (navn/e-post) — det ville kreve et ekstra scope (openid/email/profile).
  // Siden vi bevisst holder oss til minst mulig tilgang, vises derfor kun
  // tilkoblingsstatus, ikke hvilken konto som er tilkoblet.

  const logg = (linje) => {
    console.log("[Drive-diagnostikk]", linje);
    setDiagnostikk(prev=>[...prev, linje]);
  };

  // Last gapi-klienten paa forhand, IKKE inni klikk-handleren.
  // Rotarsak til at tilkobling feilet baade paa PC og mobil: naar
  // requestAccessToken() kalles fra en .then()-callback etter en
  // asynkron nettverksrundtur (gapi.load/init/discovery), regner
  // nettleseren det ikke lenger som en direkte konsekvens av
  // brukerens klikk ("user activation" er utlopt). Da blokkeres
  // popupen — konsekvent, uavhengig av plattform. Losningen er aa
  // sikre at gapi allerede er klar FOR klikket, slik at selve
  // requestAccessToken() kan kalles synkront inni onClick.
  React.useEffect(() => {
    lastGapiDriveClient().then(function(){
      setGapiKlar(true);
    }).catch(function(err){
      console.log("[Drive-diagnostikk] Forhaandslasting av gapi feilet:", err);
    });
  }, []);

  const koble = () => {
    setStatus("kobler_til");
    setFeilmelding("");
    setDiagnostikk([]);

    logg("GIS script lastet: "+(typeof google!=="undefined"&&!!google.accounts));
    logg("gapi script lastet: "+(typeof gapi!=="undefined"));
    logg("gapi Drive-klient forhaandslastet: "+gapiKlar);
    logg("OAuth Client ID: "+GOOGLE_DRIVE_CLIENT_ID);
    logg("Origin nettleseren rapporterer: "+window.location.origin);

    const startTokenForesporsel = () => {
      const client = hentDriveTokenClient(
        function(resp){
          logg("Token-callback: mottok access_token (OK)");
          // Token OK — bekreft med et ufarlig kall
          testDriveTilgang().then(function(){
            logg("testDriveTilgang: OK");
            setStatus("tilkoblet");
          }).catch(function(err){
            const kode = err && err.status;
            const body = err && err.result && err.result.error;
            logg("testDriveTilgang FEILET — HTTP status: "+kode);
            logg("testDriveTilgang feilrespons: "+JSON.stringify(body||err));
            if(kode===401) {
              setStatus("utlopt");
              setFeilmelding("Tilkoblingen er utløpt. Koble til på nytt.");
            } else if(kode===403) {
              setStatus("feil");
              setFeilmelding("Google avviste tilgangen (403). Vanligste årsak: Drive API er ikke aktivert i Google Cloud-prosjektet, eller kontoen er ikke lagt til som testbruker i OAuth consent screen.");
            } else {
              setStatus("feil");
              setFeilmelding("Kunne ikke bekrefte tilgang til Google Drive (HTTP "+kode+"). Se detaljer under.");
            }
          });
        },
        function(err){
          // err kommer enten fra GIS sin error_callback (har gjerne
          // .type og/eller .error) eller er selve token-responsen uten
          // access_token (kan ha .error / .error_description).
          const feilkode = (err&&err.type) || (err&&err.error) || "ukjent";
          const beskrivelse = (err&&err.error_description) || "";
          logg("Token-callback FEILET — kode: "+feilkode+(beskrivelse?" — "+beskrivelse:""));
          logg("Fullt feilobjekt: "+JSON.stringify(err));

          if(feilkode==="popup_closed"||feilkode==="popup_closed_by_user") {
            setStatus("feil");
            setFeilmelding("Google-vinduet ble lukket før innlogging var fullført. Prøv igjen og vent til vinduet lukkes automatisk.");
          } else if(feilkode==="access_denied") {
            setStatus("feil");
            setFeilmelding("Tilgangen ble avslått. Hvis appen fortsatt er i test-modus i Google Cloud, må kontoen din legges til som testbruker under OAuth consent screen.");
          } else if(feilkode==="invalid_client"||beskrivelse.indexOf("client")>=0) {
            setStatus("feil");
            setFeilmelding("Ugyldig OAuth Client ID. Sjekk at riktig Client ID er satt i koden og at den finnes i Google Cloud Console.");
          } else if(feilkode==="idpiframe_initialization_failed"||beskrivelse.toLowerCase().indexOf("origin")>=0) {
            setStatus("feil");
            setFeilmelding("Denne nettsiden ("+window.location.origin+") er ikke godkjent som opprinnelse for denne OAuth-klienten. Legg den til under «Autoriserte JavaScript-opprinnelser» i Google Cloud Console.");
          } else {
            setStatus("feil");
            setFeilmelding("Tilgang til Google Drive feilet ("+feilkode+"). Se diagnostikk under for detaljer.");
          }
        }
      );
      client.requestAccessToken();
    };

    if(gapiKlar) {
      // gapi er allerede klar — kall requestAccessToken synkront,
      // saa nettleseren fortsatt regner dette som et direkte resultat
      // av brukerens klikk.
      logg("Drive API (forhaandslastet): OK — starter token-foresporsel direkte");
      startTokenForesporsel();
    } else {
      // Fallback dersom forhaandslasting ikke rakk aa fullfores ennaa
      // (f.eks. treg forbindelse). Da kan popupen dessverre bli
      // blokkert av nettleseren siden vi ma vente pa lastingen forst.
      logg("gapi ikke ferdig forhaandslastet ennaa — proever aa laste na (kan feile pga popup-blokkering)");
      lastGapiDriveClient().then(function(){
        logg("Drive API (sen lasting): OK");
        setGapiKlar(true);
        startTokenForesporsel();
      }).catch(function(err){
        logg("lastGapiDriveClient FEILET: "+(err&&err.message?err.message:JSON.stringify(err)));
        setStatus("feil");
        setFeilmelding("Kunne ikke laste Google Drive-klienten (gapi). Sjekk nettforbindelsen og prøv igjen.");
      });
    }
  };

  const frakoble = () => {
    kobleFraDrive(function(){
      setStatus("ikke_tilkoblet");
      setFeilmelding("");
      setDiagnostikk([]);
    });
  };

  const STATUS_VISNING = {
    ikke_tilkoblet: {tekst:"Ikke tilkoblet", farge:P.dust},
    kobler_til:     {tekst:"Kobler til…",    farge:P.hazel},
    tilkoblet:      {tekst:"Tilkoblet",      farge:P.olive},
    utlopt:         {tekst:"Tilkobling utløpt", farge:P.clay},
    feil:           {tekst:"Feil",           farge:P.clay},
  };
  const sv = STATUS_VISNING[status];

  return (
    <div>
      <div style={{fontSize:15,fontWeight:600,color:P.ink,marginBottom:4}}>🏦 Kontoer</div>
      <div style={{fontSize:12,color:P.stone,marginBottom:16}}>
        Eksterne tjenester Familieappen kan kobles til.
      </div>

      <Card style={{padding:"14px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
          <IBox emoji="📁" color={P.hazel} size={34}/>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600,color:P.ink}}>Google Drive</div>
            <div style={{fontSize:11,color:sv.farge,fontWeight:500,marginTop:1}}>{sv.tekst}</div>
          </div>
        </div>

        <div style={{fontSize:11,color:P.stone,lineHeight:1.6,marginBottom:12}}>
          Brukes til å lagre kvitteringsbilder i din egen Google Drive-mappe.
          Familieappen får kun tilgang til filer den selv oppretter.
        </div>

        {feilmelding && (
          <div style={{fontSize:11,color:P.clay,background:"#FFF4F0",border:"1px solid #F0C4B0",
            borderRadius:7,padding:"8px 10px",marginBottom:10}}>
            {feilmelding}
          </div>
        )}

        {diagnostikk.length>0 && (
          <details style={{fontSize:10,color:P.dust,marginBottom:10,background:P.mist,
            borderRadius:7,padding:"8px 10px"}}>
            <summary style={{cursor:"pointer",fontWeight:500}}>Teknisk diagnostikk ({diagnostikk.length} linjer)</summary>
            <div style={{marginTop:6,fontFamily:"monospace",lineHeight:1.6,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>
              {diagnostikk.map((linje,i)=><div key={i}>{linje}</div>)}
            </div>
          </details>
        )}

        {(status==="ikke_tilkoblet"||status==="feil"||status==="utlopt") && (
          <button onClick={koble}
            style={{width:"100%",padding:"10px",background:P.hazel,color:"white",border:"none",
              borderRadius:9,fontSize:13,cursor:"pointer",fontWeight:600}}>
            {status==="utlopt" ? "Koble til på nytt" : "Koble til Google Drive"}
          </button>
        )}
        {status==="kobler_til" && (
          <div style={{textAlign:"center",padding:"10px",fontSize:12,color:P.stone}}>
            Venter på Google…
          </div>
        )}
        {status==="tilkoblet" && (
          <button onClick={frakoble}
            style={{width:"100%",padding:"10px",background:P.mist,border:"1px solid "+P.border,
              borderRadius:9,fontSize:13,cursor:"pointer",color:P.stone,fontWeight:500}}>
            Koble fra
          </button>
        )}
      </Card>
    </div>
  );
}


// VerktoyScreen brukes na KUN inni AdminSkall. Navigasjon eies av
// AdminSidepanelNav (adminSub/setAdminSub kommer utenfra som props),
// saa "Tilbake til Verktoy"-knappene og den generiske oversikts-listen
// er ikke lenger nodvendig her — sidepanelet viser alltid alle
// administrasjonsflatene samtidig.
function VerktoyScreen({budgetGroups,setBudgetGroups,incomeGroups,setIncomeGroups,rules,setRules,liquidity,month,adminSub}) {
  const {erMobil} = useLayoutBredde();

  // Ikke-migrerte flater (Kontoer, Aarsbudsjett, Metadata) har ikke sin
  // egen interne fast/scrollende-splitt ennaa (kommer i senere sprinter).
  // Paa web/mellom faar de derfor en enkel reserve-wrapper som gir dem
  // nokyaktig samme "hele innholdet scroller som én enhet"-oppforsel som
  // AdminSkall sin content-div ga alle skjermer i steg 2 — kun flyttet
  // ett niva ned, siden AdminSkall selv na gir bundet hoyde videre i
  // stedet for aa eie scrollingen selv. Paa mobil er dette urort:
  // MobilSkall eier fortsatt hele scrollingen selv, som for.
  // Vanlig JS-funksjon (ikke en JSX-komponent) — unngar noestet
  // komponentdefinisjon inni en render-funksjon.
  const medIkkeMigrertScroll = (innhold) => (
    erMobil ? innhold : (
      <div style={{flex:1,minHeight:0,overflowY:"auto"}}>{innhold}</div>
    )
  );

  if(adminSub==="kontoer") return medIkkeMigrertScroll(<KontoerScreen/>);

  if(adminSub==="arsbudsjett") {
    return medIkkeMigrertScroll(
      <ArsbudsjettScreen
        budgetGroups={budgetGroups} setBudgetGroups={setBudgetGroups}
        incomeGroups={incomeGroups} setIncomeGroups={setIncomeGroups}/>
    );
  }

  if(adminSub==="generator") {
    return (
      <GeneratorSenter
        budgetGroups={budgetGroups} setBudgetGroups={setBudgetGroups}
        incomeGroups={incomeGroups} setIncomeGroups={setIncomeGroups}
        liquidity={liquidity} month={month}/>
    );
  }

  if(adminSub==="regler") {
    return <RegelSenter rules={rules} setRules={setRules} budgetGroups={budgetGroups} incomeGroups={incomeGroups}/>;
  }

  // "metadata" og eventuelle fremtidige, ikke-ferdige flater
  return medIkkeMigrertScroll(
    <div style={{textAlign:"center",padding:"40px 20px",color:P.dust}}>
      <div style={{fontSize:32,marginBottom:10}}>🏷️</div>
      <div style={{fontSize:14,fontWeight:600,color:P.stone,marginBottom:6}}>Metadata</div>
      <div style={{fontSize:12,lineHeight:1.6}}>Kommer senere.</div>
    </div>
  );
}

            flexDirection:column). Skjermen som rendres her (via
            VerktoyScreen) eier na selve fast/scrollende-splitten:
            GeneratorSenter/RegelSenter via AdminArbeidsomrade, ovrige
            (Kontoer/Aarsbudsjett/Metadata) via en midlertidig reserve-
            wrapper i VerktoyScreen inntil de migreres. */}
        <div style={{flex:1,minWidth:0,minHeight:0,display:"flex",flexDirection:"column",padding:"24px 32px",boxSizing:"border-box"}}>
          {children}
        </div>
      </div>
    </div>
  );
}


function App() {
  const [user,setUser]       = useState(undefined);
  const [tab,setTab]         = useState("home");
  // adminSub: null naar ingen administrasjonsflate er aktiv (MobilSkall
  // vises), ellers en av "generator"/"regler"/"arsbudsjett"/"metadata"/
  // "kontoer" (AdminSkall vises). Dette er den strukturelle beslutningen
  // — App velger skall FOR rendring, ingen visuell korreksjon i etterkant.
  const [adminSub,setAdminSub] = useState(null);
  // useLayoutBredde MA kalles her, sammen med de andre hooks, og FOR
  // noen betinget early return (rules of hooks). Forrige plassering
  // (etter if(user===undefined)/if(user===null) returene lenger ned)
  // brot dette: forste render (user===undefined) kalte IKKE hooken,
  // andre render (etter innlogging) kalte den — ulikt antall hooks
  // mellom renderinger paa samme komponent-instans, som gir React-feil
  // #310 ("Rendered fewer hooks than expected").
  const {erMobil} = useLayoutBredde();
  const [month,setMonth]     = useState(new Date().getMonth());

  const [allMeals,setAllMealsLocal]         = useState({[getWeekKey(new Date())]:INIT_MEALS});
  const [recipes,setRecipesLocal]           = useState(INIT_RECIPES);
  const [shopping,setShoppingLocal]         = useState(INIT_SHOPPING);
  const [budgetGroups,setBudgetGroupsLocal]   = useState(BUDGET_TEMPLATE);
  const [incomeGroups,setIncomeGroupsLocal]   = useState(INCOME_GROUP_TEMPLATE);
  const [transaksjoner,setTransaksjonerLocal] = useState([]);
  const [rules,setRulesLocal] = useState([]);
  const [actual,setActualLocal] = useState([]);
  const [receipts,setReceiptsLocal] = useState([]);
  const [incomeMonths,setIncomeMonthsLocal] = useState(INIT_INCOME_MONTHS);
  const [itemHistory,setItemHistoryLocal]   = useState([]);
  const [staples,setStaplesLocal]           = useState({});
  const [liquidity,setLiquidityLocal]       = useState({});
  const [freezer,setFreezerLocal]           = useState([]);

  useEffect(() => {
    const unsub = onAuthStateChanged(_auth, u => setUser(u||null));
    return unsub;
  }, []);

  useEffect(() => {
    if(!user) return;
    const offs = [];
    const listen = (path,setter) => {
      const off = dbListen(`${FAM}/${path}`, snap => { if(snap.exists()) setter(snap.val()); });
      offs.push(off);
    };

    listen("meals",       v => setAllMealsLocal(v||{}));
    listen("recipes",     v => setRecipesLocal(Object.values(v||{})));
    listen("shopping",    v => setShoppingLocal(Object.values(v||{})));
    listen("itemHistory", v => setItemHistoryLocal(Object.values(v||{})));
    listen("staples",     v => setStaplesLocal(v||{}));
    listen("liquidity",   v => setLiquidityLocal(v||{}));
    listen("freezer",     v => setFreezerLocal(Object.values(v||{})));
    listen("transaksjoner", v=>setTransaksjonerLocal(v?Object.values(v):[]));
    listen("rules",         v=>setRulesLocal(v?Object.values(v):[]));
    listen("actual",        v=>setActualLocal(v?Object.values(v):[]));
    listen("receipts",      v=>setReceiptsLocal(v?Object.values(v):[]));

    // Budsjett — merger Firebase-data inn i lokal template.
    // Stotter baade nytt format {months:{...},meta:{...}} og gammelt {0:{...},1:{...}}
    listen("budget", v => {
      console.log("[DEBUG] budget-lytter mottok snapshot:", v);
      setBudgetGroupsLocal(prev => prev.map(g => {
        const fg = v&&v[g.id]; if(!fg) return g;
        // Eksisterende poster: merge Firebase-data inn
        const oppdatertItems = g.items.map(it=>{
          const fi = fg[it.id]; if(!fi) return it;
          const months = fi.months
            ? it.months.map((mo,mi)=>fi.months[mi]?fi.months[mi]:mo)
            : it.months.map((mo,mi)=>fi[mi]?fi[mi]:mo);
          const meta = fi.meta || it.meta || null;
          return {...it, months, meta};
        });
        // Nye poster: finnes i Firebase (fg) men ikke i prev.items ennaa
        const kjenteIds = new Set(g.items.map(it=>it.id));
        const nyeFraFirebase = Object.keys(fg)
          .filter(id=>!kjenteIds.has(id))
          .map(id=>({id, name:fg[id].name||"Ny post", months:fg[id].months, meta:fg[id].meta||null}));
        if(nyeFraFirebase.length>0) {
          console.log("[DEBUG] budget-lytter fant nye poster som manglet lokalt:", nyeFraFirebase);
        }
        return {...g, items:[...oppdatertItems, ...nyeFraFirebase]};
      }));
    });

    // Inntektsgrupper — identisk monster som budsjett, egen Firebase-path
    listen("incomeGroups", v => {
      console.log("[DEBUG] incomeGroups-lytter mottok snapshot:", v);
      setIncomeGroupsLocal(prev => prev.map(g => {
        const fg = v&&v[g.id]; if(!fg) return g;
        const oppdatertItems = g.items.map(it=>{
          const fi = fg[it.id]; if(!fi) return it;
          const months = fi.months
            ? it.months.map((mo,mi)=>fi.months[mi]?fi.months[mi]:mo)
            : it.months.map((mo,mi)=>fi[mi]?fi[mi]:mo);
          const meta = fi.meta || it.meta || null;
          return {...it, months, meta};
        });
        const kjenteIds = new Set(g.items.map(it=>it.id));
        const nyeFraFirebase = Object.keys(fg)
          .filter(id=>!kjenteIds.has(id))
          .map(id=>({id, name:fg[id].name||"Ny post", months:fg[id].months, meta:fg[id].meta||null}));
        if(nyeFraFirebase.length>0) {
          console.log("[DEBUG] incomeGroups-lytter fant nye poster som manglet lokalt:", nyeFraFirebase);
        }
        return {...g, items:[...oppdatertItems, ...nyeFraFirebase]};
      }));
    });

    // Gammel income-path — beholdes kun for bakoverkompatibilitet med
    // eldre inntektsdata. Skriver ikke tilbake til Firebase.
    listen("income", v => {
      if(!v) { setIncomeMonthsLocal(INIT_INCOME_MONTHS); return; }
      if(Array.isArray(v)) {
        const converted = INIT_INCOME_MONTHS.map((def,mi) => {
          const old = v[mi]||[];
          return {
            lonn:      old.filter(i=>i.id&&i.id.indexOf("lonn")===0).map(i=>({...i,budget:i.amount||0,spent:0,meta:defaultIncomeMeta()})),
            offentlig: old.filter(i=>i.id==="barnetrygd").map(i=>({...i,budget:i.amount||0,spent:0,meta:defaultIncomeMeta()})),
            kapital:   [],
            annet:     old.filter(i=>i.id&&i.id.indexOf("lonn")!==0&&i.id!=="barnetrygd"&&i.id!=="utbytte").map(i=>({...i,budget:i.amount||0,spent:0,meta:defaultIncomeMeta()})),
          };
        });
        setIncomeMonthsLocal(converted);
      } else {
        setIncomeMonthsLocal(v);
      }
    });

    return () => offs.forEach(f=>f());
  }, [user]);

  const setWeekMeals = async (weekKey,weekData) => {
    setAllMealsLocal(p=>({...p,[weekKey]:weekData}));
    await dbSet(`${FAM}/meals/${weekKey}`, weekData);
  };

  const setRecipes = async (updater) => {
    const next = typeof updater==="function"?updater(recipes):updater;
    setRecipesLocal(next);
    await dbSet(`${FAM}/recipes`, Object.fromEntries(next.map(r=>[r.id,r])));
  };

  const setShopping = async (updater) => {
    const next = typeof updater==="function"?updater(shopping):updater;
    setShoppingLocal(next);
    await dbSet(`${FAM}/shopping`, Object.fromEntries(next.map(i=>[i.id,i])));
    const newItems = next.filter(i=>!(itemHistory||[]).some(h=>h.name.toLowerCase()===i.name.toLowerCase()));
    if(newItems.length>0) {
      const updated = [...(itemHistory||[]), ...newItems.map(i=>({name:i.name,cat:i.cat}))];
      setItemHistoryLocal(updated);
      await dbSet(`${FAM}/itemHistory`, Object.fromEntries(updated.map((h,i)=>[i,h])));
    }
  };

  const setBudgetGroups = async (updater) => {
    const next = typeof updater==="function"?updater(budgetGroups):updater;
    setBudgetGroupsLocal(next);
    const flat = {};
    next.forEach(g=>{ flat[g.id]={}; g.items.forEach(it=>{ flat[g.id][it.id]={name:it.name, months:it.months, meta:it.meta||null}; }); });
    console.log("[DEBUG] setBudgetGroups skriver til Firebase:", FAM+"/budget", flat);
    try {
      await dbSet(`${FAM}/budget`, flat);
      console.log("[DEBUG] setBudgetGroups Firebase-write OK");
    } catch(err) {
      console.error("[DEBUG] setBudgetGroups Firebase-write FEILET:", err);
    }
  };

  const setLiquidity = async (updater) => {
    const next = typeof updater==="function"?updater(liquidity):updater;
    setLiquidityLocal(next);
    await dbSet(`${FAM}/liquidity`, next);
  };

  const setFreezer = async (updater) => {
    const next = typeof updater==="function"?updater(freezer):updater;
    setFreezerLocal(next);
    await dbSet(`${FAM}/freezer`, Object.fromEntries(next.map(i=>[i.id,i])));
  };

  const setIncomeMonths = async (updater) => {
    const next = typeof updater==="function"?updater(incomeMonths):updater;
    setIncomeMonthsLocal(next);
    await dbSet(`${FAM}/income`, next);
  };
  const setActual = async (updater) => {
    const next = typeof updater==="function"?updater(actual):updater;
    setActualLocal(next);
    await dbSet(`${FAM}/actual`, next);
  };
  const setReceipts = async (updater) => {
    const next = typeof updater==="function"?updater(receipts):updater;
    setReceiptsLocal(next);
    await dbSet(`${FAM}/receipts`, next);
  };
  const setRules = async (updater) => {
    const next = typeof updater==="function"?updater(rules):updater;
    setRulesLocal(next);
    await dbSet(`${FAM}/rules`, next);
  };
  const setTransaksjoner = async (updater) => {
    const next = typeof updater==="function"?updater(transaksjoner):updater;
    setTransaksjonerLocal(next);
    await dbSet(`${FAM}/transaksjoner`, next);
  };
  const setIncomeGroups = async (updater) => {
    const next = typeof updater==="function"?updater(incomeGroups):updater;
    setIncomeGroupsLocal(next);
    // Lagre identisk struktur som budsjett: {groupId: {itemId: {months, meta}}}
    const flat = {};
    next.forEach(g=>{ flat[g.id]={}; g.items.forEach(it=>{ flat[g.id][it.id]={name:it.name, months:it.months, meta:it.meta||null}; }); });
    console.log("[DEBUG] setIncomeGroups skriver til Firebase:", FAM+"/incomeGroups", flat);
    try {
      await dbSet(`${FAM}/incomeGroups`, flat);
      console.log("[DEBUG] setIncomeGroups Firebase-write OK");
    } catch(err) {
      console.error("[DEBUG] setIncomeGroups Firebase-write FEILET:", err);
    }
  };

  const currentWeekKey  = getWeekKey(new Date());
  const nextWeekKey     = addWeeks(currentWeekKey, 1);
  const currentWeekMeals = allMeals[currentWeekKey]||{};
  const nextWeekMeals    = allMeals[nextWeekKey]||{};
  const setCurrentWeekMeals = (upd) => {
    const cur=allMeals[currentWeekKey]||{};
    const next=typeof upd==="function"?upd(cur):upd;
    setWeekMeals(currentWeekKey,next);
  };
  const setNextWeekMealsFromRecipes = (upd) => {
    const cur=allMeals[nextWeekKey]||{};
    const next=typeof upd==="function"?upd(cur):upd;
    setWeekMeals(nextWeekKey,next);
  };

  if(user===undefined) return (
    <div style={{minHeight:"100vh",background:P.sand,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
      <div style={{fontSize:40}}>🏡</div>
      <div style={{fontSize:14,color:P.stone}}>Laster…</div>
    </div>
  );
  if(user===null) return <LoginScreen/>;

  const today = new Date();
  const dateStr = today.toLocaleDateString("nb-NO",{weekday:"long",day:"numeric",month:"long",year:"numeric"});

  const header = (
    <div style={{background:P.linen,borderBottom:`1px solid ${P.border}`,padding:"13px 16px 11px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10,boxShadow:"0 1px 8px rgba(44,35,24,0.05)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:32,height:32,borderRadius:9,background:P.hazelXL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>🏡</div>
        <div>
          <div style={{fontSize:16,fontWeight:600,color:P.ink}}>Familieappen</div>
          <div style={{fontSize:10,color:P.dust,marginTop:1}}>{dateStr.charAt(0).toUpperCase()+dateStr.slice(1)}</div>
          <div style={{fontSize:9,color:P.hazelL,marginTop:1,letterSpacing:"0.04em"}}>v-interne-overforinger-1</div>
        </div>
      </div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <span style={{fontSize:10,color:P.dust}}>{user.email&&user.email.split("@")[0]}</span>
        <button onClick={()=>signOut(_auth)} style={{background:P.mist,border:`1px solid ${P.border}`,cursor:"pointer",padding:"5px 10px",borderRadius:8,fontSize:11,color:P.stone,fontWeight:500}}>Logg ut</button>
      </div>
    </div>
  );

  // Hvilket skall som brukes avgjores av BADE arbeidsmodus (adminSub)
  // OG skjermstorrelse (erMobil). Sidepanelet er en webfunksjon — pa
  // mobil skal administrasjon fortsatt bruke MobilSkall med kortvisning,
  // aldri sidepanelet. AdminSkall vises derfor kun naar en administrasjons-
  // flate ER aktiv OG skjermen faktisk er bred nok til aa nytte den.

  // adminSub!==null -> administrasjonsflate aktiv. Om det gir AdminSkall
  // (sidepanel) eller MobilSkall (kortvisning) avhenger av erMobil.
  if(adminSub!==null && !erMobil) {
    return (
      <AdminSkall header={header} adminSub={adminSub} setAdminSub={setAdminSub}
        onAvslutt={()=>setAdminSub(null)}>
        <VerktoyScreen
          budgetGroups={budgetGroups} setBudgetGroups={setBudgetGroups}
          incomeGroups={incomeGroups} setIncomeGroups={setIncomeGroups}
          rules={rules} setRules={setRules}
          liquidity={liquidity} month={month}
          adminSub={adminSub}/>
      </AdminSkall>
    );
  }

  // Administrasjon paa mobil: MobilSkall, men innholdet er
  // VerktoyScreen/Verktoy-menyen i stedet for Hverdagsflyt-fanene —
  // brukeren er fortsatt "inne i" Verktoy fra sitt eget perspektiv,
  // kun uten sidepanel og uten bunn-navigasjonens vanlige faner.
  if(adminSub!==null && erMobil) {
    return (
      <MobilSkall header={header} bunnNav={
        <button onClick={()=>setAdminSub(null)}
          style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",
            width:"100%",maxWidth:460,zIndex:50,background:P.linen,
            borderTop:"1px solid "+P.border,boxShadow:"0 -2px 16px rgba(44,35,24,0.07)",
            padding:"12px 16px",border:"none",cursor:"pointer",
            display:"flex",alignItems:"center",justifyContent:"center",gap:8,
            fontSize:13,fontWeight:600,color:P.hazel,boxSizing:"border-box"}}>
          ← Tilbake til Hverdagsflyt
        </button>
      }>
        <VerktoyScreen
          budgetGroups={budgetGroups} setBudgetGroups={setBudgetGroups}
          incomeGroups={incomeGroups} setIncomeGroups={setIncomeGroups}
          rules={rules} setRules={setRules}
          liquidity={liquidity} month={month}
          adminSub={adminSub}/>
      </MobilSkall>
    );
  }

  return (
    <MobilSkall header={header} bunnNav={<BottomNav tab={tab} setTab={setTab}/>}>
      {tab==="home"        && <HomeScreen meals={currentWeekMeals} shopping={shopping} setTab={setTab} budgetGroups={budgetGroups} month={month}/>}
      {tab==="mat"         && <MatScreen
        allMeals={allMeals} setWeekMeals={setWeekMeals}
        recipes={recipes} setRecipes={setRecipes}
        shopping={shopping} setShopping={setShopping}
        freezer={freezer} setFreezer={setFreezer}
        itemHistory={itemHistory} staples={staples}
        currentWeekMeals={currentWeekMeals} setCurrentWeekMeals={setCurrentWeekMeals}
        nextWeekMeals={nextWeekMeals} setNextWeekMealsFromRecipes={setNextWeekMealsFromRecipes}/>}
      {tab==="forvaltning" && <ForvaltningScreen
        liquidity={liquidity} setLiquidity={setLiquidity}
        budgetGroups={budgetGroups} setBudgetGroups={setBudgetGroups}
        incomeGroups={incomeGroups} setIncomeGroups={setIncomeGroups}
        incomeMonths={incomeMonths} setIncomeMonths={setIncomeMonths}
        transaksjoner={transaksjoner} setTransaksjoner={setTransaksjoner}
        rules={rules} setRules={setRules}
        actual={actual} setActual={setActual}
        receipts={receipts} setReceipts={setReceipts}
        month={month} setMonth={setMonth}/> }
      {tab==="hjem_fam"    && <HjemFamilieScreen/>}
      {tab==="mer"         && <MerScreen setAdminSub={setAdminSub}/>}
    </MobilSkall>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if("serviceWorker" in navigator) {
  // Fjern gamle service workers og tving ny versjon
  navigator.serviceWorker.getRegistrations().then(regs=>{
    regs.forEach(r=>r.unregister());
  });
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("/familieapp/sw.js?v=kokebok1",{scope:"/familieapp/"})
      .then(r=>console.log("SW v-interne-overforinger-1:",r.scope))
      .catch(e=>console.log("SW feil:",e));
  });
}
</script>
</body>
</html>
