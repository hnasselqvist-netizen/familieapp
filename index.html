// ── Prognosemotor ─────────────────────────────────────────────────
// Ren funksjon: tar saldo + liste med poster + prognosedato
// Returnerer tre tall. Ingen annet ansvar.
function calcSpillerom(saldo, posts, prognosisDate) {
  const d = prognosisDate ? new Date(prognosisDate) : new Date();
  d.setHours(23,59,59,999);
  const relevant = posts.filter(p => {
    if(!p.date) return false;
    return new Date(p.date) <= d;
  });
  const innbetalinger = relevant.filter(p=>p.direction==="in").reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const utbetalinger  = relevant.filter(p=>p.direction==="out").reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const disponibelt = parseFloat(saldo)||0;
  const bundet      = utbetalinger - innbetalinger; // netto uttak
  const spillerom   = disponibelt + innbetalinger - utbetalinger;
  return { disponibelt, innbetalinger, utbetalinger, bundet, spillerom };
}


// ── Budsjettgenerator v1 ──────────────────────────────────────────
// Ren funksjon: tar budsjettgrupper + existing2 poster + maaned
// Returnerer oppdatert posts-objekt (ingen side-effekter)
function generateForecastPosts(budgetGroups, existingPosts, month, incomeMonths, incomeGroups) {
  // Start med kun manuelle poster — genererte slettes og regenereres
  const posts = {};
  Object.entries(existingPosts||{}).forEach(([id,p]) => {
    if(p.kilde !== "generator") {
      posts[id] = p; // behold manuelle
    }
    // Manuelt overstyrte genererte poster beholdes med sine verdier
    if(p.kilde === "generator" && p.manueltOverstyrt) {
      posts[id] = p;
    }
  });

  const now    = new Date();
  const aar    = now.getFullYear();
  const maaned = month;
  const genTs  = Date.now();

  // ── Kostnadsposter ─────────────────────────────────────────────
  budgetGroups.forEach(gruppe => {
    gruppe.items.forEach(item => {
      const meta = item.meta;
      if(!meta || !meta.automatisk) return;
      if(!meta.forfallsdag) return;
      const monthData = item.months && item.months[maaned];
      if(!monthData) return;
      const budgetAmount = (monthData.spent && monthData.spent > 0)
        ? monthData.spent : monthData.budget;
      if(!budgetAmount || budgetAmount <= 0) return;
      const erFaktisk = !!(monthData.spent && monthData.spent > 0);
      const dag = parseInt(meta.forfallsdag);
      const dato = new Date(aar, maaned, dag);
      const datoStr = dato.toISOString().slice(0,10);
      const noekkel = item.id+"_"+aar+"_"+maaned+"_"+dag;

      // Sjekk om den finnes som manuelt overstyrt
      const overstyrt = Object.values(posts).find(p=>p._genKey===noekkel&&p.manueltOverstyrt);
      if(overstyrt) return; // behold overstyrt versjon

      const prognosePost = {
        name:                item.name,
        amount:              budgetAmount,
        direction:           "out",
        date:                datoStr,
        type:                meta.oppforsel || "fast",
        kilde:               "generator",
        sourceBudgetItemId:  item.id,
        sourceBudgetGroupId: gruppe.id,
        sourceType:          "kostnader",
        sourceGroup:         gruppe.label,
        owner:               meta.eier || "Felles",
        level:               meta.niva || "nodvendig",
        erEstimat:           meta.oppforsel === "variabel" && !erFaktisk,
        _genKey:             noekkel,
        generatedAt:         genTs,
      };

      const id = uid();
      posts[id] = {...prognosePost, id};
    });
  });

  // ── Inntektsposter ─────────────────────────────────────────────
  if(incomeGroups) {
    incomeGroups.forEach(gruppe => {
      gruppe.items.forEach(inc => {
        const meta = inc.meta||{};
        if(!meta.automatisk) return;
        const dag2 = parseInt(meta.forfallsdag||"");
        if(!dag2) return;
        const mo2 = inc.months && inc.months[maaned];
        const amt = (meta.disponibelt && meta.disponibelt>0) ? meta.disponibelt
                  : (mo2&&mo2.spent>0) ? mo2.spent
                  : (mo2&&mo2.budget>0) ? mo2.budget : 0;
        if(!amt) return;
        const incDato = new Date(aar, maaned, dag2);
        const incDatoStr = incDato.toISOString().slice(0,10);
        const incNoekkel = "inc_"+inc.id+"_"+aar+"_"+maaned+"_"+dag2;

        const overstyrt = Object.values(posts).find(p=>p._genKey===incNoekkel&&p.manueltOverstyrt);
        if(overstyrt) return;

        const post = {
          name:        inc.name,
          amount:      amt,
          direction:   "in",
          date:        incDatoStr,
          type:        "inn",
          kilde:       "generator",
          sourceType:  "inntekter",
          sourceGroup: gruppe.label,
          sourceItemId:inc.id,
          owner:       meta.eier||"Felles",
          erEstimat:   !(mo2&&mo2.spent>0) && !meta.disponibelt,
          _genKey:     incNoekkel,
          generatedAt: genTs,
        };
        const incId = uid();
        posts[incId] = {...post, id:incId};
      });
    });
  }
  return posts;
}


// ── Regelmotor (ren funksjon) ────────────────────────────────────
// Motoren kjenner ikke Firebase, UI eller Bankimport.
// Den mottar én transaksjon og en liste med regler, og returnerer beste match.
function findMatchingRule(transaction, rules) {
  if(!transaction || !rules || !rules.length) return {rule:null, confidence:0, begrunnelse:"Ingen regler tilgjengelig"};

  const aktiveRegler = rules.filter(r=>r.active!==false && r.mode!=="disabled");
  if(!aktiveRegler.length) return {rule:null, confidence:0, begrunnelse:"Ingen aktive regler"};

  const tTekst = (transaction.normalizedText||transaction.tekst||"").toLowerCase();

  const scored = aktiveRegler.map(r=>{
    const rPattern = (r.normalizedPattern||r.pattern||"").toLowerCase();
    if(!rPattern||!tTekst) return {rule:r, score:0, begrunnelse:"Tomt monster eller tomt tekst"};

    let score = 0;
    let begrunnelse = "";

    if(tTekst===rPattern) {
      score = 100;
      begrunnelse = "Eksakt treff pa normalisert tekst";
    } else if(tTekst.includes(rPattern)||rPattern.includes(tTekst)) {
      score = 80;
      begrunnelse = "Delvis treff — monster inngar i teksten";
    } else {
      const tOrd = tTekst.split(/\s+/).filter(w=>w.length>3);
      const rOrd = rPattern.split(/\s+/).filter(w=>w.length>3);
      const felles = tOrd.filter(w=>rOrd.some(x=>x.includes(w)||w.includes(x)));
      if(felles.length>0) {
        score = Math.min(60, felles.length*25);
        begrunnelse = "Felles nokkelord: "+felles.join(", ");
      } else {
        return {rule:r, score:0, begrunnelse:"Ingen tekstlikhet"};
      }
    }

    // Vekt med regelens egen confidence
    const vektet = Math.round(score * ((r.confidence!==undefined?r.confidence:100)/100));
    return {rule:r, score:vektet, begrunnelse};
  }).filter(s=>s.score>0);

  if(!scored.length) return {rule:null, confidence:0, begrunnelse:"Ingen regel matcher denne transaksjonen"};

  scored.sort((a,b)=>b.score-a.score);
  const best = scored[0];
  return {rule:best.rule, confidence:best.score, begrunnelse:best.begrunnelse};
}

// ── Actual-motor (ren funksjon) ──────────────────────────────────
// Motoren kjenner ikke Firebase, UI eller Bankimport.
// Den mottar en ferdig behandlet transaksjon og returnerer én faktisk post.
function createActualFromTransaction(transaction) {
  if(!transaction) return null;
  const naa = new Date().toISOString();
  return {
    id:              uid(),
    transactionId:   transaction.id,
    ruleId:          transaction.ruleId||null,
    behandlingstype: transaction.behandlingstype||null,
    targetType:      transaction.retning==="inn" ? "income" : "budget",
    targetId:        transaction.matchetMot||null,
    targetName:      transaction.matchetNavn||null,
    account:         transaction.konto||transaction.importkilde||null,
    date:            transaction.dato||null,
    amount:          transaction.belop||0,
    direction:       transaction.retning||"ut",
    description:     transaction.tekst||"",
    source:          "bankimport",
    createdAt:       naa,
  };
}

// ── Actual-totals-motor (ren funksjon) ───────────────────────────
// Motoren kjenner ikke Firebase, UI eller Budsjett.
// Mottar Actual-poster, returnerer summer per targetId.
// Motoren er fortsatt ren: mottar Actual-poster (og valgfritt en liste over
// gyldige transactionId-er), returnerer summer per targetId. Den kjenner
// ikke Firebase eller UI — kallende kode er ansvarlig for aa sende inn
// riktig data.
function calculateActualTotals(actualPosts, monthKey, gyldigeTransaksjonIds) {
  const totals = {};
  (actualPosts||[]).forEach(a=>{
    if(!a) return;
    if(!a.targetId) return;
    // Foreldrelose Actual-poster (transactionId finnes ikke lenger i
    // transaksjoner/) skal aldri telle med. gyldigeTransaksjonIds er valgfri
    // for bakoverkompatibilitet — hvis den ikke sendes inn, filtreres ikke.
    if(gyldigeTransaksjonIds!==undefined) {
      if(!a.transactionId) return;
      if(!gyldigeTransaksjonIds.has(a.transactionId)) return;
    }
    if(monthKey!==undefined && monthKey!==null) {
      if(!a.date) return;
      const aMonthKey = a.date.slice(0,7); // "YYYY-MM"
      if(aMonthKey!==monthKey) return;
    }
    if(!totals[a.targetId]) totals[a.targetId] = 0;
    totals[a.targetId] += (a.amount||0);
  });
  return totals;
}

// ── Kvittering-lukker-bankimport (etappe 1, rene motorer) ────────
// Motorene kjenner ikke Firebase eller UI. De mottar data, returnerer
// data. Selve skrivingen (setActual/setReceipts/setTransaksjoner) gjores
// av en tynn orkestreringsfunksjon i komponenten som har tilgang til
// setterne (i dag KvitteringInnboksScreen). Dette er bevisst holdt som
// et eget, samlet lag — ikke spredt i JSX — slik at et fremtidig
// hendelseslag (etappe 2+) kan kalle nokyaktig disse samme motorene.
const BELOPSTOLERANSE_KOBLING = 1; // kr — samme toleranse som ellers i appen (finnMatchForPreview)

// Sjekker om en kvittering er klar til aa lukke en banktransaksjon:
// har en fordeling, og splittsummen stemmer med kvitteringens eget totalbelop.
function erKvitteringKlarForLukking(receipt) {
  if(!receipt) return {klar:false, kode:"mangler_kvittering"};
  if(!receipt.allocationMode || !(receipt.splits&&receipt.splits.length>0)) {
    return {klar:false, kode:"ikke_fordelt"};
  }
  const splitSum = calculateSplitTotal(receipt);
  const total = receipt.total||0;
  if(Math.abs(splitSum-total) > BELOPSTOLERANSE_KOBLING) {
    return {klar:false, kode:"splitt_avvik", detaljer:{splitSum,total}};
  }
  return {klar:true};
}

// Full vurdering av om en kobling kan lukke transaksjonen automatisk,
// eller om det finnes en reell konflikt som krever brukervalg.
// Returnerer alltid {kanKobles, kanLukkes, kode?, detaljer?} — kanKobles
// skiller "lenken kan opprettes" fra "transaksjonen kan ferdigbehandles",
// siden disse to ikke alltid folger hverandre (§8D i oppdraget).
function vurderKvitteringKobling(receipt, transaction, alleActual, alleReceipts) {
  if(!receipt || !transaction) return {kanKobles:false, kanLukkes:false, kode:"mangler_data"};

  // Blokkerende: transaksjonen er arkivert/ignorert — ikke reaktiver stille.
  if(transaction.status==="ignorert") {
    return {kanKobles:false, kanLukkes:false, kode:"transaksjon_ignorert"};
  }
  // Blokkerende: transaksjonen er allerede koblet til EN ANNEN kvittering.
  const annenKvitteringPaaTransaksjon = (alleReceipts||[]).find(r=>
    r.id!==receipt.id && r.matchedTransactionId===transaction.id);
  if(annenKvitteringPaaTransaksjon) {
    return {kanKobles:false, kanLukkes:false, kode:"transaksjon_koblet_annen_kvittering",
      detaljer:{annenKvitteringId:annenKvitteringPaaTransaksjon.id}};
  }

  // Fra her kan lenken alltid opprettes — sporsmalet er om den ogsaa kan LUKKES.
  const fordelt = erKvitteringKlarForLukking(receipt);
  if(!fordelt.klar) {
    return {kanKobles:true, kanLukkes:false, kode:fordelt.kode, detaljer:fordelt.detaljer};
  }

  // Belopet ma stemme mot selve banktransaksjonen.
  if(Math.abs((receipt.total||0) - Math.abs(transaction.belop||0)) > BELOPSTOLERANSE_KOBLING) {
    return {kanKobles:true, kanLukkes:false, kode:"belop_avvik",
      detaljer:{kvitteringTotal:receipt.total, bankBelop:transaction.belop}};
  }

  // Finnes det allerede Actual for denne transaksjonen fra en ANNEN kilde
  // (vanlig Bankimport-behandling, ikke denne kvitteringen)?
  const eksisterendeActual = (alleActual||[]).filter(a=>
    a.transactionId===transaction.id && a.receiptId!==receipt.id);
  if(eksisterendeActual.length>0) {
    const eksisterendeSum = eksisterendeActual.reduce((s,a)=>s+(a.amount||0),0);
    if(Math.abs(eksisterendeSum-(receipt.total||0)) <= BELOPSTOLERANSE_KOBLING) {
      // Samsvarer -> kan lukkes uten aa duplisere (§8A "samsvar")
      return {kanKobles:true, kanLukkes:true, handling:"bekreft_eksisterende_actual"};
    }
    return {kanKobles:true, kanLukkes:false, kode:"transaksjon_har_avvikende_actual",
      detaljer:{eksisterendeSum, kvitteringTotal:receipt.total}};
  }

  return {kanKobles:true, kanLukkes:true, handling:"opprett_ny_actual"};
}

// Bygger Actual-postene som skal representere en kvitterings splitter for
// EN gitt banktransaksjon. Ren funksjon — ingen sideeffekter.
// Hver post far en DETERMINISTISK id (kvittering+transaksjon+splitt-indeks)
// — ikke uid() — slik at aa kjore denne operasjonen flere ganger for samme
// kvittering+transaksjon alltid gir samme id-sett, aldri voksende duplikater.
function byggActualFraKvitteringSplitter(receipt, transaction) {
  if(!receipt || !transaction) return [];
  const naa = new Date().toISOString();
  return (receipt.splits||[]).map((sp,idx) => ({
    id:              receipt.id+"_"+transaction.id+"_s"+idx,
    transactionId:   transaction.id,
    receiptId:       receipt.id,
    splitIndex:      idx,
    ruleId:          null,
    behandlingstype: "kvittering",
    targetType:      sp.targetType,
    targetId:        sp.targetId,
    targetName:      sp.targetName,
    account:         transaction.konto||transaction.importkilde||null,
    date:            transaction.dato||receipt.purchaseDate||null,
    amount:          sp.amount||0,
    direction:       transaction.retning||"ut",
    description:     sp.description||sp.ocrDescription||receipt.merchant||transaction.tekst||"",
    source:          "kvittering",
    createdAt:       naa,
  }));
}

// Erstatter (fjerner+setter inn paa nytt) alle Actual-poster knyttet til
// en gitt kvittering+transaksjon-kombinasjon. Idempotent: kjort flere
// ganger med samme splitter gir samme sluttresultat, aldri flere poster.
// nyeActual kan vaere en tom liste — brukes da til aa RYDDE en tidligere
// kobling (f.eks. ved omkobling til en annen transaksjon).
function synkroniserActualForKobling(prevActual, receiptId, transactionId, nyeActual) {
  const uten = (prevActual||[]).filter(a=>
    !(a.transactionId===transactionId && a.receiptId===receiptId));
  return [...uten, ...(nyeActual||[])];
}

// ── Kontantflyt-motor (ren funksjon) ─────────────────────────────
// Motoren kjenner ikke Firebase, UI eller Faktisk.
// Budsjettpostenes months[] er alltid autoritative for forventet beloep
// den kalendermaaneden — paymentPattern beskriver kun HVORFOR belopet
// varierer (kvartalsvis/aarlig gir store belop konsentrert til enkelte
// maaneder, med 0 i de andre), det endrer ikke hvordan motoren leser data.
function calculateCommittedCashflow(budgetGroups, valgtMonth) {
  const alleItems = (budgetGroups||[]).flatMap(g=>g.items.map(it=>({...it, gruppe:g.label})));
  const fremtid = [];
  let kumulativ = 0;

  for(let mi = valgtMonth; mi < 12; mi++) {
    let planlagteKostnader = 0;
    const posterDenneManeden = [];

    alleItems.forEach(it=>{
      const mo = it.months && it.months[mi];
      const belop = mo ? (mo.budget||0) : 0;
      if(belop > 0) {
        planlagteKostnader += belop;
        posterDenneManeden.push({id:it.id, name:it.name, gruppe:it.gruppe, belop, paymentPattern:(it.meta&&it.meta.paymentPattern)||"monthly"});
      }
    });

    kumulativ += planlagteKostnader;

    fremtid.push({
      maanedIndex: mi,
      planlagteKostnader,
      planlagteInntekter: 0, // inntekter er ikke del av v1
      kumulativForpliktelse: kumulativ,
      poster: posterDenneManeden,
    });
  }

  return fremtid;
}

// ── Finn neste storre planlagte utbetaling fra en gitt maaned ────
// Hjelpefunksjon bygget paa samme rene data — "storre" defineres her
// som en post med belop > 0 i en fremtidig maaned (inkl. valgt maaned).
// Vurderer kun periodiske/sjeldne poster (quarterly, yearly, senere custom).
// Vanlige loepende maanedskostnader (monthly) er ikke "storre planlagte
// utbetalinger" i denne betydningen — de er allerede en fast, kjent del
// av hverdagsokonomien og skal ikke fremheves her.
function finnNesteStorreUtbetaling(budgetGroups, valgtMonth) {
  const flyt = calculateCommittedCashflow(budgetGroups, valgtMonth);
  for(const mnd of flyt) {
    const relevantePoster = mnd.poster.filter(p=>p.paymentPattern==="quarterly"||p.paymentPattern==="yearly"||p.paymentPattern==="custom");
    if(relevantePoster.length===0) continue;
    const storst = relevantePoster.reduce((a,b)=>b.belop>a.belop?b:a, relevantePoster[0]);
    return {maanedIndex:mnd.maanedIndex, navn:storst.name, belop:storst.belop};
  }
  return null;
}

// ── Kvitteringsmotor (ren funksjon) ──────────────────────────────
// Motoren kjenner ikke Firebase eller UI.
// Mottar en transactionId og en liste med kvitteringer, returnerer
// tilhorende kvittering eller null.
function findReceipt(transactionId, receipts) {
  if(!transactionId || !receipts) return null;
  return receipts.find(r=>r.transactionId===transactionId) || null;
}

// Ren funksjon: summerer splits[] pa en kvittering. Kjenner ikke
// Firebase eller UI.
function calculateSplitTotal(receipt) {
  if(!receipt || !receipt.splits) return 0;
  return receipt.splits.reduce((s,sp)=>s+(sp.amount||0), 0);
}

// Ren funksjon: summerer en liste med kvitteringslinjer (receiptLines).
// Kjenner ikke Firebase eller UI. netAmount = grossAmount - discountAmount
// er beloepet som teller i splitt og senere Faktisk.
function calculateReceiptLineTotals(receiptLines) {
  const linjer = receiptLines||[];
  const itemLinjer = linjer.filter(l=>l.lineType==="item"||!l.lineType);
  const grossTotal = itemLinjer.reduce((s,l)=>s+(l.grossAmount||0), 0);
  const discountTotal = linjer.reduce((s,l)=>s+(l.discountAmount||0), 0);
  const netTotal = itemLinjer.reduce((s,l)=>{
    const net = l.netAmount!==undefined ? l.netAmount : (l.grossAmount||0)-(l.discountAmount||0);
    return s+net;
  }, 0);
  const allocatedTotal = itemLinjer.filter(l=>l.targetId).reduce((s,l)=>{
    const net = l.netAmount!==undefined ? l.netAmount : (l.grossAmount||0)-(l.discountAmount||0);
    return s+net;
  }, 0);
  const remainingToAllocate = netTotal - allocatedTotal;
  return {grossTotal, discountTotal, netTotal, allocatedTotal, remainingToAllocate};
}

// ── Kvitteringsmatch-motor (ren funksjon) ────────────────────────
// Motoren kjenner ikke Firebase eller UI, og har ingen sideeffekter.
// Mottar én kvittering og listen med banktransaksjoner, returnerer
// en sortert liste med kandidater (hoyest score forst).
// Scoren er enkel og forklarbar — kun belop, dato og leverandor.

// Delt normalisering av leverandor-/handelsnavn. Brukes av bade
// kvitteringer (receipt.merchant) og banktransaksjoner (transaction.tekst)
// slik at "REMA1000", "REMA 1000" og "REMA-1000" blir like. Dette skal
// ogsaa vaere normaliseringen OCR og fremtidig bankmatching bruker —
// én felles sannhet, ikke en per-motor variant.
function normalizeMerchant(tekst) {
  if(!tekst) return "";
  return tekst.toLowerCase().replace(/[\s\-_]+/g,"");
}

// Regnestykkene for hver delscore er egne funksjoner slik at vekting
// kan justeres senere uten aa grave i selve matchlogikken.
function calculateAmountScore(receipt, transaction) {
  if(transaction.belop===undefined || receipt.total===undefined) return {score:0, reason:null};
  if(Math.abs(transaction.belop-receipt.total)<0.01) return {score:70, reason:"Eksakt beløp"};
  return {score:0, reason:null};
}

function calculateDateScore(receipt, transaction) {
  if(!receipt.purchaseDate || !transaction.dato) return {score:0, reason:null};
  const kvitteringDato = new Date(receipt.purchaseDate);
  const tDato = new Date(transaction.dato);
  const dagDiff = Math.round(Math.abs(tDato-kvitteringDato)/(1000*60*60*24));
  if(dagDiff===0) return {score:20, reason:"Samme dag"};
  if(dagDiff<=1)  return {score:15, reason:"±1 dag"};
  if(dagDiff<=2)  return {score:10, reason:"±2 dager"};
  if(dagDiff<=5)  return {score:5,  reason:"±5 dager"};
  return {score:0, reason:null};
}

function calculateMerchantScore(receipt, transaction) {
  const kvitteringLeverandor = normalizeMerchant(receipt.merchant);
  const tLeverandor = normalizeMerchant(transaction.tekst);
  if(!kvitteringLeverandor || !tLeverandor) return {score:0, reason:null};
  if(tLeverandor.indexOf(kvitteringLeverandor)>=0 || kvitteringLeverandor.indexOf(tLeverandor)>=0) {
    return {score:10, reason:"Leverandør matcher"};
  }
  return {score:0, reason:null};
}

// Finner de beste transaksjonskandidatene for én kvittering. Navnet
// reflekterer hva motoren faktisk gjor: den matcher transaksjoner MOT
// en gitt kvittering, ikke omvendt.
function findMatchingTransactions(receipt, transactions) {
  if(!receipt || !transactions || !transactions.length) return [];

  const kandidater = transactions.map(t=>{
    const amountScore   = calculateAmountScore(receipt, t);
    const dateScore     = calculateDateScore(receipt, t);
    const merchantScore = calculateMerchantScore(receipt, t);

    const score = amountScore.score + dateScore.score + merchantScore.score;
    const reasons = [amountScore.reason, dateScore.reason, merchantScore.reason].filter(Boolean);

    return {transaction:t, score, reasons};
  }).filter(k=>k.score>0);

  kandidater.sort((a,b)=>b.score-a.score);
  return kandidater;
}

// ── Intern overforing-motor (etappe 3, rene funksjoner) ──────────
// Identifiserer KANDIDATER for at to banktransaksjoner representerer
// samme interne overforing — penger flyttet mellom familiens egne
// kontoer, ikke en automatisk, stille kobling (§ oppdraget: "vi
// trenger ikke full automatisk matching i alle tenkelige tilfeller").
//
// Bruker UTELUKKENDE strukturelle signaler som allerede finnes paa
// enhver transaksjon — motsatt retning, ulik konto, likt belop,
// naerliggende dato. Kjenner ALDRI til spesifikke kontonavn (ingen
// "hvis konto==MC" noe sted her) — kontonavn er data motoren leser,
// ikke en gren i logikken. En fremtidig konto fungerer uten at
// motoren skrives om.
//
// Motsatt retning og ulik konto er STRUKTURELLE KRAV (en overforing
// kan per definisjon ikke ga fra en konto til seg selv, eller ha
// samme retning paa begge sider) — ikke bare scorede hint, i
// motsetning til belop/dato som er sannsynlighetsindikatorer.
function calculateKontoUlikhet(transaksjon, kandidat) {
  if(!transaksjon.konto || !kandidat.konto) return {oppfylt:false};
  if(transaksjon.konto===kandidat.konto) return {oppfylt:false};
  return {oppfylt:true, reason:"Ulik konto"};
}
function calculateRetningMotsatt(transaksjon, kandidat) {
  if(!transaksjon.retning || !kandidat.retning) return {oppfylt:false};
  if(transaksjon.retning===kandidat.retning) return {oppfylt:false};
  return {oppfylt:true, reason:"Motsatt retning"};
}
function calculateOverforingBelopScore(transaksjon, kandidat) {
  if(Math.abs(Math.abs(transaksjon.belop||0)-Math.abs(kandidat.belop||0))<1) {
    return {score:40, reason:"Likt beløp"};
  }
  return {score:0, reason:null};
}
function calculateOverforingDatoScore(transaksjon, kandidat) {
  if(!transaksjon.dato||!kandidat.dato) return {score:0, reason:null};
  const dagDiff = Math.round(Math.abs(new Date(transaksjon.dato)-new Date(kandidat.dato))/(1000*60*60*24));
  if(dagDiff===0) return {score:20, reason:"Samme dag"};
  if(dagDiff<=2)  return {score:10, reason:"Nærliggende dato"};
  return {score:0, reason:null};
}

// Finner kandidater for EN transaksjon blant alle andre. Ekskluderer
// transaksjoner som allerede er bekreftet som motpart i en annen
// overforing. Returnerer sortert, som findMatchingTransactions.
function finnInterneOverforingsKandidater(transaksjon, alleTransaksjoner) {
  if(!transaksjon || !alleTransaksjoner) return [];
  return alleTransaksjoner
    .filter(o=>o.id!==transaksjon.id && !o.motpartTransaksjonId)
    .map(o=>{
      const konto = calculateKontoUlikhet(transaksjon,o);
      const retning = calculateRetningMotsatt(transaksjon,o);
      if(!konto.oppfylt || !retning.oppfylt) return {transaction:o, score:0, reasons:[]};
      const belop = calculateOverforingBelopScore(transaksjon,o);
      const dato = calculateOverforingDatoScore(transaksjon,o);
      const score = 20+20+belop.score+dato.score; // 20+20 for de to oppfylte strukturelle kravene
      const reasons = [konto.reason, retning.reason, belop.reason, dato.reason].filter(Boolean);
      return {transaction:o, score, reasons};
    })
    .filter(k=>k.score>0)
    .sort((a,b)=>b.score-a.score);
}

// Ren funksjon: bekrefter en intern overforing mellom to transaksjoner.
// Symmetrisk — begge sider oppdateres likt, med gjensidig referanse
// (motpartTransaksjonId). Oppretter ALDRI Actual — interne overforinger
// skal aldri pavirke resultat, kostnad eller inntekt. Idempotent: aa
// kjore denne pa nytt med samme par gir samme sluttresultat, uansett
// hvor mange ganger.
function bekreftInternOverforing(prevTransaksjoner, transaksjonAId, transaksjonBId) {
  const naa = new Date().toISOString();
  return (prevTransaksjoner||[]).map(t=>{
    if(t.id===transaksjonAId) {
      return {...t, status:"behandlet", behandlingstype:"intern_overforing",
        motpartTransaksjonId:transaksjonBId, matchetMot:null, matchetNavn:null, updatedAt:naa};
    }
    if(t.id===transaksjonBId) {
      return {...t, status:"behandlet", behandlingstype:"intern_overforing",
        motpartTransaksjonId:transaksjonAId, matchetMot:null, matchetNavn:null, updatedAt:naa};
    }
    return t;
  });
}

// Ren funksjon: velger hvilken beskrivelse som skal vises for en
// kvitteringslinje/split. Brukerens egen beskrivelse vinner alltid over
// OCR-teksten. All visning i UI skal bruke denne — aldri description
// eller ocrDescription direkte.
function getDisplayDescription(line) {
  if(!line) return "";
  return line.description || line.ocrDescription || "";
}


function SpilleromScreen({liquidity, setLiquidity, budgetGroups, month, incomeMonths, incomeGroups}) {
  const [genStatus,setGenStatus] = useState(null);
  const [lastRun,setLastRun]     = useState(null);
  const [editPost,setEditPost]   = useState(null); // {id, ...post} for redigering

  // Kjor generatoren — alltid med funksjonell setLiquidity for fersk state
  const runGenerator = React.useCallback(() => {
    setLiquidity(prev => {
      const freshPosts = (prev && prev.posts) ? prev.posts : {};
      const mon = month!==undefined ? month : new Date().getMonth();
      const updatedPosts = generateForecastPosts(
        budgetGroups||[], freshPosts, mon, incomeMonths, incomeGroups
      );
      setLastRun(Date.now());
      const antall = Object.values(updatedPosts).filter(p=>p.kilde==="generator").length;
      setGenStatus({count:antall, ts:Date.now()});
      return {...prev, posts:updatedPosts};
    });
  }, [budgetGroups, incomeGroups, month, incomeMonths]);

  // Automatisk kjoring: kun naar budsjett/inntekter/metadata/maaned endres
  const budgetSig = JSON.stringify((budgetGroups||[]).map(g=>g.items.map(it=>({
    id:it.id, m:it.meta, b:it.months&&it.months[month]
  }))));
  const incomeSig = JSON.stringify((incomeGroups||[]).map(g=>g.items.map(it=>({
    id:it.id, m:it.meta, b:it.months&&it.months[month]
  }))));
  useEffect(() => {
    if(!budgetGroups || !budgetGroups.length) return;
    runGenerator();
  }, [budgetSig, incomeSig, month]);

  const {
    saldo        = 0,
    saldoUpdated = null,
    prognosisDate = (() => {
      // Standard: neste paydayDate (dag 20 i maaneden)
      const now = new Date();
      const lonnDay = 20;
      const candidate = new Date(now.getFullYear(), now.getMonth(), lonnDay);
      if(candidate <= now) candidate.setMonth(candidate.getMonth()+1);
      return candidate.toISOString().slice(0,10);
    })(),
    lonnDay      = 20,
    posts        = {},
  } = liquidity||{};

  const postList = Object.values(posts||{}).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const result   = calcSpillerom(saldo, postList, prognosisDate);

  // States
  const [editSaldo,setEditSaldo]         = useState(false);
  const [saldoInput,setSaldoInput]       = useState(String(saldo||""));
  const [editDate,setEditDate]           = useState(false);
  const [dateInput,setDateInput]         = useState(prognosisDate);
  const [showAddPost,setShowAddPost]     = useState(false);
  const [newPost,setNewPost]             = useState({name:"",amount:"",direction:"out",date:prognosisDate,type:"fast"});

  // Hjelpere
  const save = (patch) => setLiquidity(p=>({...p,...patch}));
  const fmt  = n => new Intl.NumberFormat("nb-NO",{style:"currency",currency:"NOK",maximumFractionDigits:0}).format(n);
  const fmtDate = d => d ? new Date(d).toLocaleDateString("nb-NO",{day:"numeric",month:"short"}) : "";
  const now = new Date();
  const saldoAge = saldoUpdated ? Math.round((Date.now()-saldoUpdated)/60000) : null;

  const saveSaldo = () => {
    const amt = parseFloat(saldoInput.replace(/\s/g,"").replace(",","."))||0;
    save({saldo:amt, saldoUpdated:Date.now()});
    setEditSaldo(false);
  };

  const saveDate = () => {
    save({prognosisDate:dateInput});
    setEditDate(false);
  };

  const addPost = () => {
    if(!newPost.name.trim()||!newPost.amount) return;
    const id = uid();
    const nyPost = {...newPost, id, amount:parseFloat(newPost.amount)||0, kilde:"manuell"};
    // Funksjonell update sikrer at vi ikke bruker stale posts
    setLiquidity(prev => ({...prev, posts:{...(prev.posts||{}), [id]:nyPost}}));
    setNewPost({name:"",amount:"",direction:"out",date:prognosisDate,type:"extra"});
    setShowAddPost(false);
  };

  const removePost = (id) => {
    setLiquidity(prev => {
      const next = {...(prev.posts||{})};
      delete next[id];
      return {...prev, posts:next};
    });
  };

  const saveEditPost = (id, felter) => {
    setLiquidity(prev => {
      const post = (prev.posts||{})[id];
      if(!post) return prev;
      const erGenerator = post.kilde === "generator";
      return {...prev, posts:{...prev.posts, [id]:{
        ...post, ...felter,
        // Marker som manuelt overstyrt hvis det er en generert post
        manueltOverstyrt: erGenerator ? true : post.manueltOverstyrt,
      }}};
    });
  };

  // UI-gruppering (kun for visning)
  const TYPE_LABELS = {inn:"Innbetalinger",fast:"Faste poster",variabel:"Budsjetterte variable",extra:"Ikke budsjettert",ukjent:"⚠️ Ukjent type (slett eller oppdater)"};

  const groupedPosts = {};
  const KNOWN_TYPES = ["inn","fast","variabel","extra"];
  postList.forEach(p=>{
    const raw = p.direction==="in"?"inn":(p.type||"extra");
    const g = KNOWN_TYPES.includes(raw) ? raw : "ukjent";
    if(!groupedPosts[g]) groupedPosts[g]=[];
    groupedPosts[g].push(p);
  });

    <div>
      <div style={{fontSize:20,fontWeight:600,color:P.ink,marginBottom:4}}>Spillerom</div>
      <div style={{fontSize:12,color:P.stone,marginBottom:16}}>Prognose frem til valgt dato</div>

        </div>
      </div>

      {/* ── Legg til post — skjema ── */}
      {showAddPost && (
        <Card style={{padding:"12px 14px",marginBottom:8}}>
          <div style={{fontSize:11,fontWeight:600,color:P.dust,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:10}}>
            Ny prognosepost
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <input value={newPost.name} onChange={e=>setNewPost(p=>({...p,name:e.target.value}))}
              placeholder="Navn (f.eks. Lonn, Boliglan, Barnetrygd)" autoComplete="off"
              style={{fontSize:14,background:P.sand,padding:"8px 10px",width:"100%",boxSizing:"border-box",borderRadius:8}}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div>
                <div style={{fontSize:11,color:P.stone,marginBottom:3}}>Belop</div>
                <input type="number" value={newPost.amount}
                  onChange={e=>setNewPost(p=>({...p,amount:e.target.value}))}
                  onFocus={e=>e.target.select()}
                  placeholder="0" style={{width:"100%",boxSizing:"border-box",fontSize:14,background:P.sand,padding:"7px 10px",borderRadius:8}}/>
              </div>
              <div>
                <div style={{fontSize:11,color:P.stone,marginBottom:3}}>Dato</div>
                <input type="date" value={newPost.date}
                  onChange={e=>setNewPost(p=>({...p,date:e.target.value}))}
                  style={{width:"100%",boxSizing:"border-box",fontSize:13,background:P.sand,padding:"7px 6px",borderRadius:8}}/>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div>
                <div style={{fontSize:11,color:P.stone,marginBottom:3}}>Retning</div>

              <div>
                <div style={{fontSize:11,color:P.stone,marginBottom:3}}>Type</div>
                <select value={newPost.type} onChange={e=>setNewPost(p=>({...p,type:e.target.value}))}

                color:newPost.name.trim()&&newPost.amount?"white":P.dust,border:"none",
                borderRadius:8,fontSize:13,cursor:"pointer",fontWeight:600}}>
              Legg til

          </div>

      {/* ── Saldo ── */}

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
          <div style={{fontSize:11,fontWeight:600,color:P.dust,textTransform:"uppercase",letterSpacing:"0.07em"}}>Saldo nå</div>
          {saldoAge!==null && (
            <span style={{fontSize:10,color:P.hazelL}}>
              oppdatert {saldoAge<60?`${saldoAge} min siden`:`${Math.round(saldoAge/60)} t siden`}
            </span>
          )}
        </div>
        {editSaldo ? (
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <input type="number" value={saldoInput} onChange={e=>setSaldoInput(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&saveSaldo()}
              onFocus={e=>e.target.select()}

              style={{flex:1,fontSize:20,fontWeight:600,background:P.sand,padding:"6px 10px",

              style={{background:P.hazel,color:"white",border:"none",borderRadius:8,
                padding:"8px 14px",fontSize:13,cursor:"pointer",fontWeight:600}}>Lagre</button>

        ) : (

            <span style={{fontSize:26,fontWeight:700,color:P.ink,letterSpacing:"-0.02em"}}>{fmt(saldo)}</span>
            <span style={{fontSize:12,color:P.hazel,fontWeight:500}}>Oppdater</span>

        )}

      {/* ── Spillerom-resultat ── */}

        border:`1px solid ${isPositive?P.oliveL:P.clayL}`,borderRadius:12,marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:600,color:isPositive?P.olive:P.clay,
          textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>
          {isPositive?"✓ Fritt spillerom":"⚠️ Underskudd"}
        </div>
        <div style={{fontSize:36,fontWeight:700,color:isPositive?P.olive:P.clay,
          letterSpacing:"-0.03em",marginBottom:12}}>

        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div style={{background:"rgba(255,255,255,0.5)",borderRadius:8,padding:"8px 10px"}}>
            <div style={{fontSize:10,color:P.stone,marginBottom:2}}>Innbetalinger</div>
            <div style={{fontSize:14,fontWeight:600,color:P.olive}}>+{fmt(result.innbetalinger)}</div>

          <div style={{background:"rgba(255,255,255,0.5)",borderRadius:8,padding:"8px 10px"}}>
            <div style={{fontSize:10,color:P.stone,marginBottom:2}}>Utbetalinger</div>
            <div style={{fontSize:14,fontWeight:600,color:P.clay}}>-{fmt(result.utbetalinger)}</div>

                  amount:parseFloat(String(editPost.amount))||0,
                  date:editPost.date,direction:editPost.direction,type:editPost.type});
                setEditPost(null);
              }} style={{flex:2,padding:"10px",background:P.hazel,color:"white",border:"none",
                borderRadius:9,fontSize:13,cursor:"pointer",fontWeight:600}}>Lagre</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

function AddItemRow({onAdd,color}) {
  const [n,setN]=useState(""); const [b,setB]=useState(""); const [s,setS]=useState("");
  const go=()=>{if(!n.trim())return;onAdd(n,b,s);setN("");setB("");setS("");};
  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 68px 68px 30px",gap:5,marginTop:9,alignItems:"center"}}>
      <input value={n} onChange={e=>setN(e.target.value)} placeholder="Ny post…" style={{fontSize:11,background:P.sand}}/>
      <input type="number" value={b} onChange={e=>setB(e.target.value)} placeholder="Budsjett" style={{fontSize:11,textAlign:"right",background:P.sand}}/>
      <input type="number" value={s} onChange={e=>setS(e.target.value)} placeholder="Faktisk" style={{fontSize:11,textAlign:"right",background:P.sand}}/>
      <button onClick={go} style={{background:color||P.hazel,color:"white",border:"none",borderRadius:7,padding:"5px",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>＋</button>
    </div>
  );
}

// ── BudsjettScreen ────────────────────────────────────────────────
function BudsjettScreen({budgetGroups,setBudgetGroups,actual,transaksjoner,month,setMonth}) {
  const monthKey = "2026-"+String(month+1).padStart(2,"0");
  const gyldigeTransIds = new Set((transaksjoner||[]).map(t=>t.id));
  const actualTotals = calculateActualTotals(actual, monthKey, gyldigeTransIds);
  const [expanded,setExpanded]   = useState(null);
  const [metaModal,setMetaModal] = useState(null);

  const gBudget = (g,m) => g.items.reduce((s,i)=>s+((i.months&&i.months[m]?i.months[m].budget:0)||0),0);
  const gSpent  = (g,m) => g.items.reduce((s,i)=>s+(actualTotals[i.id]!==undefined?actualTotals[i.id]:((i.months&&i.months[m]?i.months[m].spent:0)||0)),0);

  const updItem = (gid,iid,f,v) => setBudgetGroups(p=>p.map(g=>g.id!==gid?g:{
    ...g, items:g.items.map(it=>it.id!==iid?it:{
      ...it, months:it.months.map((mo,mi)=>mi!==month?mo:{...mo,[f]:parseFloat(v)||0})
    })
  }));
  const addItem = (gid,n,b,s) => {
    setBudgetGroups(p=>p.map(g=>g.id!==gid?g:{
    ...g, items:[...g.items,{id:uid(),name:n,months:Array.from({length:12},(_,mi)=>({
      budget:mi===month?parseFloat(b)||0:0,
      spent: mi===month?parseFloat(s)||0:0
    }))}]
  }));;
  };

  const delItem = (gid,iid) => setBudgetGroups(p=>p.map(g=>g.id!==gid?g:{
    ...g, items:g.items.filter(it=>it.id!==iid)
  }));
  const saveMeta = (gid,iid,meta) => setBudgetGroups(p=>p.map(g=>g.id!==gid?g:{
    ...g, items:g.items.map(it=>it.id!==iid?it:{...it,meta})
  }));

  function GRow({g,edit}) {
    const gb=gBudget(g,month), gs=gSpent(g,month), over=isOver(gs,gb), open=expanded===g.id;
    return (
      <div>
        <Card onClick={()=>setExpanded(open?null:g.id)} accent={g.color}
          style={{cursor:"pointer",borderRadius:open?"11px 11px 0 0":11,
            marginBottom:open?0:undefined,borderBottom:open?"none":undefined,padding:"10px 14px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <IBox emoji={GROUP_EMOJI[g.id]||"📁"} color={g.color} size={34}/>
            <div style={{flex:1}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:5}}>
                <span style={{fontSize:13,fontWeight:600,color:P.ink}}>{g.label}</span>
                <div>
                  <span style={{fontSize:12,fontWeight:500,color:over?P.clay:P.ink}}>{fmt(gs)}</span>
                  <span style={{fontSize:10.5,color:P.dust}}> / {fmt(gb)}</span>
                  {over && <span style={{marginLeft:4,fontSize:10,color:P.clay,fontWeight:600}}>↑</span>}
                </div>
              </div>
              <Bar value={gs} max={gb||1} color={g.color} h={3} over={over}/>
            </div>
            <Em e={open?"▴":"▾"} s={{color:P.dust,fontSize:13,marginLeft:6}}/>
          </div>
        </Card>
        {open && (
          <div style={{border:`1px solid ${P.border}`,borderTop:"none",borderRadius:"0 0 11px 11px",
            background:P.linen,padding:"6px 14px 12px",marginBottom:6}}>
            {edit && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 68px 68px 30px",gap:5,
                padding:"4px 0 7px",borderBottom:`1px solid ${P.border}`,marginBottom:4}}>
                <span style={{fontSize:10,color:P.dust}}>Post</span>
                <span style={{fontSize:10,color:P.dust,textAlign:"right"}}>Budsjett</span>
                <span style={{fontSize:10,color:P.dust,textAlign:"right"}}>Faktisk</span>
                <span/>
              </div>
            )}
            {g.items.map((it,idx) => {
              const mo=it.months[month];
              const faktiskBelop = actualTotals[it.id]!==undefined ? Math.round(actualTotals[it.id]) : mo.spent;
              const o=isOver(faktiskBelop,mo.budget);
              return (
                <div key={it.id} style={{padding:"6px 0",borderBottom:idx<g.items.length-1?`1px solid ${P.border}`:"none"}}>
                  {edit ? (
                    <div style={{display:"grid",gridTemplateColumns:"1fr 68px 68px 30px",gap:5,alignItems:"center"}}>
                      <div style={{display:"flex",alignItems:"center",gap:4,minWidth:0}}>
                        <span style={{fontSize:12,color:o?P.clay:P.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{it.name}</span>
                        {it.meta&&it.meta.automatisk && (
                          <span title="Automatisk til prognose" style={{fontSize:13,color:P.gold,flexShrink:0}}>⚡</span>
                        )}
                        <button onClick={()=>setMetaModal({item:it,groupId:g.id})}
                          style={{background:it.meta?P.hazelXL:P.mist,border:it.meta?"1px solid "+P.hazelL:"1px solid "+P.border,
                            borderRadius:5,cursor:"pointer",fontSize:9,padding:"2px 5px",
                            color:it.meta?P.hazel:P.dust,whiteSpace:"nowrap",flexShrink:0}}>
                          {it.meta?"✓":"+"}
                        </button>
                      </div>
                      <InlineNum key={"b-"+it.id+"-"+month}
                        value={mo.budget}
                        onChange={v=>updItem(g.id,it.id,"budget",v)}/>
                      <InlineNum key={"s-"+it.id+"-"+month}
                        value={faktiskBelop}
                        onChange={v=>updItem(g.id,it.id,"spent",v)}
                        colorStyle={{color:o?P.clay:"inherit"}}/>
                      <button onClick={()=>delItem(g.id,it.id)} style={{background:"none",border:"none",cursor:"pointer",color:P.dust,fontSize:12,padding:2,opacity:.5}}>🗑️</button>
                    </div>
                  ) : (
                    <div onClick={()=>setMetaModal({item:it,groupId:g.id})} style={{cursor:"pointer"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:2}}>
                        <div style={{flex:1,minWidth:0}}>
                          <span style={{fontSize:12,color:P.stone}}>{it.name}</span>
                          {it.meta&&it.meta.automatisk && (
                            <span title="Automatisk til prognose" style={{fontSize:12,color:P.gold,marginLeft:2}}>⚡</span>
                          )}
                          {it.meta&&it.meta.eier&&it.meta.eier!=="Felles" && (
                            <span style={{fontSize:9,color:P.hazelL,background:P.mist,borderRadius:3,padding:"0 3px",marginLeft:2}}>{it.meta.eier}</span>
                          )}
                        </div>
                        <div>
                          <span style={{fontSize:12,fontWeight:500,color:o?P.clay:P.ink}}>{fmt(faktiskBelop)}</span>
                          <span style={{fontSize:10.5,color:P.dust}}> / {fmt(mo.budget)}</span>
                        </div>
                      </div>
                      {mo.budget>0 && <Bar value={faktiskBelop} max={mo.budget} color={g.color} h={2.5} over={o}/>}
                    </div>
                  )}
                </div>
              );
            })}
            {edit && <AddItemRow onAdd={(n,b,s)=>addItem(g.id,n,b,s)} color={g.color}/>}
          </div>
        )}
      </div>
    );
  }

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:600,color:P.ink}}>📅 {MONTHS[month]} 2026</div>
        <select value={month} onChange={e=>setMonth(+e.target.value)}
          style={{fontSize:12,background:P.mist,border:`1px solid ${P.border}`,
            borderRadius:8,padding:"6px 10px",color:P.ink,fontWeight:500}}>
          {MONTHS.map((m,i)=><option key={i} value={i}>{m} 2026</option>)}
        </select>
      </div>
      <div style={{fontSize:12,color:P.stone,marginBottom:8}}>ℹ️ Trykk for å redigere {MONTHS[month].toLowerCase()}-tallene. Trykk på et navn for å sette v2-metadata.</div>
      {budgetGroups.map(g=><GRow key={g.id} g={g} edit={true}/>)}
                        {metaModal && (
        <BudsjettMetaModal
          item={metaModal.item}
          groupId={metaModal.groupId}
          onSave={saveMeta}
          onClose={()=>setMetaModal(null)}
        />
      )}
    </div>
  );
}

// ── InntekterScreen ───────────────────────────────────────────────
function InntekterScreen({incomeGroups,setIncomeGroups,actual,transaksjoner,month,setMonth}) {
  const monthKey = "2026-"+String(month+1).padStart(2,"0");
  const gyldigeTransIds = new Set((transaksjoner||[]).map(t=>t.id));
  const actualTotals = calculateActualTotals(actual, monthKey, gyldigeTransIds);
  const [expanded,setExpanded]   = useState(null);
  const [metaModal,setMetaModal] = useState(null);

  const gBudget = (g) => g.items.reduce((s,i)=>s+((i.months&&i.months[month]?i.months[month].budget:0)||0),0);
  const gSpent  = (g) => g.items.reduce((s,i)=>s+(actualTotals[i.id]!==undefined?actualTotals[i.id]:((i.months&&i.months[month]?i.months[month].spent:0)||0)),0);

  const updItem = (gid,iid,f,v) => setIncomeGroups(p=>p.map(g=>g.id!==gid?g:{
    ...g, items:g.items.map(it=>it.id!==iid?it:{
      ...it, months:it.months.map((mo,mi)=>mi!==month?mo:{...mo,[f]:parseFloat(v)||0})
    })
  }));
  const addItem = (gid,n,b,s) => setIncomeGroups(p=>p.map(g=>g.id!==gid?g:{
    ...g, items:[...g.items,{id:uid(),name:n,months:Array.from({length:12},(_,mi)=>({
      budget:mi===month?parseFloat(b)||0:0,
      spent: mi===month?parseFloat(s)||0:0
    })),meta:null}]
  }));
  const delItem = (gid,iid) => setIncomeGroups(p=>p.map(g=>g.id!==gid?g:{
    ...g, items:g.items.filter(it=>it.id!==iid)
  }));
  const saveMeta = (gid,iid,meta) => setIncomeGroups(p=>p.map(g=>g.id!==gid?g:{
    ...g, items:g.items.map(it=>it.id!==iid?it:{...it,meta})
  }));

  const totalBudget = (incomeGroups||[]).reduce((s,g)=>s+gBudget(g),0);
  const totalSpent  = (incomeGroups||[]).reduce((s,g)=>s+gSpent(g),0);

  function GRow({g}) {
    const gb=gBudget(g), gs=gSpent(g), open=expanded===g.id;
    return (
      <div>
        <Card onClick={()=>setExpanded(open?null:g.id)} accent={g.color}
          style={{cursor:"pointer",borderRadius:open?"11px 11px 0 0":11,
            marginBottom:open?0:undefined,borderBottom:open?"none":undefined,padding:"10px 14px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <IBox emoji={INCOME_GROUP_EMOJI[g.id]||"📋"} color={g.color} size={34}/>
            <div style={{flex:1}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:5}}>
                <span style={{fontSize:13,fontWeight:600,color:P.ink}}>{g.label}</span>
                <div>
                  <span style={{fontSize:12,fontWeight:500,color:P.olive}}>{fmt(gs)}</span>
                  <span style={{fontSize:10.5,color:P.dust}}> / {fmt(gb)}</span>
                </div>
              </div>
              <Bar value={gs} max={gb||1} color={g.color} h={3}/>
            </div>
            <Em e={open?"▴":"▾"} s={{color:P.dust,fontSize:13,marginLeft:6}}/>
          </div>
        </Card>
        {open && (
          <div style={{border:"1px solid "+P.border,borderTop:"none",borderRadius:"0 0 11px 11px",
            background:P.linen,padding:"6px 14px 12px",marginBottom:6}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 68px 68px 30px",gap:5,
              padding:"4px 0 7px",borderBottom:"1px solid "+P.border,marginBottom:4}}>
              <span style={{fontSize:10,color:P.dust}}>Post</span>
              <span style={{fontSize:10,color:P.dust,textAlign:"right"}}>Budsjett</span>
              <span style={{fontSize:10,color:P.dust,textAlign:"right"}}>Faktisk</span>
              <span/>
            </div>
            {g.items.map((it,idx) => {
              const mo = (it.months&&it.months[month]) ? it.months[month] : {budget:0,spent:0};
              return (
                <div key={it.id} style={{padding:"6px 0",borderBottom:idx<g.items.length-1?"1px solid "+P.border:"none"}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 68px 68px 30px",gap:5,alignItems:"center"}}>
                    <div style={{display:"flex",alignItems:"center",gap:4,minWidth:0}}>
                      <span style={{fontSize:12,color:P.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{it.name}</span>
                      {it.meta&&it.meta.automatisk && (
                        <span title="Automatisk til prognose" style={{fontSize:13,color:P.gold,flexShrink:0}}>⚡</span>
                      )}
                      <button onClick={()=>setMetaModal({item:it,groupId:g.id})}
                        style={{background:it.meta?P.hazelXL:P.mist,
                          border:"1px solid "+(it.meta?P.hazelL:P.border),
                          borderRadius:5,cursor:"pointer",fontSize:9,padding:"2px 5px",
                          color:it.meta?P.hazel:P.dust,whiteSpace:"nowrap",flexShrink:0}}>
                        {it.meta?"✓":"+"}
                      </button>
                    </div>
                    <InlineNum key={"ib-"+it.id+"-"+month}
                      value={mo.budget}
                      onChange={v=>updItem(g.id,it.id,"budget",v)}
                      colorStyle={{color:P.olive}}/>
                    <InlineNum key={"is-"+it.id+"-"+month}
                      value={actualTotals[it.id]!==undefined ? Math.round(actualTotals[it.id]) : mo.spent}
                      onChange={v=>updItem(g.id,it.id,"spent",v)}
                      colorStyle={{color:P.olive,fontWeight:600}}/>
                    <button onClick={()=>delItem(g.id,it.id)}
                      style={{background:"none",border:"none",cursor:"pointer",color:P.dust,fontSize:12,padding:2,opacity:.5}}>🗑️</button>
                  </div>
                </div>
              );
            })}
            <AddItemRow onAdd={(n,b,s)=>addItem(g.id,n,b,s)} color={g.color}/>
          </div>
        )}
      </div>
    );
  }

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:600,color:P.ink}}>📅 {MONTHS[month]} 2026</div>
        <select value={month} onChange={e=>setMonth(+e.target.value)}
          style={{fontSize:12,background:P.mist,border:"1px solid "+P.border,
            borderRadius:8,padding:"6px 10px",color:P.ink,fontWeight:500}}>
          {MONTHS.map((m,i)=><option key={i} value={i}>{m} 2026</option>)}
        </select>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        <Card style={{padding:"12px 14px"}}>
          <div style={{fontSize:10,color:P.dust,marginBottom:3}}>↑ Budsjettert</div>
          <div style={{fontSize:19,fontWeight:600,color:P.olive}}>{fmt(totalBudget)}</div>
        </Card>
        <Card style={{padding:"12px 14px"}}>
          <div style={{fontSize:10,color:P.dust,marginBottom:3}}>↑ Faktisk</div>
          <div style={{fontSize:19,fontWeight:600,color:totalSpent>0?P.olive:P.stone}}>{fmt(totalSpent)}</div>
        </Card>
      </div>
      {(incomeGroups||[]).map(g=><GRow key={g.id} g={g}/>)}
      {metaModal && (
        <InntekterMetaModal
          item={metaModal.item}
          groupId={metaModal.groupId}
          onSave={saveMeta}
          onClose={()=>setMetaModal(null)}/>
      )}
    </div>
  );
}
