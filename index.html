// ── AddToPlanCard (pkt 2+6) ───────────────────────────────────────
function AddToPlanCard({recipe,meals,nextMeals,setMeals,setNextWeekMeals,onPickIngredients}) {
  const todayIdx = (new Date().getDay()+6)%7;
  const [week,setWeek] = useState("this"); // "this"|"next"
  const currentMeals = week==="this" ? meals : (nextMeals||{});
  const alreadyPlanned = Object.values(currentMeals||{}).some(m=>getMealName(m).toLowerCase()===(recipe.name||"").toLowerCase());

  return (
    <Card style={{marginBottom:12,padding:"10px 14px"}}>
      <div style={{fontSize:12,fontWeight:600,color:P.stone,marginBottom:8}}>📅 Legg til i middagsplanen</div>

      {/* Ukevalg */}
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        {[{id:"this",label:"Denne uken"},{id:"next",label:"Neste uke"}].map(w=>(
          <button key={w.id} onClick={()=>setWeek(w.id)} style={{
            flex:1,padding:"5px 8px",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:500,
            background:week===w.id?P.hazel:P.mist,
            color:week===w.id?"white":P.stone,
            border:`1px solid ${week===w.id?P.hazel:P.border}`}}>
            {w.label}
          </button>
        ))}
      </div>

      {alreadyPlanned && (
        <div style={{fontSize:11,color:P.clay,background:P.clayXL,border:`1px solid ${P.clayL}`,borderRadius:7,padding:"5px 9px",marginBottom:8}}>
          ⚠️ Allerede planlagt {week==="this"?"denne":"neste"} uke
        </div>
      )}

      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {DAYS.map((d,i) => {
          const isThisRecipe = getMealName(currentMeals[d]).toLowerCase()===(recipe.name||"").toLowerCase();
          const hasOther = !!currentMeals[d]&&!isThisRecipe;
          if(hasOther) return null;
          const isPast = week==="this" && i<todayIdx;
          return (
            <button key={d}
              onClick={()=>{
                const mealObj={type:"recipe",name:recipe.name,recipeId:recipe.id};
                if(week==="this") setMeals(p=>({...p,[d]:mealObj}));
                else setNextWeekMeals(p=>({...p,[d]:mealObj}));
                onPickIngredients();
              }}
              style={{padding:"5px 12px",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:500,
                background:isThisRecipe?P.olive:isPast?P.mist:P.hazelXL,
                color:isThisRecipe?"white":isPast?P.hazelL:P.hazel,
                border:`1px solid ${isThisRecipe?P.olive:isPast?P.border:P.hazelL}`,
                opacity:isPast?0.5:1}}>
              {DAY_S[d]}{isThisRecipe?" ✓":""}{isPast?" (passert)":""}
            </button>
          );
        })}
      </div>
    </Card>
  );
}


// ── RecipeIngredients — detaljvisning med skalering ──────────────
function RecipeIngredients({recipe, freezer}) {
  const r = recipe || {};
  const base = r.servings || 0;
  const [scale,setScale] = useState(base || 1);

  const scaleAmt = (amtStr) => {
    if(!amtStr || base===0) return amtStr||"";
    const num = parseFloat(String(amtStr));
    if(isNaN(num)) return amtStr;
    const scaled = Math.round(num*(scale/base)*100)/100;
    return String(amtStr).replace(/^[\d.,]+/, String(scaled));
  };

  const hasGroups = r.ingredientGroups && r.ingredientGroups.length>0;
  const flatIngs  = hasGroups ? [] : (r.ingredients||[]);
  const groups    = hasGroups ? r.ingredientGroups : [];

  const IngRow = ({ing}) => {
    const inFreezer = (freezer||[]).find(f=>f.name.toLowerCase()===ing.name.toLowerCase());
    const freezerLabel = inFreezer ? (() => {
      const batches = inFreezer.batches||[];
      const totalG = batches.reduce((s,b)=>b.gramsPerUnit?s+b.count*b.gramsPerUnit:s,0);
      if(totalG>0) return `❄️ ${totalG} g i fryseren`;
      const totalCount = batches.reduce((s,b)=>s+b.count,0);
      const unit = (batches[0]&&batches[0].unit)||"stk";
      return totalCount>0?`❄️ ${totalCount} ${unit}`:"❄️ har i fryseren";
    })() : null;
    return (
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:`1px solid ${P.border}`}}>
        <div style={{width:7,height:7,borderRadius:"50%",background:CAT_COLOR[ing.cat]||P.hazel,flexShrink:0}}/>
        <span style={{flex:1,fontSize:13,fontWeight:500,color:P.ink}}>{ing.name||""}</span>
        {freezerLabel && (
          <span style={{fontSize:10,color:"#4A8BBF",background:"#EBF5FF",borderRadius:5,
            padding:"1px 6px",fontWeight:500,flexShrink:0}}>
            {freezerLabel}
          </span>
        )}
        <span style={{fontSize:12,color:P.stone}}>{scaleAmt(ing.amount)}</span>
      </div>
    );
  };

  if(!hasGroups && flatIngs.length===0) return null;

  return (
    <Card style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <SL style={{marginBottom:0}}>Ingredienser</SL>
        {base>0 && (
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <button onClick={()=>setScale(s=>Math.max(1,s-1))}
              style={{width:26,height:26,borderRadius:7,background:P.mist,border:`1px solid ${P.border}`,cursor:"pointer",fontSize:16,fontWeight:600,color:P.stone,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>−</button>
            <span style={{fontSize:12,color:P.ink,minWidth:56,textAlign:"center"}}>{scale} pers</span>
            <button onClick={()=>setScale(s=>s+1)}
              style={{width:26,height:26,borderRadius:7,background:P.mist,border:`1px solid ${P.border}`,cursor:"pointer",fontSize:16,fontWeight:600,color:P.stone,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>＋</button>
          </div>
        )}
      </div>
      {hasGroups
        ? groups.map((g,gi)=>(
            <div key={g.id||gi} style={{marginBottom:gi<groups.length-1?14:0}}>
              <div style={{fontSize:11,fontWeight:600,color:P.dust,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4,marginTop:gi>0?4:0}}>{g.name||"Ingredienser"}</div>
              {(g.ingredients||[]).map((ing,i)=><IngRow key={i} ing={ing}/>)}
            </div>
          ))
        : flatIngs.map((ing,i)=><IngRow key={i} ing={ing}/>)
      }
    </Card>
  );
}

// ── Recipes Screen ────────────────────────────────────────────────
function RecipesScreen({recipes,setRecipes,meals,setMeals,nextMeals,setNextWeekMeals,setShopping,freezer}) {
  const [sel,setSel]         = useState(null);
  const [showAdd,setShowAdd]   = useState(false);  // ny enkel flyt
  const [showForm,setShowForm] = useState(false);  // avansert redigering
  const [editRecipe,setEditRecipe] = useState(null);
  const [filter,setFilter]   = useState("Alle");
  const [search,setSearch]   = useState("");
  const cats = ["Alle","Middag","Frokost","Lunsj","Dessert","Snacks"];
  const visible = recipes.filter(r=>filter==="Alle"||r.cat===filter).filter(r=>!search||r.name.toLowerCase().includes(search.toLowerCase())||(r.tags||[]).some(t=>t.toLowerCase().includes(search.toLowerCase())));

  const normalise = (data) => ({
    name: data.name||"Uten navn",
    cat: data.cat||"Middag",
    tags: data.tags||[],
    ingredients: data.ingredients||[],
    time: data.time||0,
    servings: data.servings||0,
    url: data.url||"",
    imageUrl: data.imageUrl||null,
    source: data.source||"manual",
    ...data,
  });

  const saveRecipe = (data) => {
    const now = Date.now();
    const safe = normalise(data);
    if(editRecipe) {
      setRecipes(p=>p.map(r=>r.id===editRecipe.id?{...r,...safe,updatedAt:now}:r));
    } else {
      setRecipes(p=>[...p,{id:uid(),...safe,createdAt:now}]);
    }
    setEditRecipe(null);
  };

  const logEvent = async (type, meta={}) => {
    try {
      await dbSet(`${FAM}/events/${Date.now()}_${uid()}`, {type, meta, ts:Date.now()});
    } catch(e) {}
  };

  React.useEffect(()=>{ window.__openRecipe = (id)=>setSel(id); return ()=>{ window.__openRecipe=null; }; },[]);
  React.useEffect(()=>{ _globalRecipes = recipes; },[recipes]);
  if(sel) {
    const r = recipes.find(x=>x.id===sel);
    if(!r){setSel(null);return null;}
    return (
      <div>
        <button onClick={()=>setSel(null)} style={{display:"flex",alignItems:"center",gap:5,fontSize:12.5,color:P.hazel,marginBottom:16,background:"none",border:"none",cursor:"pointer",padding:0,fontWeight:500}}>← Tilbake</button>
        <div style={{fontSize:20,fontWeight:600,color:P.ink,marginBottom:8}}>{r.name}</div>
        <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
          <Chip color={P.olive}>⏱ {r.time} min</Chip>
          <Chip color={P.dusk}>👥 {r.servings} pers</Chip>
          <Chip color={P.hazel}>{r.cat}</Chip>
          {(r.tags||[]).map(t=><Chip key={t} color={P.hazelL}>{t}</Chip>)}
        </div>
        {r.imageUrl && (
          <img src={r.imageUrl} alt={r.name} style={{width:"100%",borderRadius:10,marginBottom:12,maxHeight:200,objectFit:"cover",border:`1px solid ${P.border}`}}/>
        )}
        {r.url && <a href={r.url} target="_blank" rel="noreferrer" style={{fontSize:12,color:P.dusk,display:"block",marginBottom:12}}>↗ Originaloppskrift</a>}

        <AddToPlanCard recipe={r} meals={meals} nextMeals={nextMeals} setMeals={setMeals} setNextWeekMeals={setNextWeekMeals} onPickIngredients={()=>{}}/>

        <RecipeIngredients recipe={r} freezer={freezer||[]}/>
        {r.instructions && (
          <Card style={{marginBottom:12}}>
            <div style={{fontSize:10.5,fontWeight:600,color:P.dust,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Fremgangsmåte</div>
            <div style={{fontSize:13,color:P.ink,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{r.instructions}</div>
          </Card>
        )}
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>{setEditRecipe(r);setShowForm(true);}} style={{flex:1,padding:"10px",background:P.hazelXL,color:P.hazel,border:`1px solid ${P.hazelL}`,borderRadius:9,fontSize:13,cursor:"pointer",fontWeight:500}}>✏️ Rediger</button>
          <button onClick={()=>{setRecipes(p=>p.filter(x=>x.id!==r.id));setSel(null);}} style={{flex:1,padding:"10px",background:P.clayXL,color:P.clay,border:`1px solid ${P.clayL}`,borderRadius:9,fontSize:13,cursor:"pointer",fontWeight:500}}>🗑️ Slett</button>
        </div>
        {showForm && <RecipeForm initial={editRecipe} onSave={saveRecipe} onClose={()=>{setShowForm(false);setEditRecipe(null);}}/>}
      </div>
    );
  }

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div>
          <div style={{fontSize:20,fontWeight:600,color:P.ink}}>Kokebok</div>
          <div style={{fontSize:12,color:P.stone,marginTop:2}}>🍳 {recipes.length} oppskrifter</div>
        </div>
        <button onClick={()=>setShowAdd(true)} style={{background:P.hazel,color:"white",border:"none",borderRadius:9,padding:"8px 14px",fontSize:12.5,cursor:"pointer",fontWeight:600}}>＋ Legg til</button>
      </div>
      <div style={{position:"relative",marginBottom:12}}>
        <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:14,color:P.dust}}>🔍</span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Søk i kokebok…"
          style={{width:"100%",boxSizing:"border-box",paddingLeft:32,fontSize:13,background:P.mist,border:`1px solid ${P.border}`,borderRadius:9,color:P.ink}}/>
        {search && <button onClick={()=>setSearch("")} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:P.dust,fontSize:14}}>✕</button>}
      </div>
      <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:2}}>
        {cats.map(c=><Pill key={c} active={filter===c} onClick={()=>setFilter(c)}>{c}</Pill>)}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {visible.length===0 && recipes.length===0 && (
          <div style={{textAlign:"center",padding:"32px 16px",background:P.linen,borderRadius:12,border:`1px solid ${P.border}`}}>
            <div style={{fontSize:32,marginBottom:12}}>📖</div>
            <div style={{fontSize:15,fontWeight:600,color:P.ink,marginBottom:6}}>Kokeboken er tom</div>
            <div style={{fontSize:13,color:P.stone,marginBottom:16,lineHeight:1.6}}>
              Start med en rett du lager ofte.<br/>Skriv navn + ingredienser — ferdig på 15 sekunder.
            </div>
            <button onClick={()=>setShowAdd(true)} style={{background:P.hazel,color:"white",border:"none",borderRadius:9,padding:"10px 20px",fontSize:13,cursor:"pointer",fontWeight:600}}>
              ⚡ Legg inn første oppskrift
            </button>
          </div>
        )}
        {visible.length===0 && recipes.length>0 && (
          <div style={{textAlign:"center",padding:"32px 0",color:P.dust,fontSize:13}}>Ingen oppskrifter matcher søket</div>
        )}
        {visible.map(r => (
          <Card key={r.id} onClick={()=>setSel(r.id)} accent={CAT_COLOR[((r.ingredients||[])[0]&&(r.ingredients||[])[0].cat)]||P.hazel} style={{cursor:"pointer",padding:"10px 14px"}}>
            <div style={{display:"flex",alignItems:"center",gap:11}}>
              <IBox emoji="🍳" color={P.dusk} size={38}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13.5,fontWeight:600,color:P.ink}}>{r.name}</div>
                <div style={{fontSize:11,color:P.dust,marginTop:2}}>⏱ {r.time} min · 👥 {r.servings} pers · {r.cat}</div>
              </div>

            </div>
          </Card>
        ))}
      </div>
      {showAdd && <AddRecipeModal onSave={saveRecipe} onClose={()=>setShowAdd(false)} logEvent={logEvent}/>}

  );
}

// ── Shopping Screen ───────────────────────────────────────────────
function ShoppingScreen({shopping,setShopping,itemHistory}) {
  const [newItem,setNewItem] = useState("");
  const [newAmt,setNewAmt]   = useState("");
  const [newCat,setNewCat]   = useState("Diverse");
  const [showDone,setShowDone] = useState(false);

  const [editingId,setEditingId] = useState(null);

  const pending  = shopping.filter(i=>!i.done);
  const done     = shopping.filter(i=>i.done);
  const catOrder = [...new Set(pending.map(i=>i.cat))];
  const toggle   = id => { setShopping(p=>p.map(i=>i.id===id?{...i,done:!i.done}:i)); if(editingId===id) setEditingId(null); };
  const remove   = id => { setShopping(p=>p.filter(i=>i.id!==id)); if(editingId===id) setEditingId(null); };
  const clearDone = () => setShopping(p=>p.filter(i=>!i.done));
  const updateItem = (id, field, val) => setShopping(p=>p.map(i=>i.id===id?{...i,[field]:val}:i));
  const add = () => {
    if(!newItem.trim()) return;
    setShopping(p=>[...p,{id:uid(),name:newItem.trim(),amount:newAmt.trim(),cat:newCat,done:false}]);
    setNewItem(""); setNewAmt("");
  };

  const suggestions = newItem.length>1
    ? (itemHistory||[]).filter(h=>h.name.toLowerCase().includes(newItem.toLowerCase())&&!shopping.some(s=>s.name.toLowerCase()===h.name.toLowerCase())).slice(0,5)
    : [];

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div>
          <div style={{fontSize:20,fontWeight:600,color:P.ink}}>Handleliste</div>
          <div style={{fontSize:12,color:P.stone,marginTop:2}}>✓ {done.length} fullført · ⏱ {pending.length} gjenstaar</div>
        </div>
        {done.length>0 && <button onClick={clearDone} style={{fontSize:11.5,color:P.clay,background:P.clayXL,border:`1px solid ${P.clayL}`,padding:"5px 10px",borderRadius:7,cursor:"pointer",fontWeight:500}}>🗑️ Fjern fullførte</button>}
      </div>

      {shopping.length>0 && (
        <div style={{marginBottom:14}}>
          <Bar value={done.length} max={shopping.length} color={P.olive} h={3}/>
          <div style={{display:"flex",justifyContent:"flex-end",marginTop:4}}>
            <span style={{fontSize:10.5,color:P.dust}}>{Math.round(done.length/shopping.length*100)}% ferdig</span>
          </div>
        </div>
      )}

      <div style={{marginBottom:14}}>
        <div style={{background:P.mist,padding:"8px",borderRadius:suggestions.length>0?"10px 10px 0 0":10,border:`1px solid ${P.border}`,display:"flex",gap:6,alignItems:"center"}}>
          <Em e="＋" s={{fontSize:15,color:P.dust,flexShrink:0}}/>
          <input value={newItem} onChange={e=>setNewItem(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} autoComplete="off" placeholder="Hva trenger du?" style={{flex:2,fontSize:13,background:"transparent",border:"none",outline:"none",color:P.ink,padding:"0 2px"}}/>
          <input value={newAmt} onChange={e=>setNewAmt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} autoComplete="off" placeholder="Mengde" style={{width:65,fontSize:12,background:"transparent",border:"none",outline:"none",color:P.stone,borderLeft:`1px solid ${P.border}`,paddingLeft:8}}/>
          <select value={newCat} onChange={e=>setNewCat(e.target.value)} style={{fontSize:11,background:"transparent",border:"none",outline:"none",color:P.stone,maxWidth:95,borderLeft:`1px solid ${P.border}`,paddingLeft:6}}>
            {SHOP_CATS.map(c=><option key={c}>{c}</option>)}
          </select>
          <button onClick={add} style={{background:P.hazel,color:"white",border:"none",borderRadius:7,width:30,height:30,cursor:"pointer",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>→</button>
        </div>
        {suggestions.length>0 && (
          <div style={{border:`1px solid ${P.border}`,borderTop:"none",borderRadius:"0 0 10px 10px",background:P.linen,overflow:"hidden"}}>
            {suggestions.map((s,i) => (
              <div key={i} onClick={()=>{setNewItem(s.name);setNewCat(s.cat);}}
                style={{display:"flex",alignItems:"center",gap:10,padding:"7px 12px",borderTop:i>0?`1px solid ${P.border}`:"none",cursor:"pointer"}}
                onMouseEnter={e=>e.currentTarget.style.background=P.hazelXL}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <div style={{width:7,height:7,borderRadius:"50%",background:CAT_COLOR[s.cat]||P.hazel,flexShrink:0}}/>
                <span style={{flex:1,fontSize:13,color:P.ink}}>{s.name}</span>
                <span style={{fontSize:11,color:P.dust}}>{s.cat}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      {shopping.length===0 && (
        <div style={{textAlign:"center",padding:"48px 0",color:P.dust}}>
          <div style={{fontSize:32,marginBottom:10,opacity:.35}}>🛍️</div>
          <div style={{fontSize:14,fontWeight:500,color:P.stone}}>Listen er tom</div>
        </div>
      )}

      {catOrder.map(cat => {
        const items=pending.filter(i=>i.cat===cat);
        const cc=CAT_COLOR[cat]||P.hazel;
        return (
          <div key={cat} style={{marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
              <Em e={CAT_EMOJI[cat]||"📦"} s={{fontSize:12}}/>
              <span style={{fontSize:10.5,fontWeight:600,color:P.dust,textTransform:"uppercase",letterSpacing:"0.08em"}}>{cat}</span>
              <div style={{flex:1,height:"0.5px",background:P.border}}/>
              <span style={{fontSize:10,color:P.dust}}>{items.length}</span>
            </div>
            {items.map((item,idx) => {
              const isEd = editingId===item.id;
              return (
                <div key={item.id} style={{borderBottom:idx<items.length-1?`1px solid ${P.border}`:"none"}}>
                  {/* Hovedrad */}
                  <div onClick={()=>setEditingId(isEd?null:item.id)} style={{display:"flex",alignItems:"center",gap:9,padding:"6px 2px",cursor:"pointer"}}>
                    <button onClick={e=>{e.stopPropagation();toggle(item.id);}}
                      style={{width:20,height:20,borderRadius:5,flexShrink:0,cursor:"pointer",
                        background:"transparent",border:`1.5px solid ${P.hazelL}`,
                        display:"flex",alignItems:"center",justifyContent:"center"}}/>
                    <span style={{flex:1,fontSize:13,color:P.ink}}>{item.name}</span>
                    {item.amount && !isEd &&
                      <span style={{fontSize:11.5,color:P.dust,flexShrink:0}}>{item.amount}</span>}

                    <button onClick={e=>{e.stopPropagation();remove(item.id);}}
                      style={{background:"none",border:"none",color:P.dust,cursor:"pointer",fontSize:14,padding:"0 2px",opacity:.45}}>✕</button>
                  </div>
                  {/* Redigeringsrad */}
                  {isEd && (
                    <div style={{padding:"6px 0 10px 29px",display:"flex",flexDirection:"column",gap:6}}>
                      <input value={item.name} onChange={e=>updateItem(item.id,"name",e.target.value)}
                        onKeyDown={e=>{ if(e.key==="Enter"||e.key==="Done") setEditingId(null); }}
                        autoComplete="off" enterKeyHint="done"
                        style={{fontSize:16,background:P.sand,padding:"6px 9px",width:"100%",boxSizing:"border-box"}}/>
                      <div style={{display:"flex",gap:5}}>
                        <input value={item.amount||""} onChange={e=>updateItem(item.id,"amount",e.target.value)}
                          onKeyDown={e=>{ if(e.key==="Enter"||e.key==="Done") setEditingId(null); }}
                          placeholder="Mengde" type="text" autoComplete="off" enterKeyHint="done"
                          style={{flex:1,fontSize:16,background:P.sand,padding:"5px 7px",textAlign:"right"}}/>
                        <select value={item.cat||"Diverse"} onChange={e=>updateItem(item.id,"cat",e.target.value)}
                          style={{flex:2,fontSize:12,background:P.sand,padding:"5px 4px"}}>
                          {SHOP_CATS.map(c=><option key={c} value={c}>{c}</option>)}
                        </select>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      })}

      {done.length>0 && (
        <div style={{marginTop:6}}>
          <button onClick={()=>setShowDone(p=>!p)} style={{display:"flex",alignItems:"center",gap:8,width:"100%",background:"none",border:"none",cursor:"pointer",padding:"6px 0",marginBottom:6}}>
            <div style={{flex:1,height:"0.5px",background:P.border}}/>
            <span style={{fontSize:10.5,fontWeight:600,color:P.dust,whiteSpace:"nowrap"}}>{showDone?"▴":"▾"} {done.length} FULLFØRT</span>
            <div style={{flex:1,height:"0.5px",background:P.border}}/>
          </button>
          {showDone && (
            <div style={{opacity:0.6}}>
              {done.map((item,idx) => (
                <div key={item.id} style={{display:"flex",alignItems:"center",gap:9,padding:"6px 2px",borderBottom:idx<done.length-1?`1px solid ${P.border}`:"none"}}>
                  <button onClick={()=>toggle(item.id)} style={{width:20,height:20,borderRadius:5,flexShrink:0,cursor:"pointer",background:P.olive,border:`1.5px solid ${P.olive}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <Em e="✓" s={{fontSize:11,color:"white"}}/>
                  </button>
                  <span style={{flex:1,fontSize:13,color:P.dust,textDecoration:"line-through"}}>{item.name}</span>
                  {item.amount && <span style={{fontSize:11.5,color:P.dust}}>{item.amount}</span>}
                  <button onClick={()=>remove(item.id)} style={{background:"none",border:"none",color:P.dust,cursor:"pointer",fontSize:14,padding:"0 2px",opacity:.35}}>✕</button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}


// ── Freezer Screen ────────────────────────────────────────────────
function FreezerScreen({freezer, setFreezer, itemHistory}) {
  const FREEZER_UNITS = ["stk","g","kg","ml","dl","l","pk","boks","pose"];
  const emptyForm = () => ({name:"",count:"1",unit:"pk",gramsPerUnit:""});
  const [form,setForm]             = useState(emptyForm());
  const [suggestions,setSuggestions] = useState([]);
  const [focusName,setFocusName]   = useState(false);

  // Historikk fra itemHistory + existing2 fryserposter
  const allNames = React.useMemo(()=>{
    const names = new Set();
    (itemHistory||[]).forEach(h=>{ if(h.name) names.add(h.name); });
    (freezer||[]).forEach(i=>names.add(i.name));
    return [...names];
  },[itemHistory,freezer]);

  const onNameChange = (val) => {
    setForm(f=>({...f,name:val}));
    if(val.length>=2) setSuggestions(allNames.filter(n=>n.toLowerCase().includes(val.toLowerCase())&&n!==val).slice(0,6));
    else setSuggestions([]);
  };
  const pickSuggestion = (name) => { setForm(f=>({...f,name})); setSuggestions([]); };

  const add = () => {
    if(!form.name.trim()) return;
    const batch = {
      id: uid(),
      count: parseInt(form.count)||1,
      unit: form.unit,
      gramsPerUnit: form.gramsPerUnit ? parseInt(form.gramsPerUnit) : null,
    };
    const existing = freezer.find(i=>i.name.toLowerCase()===form.name.trim().toLowerCase());
    if(existing) {
      // Finn om samme pakkestørrelse finnes
      const sameSize = existing.batches.find(b=>b.unit===batch.unit&&b.gramsPerUnit===batch.gramsPerUnit);
      const newBatches = sameSize
        ? existing.batches.map(b=>b.id===sameSize.id?{...b,count:b.count+batch.count}:b)
        : [...existing.batches, batch];
      setFreezer(p=>p.map(i=>i.id===existing.id?{...i,batches:newBatches}:i));
    } else {
      setFreezer(p=>[...p,{id:uid(), name:form.name.trim(), batches:[batch]}]);
    }
    setForm(emptyForm());
    setSuggestions([]);
  };

  const adjustBatch = (itemId, batchId, delta) => {
    setFreezer(p=>p.map(i=>i.id!==itemId?i:{
      ...i,
      batches: i.batches.map(b=>b.id!==batchId?b:{...b,count:Math.max(0,b.count+delta)})
               .filter(b=>b.count>0)
    }).filter(i=>i.batches.length>0));
  };
  const removeItem  = id  => setFreezer(p=>p.filter(i=>i.id!==id));

  const batchLabel = (b) => {
    if(b.gramsPerUnit) return `${b.count} ${b.unit} à ${b.gramsPerUnit} g`;
    if(b.unit!=="stk") return `${b.count} ${b.unit}`;
    return `${b.count} stk`;
  };

  const totalGrams = (item) => {
    const tot = item.batches.reduce((s,b)=>b.gramsPerUnit?s+b.count*b.gramsPerUnit:s, 0);
    return tot>0?tot:null;
  };

  const showGrams = form.unit==="pk"||form.unit==="boks"||form.unit==="pose"||form.unit==="g"||form.unit==="kg";

  return (
    <div>
      <div style={{fontSize:20,fontWeight:600,color:P.ink,marginBottom:4}}>Fryser</div>
      <div style={{fontSize:12,color:P.stone,marginBottom:14}}>❄️ {freezer.length} varer registrert</div>

      {/* Skjema */}
      <Card style={{marginBottom:20,padding:"12px 14px"}}>
        <div style={{fontSize:11,fontWeight:600,color:P.dust,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>Legg til i fryseren</div>

        <div style={{marginBottom:8}}>
          <div style={{fontSize:11,color:P.stone,marginBottom:4}}>Varenavn</div>
          <div style={{position:"relative"}}>
            <input value={form.name} onChange={e=>onNameChange(e.target.value)}
              onFocus={()=>setFocusName(true)}
              onBlur={()=>setTimeout(()=>setFocusName(false),150)}
              placeholder="f.eks. Karbonadedeig" autoComplete="off"
              style={{width:"100%",boxSizing:"border-box",fontSize:16,background:P.sand,
                border:`1.5px solid ${form.name?P.hazel:P.border}`,borderRadius:8,
                padding:"8px 10px",color:P.ink,outline:"none"}}/>
            {focusName && suggestions.length>0 && (
              <div style={{position:"absolute",top:"100%",left:0,right:0,background:P.linen,
                border:`1px solid ${P.hazel}`,borderTop:"none",borderRadius:"0 0 9px 9px",zIndex:20,overflow:"hidden"}}>
                {suggestions.map((s,i)=>(
                  <div key={i} onMouseDown={()=>pickSuggestion(s)}
                    style={{padding:"8px 12px",fontSize:14,cursor:"pointer",color:P.ink}}
                    onMouseEnter={e=>e.currentTarget.style.background=P.hazelXL}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>{s}</div>
                ))}
              </div>
            )}
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <div>
            <div style={{fontSize:11,color:P.stone,marginBottom:4}}>Antall</div>
            <input value={form.count} onChange={e=>setForm(f=>({...f,count:e.target.value}))}
              type="number" min="1"
              style={{width:"100%",boxSizing:"border-box",fontSize:16,background:P.sand,
                borderRadius:8,padding:"8px 10px",textAlign:"center"}}/>
          </div>
          <div>
            <div style={{fontSize:11,color:P.stone,marginBottom:4}}>Enhet</div>
            <select value={form.unit} onChange={e=>setForm(f=>({...f,unit:e.target.value,gramsPerUnit:""}))}
              style={{width:"100%",boxSizing:"border-box",fontSize:16,background:P.sand,
                borderRadius:8,padding:"8px 6px"}}>
              {FREEZER_UNITS.map(u=><option key={u} value={u}>{u}</option>)}
            </select>
          </div>
        </div>

        {showGrams && (
          <div style={{marginBottom:8}}>
            <div style={{fontSize:11,color:P.stone,marginBottom:4}}>Gram per {form.unit} <span style={{color:P.dust,fontWeight:400}}>(valgfritt)</span></div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <input value={form.gramsPerUnit} onChange={e=>setForm(f=>({...f,gramsPerUnit:e.target.value}))}
                type="number" placeholder="f.eks. 500"
                style={{flex:1,fontSize:16,background:P.sand,borderRadius:8,padding:"8px 10px"}}/>
              <span style={{fontSize:13,color:P.stone,fontWeight:500}}>g</span>
            </div>
          </div>
        )}

        {form.name.trim() && (
          <div style={{fontSize:12,color:P.stone,marginBottom:10,padding:"6px 10px",
            background:P.mist,borderRadius:7,border:`1px solid ${P.border}`}}>
            Lagres som: <strong style={{color:P.ink}}>{form.name.trim()}</strong>
            {" — "}{form.count||1} {form.unit}{form.gramsPerUnit?` à ${form.gramsPerUnit} g`:""}
          </div>

        <button onClick={add} disabled={!form.name.trim()}
          style={{width:"100%",padding:"10px",background:form.name.trim()?P.hazel:P.mist,
            color:form.name.trim()?"white":P.dust,border:"none",borderRadius:8,
            fontSize:14,cursor:form.name.trim()?"pointer":"default",fontWeight:600}}>
          ＋ Legg til i fryseren
        </button>
      </Card>

      {freezer.length===0 && (
        <div style={{textAlign:"center",padding:"40px 0",color:P.dust}}>
          <div style={{fontSize:32,marginBottom:10}}>❄️</div>
