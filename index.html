        </div>
      )}

      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {freezer.map(item => {
          const tot = totalGrams(item);
          return (
            <Card key={item.id} style={{padding:"10px 14px"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <span style={{fontSize:16}}>❄️</span>
                <span style={{flex:1,fontSize:14,fontWeight:600,color:P.ink}}>{item.name}</span>
                {tot && <span style={{fontSize:11,color:"#4A8BBF",fontWeight:500}}>Totalt: {tot} g</span>}
                <button onClick={()=>removeItem(item.id)}
                  style={{background:"none",border:"none",cursor:"pointer",color:P.dust,fontSize:13,opacity:.5,padding:"0 2px"}}>
                  ✕
                </button>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:4,paddingLeft:24}}>
                {item.batches.map(b=>(
                  <div key={b.id} style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{flex:1,fontSize:13,color:P.stone}}>{batchLabel(b)}</span>
                    <button onClick={()=>adjustBatch(item.id,b.id,-1)}
                      style={{width:24,height:24,borderRadius:6,background:P.mist,
                        border:`1px solid ${P.border}`,cursor:"pointer",fontSize:14,
                        fontWeight:600,color:P.stone,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                    <span style={{fontSize:13,fontWeight:600,color:P.ink,minWidth:16,textAlign:"center"}}>{b.count}</span>
                    <button onClick={()=>adjustBatch(item.id,b.id,1)}
                      style={{width:24,height:24,borderRadius:6,background:P.mist,
                        border:`1px solid ${P.border}`,cursor:"pointer",fontSize:14,
                        fontWeight:600,color:P.stone,display:"flex",alignItems:"center",justifyContent:"center"}}>＋</button>
                  </div>
                ))}
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}



// ── Forvaltning Screen ───────────────────────────────────────────
function ForvaltningScreen({liquidity,setLiquidity,budgetGroups,setBudgetGroups,
  incomeGroups,setIncomeGroups,incomeMonths,setIncomeMonths,month,setMonth}) {
  const [sub,setSub] = useState("spillerom");
  const [editSaldoInline,setEditSaldoInline] = useState(false);
  const [saldoInputVal,setSaldoInputVal] = useState("");
  const tabs = [
    {id:"spillerom", emoji:"📊",label:"Spillerom"},
    {id:"inntekter", emoji:"📥",label:"Inntekter"},
    {id:"kostnader", emoji:"💸",label:"Kostnader"},
    {id:"generator", emoji:"⚡",label:"Generator"},
  ];
  // "detaljer" er en skjult sub — ikke i tab-baren, men tilgjengelig via spillerom-kortet

  // ── Spillerom-visning (beslutningsside) ──────────────────────────
  const liq = liquidity||{};
  const saldo = parseFloat(liq.saldo)||0;
  const progDate = liq.prognosisDate||new Date().toISOString().slice(0,10);
  const posts = Object.values(liq.posts||{});
  const res = calcSpillerom(saldo, posts, progDate);
  const disponibelt = saldo;
  const bundet = res.utbetalinger - res.innbetalinger;
  const spillerom = res.spillerom;
  const harSaldo = saldo>0;
  const harPoster = posts.length>0;
  const fmt2 = n=>new Intl.NumberFormat("nb-NO",{style:"currency",currency:"NOK",maximumFractionDigits:0}).format(n);
  const fmtD = d=>new Date(d).toLocaleDateString("nb-NO",{day:"numeric",month:"short"});

  // Fordeling per nivå fra budsjett
  const totalMonth = (niva) => {
    const alle = budgetGroups.flatMap(g=>g.items);
    const filtered = niva==="opprettholde"
      ? alle.filter(it => {
          const n = it.meta&&it.meta.niva||"opprettholde";
          // Støtter ny modell (opprettholde) og gammel (nodvendig/valgfritt)
          return n==="opprettholde"||n==="nodvendig"||n==="valgfritt";
        })
      : alle.filter(it=>(it.meta&&it.meta.niva||"opprettholde")===niva);
    return filtered.reduce((s,it)=>s+((it.months&&it.months[month]?it.months[month].budget:0)||0),0);
  };

  // Muligheter
  const muligheter = [];
  if(spillerom>=0&&harPoster) muligheter.push({tekst:"Alle faste kostnader er dekket frem til valgt dato.",type:"positiv"});
  if(spillerom>10000) muligheter.push({tekst:"Du har spillerom til ekstra sparing.",type:"positiv"});
  if(!harSaldo) muligheter.push({tekst:"Oppdater saldo for å få en prognose.",type:"noytral"});
  if(!harPoster) muligheter.push({tekst:"Ingen prognoseposter registrert ennå.",type:"noytral"});

  const NivaKort = ({emoji,label,amount,color}) => (
    <div style={{background:P.linen,border:`1px solid ${P.border}`,borderRadius:10,
      padding:"10px 12px",flex:1}}>
      <div style={{fontSize:12,marginBottom:2}}>{emoji}</div>
      <div style={{fontSize:10,color:P.dust,marginBottom:4}}>{label}</div>
      <div style={{fontSize:15,fontWeight:700,color:color||P.ink}}>{fmt2(amount)}</div>
    </div>
  );

  return (
    <div>
      {/* Intern tab-bar */}
      <div style={{display:"flex",gap:4,marginBottom:16,background:P.mist,
        borderRadius:10,padding:3,border:`1px solid ${P.border}`}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setSub(t.id)}
            style={{flex:1,padding:"7px 0",fontSize:11.5,borderRadius:8,border:"none",
              cursor:"pointer",background:sub===t.id?P.linen:"transparent",
              color:sub===t.id?P.ink:P.stone,fontWeight:sub===t.id?600:400,
              boxShadow:sub===t.id?"0 1px 4px rgba(44,35,24,0.08)":"none"}}>
            {t.emoji} {t.label}
          </button>
        ))}
      </div>

      {/* ── SPILLEROM (beslutningsside) ── */}
      {sub==="spillerom" && (
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {/* Tre beslutningskort */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            <div style={{background:P.linen,border:"1px solid "+P.border,borderRadius:10,padding:"12px 10px",textAlign:"center",cursor:"pointer"}}
              onClick={()=>{if(!editSaldoInline){setSaldoInputVal(String(liq.saldo||""));setEditSaldoInline(true);}}}>
              <div style={{fontSize:9.5,fontWeight:600,color:P.dust,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Disponibelt nå</div>
              {editSaldoInline ? (
                <input type="number" value={saldoInputVal}
                  autoFocus
                  onChange={e=>setSaldoInputVal(e.target.value)}
                  onFocus={e=>e.target.select()}
                  onBlur={()=>{const v=parseFloat(saldoInputVal)||0;setLiquidity(p=>({...p,saldo:v,saldoUpdated:Date.now()}));setEditSaldoInline(false);}}
                  onKeyDown={e=>{if(e.key==="Enter"){const v=parseFloat(saldoInputVal)||0;setLiquidity(p=>({...p,saldo:v,saldoUpdated:Date.now()}));setEditSaldoInline(false);}}}
                  enterKeyHint="done"
                  onClick={e=>e.stopPropagation()}
                  style={{fontSize:15,fontWeight:700,width:"100%",textAlign:"center",
                    background:P.sand,border:"1px solid "+P.hazel,borderRadius:6,padding:"2px 4px"}}/>
              ) : (
                <div style={{fontSize:15,fontWeight:700,color:P.ink}}>{harSaldo?fmt2(disponibelt):"–"}</div>
              )}
              <div style={{fontSize:9,color:P.dust,marginTop:3}}>{editSaldoInline?"Enter for å lagre":harSaldo?"trykk for å endre":"trykk for å sette"}</div>
            </div>
            <div onClick={()=>setSub("poster")} style={{background:P.linen,
              border:"1px solid "+P.border,borderRadius:10,padding:"12px 10px",
              textAlign:"center",cursor:"pointer"}}>
              <div style={{fontSize:9.5,fontWeight:600,color:P.dust,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Bundet</div>
              <div style={{fontSize:15,fontWeight:700,color:bundet>0?P.clay:P.stone}}>{harPoster?fmt2(bundet):"–"}</div>
              <div style={{fontSize:9,color:P.dust,marginTop:3}}>trykk for poster</div>
            </div>
            <div onClick={()=>setSub("detaljer")} style={{
              background:harSaldo&&harPoster?(spillerom>=0?`${P.olive}10`:P.clayXL):P.linen,
              border:`1px solid ${harSaldo&&harPoster?(spillerom>=0?P.oliveL:P.clayL):P.border}`,
              borderRadius:10,padding:"12px 10px",textAlign:"center",cursor:"pointer"}}>
              <div style={{fontSize:9.5,fontWeight:600,color:harSaldo&&harPoster?(spillerom>=0?P.olive:P.clay):P.dust,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Spillerom</div>
              <div style={{fontSize:15,fontWeight:700,color:harSaldo&&harPoster?(spillerom>=0?P.olive:P.clay):P.stone}}>
                {harSaldo&&harPoster?fmt2(spillerom):"–"}
              </div>
              <div style={{fontSize:9,color:P.dust,marginTop:3}}>trykk for detaljer</div>
            </div>
          </div>

          {/* Muligheter */}
          {muligheter.length>0 && (
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              {muligheter.map((m,i)=>(
                <div key={i} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"9px 12px",
                  background:m.type==="positiv"?P.olive+"08":P.mist,
                  border:"1px solid "+(m.type==="positiv"?P.oliveL:P.border),borderRadius:9}}>
                  <span style={{fontSize:13,flexShrink:0,marginTop:1}}>{m.type==="positiv"?"✓":"ℹ️"}</span>
                  <span style={{fontSize:12.5,color:m.type==="positiv"?P.olive:P.stone,lineHeight:1.5}}>{m.tekst}</span>
                </div>
              ))}
            </div>
          )}

          {/* Fordeling per nivå */}
          <div>
            <div style={{fontSize:10.5,fontWeight:600,color:P.dust,textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:8}}>Fordeling</div>
            <div style={{display:"flex",gap:6,marginBottom:6}}>
              <NivaKort emoji="🌳" label="Bygge"        amount={totalMonth("bygge")}   color={P.olive}/>
              <NivaKort emoji="✨" label="Velge"        amount={totalMonth("velge")}   color={P.dusk}/>
            </div>
            <div style={{display:"flex",gap:6}}>
              <NivaKort emoji="🌱" label="Opprettholde" amount={totalMonth("opprettholde")} color={P.hazel}/>
              <NivaKort emoji="🛡️" label="Beskytte"    amount={totalMonth("beskytte")} color={P.clay}/>
            </div>
          </div>

          {/* Lenke til detaljer */}
          <button onClick={()=>setSub("kostnader")}
            style={{fontSize:12,color:P.hazel,background:"none",border:`1px solid ${P.hazelL}`,
              borderRadius:8,padding:"8px 14px",cursor:"pointer",fontWeight:500,textAlign:"center"}}>
            Se budsjettdetaljer →
          </button>
        </div>
      )}

      {/* ── KOSTNADER (tidligere Budsjett) ── */}
      {sub==="kostnader" && (
        <BudsjettScreen
          budgetGroups={budgetGroups} setBudgetGroups={setBudgetGroups}
          month={month} setMonth={setMonth}/>
      )}

      {/* ── INNTEKTER ── */}
      {sub==="inntekter" && (
        <InntekterScreen
          incomeGroups={incomeGroups} setIncomeGroups={setIncomeGroups}
          month={month} setMonth={setMonth}/>
      )}

      {/* ── DETALJER (Spillerom) — skjult sub, åpnes via spillerom-kortet ── */}
      {sub==="detaljer" && (
        <div>
          <button onClick={()=>setSub("spillerom")}
            style={{display:"flex",alignItems:"center",gap:5,fontSize:12.5,color:P.hazel,
              marginBottom:14,background:"none",border:"none",cursor:"pointer",padding:0,fontWeight:500}}>
            ← Tilbake
          </button>
          <SpilleromScreen liquidity={liquidity} setLiquidity={setLiquidity} budgetGroups={budgetGroups} month={month} incomeMonths={incomeMonths} incomeGroups={incomeGroups}/>
        </div>
      )}

      {/* ── GENERATOR-SENTER ── */}
      {sub==="generator" && (
        <GeneratorSenter
          budgetGroups={budgetGroups}
          setBudgetGroups={setBudgetGroups}
          incomeGroups={incomeGroups}
          setIncomeGroups={setIncomeGroups}
          liquidity={liquidity}
          month={month}/>
      )}
    </div>
  );
}


// ── GeneratorSenter ───────────────────────────────────────────────
function GeneratorSenter({budgetGroups,setBudgetGroups,incomeGroups,setIncomeGroups,liquidity,month}) {
  const [filter,setFilter] = useState("alle");
  const [editModal,setEditModal] = useState(null); // {type:"inn"|"ut",groupId,item}

  const NIVA_LABEL = {
    beskytte:"🛡️ Beskytte",opprettholde:"🌱 Opprettholde",
    nodvendig:"🌱 Nødvendig",valgfritt:"🌱 Valgfritt",
    bygge:"🌳 Bygge",velge:"✨ Velge",
  };

  // Bygg en flat liste av alle poster
  const allePoster = [
    ...(incomeGroups||[]).flatMap(g=>g.items.map(it=>({
      type:"inn", gruppe:g.label, groupId:g.id, item:it,
      budget:(it.months&&it.months[month])?it.months[month].budget:0,
    }))),
    ...(budgetGroups||[]).flatMap(g=>g.items.map(it=>({
      type:"ut", gruppe:g.label, groupId:g.id, item:it,
      budget:(it.months&&it.months[month])?it.months[month].budget:0,
    }))),
  ];

  // Valideringsfeil per post
  const feil = (p) => {
    const m = p.item.meta;
    const f = [];
    if(!m) return ["Mangler all metadata"];
    if(!m.eier||m.eier==="Felles" && p.type==="inn") {} // Felles er OK for kostnader
    if(!m.forfallsdag) f.push("mangler dag");
    if(m.automatisk && !p.budget) f.push("automatisk men 0 kr");
    if(!m.kilde||m.kilde==="budsjett") {} // budsjett er OK
    return f;
  };

  // Filtrer
  const filtrert = allePoster.filter(p=>{
    if(filter==="inntekter") return p.type==="inn";
    if(filter==="kostnader") return p.type==="ut";
    if(filter==="automatisk") return p.item.meta&&p.item.meta.automatisk;
    if(filter==="mangler") return !p.item.meta||(p.item.meta&&!p.item.meta.forfallsdag&&p.item.meta.automatisk);
    return true;
  });

  const saveMeta = (type,groupId,itemId,meta) => {
    if(type==="inn") {
      setIncomeGroups(p=>p.map(g=>g.id!==groupId?g:{
        ...g, items:g.items.map(it=>it.id!==itemId?it:{...it,meta})
      }));
    } else {
      setBudgetGroups(p=>p.map(g=>g.id!==groupId?g:{
        ...g, items:g.items.map(it=>it.id!==itemId?it:{...it,meta})
      }));
    }
  };

  const FILTERS = [
    {id:"alle",      label:"Alle"},
    {id:"mangler",   label:"⚠️ Mangler"},
    {id:"automatisk",label:"⚡ Automatisk"},
    {id:"inntekter", label:"↑ Inntekter"},
    {id:"kostnader", label:"↓ Kostnader"},
  ];

  const Pill = ({id,label}) => (
    <button onClick={()=>setFilter(id)}
      style={{padding:"5px 12px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:filter===id?600:400,
        background:filter===id?P.hazel:P.mist,color:filter===id?"white":P.stone,
        border:"1px solid "+(filter===id?P.hazel:P.border)}}>
      {label}
    </button>
  );

  // Status fra liquidity.posts
  const allePoster2 = Object.values((liquidity&&liquidity.posts)||{});
  const genPoster    = allePoster2.filter(p=>p.kilde==="generator");
  const manPoster    = allePoster2.filter(p=>p.kilde!=="generator");
  const overstyrte   = allePoster2.filter(p=>p.manueltOverstyrt);
  const sistKjort    = genPoster.length>0 ? Math.max(...genPoster.map(p=>p.generatedAt||0)) : null;
  const fmtRelTid    = (ts) => {
    if(!ts) return "–";
    const sek = Math.round((Date.now()-ts)/1000);
    if(sek<60) return "for "+sek+" sekunder siden";
    const min = Math.round(sek/60);
    if(min<60) return "for "+min+" min siden";
    return new Date(ts).toLocaleTimeString("nb-NO",{hour:"2-digit",minute:"2-digit"});
  };

  // Mangler-oppsummering
  const autoUtenDag    = allePoster.filter(p=>p.item.meta&&p.item.meta.automatisk&&!p.item.meta.forfallsdag);
  const autoUtenBelop  = allePoster.filter(p=>p.item.meta&&p.item.meta.automatisk&&!p.budget);
  const utenMeta       = allePoster.filter(p=>!p.item.meta);

  return (
    <div>
      <div style={{fontSize:15,fontWeight:600,color:P.ink,marginBottom:8}}>⚡ Generator-senter</div>

      {/* Status-panel */}
      <Card style={{padding:"12px 14px",marginBottom:12}}>
        <div style={{fontSize:10.5,fontWeight:600,color:P.dust,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:8}}>Status</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          <div style={{fontSize:11,color:P.stone}}>
            <span style={{color:P.dust}}>Sist kjort: </span>
            <span style={{fontWeight:500}}>{fmtRelTid(sistKjort)}</span>
          </div>
          <div style={{fontSize:11,color:P.stone}}>
            <span style={{color:P.dust}}>Genererte: </span>
            <span style={{fontWeight:500,color:P.hazel}}>{genPoster.length}</span>
          </div>
          <div style={{fontSize:11,color:P.stone}}>
            <span style={{color:P.dust}}>Manuelle: </span>
            <span style={{fontWeight:500}}>{manPoster.length}</span>
          </div>
          <div style={{fontSize:11,color:P.stone}}>
            <span style={{color:P.dust}}>Overstyrte: </span>
            <span style={{fontWeight:500,color:overstyrte.length>0?P.clay:P.stone}}>{overstyrte.length}</span>
          </div>
        </div>
      </Card>

      {/* Mangel-oppsummering */}
      {(utenMeta.length>0||autoUtenDag.length>0||autoUtenBelop.length>0) && (
        <Card style={{padding:"12px 14px",marginBottom:12,background:"#FFF8F0",border:"1px solid #E8C4A0"}}>
          <div style={{fontSize:10.5,fontWeight:600,color:"#C0602A",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:8}}>⚠ Mangler</div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {utenMeta.length>0 && (
              <button onClick={()=>setFilter("mangler")} style={{display:"flex",alignItems:"center",gap:8,
                background:"none",border:"none",cursor:"pointer",padding:0,textAlign:"left"}}>
                <span style={{fontSize:12,color:"#C0602A",fontWeight:500}}>{utenMeta.length} poster mangler metadata</span>
                <span style={{fontSize:10,color:P.hazel}}>→ vis</span>
              </button>
            )}
            {autoUtenDag.length>0 && (
              <button onClick={()=>setFilter("mangler")} style={{display:"flex",alignItems:"center",gap:8,
                background:"none",border:"none",cursor:"pointer",padding:0,textAlign:"left"}}>
                <span style={{fontSize:12,color:"#C0602A",fontWeight:500}}>{autoUtenDag.length} automatisk post mangler forfallsdag</span>
                <span style={{fontSize:10,color:P.hazel}}>→ vis</span>
              </button>
            )}
            {autoUtenBelop.length>0 && (
              <button onClick={()=>setFilter("mangler")} style={{display:"flex",alignItems:"center",gap:8,
                background:"none",border:"none",cursor:"pointer",padding:0,textAlign:"left"}}>
                <span style={{fontSize:12,color:"#C0602A",fontWeight:500}}>{autoUtenBelop.length} automatiske poster mangler beløp</span>
                <span style={{fontSize:10,color:P.hazel}}>→ vis</span>
              </button>
            )}
          </div>
        </Card>
      )}

      {/* Filterknapper */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
        {FILTERS.map(f=><Pill key={f.id} id={f.id} label={f.label}/>)}
      </div>

      {/* Tabell */}
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
          <thead>
            <tr style={{borderBottom:"2px solid "+P.border,textAlign:"left"}}>
              <th style={{padding:"6px 4px",color:P.dust,fontWeight:600,whiteSpace:"nowrap"}}>⇅</th>
              <th style={{padding:"6px 4px",color:P.dust,fontWeight:600}}>Gruppe</th>
              <th style={{padding:"6px 4px",color:P.dust,fontWeight:600}}>Post</th>
              <th style={{padding:"6px 4px",color:P.dust,fontWeight:600}}>Eier</th>
              <th style={{padding:"6px 4px",color:P.dust,fontWeight:600}}>Nivå</th>
              <th style={{padding:"6px 4px",color:P.dust,fontWeight:600}}>Konto</th>
              <th style={{padding:"6px 4px",color:P.dust,fontWeight:600,textAlign:"center"}}>Dag</th>
              <th style={{padding:"6px 4px",color:P.dust,fontWeight:600,textAlign:"center"}}>⚡</th>
              <th style={{padding:"6px 4px",color:P.dust,fontWeight:600}}>Kilde</th>
              <th style={{padding:"6px 4px",color:P.dust,fontWeight:600,textAlign:"right"}}>Beløp</th>
              <th style={{padding:"6px 4px",color:P.dust,fontWeight:600,textAlign:"center"}}></th>
            </tr>
          </thead>
          <tbody>
            {filtrert.map((p,idx) => {
              const m = p.item.meta;
              const f = feil(p);
              const harFeil = f.length>0;
              const rowBg = idx%2===0?P.linen:"transparent";
              const manglaDag = m&&m.automatisk&&!m.forfallsdag;
              return (
                <tr key={p.groupId+"-"+p.item.id}
                  style={{background:harFeil?"#FFF8F0":rowBg,
                    borderBottom:"1px solid "+P.border,cursor:"pointer"}}
                  onClick={()=>setEditModal(p)}>
                  <td style={{padding:"6px 4px",color:p.type==="inn"?P.olive:P.clay,fontWeight:600}}>
                    {p.type==="inn"?"↑":"↓"}
                  </td>
                  <td style={{padding:"6px 4px",color:P.stone,fontSize:10}}>{p.gruppe}</td>
                  <td style={{padding:"6px 4px",color:P.ink,fontWeight:500,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {p.item.name}
                    {harFeil && <span style={{marginLeft:4,color:"#C0602A",fontSize:9}}>⚠</span>}
                  </td>
                  <td style={{padding:"6px 4px",color:m?P.stone:P.clay,fontSize:10}}>{m?m.eier||"—":"—"}</td>
                  <td style={{padding:"6px 4px",color:P.stone,fontSize:10,whiteSpace:"nowrap"}}>
                    {m?(NIVA_LABEL[m.niva]||m.niva||"—"):"—"}
                  </td>
                  <td style={{padding:"6px 4px",color:m?P.stone:P.clay,fontSize:10}}>{m?m.konto||"—":"—"}</td>
                  <td style={{padding:"6px 4px",textAlign:"center",color:manglaDag?P.clay:P.stone,fontWeight:manglaDag?600:400}}>
                    {m?m.forfallsdag||"—":"—"}
                    {manglaDag && <span style={{color:P.clay}}> ⚠</span>}
                  </td>
                  <td style={{padding:"6px 4px",textAlign:"center"}}>
                    {m&&m.automatisk ? <span style={{color:P.gold}}>⚡</span> : <span style={{color:P.border}}>·</span>}
                  </td>
                  <td style={{padding:"6px 4px",color:P.stone,fontSize:10}}>{m?m.kilde||"—":"—"}</td>
                  <td style={{padding:"6px 4px",textAlign:"right",color:p.type==="inn"?P.olive:P.ink,fontWeight:500}}>
                    {p.budget>0?fmt(p.budget):"—"}
                  </td>
                  <td style={{padding:"6px 4px",textAlign:"center"}}>
                    <button
                      style={{background:m?P.hazelXL:P.mist,border:"1px solid "+(m?P.hazelL:P.border),
                        borderRadius:5,cursor:"pointer",fontSize:9,padding:"2px 6px",
                        color:m?P.hazel:P.dust}}
                      onClick={e=>{e.stopPropagation();setEditModal(p);}}>
                      {m?"✓":"+"}
                    </button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {filtrert.length===0 && (
          <div style={{textAlign:"center",padding:"24px",color:P.dust,fontSize:13}}>
            Ingen poster matcher dette filteret.
          </div>
        )}
      </div>

      {/* Rediger-modal */}
      {editModal && (
        editModal.type==="inn"
          ? <InntekterMetaModal
              item={editModal.item}
              groupId={editModal.groupId}
              onSave={(gid,iid,meta)=>saveMeta("inn",gid,iid,meta)}
              onClose={()=>setEditModal(null)}/>
          : <BudsjettMetaModal
              item={editModal.item}
              groupId={editModal.groupId}
              onSave={(gid,iid,meta)=>saveMeta("ut",gid,iid,meta)}
              onClose={()=>setEditModal(null)}/>
      )}
    </div>
  );
}

// ── Prognosemotor ─────────────────────────────────────────────────
// Ren funksjon: tar saldo + liste med poster + prognosedato
// Returnerer tre tall. Ingen annet ansvar.
function calcSpillerom(saldo, posts, prognosisDate) {
  const d = prognosisDate ? new Date(prognosisDate) : new Date();
  d.setHours(23,59,59,999);
  const relevant = posts.filter(p => {
    if(!p.date) return false;
    return new Date(p.date) <= d;
  });
  const innbetalinger = relevant.filter(p=>p.direction==="in").reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const utbetalinger  = relevant.filter(p=>p.direction==="out").reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const disponibelt = parseFloat(saldo)||0;
  const bundet      = utbetalinger - innbetalinger; // netto uttak
  const spillerom   = disponibelt + innbetalinger - utbetalinger;
  return { disponibelt, innbetalinger, utbetalinger, bundet, spillerom };
}


// ── Budsjettgenerator v1 ──────────────────────────────────────────
// Ren funksjon: tar budsjettgrupper + existing2 poster + maaned
// Returnerer oppdatert posts-objekt (ingen side-effekter)
function generateForecastPosts(budgetGroups, existingPosts, month, incomeMonths, incomeGroups) {
  // Start med kun manuelle poster — genererte slettes og regenereres
  const posts = {};
  Object.entries(existingPosts||{}).forEach(([id,p]) => {
    if(p.kilde !== "generator") {
      posts[id] = p; // behold manuelle
    }
    // Manuelt overstyrte genererte poster beholdes med sine verdier
    if(p.kilde === "generator" && p.manueltOverstyrt) {
      posts[id] = p;
    }
  });

  const now    = new Date();
  const aar    = now.getFullYear();
  const maaned = month;
  const genTs  = Date.now();

  // ── Kostnadsposter ─────────────────────────────────────────────
  budgetGroups.forEach(gruppe => {
    gruppe.items.forEach(item => {
      const meta = item.meta;
      if(!meta || !meta.automatisk) return;
      if(!meta.forfallsdag) return;
      const monthData = item.months && item.months[maaned];
      if(!monthData) return;
      const budgetAmount = (monthData.spent && monthData.spent > 0)
        ? monthData.spent : monthData.budget;
      if(!budgetAmount || budgetAmount <= 0) return;
      const erFaktisk = !!(monthData.spent && monthData.spent > 0);
      const dag = parseInt(meta.forfallsdag);
      const dato = new Date(aar, maaned, dag);
      const datoStr = dato.toISOString().slice(0,10);
      const noekkel = item.id+"_"+aar+"_"+maaned+"_"+dag;

      // Sjekk om den finnes som manuelt overstyrt
      const overstyrt = Object.values(posts).find(p=>p._genKey===noekkel&&p.manueltOverstyrt);
      if(overstyrt) return; // behold overstyrt versjon

      const prognosePost = {
        name:                item.name,
        amount:              budgetAmount,
        direction:           "out",
        date:                datoStr,
        type:                meta.oppforsel || "fast",
        kilde:               "generator",
        sourceBudgetItemId:  item.id,
        sourceBudgetGroupId: gruppe.id,
        sourceType:          "kostnader",
        sourceGroup:         gruppe.label,
        owner:               meta.eier || "Felles",
        level:               meta.niva || "nodvendig",
        erEstimat:           meta.oppforsel === "variabel" && !erFaktisk,
        _genKey:             noekkel,
        generatedAt:         genTs,
      };

      const id = uid();
      posts[id] = {...prognosePost, id};
    });
  });

  // ── Inntektsposter ─────────────────────────────────────────────
  if(incomeGroups) {
    incomeGroups.forEach(gruppe => {
      gruppe.items.forEach(inc => {
        const meta = inc.meta||{};
        if(!meta.automatisk) return;
        const dag2 = parseInt(meta.forfallsdag||"");
        if(!dag2) return;
        const mo2 = inc.months && inc.months[maaned];
        const amt = (meta.disponibelt && meta.disponibelt>0) ? meta.disponibelt
                  : (mo2&&mo2.spent>0) ? mo2.spent
                  : (mo2&&mo2.budget>0) ? mo2.budget : 0;
        if(!amt) return;
        const incDato = new Date(aar, maaned, dag2);
        const incDatoStr = incDato.toISOString().slice(0,10);
        const incNoekkel = "inc_"+inc.id+"_"+aar+"_"+maaned+"_"+dag2;

        const overstyrt = Object.values(posts).find(p=>p._genKey===incNoekkel&&p.manueltOverstyrt);
        if(overstyrt) return;

        const post = {
          name:        inc.name,
          amount:      amt,
          direction:   "in",
          date:        incDatoStr,
          type:        "inn",
          kilde:       "generator",
          sourceType:  "inntekter",
          sourceGroup: gruppe.label,
          sourceItemId:inc.id,
          owner:       meta.eier||"Felles",
          erEstimat:   !(mo2&&mo2.spent>0) && !meta.disponibelt,
          _genKey:     incNoekkel,
          generatedAt: genTs,
        };
        const incId = uid();
        posts[incId] = {...post, id:incId};
      });
    });
  }
  return posts;
}


// ── SpilleromScreen ───────────────────────────────────────────────
function SpilleromScreen({liquidity, setLiquidity, budgetGroups, month, incomeMonths, incomeGroups}) {
  const [genStatus,setGenStatus] = useState(null);
  const [lastRun,setLastRun]     = useState(null);
  const [editPost,setEditPost]   = useState(null); // {id, ...post} for redigering

  // Kjor generatoren — alltid med funksjonell setLiquidity for fersk state
  const runGenerator = React.useCallback(() => {
    setLiquidity(prev => {
      const freshPosts = (prev && prev.posts) ? prev.posts : {};
      const mon = month!==undefined ? month : new Date().getMonth();
      const updatedPosts = generateForecastPosts(
        budgetGroups||[], freshPosts, mon, incomeMonths, incomeGroups
      );
      setLastRun(Date.now());
      const antall = Object.values(updatedPosts).filter(p=>p.kilde==="generator").length;
      setGenStatus({count:antall, ts:Date.now()});
      return {...prev, posts:updatedPosts};
    });
  }, [budgetGroups, incomeGroups, month, incomeMonths]);

  // Automatisk kjoring: kun naar budsjett/inntekter/metadata/maaned endres
  const budgetSig = JSON.stringify((budgetGroups||[]).map(g=>g.items.map(it=>({
    id:it.id, m:it.meta, b:it.months&&it.months[month]
  }))));
  const incomeSig = JSON.stringify((incomeGroups||[]).map(g=>g.items.map(it=>({
    id:it.id, m:it.meta, b:it.months&&it.months[month]
  }))));
  useEffect(() => {
    if(!budgetGroups || !budgetGroups.length) return;
    runGenerator();
  }, [budgetSig, incomeSig, month]);

  const {
    saldo        = 0,
    saldoUpdated = null,
    prognosisDate = (() => {
      // Standard: neste paydayDate (dag 20 i maaneden)
      const now = new Date();
      const lonnDay = 20;
      const candidate = new Date(now.getFullYear(), now.getMonth(), lonnDay);
      if(candidate <= now) candidate.setMonth(candidate.getMonth()+1);
      return candidate.toISOString().slice(0,10);
    })(),
    lonnDay      = 20,
    posts        = {},
  } = liquidity||{};

  const postList = Object.values(posts||{}).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const result   = calcSpillerom(saldo, postList, prognosisDate);

  // States
  const [editSaldo,setEditSaldo]         = useState(false);
  const [saldoInput,setSaldoInput]       = useState(String(saldo||""));
  const [editDate,setEditDate]           = useState(false);
  const [dateInput,setDateInput]         = useState(prognosisDate);
  const [showAddPost,setShowAddPost]     = useState(false);
  const [newPost,setNewPost]             = useState({name:"",amount:"",direction:"out",date:prognosisDate,type:"fast"});

  // Hjelpere
  const save = (patch) => setLiquidity(p=>({...p,...patch}));
  const fmt  = n => new Intl.NumberFormat("nb-NO",{style:"currency",currency:"NOK",maximumFractionDigits:0}).format(n);
  const fmtDate = d => d ? new Date(d).toLocaleDateString("nb-NO",{day:"numeric",month:"short"}) : "";
  const now = new Date();
  const saldoAge = saldoUpdated ? Math.round((Date.now()-saldoUpdated)/60000) : null;

  const saveSaldo = () => {
    const amt = parseFloat(saldoInput.replace(/\s/g,"").replace(",","."))||0;
    save({saldo:amt, saldoUpdated:Date.now()});
    setEditSaldo(false);
  };

  const saveDate = () => {
    save({prognosisDate:dateInput});
    setEditDate(false);
  };

  const addPost = () => {
    if(!newPost.name.trim()||!newPost.amount) return;
    const id = uid();
    const nyPost = {...newPost, id, amount:parseFloat(newPost.amount)||0, kilde:"manuell"};
    // Funksjonell update sikrer at vi ikke bruker stale posts
    setLiquidity(prev => ({...prev, posts:{...(prev.posts||{}), [id]:nyPost}}));
    setNewPost({name:"",amount:"",direction:"out",date:prognosisDate,type:"extra"});
    setShowAddPost(false);
  };

  const removePost = (id) => {
    setLiquidity(prev => {
      const next = {...(prev.posts||{})};
      delete next[id];
      return {...prev, posts:next};
    });
  };

  const saveEditPost = (id, felter) => {
    setLiquidity(prev => {
      const post = (prev.posts||{})[id];
      if(!post) return prev;
      const erGenerator = post.kilde === "generator";
      return {...prev, posts:{...prev.posts, [id]:{
        ...post, ...felter,
        // Marker som manuelt overstyrt hvis det er en generert post
        manueltOverstyrt: erGenerator ? true : post.manueltOverstyrt,
      }}};
    });
  };

  // UI-gruppering (kun for visning)
  const TYPE_LABELS = {inn:"Innbetalinger",fast:"Faste poster",variabel:"Budsjetterte variable",extra:"Ikke budsjettert",ukjent:"⚠️ Ukjent type (slett eller oppdater)"};
  const TYPE_COLORS = {inn:P.olive,fast:P.hazel,variabel:P.dusk,extra:P.clay,ukjent:P.clay};
  const groupedPosts = {};
  const KNOWN_TYPES = ["inn","fast","variabel","extra"];
  postList.forEach(p=>{
    const raw = p.direction==="in"?"inn":(p.type||"extra");
    const g = KNOWN_TYPES.includes(raw) ? raw : "ukjent";
    if(!groupedPosts[g]) groupedPosts[g]=[];
    groupedPosts[g].push(p);
  });

  const isPositive = result.spillerom>=0;
  const daysToDate = Math.ceil((new Date(prognosisDate)-now)/(1000*60*60*24));

  return (
    <div>
      <div style={{fontSize:20,fontWeight:600,color:P.ink,marginBottom:4}}>Spillerom</div>
      <div style={{fontSize:12,color:P.stone,marginBottom:16}}>Prognose frem til valgt dato</div>

      {/* ── Prognosedato ── */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,
        padding:"8px 12px",background:P.mist,borderRadius:9,border:`1px solid ${P.border}`}}>
        <span style={{fontSize:12,color:P.stone}}>Frem til:</span>
        {editDate ? (
          <>
            <input type="date" value={dateInput} onChange={e=>setDateInput(e.target.value)}
              style={{flex:1,fontSize:14,background:P.sand,padding:"4px 8px"}}/>
            <button onClick={saveDate}
              style={{background:P.hazel,color:"white",border:"none",borderRadius:7,
                padding:"4px 12px",fontSize:12,cursor:"pointer",fontWeight:600}}>OK</button>
            <button onClick={()=>setEditDate(false)}
              style={{background:"none",border:"none",cursor:"pointer",color:P.dust,fontSize:13}}>✕</button>
          </>
        ) : (
          <>
            <span style={{flex:1,fontSize:14,fontWeight:600,color:P.ink}}>
              {fmtDate(prognosisDate)}
              <span style={{fontSize:11,fontWeight:400,color:P.dust,marginLeft:6}}>
                ({daysToDate>0?`om ${daysToDate} dager`:daysToDate===0?"i dag":"passert"})
              </span>
            </span>
            <button onClick={()=>setEditDate(true)}
              style={{background:"none",border:"none",cursor:"pointer",color:P.hazel,fontSize:12,fontWeight:500}}>
              Endre
            </button>
          </>
        )}
      </div>

      {/* ── Handlingsknapper ── */}
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <button onClick={()=>setShowAddPost(v=>!v)}
          style={{flex:1,padding:"9px 8px",
            background:showAddPost?P.hazelXL:P.mist,
            border:showAddPost?"1px solid "+P.hazelL:"1.5px dashed "+P.border,
            borderRadius:9,fontSize:12,cursor:"pointer",
            color:showAddPost?P.hazel:P.stone,fontWeight:500,textAlign:"center"}}>
          {showAddPost?"✕ Lukk":"＋ Legg til prognosepost"}
        </button>
        <div style={{flex:1,padding:"8px 10px",background:P.hazelXL,
          border:"1px solid "+P.hazelL,borderRadius:9,fontSize:11,
          color:P.hazel,textAlign:"center",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
          <span>⚡</span>
          <span>{lastRun?"Oppdatert "+new Date(lastRun).toLocaleTimeString("nb-NO",{hour:"2-digit",minute:"2-digit"}):"Oppdaterer…"}</span>
        </div>
      </div>
      {genStatus && (
        <div style={{fontSize:11,color:P.olive,fontWeight:500,marginTop:-8,marginBottom:8,textAlign:"right"}}>
          ✓ {genStatus.count} poster oppdatert
        </div>
      )}

      {/* ── Legg til post — skjema ── */}
      {showAddPost && (
        <Card style={{padding:"12px 14px",marginBottom:8}}>
          <div style={{fontSize:11,fontWeight:600,color:P.dust,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:10}}>
            Ny prognosepost
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <input value={newPost.name} onChange={e=>setNewPost(p=>({...p,name:e.target.value}))}
              placeholder="Navn (f.eks. Lonn, Boliglan, Barnetrygd)" autoComplete="off"
              style={{fontSize:14,background:P.sand,padding:"8px 10px",width:"100%",boxSizing:"border-box",borderRadius:8}}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div>
                <div style={{fontSize:11,color:P.stone,marginBottom:3}}>Belop</div>
                <input type="number" value={newPost.amount}
                  onChange={e=>setNewPost(p=>({...p,amount:e.target.value}))}
                  onFocus={e=>e.target.select()}
                  placeholder="0" style={{width:"100%",boxSizing:"border-box",fontSize:14,background:P.sand,padding:"7px 10px",borderRadius:8}}/>
              </div>
              <div>
                <div style={{fontSize:11,color:P.stone,marginBottom:3}}>Dato</div>
                <input type="date" value={newPost.date}
                  onChange={e=>setNewPost(p=>({...p,date:e.target.value}))}
                  style={{width:"100%",boxSizing:"border-box",fontSize:13,background:P.sand,padding:"7px 6px",borderRadius:8}}/>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div>
                <div style={{fontSize:11,color:P.stone,marginBottom:3}}>Retning</div>
                <select value={newPost.direction} onChange={e=>setNewPost(p=>({...p,direction:e.target.value,type:e.target.value==="in"?"inn":"fast"}))}
                  style={{width:"100%",boxSizing:"border-box",fontSize:13,background:P.sand,padding:"7px 6px",borderRadius:8}}>
                  <option value="out">Utbetaling</option>
                  <option value="in">Innbetaling</option>
                </select>
              </div>
              <div>
                <div style={{fontSize:11,color:P.stone,marginBottom:3}}>Type</div>
                <select value={newPost.type} onChange={e=>setNewPost(p=>({...p,type:e.target.value}))}
                  style={{width:"100%",boxSizing:"border-box",fontSize:13,background:P.sand,padding:"7px 6px",borderRadius:8}}>
                  <option value="fast">Fast</option>
                  <option value="variabel">Variabel</option>
                  <option value="extra">Ekstra</option>
                  <option value="inn">Innbetaling</option>
                </select>
              </div>
            </div>
            <button onClick={addPost} disabled={!newPost.name.trim()||!newPost.amount}
              style={{padding:"9px",background:newPost.name.trim()&&newPost.amount?P.hazel:P.mist,
                color:newPost.name.trim()&&newPost.amount?"white":P.dust,border:"none",
                borderRadius:8,fontSize:13,cursor:"pointer",fontWeight:600}}>
              Legg til
            </button>
          </div>
        </Card>
      )}

      {/* ── Saldo ── */}
      <Card style={{marginBottom:10,padding:"12px 14px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
          <div style={{fontSize:11,fontWeight:600,color:P.dust,textTransform:"uppercase",letterSpacing:"0.07em"}}>Saldo nå</div>
          {saldoAge!==null && (
            <span style={{fontSize:10,color:P.hazelL}}>
              oppdatert {saldoAge<60?`${saldoAge} min siden`:`${Math.round(saldoAge/60)} t siden`}
            </span>
          )}
        </div>
        {editSaldo ? (
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <input type="number" value={saldoInput} onChange={e=>setSaldoInput(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&saveSaldo()}
              onFocus={e=>e.target.select()}
              autoFocus placeholder="0" enterKeyHint="done"
              style={{flex:1,fontSize:20,fontWeight:600,background:P.sand,padding:"6px 10px",
                border:`1.5px solid ${P.hazel}`}}/>
            <button onClick={saveSaldo}
              style={{background:P.hazel,color:"white",border:"none",borderRadius:8,
                padding:"8px 14px",fontSize:13,cursor:"pointer",fontWeight:600}}>Lagre</button>
          </div>
        ) : (
          <div style={{display:"flex",alignItems:"baseline",gap:10,cursor:"pointer"}} onClick={()=>{setSaldoInput(String(saldo));setEditSaldo(true);}}>
            <span style={{fontSize:26,fontWeight:700,color:P.ink,letterSpacing:"-0.02em"}}>{fmt(saldo)}</span>
            <span style={{fontSize:12,color:P.hazel,fontWeight:500}}>Oppdater</span>
          </div>
        )}
      </Card>

      {/* ── Spillerom-resultat ── */}
      <div style={{padding:"16px",background:isPositive?`${P.olive}12`:P.clayXL,
        border:`1px solid ${isPositive?P.oliveL:P.clayL}`,borderRadius:12,marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:600,color:isPositive?P.olive:P.clay,
          textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>
          {isPositive?"✓ Fritt spillerom":"⚠️ Underskudd"}
        </div>
        <div style={{fontSize:36,fontWeight:700,color:isPositive?P.olive:P.clay,
          letterSpacing:"-0.03em",marginBottom:12}}>
          {fmt(result.spillerom)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div style={{background:"rgba(255,255,255,0.5)",borderRadius:8,padding:"8px 10px"}}>
            <div style={{fontSize:10,color:P.stone,marginBottom:2}}>Innbetalinger</div>
            <div style={{fontSize:14,fontWeight:600,color:P.olive}}>+{fmt(result.innbetalinger)}</div>
          </div>
          <div style={{background:"rgba(255,255,255,0.5)",borderRadius:8,padding:"8px 10px"}}>
            <div style={{fontSize:10,color:P.stone,marginBottom:2}}>Utbetalinger</div>
            <div style={{fontSize:14,fontWeight:600,color:P.clay}}>-{fmt(result.utbetalinger)}</div>
          </div>
        </div>
      </div>

      {/* ── Prognoseposter ── */}
      {["extra","variabel","fast","inn","ukjent"].map(group => {
        const gPosts = groupedPosts[group]||[];
        if(gPosts.length===0) return null;
        const col = TYPE_COLORS[group]||P.hazel;
        const total = gPosts.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
        return (
          <div key={group} style={{marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
              <span style={{fontSize:10,fontWeight:600,color:col,textTransform:"uppercase",letterSpacing:"0.07em"}}>
                {TYPE_LABELS[group]}
              </span>
              <div style={{flex:1,height:"0.5px",background:P.border}}/>
              <span style={{fontSize:11,fontWeight:600,color:col}}>
                {group==="inn"?"+":"-"}{fmt(total)}
              </span>
            </div>
            {gPosts.map(p => {
              const inRange = new Date(p.date)<=new Date(prognosisDate);
              const fraGenerator = p.kilde==="generator";
              return (
                <div key={p.id}
                  onClick={()=>setEditPost({...p})}
                  style={{display:"flex",alignItems:"center",gap:10,
                  padding:"7px 10px",borderRadius:8,marginBottom:3,cursor:"pointer",
                  background:inRange?P.linen:P.mist,
                  border:"1px solid "+(fraGenerator?(inRange?P.hazelL:P.border):(inRange?P.border:"transparent")),
                  opacity:inRange?1:0.5}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                      <span style={{fontSize:13,fontWeight:500,color:P.ink}}>{p.name}</span>
                      {fraGenerator && !p.manueltOverstyrt && (
                        <span style={{fontSize:9,background:P.hazelXL,color:P.hazel,
                          borderRadius:4,padding:"1px 5px",fontWeight:600}}>budsjett</span>
                      )}
                      {p.manueltOverstyrt && (
                        <span style={{fontSize:9,background:"#FFF0E0",color:"#C0602A",
                          borderRadius:4,padding:"1px 5px",fontWeight:600}}>✏️ overstyrt</span>
                      )}
                      {p.erEstimat && (
                        <span style={{fontSize:9,background:P.goldXL,color:P.gold,
                          borderRadius:4,padding:"1px 5px",fontWeight:600}}>estimat</span>
                      )}
                    </div>
                    <div style={{fontSize:10,color:P.dust,marginTop:1}}>
                      {fmtDate(p.date)}{!inRange?" · utenfor periode":""}
                      {fraGenerator&&p.owner&&p.owner!=="Felles"?` · ${p.owner}`:""}
                    </div>
                  </div>
                  <span style={{fontSize:13,fontWeight:600,color:p.direction==="in"?P.olive:P.clay,flexShrink:0}}>
                    {p.direction==="in"?"+":"-"}{fmt(p.amount)}
                  </span>
                  <button onClick={e=>{e.stopPropagation();removePost(p.id);}}
                    style={{background:"none",border:"none",cursor:"pointer",color:P.dust,fontSize:12,opacity:.5,padding:"0 2px"}}>
                    ✕
                  </button>
                </div>
              );
            })}
          </div>
        );
      })}





      {/* ── Rediger prognosepost ── */}
      {editPost && (
        <Modal title={editPost.kilde==="generator"?"Rediger generert post":"Rediger post"} onClose={()=>setEditPost(null)}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {editPost.kilde==="generator" && (
              <div style={{fontSize:11,color:"#C0602A",background:"#FFF8F0",padding:"8px 12px",borderRadius:8,border:"1px solid #E8C4A0"}}>
                Generert post. Endringer merkes som manuelt overstyrt.
              </div>
            )}
            <div>
              <div style={{fontSize:11,color:P.dust,marginBottom:4}}>Navn</div>
              <input value={editPost.name} onChange={e=>setEditPost(p=>({...p,name:e.target.value}))}
                style={{width:"100%",boxSizing:"border-box",fontSize:15,background:P.sand,padding:"8px 10px",borderRadius:8}}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div>
                <div style={{fontSize:11,color:P.dust,marginBottom:4}}>Belop</div>
                <input type="number" value={editPost.amount} onFocus={e=>e.target.select()}
                  onChange={e=>setEditPost(p=>({...p,amount:e.target.value}))}
                  style={{width:"100%",boxSizing:"border-box",fontSize:15,background:P.sand,padding:"8px 10px",borderRadius:8}}/>
              </div>
              <div>
                <div style={{fontSize:11,color:P.dust,marginBottom:4}}>Dato</div>
                <input type="date" value={editPost.date}
                  onChange={e=>setEditPost(p=>({...p,date:e.target.value}))}
                  style={{width:"100%",boxSizing:"border-box",fontSize:13,background:P.sand,padding:"8px 6px",borderRadius:8}}/>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div>
                <div style={{fontSize:11,color:P.dust,marginBottom:4}}>Retning</div>
                <select value={editPost.direction} onChange={e=>setEditPost(p=>({...p,direction:e.target.value}))}
                  style={{width:"100%",boxSizing:"border-box",fontSize:13,background:P.sand,padding:"8px 6px",borderRadius:8}}>
                  <option value="out">Utbetaling</option>
                  <option value="in">Innbetaling</option>
                </select>
              </div>
              <div>
                <div style={{fontSize:11,color:P.dust,marginBottom:4}}>Type</div>
                <select value={editPost.type||"extra"} onChange={e=>setEditPost(p=>({...p,type:e.target.value}))}
                  style={{width:"100%",boxSizing:"border-box",fontSize:13,background:P.sand,padding:"8px 6px",borderRadius:8}}>
                  <option value="fast">Fast</option>
                  <option value="variabel">Variabel</option>
                  <option value="extra">Ekstra</option>
                  <option value="inn">Innbetaling</option>
                </select>
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:4}}>
              <button onClick={()=>setEditPost(null)}
                style={{flex:1,padding:"10px",background:P.mist,border:"1px solid "+P.border,
                  borderRadius:9,fontSize:13,cursor:"pointer",color:P.stone}}>Avbryt</button>
              <button onClick={()=>{
                saveEditPost(editPost.id,{name:editPost.name,
                  amount:parseFloat(String(editPost.amount))||0,
                  date:editPost.date,direction:editPost.direction,type:editPost.type});
                setEditPost(null);
              }} style={{flex:2,padding:"10px",background:P.hazel,color:"white",border:"none",
                borderRadius:9,fontSize:13,cursor:"pointer",fontWeight:600}}>Lagre</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

function AddItemRow({onAdd,color}) {
  const [n,setN]=useState(""); const [b,setB]=useState(""); const [s,setS]=useState("");
  const go=()=>{if(!n.trim())return;onAdd(n,b,s);setN("");setB("");setS("");};
  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 68px 68px 30px",gap:5,marginTop:9,alignItems:"center"}}>
      <input value={n} onChange={e=>setN(e.target.value)} placeholder="Ny post…" style={{fontSize:11,background:P.sand}}/>
      <input type="number" value={b} onChange={e=>setB(e.target.value)} placeholder="Budsjett" style={{fontSize:11,textAlign:"right",background:P.sand}}/>
      <input type="number" value={s} onChange={e=>setS(e.target.value)} placeholder="Faktisk" style={{fontSize:11,textAlign:"right",background:P.sand}}/>
      <button onClick={go} style={{background:color||P.hazel,color:"white",border:"none",borderRadius:7,padding:"5px",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>＋</button>
    </div>
  );
}

// ── BudsjettScreen ────────────────────────────────────────────────
function BudsjettScreen({budgetGroups,setBudgetGroups,month,setMonth}) {
  const [expanded,setExpanded]   = useState(null);
  const [metaModal,setMetaModal] = useState(null);

  const gBudget = (g,m) => g.items.reduce((s,i)=>s+((i.months&&i.months[m]?i.months[m].budget:0)||0),0);
  const gSpent  = (g,m) => g.items.reduce((s,i)=>s+((i.months&&i.months[m]?i.months[m].spent:0)||0),0);

  const updItem = (gid,iid,f,v) => setBudgetGroups(p=>p.map(g=>g.id!==gid?g:{
    ...g, items:g.items.map(it=>it.id!==iid?it:{
      ...it, months:it.months.map((mo,mi)=>mi!==month?mo:{...mo,[f]:parseFloat(v)||0})
    })
  }));
  const addItem = (gid,n,b,s) => setBudgetGroups(p=>p.map(g=>g.id!==gid?g:{
    ...g, items:[...g.items,{id:uid(),name:n,months:Array.from({length:12},(_,mi)=>({
      budget:mi===month?parseFloat(b)||0:0,
      spent: mi===month?parseFloat(s)||0:0
    }))}]
  }));
  const delItem = (gid,iid) => setBudgetGroups(p=>p.map(g=>g.id!==gid?g:{
    ...g, items:g.items.filter(it=>it.id!==iid)
  }));
  const saveMeta = (gid,iid,meta) => setBudgetGroups(p=>p.map(g=>g.id!==gid?g:{
    ...g, items:g.items.map(it=>it.id!==iid?it:{...it,meta})
  }));

  function GRow({g,edit}) {
    const gb=gBudget(g,month), gs=gSpent(g,month), over=isOver(gs,gb), open=expanded===g.id;
    return (
      <div>
        <Card onClick={()=>setExpanded(open?null:g.id)} accent={g.color}
          style={{cursor:"pointer",borderRadius:open?"11px 11px 0 0":11,
            marginBottom:open?0:undefined,borderBottom:open?"none":undefined,padding:"10px 14px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <IBox emoji={GROUP_EMOJI[g.id]||"📁"} color={g.color} size={34}/>
            <div style={{flex:1}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:5}}>
                <span style={{fontSize:13,fontWeight:600,color:P.ink}}>{g.label}</span>
                <div>
                  <span style={{fontSize:12,fontWeight:500,color:over?P.clay:P.ink}}>{fmt(gs)}</span>
                  <span style={{fontSize:10.5,color:P.dust}}> / {fmt(gb)}</span>
                  {over && <span style={{marginLeft:4,fontSize:10,color:P.clay,fontWeight:600}}>↑</span>}
                </div>
              </div>
              <Bar value={gs} max={gb||1} color={g.color} h={3} over={over}/>
            </div>
            <Em e={open?"▴":"▾"} s={{color:P.dust,fontSize:13,marginLeft:6}}/>
          </div>
        </Card>
        {open && (
          <div style={{border:`1px solid ${P.border}`,borderTop:"none",borderRadius:"0 0 11px 11px",
            background:P.linen,padding:"6px 14px 12px",marginBottom:6}}>
            {edit && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 68px 68px 30px",gap:5,
                padding:"4px 0 7px",borderBottom:`1px solid ${P.border}`,marginBottom:4}}>
                <span style={{fontSize:10,color:P.dust}}>Post</span>
                <span style={{fontSize:10,color:P.dust,textAlign:"right"}}>Budsjett</span>
                <span style={{fontSize:10,color:P.dust,textAlign:"right"}}>Faktisk</span>
                <span/>
              </div>
            )}
            {g.items.map((it,idx) => {
              const mo=it.months[month], o=isOver(mo.spent,mo.budget);
              return (
                <div key={it.id} style={{padding:"6px 0",borderBottom:idx<g.items.length-1?`1px solid ${P.border}`:"none"}}>
                  {edit ? (
                    <div style={{display:"grid",gridTemplateColumns:"1fr 68px 68px 30px",gap:5,alignItems:"center"}}>
                      <div style={{display:"flex",alignItems:"center",gap:4,minWidth:0}}>
                        <span style={{fontSize:12,color:o?P.clay:P.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{it.name}</span>
                        {it.meta&&it.meta.automatisk && (
                          <span title="Automatisk til prognose" style={{fontSize:13,color:P.gold,flexShrink:0}}>⚡</span>
                        )}
                        <button onClick={()=>setMetaModal({item:it,groupId:g.id})}
                          style={{background:it.meta?P.hazelXL:P.mist,border:it.meta?"1px solid "+P.hazelL:"1px solid "+P.border,
                            borderRadius:5,cursor:"pointer",fontSize:9,padding:"2px 5px",
                            color:it.meta?P.hazel:P.dust,whiteSpace:"nowrap",flexShrink:0}}>
                          {it.meta?"✓":"+"}
                        </button>
                      </div>
                      <InlineNum key={"b-"+it.id+"-"+month}
                        value={mo.budget}
                        onChange={v=>updItem(g.id,it.id,"budget",v)}/>
                      <InlineNum key={"s-"+it.id+"-"+month}
                        value={mo.spent}
                        onChange={v=>updItem(g.id,it.id,"spent",v)}
                        colorStyle={{color:o?P.clay:"inherit"}}/>
                      <button onClick={()=>delItem(g.id,it.id)} style={{background:"none",border:"none",cursor:"pointer",color:P.dust,fontSize:12,padding:2,opacity:.5}}>🗑️</button>
                    </div>
                  ) : (
                    <div onClick={()=>setMetaModal({item:it,groupId:g.id})} style={{cursor:"pointer"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:2}}>
                        <div style={{flex:1,minWidth:0}}>
                          <span style={{fontSize:12,color:P.stone}}>{it.name}</span>
                          {it.meta&&it.meta.automatisk && (
                            <span title="Automatisk til prognose" style={{fontSize:12,color:P.gold,marginLeft:2}}>⚡</span>
                          )}
                          {it.meta&&it.meta.eier&&it.meta.eier!=="Felles" && (
                            <span style={{fontSize:9,color:P.hazelL,background:P.mist,borderRadius:3,padding:"0 3px",marginLeft:2}}>{it.meta.eier}</span>
                          )}
                        </div>
                        <div>
                          <span style={{fontSize:12,fontWeight:500,color:o?P.clay:P.ink}}>{fmt(mo.spent)}</span>
                          <span style={{fontSize:10.5,color:P.dust}}> / {fmt(mo.budget)}</span>
                        </div>
                      </div>
                      {mo.budget>0 && <Bar value={mo.spent} max={mo.budget} color={g.color} h={2.5} over={o}/>}
                    </div>
                  )}
                </div>
              );
            })}
            {edit && <AddItemRow onAdd={(n,b,s)=>addItem(g.id,n,b,s)} color={g.color}/>}
          </div>
        )}
      </div>
    );
  }

  return (

function InntekterScreen({incomeGroups,setIncomeGroups,month,setMonth}) {
  const [expanded,setExpanded]   = useState(null);
  const [metaModal,setMetaModal] = useState(null);

  const gBudget = (g) => g.items.reduce((s,i)=>s+((i.months&&i.months[month]?i.months[month].budget:0)||0),0);
  const gSpent  = (g) => g.items.reduce((s,i)=>s+((i.months&&i.months[month]?i.months[month].spent:0)||0),0);

  const updItem = (gid,iid,f,v) => setIncomeGroups(p=>p.map(g=>g.id!==gid?g:{
    ...g, items:g.items.map(it=>it.id!==iid?it:{
      ...it, months:it.months.map((mo,mi)=>mi!==month?mo:{...mo,[f]:parseFloat(v)||0})
    })
  }));
  const addItem = (gid,n,b,s) => setIncomeGroups(p=>p.map(g=>g.id!==gid?g:{
    ...g, items:[...g.items,{id:uid(),name:n,months:Array.from({length:12},(_,mi)=>({
      budget:mi===month?parseFloat(b)||0:0,
      spent: mi===month?parseFloat(s)||0:0
    })),meta:null}]
  }));
  const delItem = (gid,iid) => setIncomeGroups(p=>p.map(g=>g.id!==gid?g:{
    ...g, items:g.items.filter(it=>it.id!==iid)
  }));
  const saveMeta = (gid,iid,meta) => setIncomeGroups(p=>p.map(g=>g.id!==gid?g:{
    ...g, items:g.items.map(it=>it.id!==iid?it:{...it,meta})
  }));

  const totalBudget = (incomeGroups||[]).reduce((s,g)=>s+gBudget(g),0);
  const totalSpent  = (incomeGroups||[]).reduce((s,g)=>s+gSpent(g),0);

  function GRow({g}) {
    const gb=gBudget(g), gs=gSpent(g), open=expanded===g.id;
    return (
      <div>
        <Card onClick={()=>setExpanded(open?null:g.id)} accent={g.color}
          style={{cursor:"pointer",borderRadius:open?"11px 11px 0 0":11,
            marginBottom:open?0:undefined,borderBottom:open?"none":undefined,padding:"10px 14px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <IBox emoji={INCOME_GROUP_EMOJI[g.id]||"📋"} color={g.color} size={34}/>
            <div style={{flex:1}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:5}}>
                <span style={{fontSize:13,fontWeight:600,color:P.ink}}>{g.label}</span>
                <div>
                  <span style={{fontSize:12,fontWeight:500,color:P.olive}}>{fmt(gs)}</span>
                  <span style={{fontSize:10.5,color:P.dust}}> / {fmt(gb)}</span>
                </div>
              </div>
              <Bar value={gs} max={gb||1} color={g.color} h={3}/>
            </div>
            <Em e={open?"▴":"▾"} s={{color:P.dust,fontSize:13,marginLeft:6}}/>
          </div>
        </Card>
        {open && (
          <div style={{border:"1px solid "+P.border,borderTop:"none",borderRadius:"0 0 11px 11px",
            background:P.linen,padding:"6px 14px 12px",marginBottom:6}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 68px 68px 30px",gap:5,
              padding:"4px 0 7px",borderBottom:"1px solid "+P.border,marginBottom:4}}>
              <span style={{fontSize:10,color:P.dust}}>Post</span>
              <span style={{fontSize:10,color:P.dust,textAlign:"right"}}>Budsjett</span>
              <span style={{fontSize:10,color:P.dust,textAlign:"right"}}>Faktisk</span>
              <span/>
            </div>
            {g.items.map((it,idx) => {
              const mo = (it.months&&it.months[month]) ? it.months[month] : {budget:0,spent:0};
              return (
                <div key={it.id} style={{padding:"6px 0",borderBottom:idx<g.items.length-1?"1px solid "+P.border:"none"}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 68px 68px 30px",gap:5,alignItems:"center"}}>
                    <div style={{display:"flex",alignItems:"center",gap:4,minWidth:0}}>
                      <span style={{fontSize:12,color:P.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{it.name}</span>
                      {it.meta&&it.meta.automatisk && (
                        <span title="Automatisk til prognose" style={{fontSize:13,color:P.gold,flexShrink:0}}>⚡</span>
                      )}
                      <button onClick={()=>setMetaModal({item:it,groupId:g.id})}
                        style={{background:it.meta?P.hazelXL:P.mist,
                          border:"1px solid "+(it.meta?P.hazelL:P.border),
                          borderRadius:5,cursor:"pointer",fontSize:9,padding:"2px 5px",
                          color:it.meta?P.hazel:P.dust,whiteSpace:"nowrap",flexShrink:0}}>
                        {it.meta?"✓":"+"}
                      </button>
                    </div>
                    <InlineNum key={"ib-"+it.id+"-"+month}
                      value={mo.budget}
                      onChange={v=>updItem(g.id,it.id,"budget",v)}
                      colorStyle={{color:P.olive}}/>
                    <InlineNum key={"is-"+it.id+"-"+month}
                      value={mo.spent}
                      onChange={v=>updItem(g.id,it.id,"spent",v)}
                      colorStyle={{color:P.olive,fontWeight:600}}/>
                    <button onClick={()=>delItem(g.id,it.id)}
                      style={{background:"none",border:"none",cursor:"pointer",color:P.dust,fontSize:12,padding:2,opacity:.5}}>🗑️</button>
                  </div>
                </div>
              );
            })}
            <AddItemRow onAdd={(n,b,s)=>addItem(g.id,n,b,s)} color={g.color}/>
          </div>
        )}
      </div>
    );
  }

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:600,color:P.ink}}>📅 {MONTHS[month]} 2026</div>
        <select value={month} onChange={e=>setMonth(+e.target.value)}
          style={{fontSize:12,background:P.mist,border:"1px solid "+P.border,
            borderRadius:8,padding:"6px 10px",color:P.ink,fontWeight:500}}>
          {MONTHS.map((m,i)=><option key={i} value={i}>{m} 2026</option>)}
        </select>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        <Card style={{padding:"12px 14px"}}>
          <div style={{fontSize:10,color:P.dust,marginBottom:3}}>↑ Budsjettert</div>
          <div style={{fontSize:19,fontWeight:600,color:P.olive}}>{fmt(totalBudget)}</div>
        </Card>
        <Card style={{padding:"12px 14px"}}>
          <div style={{fontSize:10,color:P.dust,marginBottom:3}}>↑ Faktisk</div>
          <div style={{fontSize:19,fontWeight:600,color:totalSpent>0?P.olive:P.stone}}>{fmt(totalSpent)}</div>
        </Card>
      </div>
      {(incomeGroups||[]).map(g=><GRow key={g.id} g={g}/>)}
      {metaModal && (
        <InntekterMetaModal
          item={metaModal.item}
          groupId={metaModal.groupId}
          onSave={saveMeta}
          onClose={()=>setMetaModal(null)}/>
      )}
    </div>
  );
}

// ── Root App ──────────────────────────────────────────────────────
function App() {
  const [user,setUser]       = useState(undefined);
  const [tab,setTab]         = useState("home");
  const [month,setMonth]     = useState(new Date().getMonth());

  const [allMeals,setAllMealsLocal]         = useState({[getWeekKey(new Date())]:INIT_MEALS});
  const [recipes,setRecipesLocal]           = useState(INIT_RECIPES);
  const [shopping,setShoppingLocal]         = useState(INIT_SHOPPING);
  const [budgetGroups,setBudgetGroupsLocal]   = useState(BUDGET_TEMPLATE);
  const [incomeGroups,setIncomeGroupsLocal]   = useState(INCOME_GROUP_TEMPLATE);
  const [incomeMonths,setIncomeMonthsLocal] = useState(INIT_INCOME_MONTHS);
  const [itemHistory,setItemHistoryLocal]   = useState([]);
  const [staples,setStaplesLocal]           = useState({});
  const [liquidity,setLiquidityLocal]       = useState({});
  const [freezer,setFreezerLocal]           = useState([]);

  useEffect(() => {
    const unsub = onAuthStateChanged(_auth, u => setUser(u||null));
    return unsub;
  }, []);

  useEffect(() => {
    if(!user) return;
    const offs = [];
    const listen = (path,setter) => {
      const off = dbListen(`${FAM}/${path}`, snap => { if(snap.exists()) setter(snap.val()); });
      offs.push(off);
    };
    listen("meals",       v => setAllMealsLocal(v||{}));
    listen("recipes",     v => setRecipesLocal(Object.values(v||{})));
    listen("shopping",    v => setShoppingLocal(Object.values(v||{})));
    listen("itemHistory", v => setItemHistoryLocal(Object.values(v||{})));
    listen("staples",      v => setStaplesLocal(v||{}));
    listen("liquidity",    v => setLiquidityLocal(v||{}));
    listen("freezer",      v => setFreezerLocal(Object.values(v||{})));
    listen("budget",      v => setBudgetGroupsLocal(prev => prev.map(g => {
      const fg=v&&v[g.id]; if(!fg) return g;
      return {...g, items:g.items.map(it=>{
        const fi=fg[it.id]; if(!fi) return it;
        // fi er nå {months:{...}, meta:{...}} eller gamle {0:{...},1:{...}...}
        // Støtter begge formater for bakoverkompatibilitet
        const months = fi.months
          ? it.months.map((mo,mi)=>fi.months[mi]?fi.months[mi]:mo)
          : it.months.map((mo,mi)=>fi[mi]?fi[mi]:mo);
        const meta = fi.meta || it.meta || null;
        return {...it, months, meta};
      })};
    })));
    listen("income", v => {
      if(!v) { setIncomeMonthsLocal(INIT_INCOME_MONTHS); return; }
      const toArr = (x) => {
        if(!x) return [];
        if(Array.isArray(x)) return x;
        if(typeof x !== "object") return [];
        const keys = Object.keys(x).sort((a,b)=>+a-+b);
        return keys.map(k=>x[k]);
      };
      const allMonths = toArr(v);
      const result = Array.from({length:12},(_,mi)=>{
        const mo = allMonths[mi];
        if(!mo) return INIT_INCOME_MONTHS[mi];
        const moArr = toArr(mo);
        if(moArr.length>0 && moArr[0] && moArr[0].id) {
          return moArr.map(it=>({id:it.id,name:it.name,budget:parseFloat(it.budget)||0,spent:parseFloat(it.spent)||0,meta:it.meta||defaultIncomeMeta()}));
        }
        return INIT_INCOME_MONTHS[mi];
      });
      setIncomeMonthsLocal(result);
    });
    listen("incomeGroups", v => setIncomeGroupsLocal(prev => prev.map(g => {
      const fg=v&&v[g.id]; if(!fg) return g;
      return {...g, items:g.items.map(it=>{
        const fi=fg[it.id]; if(!fi) return it;
        const months = fi.months
          ? it.months.map((mo,mi)=>fi.months[mi]?fi.months[mi]:mo)
          : it.months.map((mo,mi)=>fi[mi]?fi[mi]:mo);
        const meta = fi.meta || it.meta || null;
        return {...it, months, meta};
      })};
    })));
    
    listen("freezer",      v => setFreezerLocal(Object.values(v||{})));
    listen("budget",      v => setBudgetGroupsLocal(prev => prev.map(g => {
      const fg=v&&v[g.id]; if(!fg) return g;
      return {...g, items:g.items.map(it=>{
        const fi=fg[it.id]; if(!fi) return it;
        // fi er nå {months:{...}, meta:{...}} eller gamle {0:{...},1:{...}...}
        // Støtter begge formater for bakoverkompatibilitet
        const months = fi.months
          ? it.months.map((mo,mi)=>fi.months[mi]?fi.months[mi]:mo)
          : it.months.map((mo,mi)=>fi[mi]?fi[mi]:mo);
        const meta = fi.meta || it.meta || null;
        return {...it, months, meta};
      })};
    })));
    listen("income", v => {
      if(!v) { setIncomeMonthsLocal(INIT_INCOME_MONTHS); return; }

      // Firebase lagrer JS-arrays som objekt med "0","1",... som noekler.
      // toArr() konverterer dette til ekte JS-array.
      const toArr = (x) => {
        if(!x) return [];
        if(Array.isArray(x)) return x;
        if(typeof x !== "object") return [];
