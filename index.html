// ── Recipe Form (legg til / rediger) ─────────────────────────────
function RecipeForm({onSave,onClose,initial}) {
  const emptyRowF = () => ({id:uid(), name:"", amount:"", unit:"stk"});
  const emptyGroupF = (n="Ingredienser") => ({id:uid(), name:n, rows:[emptyRowF()]});

  const ingToRow = (ing) => {
    const amtStr = String(ing.amount||"");
    const numPart = amtStr.replace(/[^0-9.,]/g,"").trim();
    const unitPart = amtStr.replace(/[0-9.,\s]/g,"").trim();
    return {id:uid(), name:ing.name||"", amount:numPart, unit:ing.unit||unitPart||"stk"};
  };

  const toFlatRows = (r) => {
    if(r.ingredientGroups && r.ingredientGroups.length>0) return [emptyRowF()];
    return (r.ingredients||[]).map(ingToRow).concat([emptyRowF()]);
  };
  const toGroups = (r) => {
    if(r.ingredientGroups && r.ingredientGroups.length>0) {
      return r.ingredientGroups.map(g=>({
        id:g.id||uid(), name:g.name||"Ingredienser",
        rows:(g.ingredients||[]).map(ingToRow).concat([emptyRowF()])
      }));
    }
    return [];
  };

  const empty = {name:"",time:"",servings:"",cat:"Middag",tags:"",url:"",instructions:""};
  const toForm = r => ({...empty,...r,time:String(r.time||""),servings:String(r.servings||""),tags:(r.tags||[]).join(", "),instructions:r.instructions||""});
  const [form,setForm]         = useState(initial?toForm(initial):empty);
  const [flatRows,setFlatRows] = useState(initial?toFlatRows(initial):[emptyRowF()]);
  const [groups,setGroups]     = useState(initial?toGroups(initial):[]);
  const [aiSt,setAiSt]         = useState("");

  const fetchUrl = async () => {
    if(!form.url.trim()){setAiSt("Lim inn en URL");return;}
    setAiSt("loading");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,tools:[{type:"web_search_20250305",name:"web_search"}],
          messages:[{role:"user",content:`Besøk denne siden og hent oppskriften: ${form.url}\nReturner KUN JSON: {"name":"...","time":20,"servings":4,"cat":"Middag","tags":["enkel"],"ingredients":[{"name":"Pasta","amount":"400g","cat":"Tørrvarer"}]}`}]})});
      const d=await res.json();
      const txt=d.content&&d.content.filter(c=>c.type==="text").map(c=>c.text).join("").replace(/```json|```/g,"").trim();
      const s=txt.indexOf("{"),e=txt.lastIndexOf("}");if(s===-1)throw 0;
      const p=JSON.parse(txt.slice(s,e+1));
      setForm(f=>({...f,name:p.name||f.name,time:String(p.time||f.time),servings:String(p.servings||f.servings),cat:p.cat||f.cat,tags:(p.tags||[]).join(", "),
        ingredients:(p.ingredients||[]).map(i=>({name:i.name,amount:i.amount||"",cat:i.cat||"Diverse"}))}));
      setAiSt("ok");
    } catch { setAiSt("error"); }
  };

  const rowsToIngs = (rws) => (rws||[]).filter(r=>r.name.trim()).map(r=>({
    name:r.name.trim(),
    amount:r.amount?`${r.amount} ${r.unit}`.trim():"",
    unit:r.unit, cat:"Diverse"
  }));

  const addGroup = () => {
    if(groups.length===0) {
      setGroups([{id:uid(),name:"Ingredienser",rows: flatRows.filter(r=>r.name.trim()).length>0 ? flatRows : [emptyRow()]}]);
    } else {
      setGroups(p=>[...p,{id:uid(),name:"Ny gruppe",rows:[emptyRow()]}]);
    }
  };
  const updateGroup = (gid,field,val) => setGroups(p=>p.map(g=>g.id===gid?{...g,[field]:val}:g));
  const removeGroup = (gid) => setGroups(p=>p.filter(g=>g.id!==gid));
  const setGroupRows = (gid,updater) => setGroups(p=>p.map(g=>g.id===gid?{...g,rows:typeof updater==="function"?updater(g.rows):updater}:g));

  const save = () => {
    const hasGroups = groups.length>0;
    const recipe = {
      name:form.name, time:parseInt(form.time)||0, servings:parseInt(form.servings)||4,
      cat:form.cat, tags:form.tags.split(",").map(s=>s.trim()).filter(Boolean),
      url:form.url, instructions:form.instructions||"",
      ingredients: hasGroups ? [] : rowsToIngs(flatRows),
      ingredientGroups: hasGroups
        ? groups.map(g=>({id:g.id,name:g.name,ingredients:rowsToIngs(g.rows)}))
        : [],
    };
    onSave(recipe);
    onClose();
  };

  return (
    <Modal title={initial?"Rediger oppskrift":"Legg til oppskrift"} onClose={onClose}>
      <div style={{marginBottom:14,padding:"11px 12px",background:P.mist,borderRadius:9,border:`1px solid ${P.border}`}}>
        <div style={{fontSize:11.5,fontWeight:600,color:P.stone,marginBottom:7}}>🌐 Hent fra nettside (valgfritt)</div>
        <div style={{display:"flex",gap:6}}>
          <input value={form.url} onChange={e=>setForm(f=>({...f,url:e.target.value}))} onFocus={e=>e.target.select()}
            placeholder="https://www.matprat.no/…" autoComplete="off" style={{flex:1,fontSize:12,background:P.linen}}/>
          <button onClick={fetchUrl} disabled={aiSt==="loading"} style={{background:P.dusk,color:"white",border:"none",borderRadius:7,padding:"0 12px",fontSize:12,cursor:"pointer",opacity:aiSt==="loading"?.6:1}}>
            {aiSt==="loading"?"Henter…":"→ Hent"}
          </button>
        </div>
        {aiSt==="ok"&&<div style={{fontSize:11,marginTop:6,color:P.olive}}>✓ Hentet — sjekk feltene</div>}
        {aiSt==="error"&&<div style={{fontSize:11,marginTop:6,color:P.clay}}>⚠️ Kunne ikke hente. Fyll inn manuelt.</div>}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div>
          <div style={{fontSize:11.5,color:P.stone,marginBottom:4,fontWeight:600}}>Navn *</div>
          <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} autoComplete="off" placeholder="Tomatsuppe…" style={{width:"100%",boxSizing:"border-box",fontSize:14,padding:"9px 11px"}}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          <div>
            <div style={{fontSize:11.5,color:P.stone,marginBottom:4,fontWeight:600}}>Tid (min)</div>
            <input type="number" value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))} autoComplete="off" placeholder="30" style={{width:"100%",boxSizing:"border-box",fontSize:13}}/>
          </div>
          <div>
            <div style={{fontSize:11.5,color:P.stone,marginBottom:4,fontWeight:600}}>Porsjoner</div>
            <input type="number" value={form.servings} onChange={e=>setForm(f=>({...f,servings:e.target.value}))} autoComplete="off" placeholder="4" style={{width:"100%",boxSizing:"border-box",fontSize:13}}/>
          </div>
          <div>
            <div style={{fontSize:11.5,color:P.stone,marginBottom:4,fontWeight:600}}>Kategori</div>
            <select value={form.cat} onChange={e=>setForm(f=>({...f,cat:e.target.value}))} style={{width:"100%",boxSizing:"border-box",fontSize:13}}>
              {["Middag","Frokost","Lunsj","Dessert","Snacks"].map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
        </div>
        <div>
          <div style={{fontSize:11.5,color:P.stone,marginBottom:8,fontWeight:600}}>Ingredienser</div>
          {groups.length===0 ? (
            <IngredientRows rows={flatRows} setRows={setFlatRows} allRecipes={_globalRecipes}/>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {groups.map(g=>(
                <div key={g.id} style={{border:`1px solid ${P.border}`,borderRadius:9,padding:"10px 12px",background:P.sand}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                    <input value={g.name} onChange={e=>updateGroup(g.id,"name",e.target.value)}
                      onFocus={e=>e.target.select()}
                      style={{flex:1,fontSize:13,fontWeight:600,background:"transparent",border:"none",outline:"none",color:P.ink,padding:0}}/>
                    {groups.length>1&&<button onClick={()=>removeGroup(g.id)} style={{background:"none",border:"none",cursor:"pointer",color:P.dust,fontSize:12}}>✕</button>}
                  </div>
                  <IngredientRows rows={g.rows} setRows={(u)=>setGroupRows(g.id,u)} allRecipes={_globalRecipes}/>
                </div>
              ))}
            </div>
          )}
          <button onClick={addGroup}
            style={{marginTop:8,fontSize:12,color:P.dusk,background:"none",border:"none",cursor:"pointer",padding:"4px 0",fontWeight:500}}>
            ＋ Legg til gruppe
          </button>
        </div>
        <div>
          <div style={{fontSize:11.5,color:P.stone,marginBottom:4,fontWeight:600}}>Tagger</div>
          <input value={form.tags} onChange={e=>setForm(f=>({...f,tags:e.target.value}))} autoComplete="off" placeholder="enkel, favoritt…" style={{width:"100%",boxSizing:"border-box",fontSize:13}}/>
        </div>
        <div>
          <div style={{fontSize:11.5,color:P.stone,marginBottom:4,fontWeight:600}}>Fremgangsmåte <span style={{fontWeight:400,color:P.hazelL}}>(valgfritt)</span></div>
          <textarea value={form.instructions||""} onChange={e=>setForm(f=>({...f,instructions:e.target.value}))}
            placeholder="Skriv fremgangsmåte her…" rows={5}
            style={{width:"100%",boxSizing:"border-box",fontSize:13,resize:"vertical",
              background:P.sand,border:`1px solid ${P.border}`,borderRadius:9,
              padding:"9px 12px",color:P.ink,lineHeight:1.6,outline:"none",
              fontFamily:"-apple-system,sans-serif"}}/>
        </div>
        <button onClick={save} disabled={!form.name.trim()} style={{padding:"12px",background:form.name.trim()?P.hazel:P.mist,color:form.name.trim()?"white":P.dust,border:"none",borderRadius:9,fontSize:13,cursor:form.name.trim()?"pointer":"default",fontWeight:600}}>
          💾 {initial?"Lagre endringer":"Lagre oppskrift"}
        </button>
      </div>
    </Modal>
  );
}

// ── AddToPlanCard (pkt 2+6) ───────────────────────────────────────
function AddToPlanCard({recipe,meals,nextMeals,setMeals,setNextWeekMeals,onPickIngredients}) {
  const todayIdx = (new Date().getDay()+6)%7;
  const [week,setWeek] = useState("this"); // "this"|"next"
  const currentMeals = week==="this" ? meals : (nextMeals||{});
  const alreadyPlanned = Object.values(currentMeals||{}).some(m=>getMealName(m).toLowerCase()===(recipe.name||"").toLowerCase());

  return (
    <Card style={{marginBottom:12,padding:"10px 14px"}}>
      <div style={{fontSize:12,fontWeight:600,color:P.stone,marginBottom:8}}>📅 Legg til i middagsplanen</div>

      {/* Ukevalg */}
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        {[{id:"this",label:"Denne uken"},{id:"next",label:"Neste uke"}].map(w=>(
          <button key={w.id} onClick={()=>setWeek(w.id)} style={{
            flex:1,padding:"5px 8px",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:500,
            background:week===w.id?P.hazel:P.mist,
            color:week===w.id?"white":P.stone,
            border:`1px solid ${week===w.id?P.hazel:P.border}`}}>
            {w.label}
          </button>
        ))}
      </div>

      {alreadyPlanned && (
        <div style={{fontSize:11,color:P.clay,background:P.clayXL,border:`1px solid ${P.clayL}`,borderRadius:7,padding:"5px 9px",marginBottom:8}}>
          ⚠️ Allerede planlagt {week==="this"?"denne":"neste"} uke
        </div>
      )}

      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {DAYS.map((d,i) => {
          const isThisRecipe = getMealName(currentMeals[d]).toLowerCase()===(recipe.name||"").toLowerCase();
          const hasOther = !!currentMeals[d]&&!isThisRecipe;
          if(hasOther) return null;
          const isPast = week==="this" && i<todayIdx;
          return (
            <button key={d}
              onClick={()=>{
                const mealObj={type:"recipe",name:recipe.name,recipeId:recipe.id};
                if(week==="this") setMeals(p=>({...p,[d]:mealObj}));
                else setNextWeekMeals(p=>({...p,[d]:mealObj}));
                onPickIngredients();
              }}
              style={{padding:"5px 12px",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:500,
                background:isThisRecipe?P.olive:isPast?P.mist:P.hazelXL,
                color:isThisRecipe?"white":isPast?P.hazelL:P.hazel,
                border:`1px solid ${isThisRecipe?P.olive:isPast?P.border:P.hazelL}`,
                opacity:isPast?0.5:1}}>
              {DAY_S[d]}{isThisRecipe?" ✓":""}{isPast?" (passert)":""}
            </button>
          );
        })}
      </div>
    </Card>
  );
}


// ── RecipeIngredients — detaljvisning med skalering ──────────────
function RecipeIngredients({recipe, freezer}) {
  const r = recipe || {};
  const base = r.servings || 0;
  const [scale,setScale] = useState(base || 1);

  const scaleAmt = (amtStr) => {
    if(!amtStr || base===0) return amtStr||"";
    const num = parseFloat(String(amtStr));
    if(isNaN(num)) return amtStr;
    const scaled = Math.round(num*(scale/base)*100)/100;
    return String(amtStr).replace(/^[\d.,]+/, String(scaled));
  };

  const hasGroups = r.ingredientGroups && r.ingredientGroups.length>0;
  const flatIngs  = hasGroups ? [] : (r.ingredients||[]);
  const groups    = hasGroups ? r.ingredientGroups : [];

  const IngRow = ({ing}) => {
    const inFreezer = (freezer||[]).find(f=>f.name.toLowerCase()===ing.name.toLowerCase());
    const freezerLabel = inFreezer ? (() => {
      const batches = inFreezer.batches||[];
      const totalG = batches.reduce((s,b)=>b.gramsPerUnit?s+b.count*b.gramsPerUnit:s,0);
      if(totalG>0) return `❄️ ${totalG} g i fryseren`;
      const totalCount = batches.reduce((s,b)=>s+b.count,0);
      const unit = (batches[0]&&batches[0].unit)||"stk";
      return totalCount>0?`❄️ ${totalCount} ${unit}`:"❄️ har i fryseren";
    })() : null;
    return (
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:`1px solid ${P.border}`}}>
        <div style={{width:7,height:7,borderRadius:"50%",background:CAT_COLOR[ing.cat]||P.hazel,flexShrink:0}}/>
        <span style={{flex:1,fontSize:13,fontWeight:500,color:P.ink}}>{ing.name||""}</span>
        {freezerLabel && (
          <span style={{fontSize:10,color:"#4A8BBF",background:"#EBF5FF",borderRadius:5,
            padding:"1px 6px",fontWeight:500,flexShrink:0}}>
            {freezerLabel}
          </span>
        )}
        <span style={{fontSize:12,color:P.stone}}>{scaleAmt(ing.amount)}</span>
      </div>
    );
  };

  if(!hasGroups && flatIngs.length===0) return null;

  return (
    <Card style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <SL style={{marginBottom:0}}>Ingredienser</SL>
        {base>0 && (
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <button onClick={()=>setScale(s=>Math.max(1,s-1))}
              style={{width:26,height:26,borderRadius:7,background:P.mist,border:`1px solid ${P.border}`,cursor:"pointer",fontSize:16,fontWeight:600,color:P.stone,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>−</button>
            <span style={{fontSize:12,color:P.ink,minWidth:56,textAlign:"center"}}>{scale} pers</span>
            <button onClick={()=>setScale(s=>s+1)}
              style={{width:26,height:26,borderRadius:7,background:P.mist,border:`1px solid ${P.border}`,cursor:"pointer",fontSize:16,fontWeight:600,color:P.stone,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>＋</button>
          </div>
        )}
      </div>
      {hasGroups
        ? groups.map((g,gi)=>(
            <div key={g.id||gi} style={{marginBottom:gi<groups.length-1?14:0}}>
              <div style={{fontSize:11,fontWeight:600,color:P.dust,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4,marginTop:gi>0?4:0}}>{g.name||"Ingredienser"}</div>
              {(g.ingredients||[]).map((ing,i)=><IngRow key={i} ing={ing}/>)}
            </div>
          ))
        : flatIngs.map((ing,i)=><IngRow key={i} ing={ing}/>)
      }
    </Card>
  );
}

        <div>
          <div style={{fontSize:20,fontWeight:600,color:P.ink}}>Kokebok</div>
          <div style={{fontSize:12,color:P.stone,marginTop:2}}>🍳 {recipes.length} oppskrifter</div>
        </div>
        <button onClick={()=>setShowAdd(true)} style={{background:P.hazel,color:"white",border:"none",borderRadius:9,padding:"8px 14px",fontSize:12.5,cursor:"pointer",fontWeight:600}}>＋ Legg til</button>
      </div>
      <div style={{position:"relative",marginBottom:12}}>
        <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:14,color:P.dust}}>🔍</span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Søk i kokebok…"
          style={{width:"100%",boxSizing:"border-box",paddingLeft:32,fontSize:13,background:P.mist,border:`1px solid ${P.border}`,borderRadius:9,color:P.ink}}/>
        {search && <button onClick={()=>setSearch("")} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:P.dust,fontSize:14}}>✕</button>}

        {cats.map(c=><Pill key={c} active={filter===c} onClick={()=>setFilter(c)}>{c}</Pill>)}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {visible.length===0 && recipes.length===0 && (

            </div>
            <button onClick={()=>setShowAdd(true)} style={{background:P.hazel,color:"white",border:"none",borderRadius:9,padding:"10px 20px",fontSize:13,cursor:"pointer",fontWeight:600}}>
              ⚡ Legg inn første oppskrift

          <div style={{textAlign:"center",padding:"32px 0",color:P.dust,fontSize:13}}>Ingen oppskrifter matcher søket</div>
        )}
        {visible.map(r => (
          <Card key={r.id} onClick={()=>setSel(r.id)} accent={CAT_COLOR[((r.ingredients||[])[0]&&(r.ingredients||[])[0].cat)]||P.hazel} style={{cursor:"pointer",padding:"10px 14px"}}>
            <div style={{display:"flex",alignItems:"center",gap:11}}>
              <IBox emoji="🍳" color={P.dusk} size={38}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13.5,fontWeight:600,color:P.ink}}>{r.name}</div>
                <div style={{fontSize:11,color:P.dust,marginTop:2}}>⏱ {r.time} min · 👥 {r.servings} pers · {r.cat}</div>
              </div>
              {r.url && <span style={{fontSize:13,color:P.dusk}}>🔗</span>}
              <Em e="›" s={{color:P.dust,fontSize:16,flexShrink:0}}/>
            </div>
          </Card>
        ))}
      </div>
      {showAdd && <AddRecipeModal onSave={saveRecipe} onClose={()=>setShowAdd(false)} logEvent={logEvent}/>}
      {showForm && <RecipeForm initial={editRecipe} onSave={saveRecipe} onClose={()=>{setShowForm(false);setEditRecipe(null);}}/>}
    </div>
  );
}

// ── Shopping Screen ───────────────────────────────────────────────
function ShoppingScreen({shopping,setShopping,itemHistory}) {
  const [newItem,setNewItem] = useState("");
  const [newAmt,setNewAmt]   = useState("");
  const [newCat,setNewCat]   = useState("Diverse");
  const [showDone,setShowDone] = useState(false);

  const [editingId,setEditingId] = useState(null);

  const pending  = shopping.filter(i=>!i.done);
  const done     = shopping.filter(i=>i.done);
  const catOrder = [...new Set(pending.map(i=>i.cat))];
  const toggle   = id => { setShopping(p=>p.map(i=>i.id===id?{...i,done:!i.done}:i)); if(editingId===id) setEditingId(null); };
  const remove   = id => { setShopping(p=>p.filter(i=>i.id!==id)); if(editingId===id) setEditingId(null); };
  const clearDone = () => setShopping(p=>p.filter(i=>!i.done));
  const updateItem = (id, field, val) => setShopping(p=>p.map(i=>i.id===id?{...i,[field]:val}:i));
  const add = () => {
    if(!newItem.trim()) return;
    setShopping(p=>[...p,{id:uid(),name:newItem.trim(),amount:newAmt.trim(),cat:newCat,done:false}]);
    setNewItem(""); setNewAmt("");
  };

  const suggestions = newItem.length>1
    ? (itemHistory||[]).filter(h=>h.name.toLowerCase().includes(newItem.toLowerCase())&&!shopping.some(s=>s.name.toLowerCase()===h.name.toLowerCase())).slice(0,5)
    : [];

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div>
          <div style={{fontSize:20,fontWeight:600,color:P.ink}}>Handleliste</div>
          <div style={{fontSize:12,color:P.stone,marginTop:2}}>✓ {done.length} fullført · ⏱ {pending.length} gjenstaar</div>
        </div>
        {done.length>0 && <button onClick={clearDone} style={{fontSize:11.5,color:P.clay,background:P.clayXL,border:`1px solid ${P.clayL}`,padding:"5px 10px",borderRadius:7,cursor:"pointer",fontWeight:500}}>🗑️ Fjern fullførte</button>}
      </div>

      {shopping.length>0 && (
        <div style={{marginBottom:14}}>
          <Bar value={done.length} max={shopping.length} color={P.olive} h={3}/>
          <div style={{display:"flex",justifyContent:"flex-end",marginTop:4}}>
            <span style={{fontSize:10.5,color:P.dust}}>{Math.round(done.length/shopping.length*100)}% ferdig</span>
          </div>
        </div>
      )}

      <div style={{marginBottom:14}}>
        <div style={{background:P.mist,padding:"8px",borderRadius:suggestions.length>0?"10px 10px 0 0":10,border:`1px solid ${P.border}`,display:"flex",gap:6,alignItems:"center"}}>
          <Em e="＋" s={{fontSize:15,color:P.dust,flexShrink:0}}/>
          <input value={newItem} onChange={e=>setNewItem(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} autoComplete="off" placeholder="Hva trenger du?" style={{flex:2,fontSize:13,background:"transparent",border:"none",outline:"none",color:P.ink,padding:"0 2px"}}/>
          <input value={newAmt} onChange={e=>setNewAmt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} autoComplete="off" placeholder="Mengde" style={{width:65,fontSize:12,background:"transparent",border:"none",outline:"none",color:P.stone,borderLeft:`1px solid ${P.border}`,paddingLeft:8}}/>
          <select value={newCat} onChange={e=>setNewCat(e.target.value)} style={{fontSize:11,background:"transparent",border:"none",outline:"none",color:P.stone,maxWidth:95,borderLeft:`1px solid ${P.border}`,paddingLeft:6}}>
            {SHOP_CATS.map(c=><option key={c}>{c}</option>)}
          </select>
          <button onClick={add} style={{background:P.hazel,color:"white",border:"none",borderRadius:7,width:30,height:30,cursor:"pointer",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>→</button>
        </div>
        {suggestions.length>0 && (
          <div style={{border:`1px solid ${P.border}`,borderTop:"none",borderRadius:"0 0 10px 10px",background:P.linen,overflow:"hidden"}}>
            {suggestions.map((s,i) => (
              <div key={i} onClick={()=>{setNewItem(s.name);setNewCat(s.cat);}}
                style={{display:"flex",alignItems:"center",gap:10,padding:"7px 12px",borderTop:i>0?`1px solid ${P.border}`:"none",cursor:"pointer"}}
                onMouseEnter={e=>e.currentTarget.style.background=P.hazelXL}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <div style={{width:7,height:7,borderRadius:"50%",background:CAT_COLOR[s.cat]||P.hazel,flexShrink:0}}/>
                <span style={{flex:1,fontSize:13,color:P.ink}}>{s.name}</span>
                <span style={{fontSize:11,color:P.dust}}>{s.cat}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      {shopping.length===0 && (
        <div style={{textAlign:"center",padding:"48px 0",color:P.dust}}>
          <div style={{fontSize:32,marginBottom:10,opacity:.35}}>🛍️</div>
          <div style={{fontSize:14,fontWeight:500,color:P.stone}}>Listen er tom</div>
        </div>
      )}

      {catOrder.map(cat => {
        const items=pending.filter(i=>i.cat===cat);
        const cc=CAT_COLOR[cat]||P.hazel;
        return (
          <div key={cat} style={{marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
              <Em e={CAT_EMOJI[cat]||"📦"} s={{fontSize:12}}/>
              <span style={{fontSize:10.5,fontWeight:600,color:P.dust,textTransform:"uppercase",letterSpacing:"0.08em"}}>{cat}</span>
              <div style={{flex:1,height:"0.5px",background:P.border}}/>
              <span style={{fontSize:10,color:P.dust}}>{items.length}</span>
            </div>
            {items.map((item,idx) => {
              const isEd = editingId===item.id;
              return (
                <div key={item.id} style={{borderBottom:idx<items.length-1?`1px solid ${P.border}`:"none"}}>
                  {/* Hovedrad */}
                  <div onClick={()=>setEditingId(isEd?null:item.id)} style={{display:"flex",alignItems:"center",gap:9,padding:"6px 2px",cursor:"pointer"}}>
                    <button onClick={e=>{e.stopPropagation();toggle(item.id);}}
                      style={{width:20,height:20,borderRadius:5,flexShrink:0,cursor:"pointer",
                        background:"transparent",border:`1.5px solid ${P.hazelL}`,
                        display:"flex",alignItems:"center",justifyContent:"center"}}/>
                    <span style={{flex:1,fontSize:13,color:P.ink}}>{item.name}</span>
                    {item.amount && !isEd &&
                      <span style={{fontSize:11.5,color:P.dust,flexShrink:0}}>{item.amount}</span>}

                    <button onClick={e=>{e.stopPropagation();remove(item.id);}}
                      style={{background:"none",border:"none",color:P.dust,cursor:"pointer",fontSize:14,padding:"0 2px",opacity:.45}}>✕</button>
                  </div>
                  {/* Redigeringsrad */}
                  {isEd && (
                    <div style={{padding:"6px 0 10px 29px",display:"flex",flexDirection:"column",gap:6}}>
                      <input value={item.name} onChange={e=>updateItem(item.id,"name",e.target.value)}
                        onKeyDown={e=>{ if(e.key==="Enter"||e.key==="Done") setEditingId(null); }}
                        autoComplete="off" enterKeyHint="done"
                        style={{fontSize:16,background:P.sand,padding:"6px 9px",width:"100%",boxSizing:"border-box"}}/>
                      <div style={{display:"flex",gap:5}}>
                        <input value={item.amount||""} onChange={e=>updateItem(item.id,"amount",e.target.value)}
                          onKeyDown={e=>{ if(e.key==="Enter"||e.key==="Done") setEditingId(null); }}
                          placeholder="Mengde" type="text" autoComplete="off" enterKeyHint="done"
                          style={{flex:1,fontSize:16,background:P.sand,padding:"5px 7px",textAlign:"right"}}/>
                        <select value={item.cat||"Diverse"} onChange={e=>updateItem(item.id,"cat",e.target.value)}
                          style={{flex:2,fontSize:12,background:P.sand,padding:"5px 4px"}}>
                          {SHOP_CATS.map(c=><option key={c} value={c}>{c}</option>)}
                        </select>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      })}

      {done.length>0 && (
        <div style={{marginTop:6}}>
          <button onClick={()=>setShowDone(p=>!p)} style={{display:"flex",alignItems:"center",gap:8,width:"100%",background:"none",border:"none",cursor:"pointer",padding:"6px 0",marginBottom:6}}>
            <div style={{flex:1,height:"0.5px",background:P.border}}/>
            <span style={{fontSize:10.5,fontWeight:600,color:P.dust,whiteSpace:"nowrap"}}>{showDone?"▴":"▾"} {done.length} FULLFØRT</span>
            <div style={{flex:1,height:"0.5px",background:P.border}}/>
          </button>
          {showDone && (
            <div style={{opacity:0.6}}>
              {done.map((item,idx) => (
                <div key={item.id} style={{display:"flex",alignItems:"center",gap:9,padding:"6px 2px",borderBottom:idx<done.length-1?`1px solid ${P.border}`:"none"}}>
                  <button onClick={()=>toggle(item.id)} style={{width:20,height:20,borderRadius:5,flexShrink:0,cursor:"pointer",background:P.olive,border:`1.5px solid ${P.olive}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <Em e="✓" s={{fontSize:11,color:"white"}}/>
                  </button>
                  <span style={{flex:1,fontSize:13,color:P.dust,textDecoration:"line-through"}}>{item.name}</span>
                  {item.amount && <span style={{fontSize:11.5,color:P.dust}}>{item.amount}</span>}
                  <button onClick={()=>remove(item.id)} style={{background:"none",border:"none",color:P.dust,cursor:"pointer",fontSize:14,padding:"0 2px",opacity:.35}}>✕</button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}


// ── Freezer Screen ────────────────────────────────────────────────
function FreezerScreen({freezer, setFreezer, itemHistory}) {
  const FREEZER_UNITS = ["stk","g","kg","ml","dl","l","pk","boks","pose"];
  const emptyForm = () => ({name:"",count:"1",unit:"pk",gramsPerUnit:""});
  const [form,setForm]             = useState(emptyForm());
  const [suggestions,setSuggestions] = useState([]);
  const [focusName,setFocusName]   = useState(false);

  // Historikk fra itemHistory + existing2 fryserposter
  const allNames = React.useMemo(()=>{
    const names = new Set();
    (itemHistory||[]).forEach(h=>{ if(h.name) names.add(h.name); });
    (freezer||[]).forEach(i=>names.add(i.name));
    return [...names];
  },[itemHistory,freezer]);

  const onNameChange = (val) => {
    setForm(f=>({...f,name:val}));
    if(val.length>=2) setSuggestions(allNames.filter(n=>n.toLowerCase().includes(val.toLowerCase())&&n!==val).slice(0,6));
    else setSuggestions([]);
  };
  const pickSuggestion = (name) => { setForm(f=>({...f,name})); setSuggestions([]); };

  const add = () => {
    if(!form.name.trim()) return;
    const batch = {
      id: uid(),
      count: parseInt(form.count)||1,
      unit: form.unit,
      gramsPerUnit: form.gramsPerUnit ? parseInt(form.gramsPerUnit) : null,
    };
    const existing = freezer.find(i=>i.name.toLowerCase()===form.name.trim().toLowerCase());
    if(existing) {
      // Finn om samme pakkestørrelse finnes
      const sameSize = existing.batches.find(b=>b.unit===batch.unit&&b.gramsPerUnit===batch.gramsPerUnit);
      const newBatches = sameSize
        ? existing.batches.map(b=>b.id===sameSize.id?{...b,count:b.count+batch.count}:b)
        : [...existing.batches, batch];
      setFreezer(p=>p.map(i=>i.id===existing.id?{...i,batches:newBatches}:i));
    } else {
      setFreezer(p=>[...p,{id:uid(), name:form.name.trim(), batches:[batch]}]);
    }
    setForm(emptyForm());
    setSuggestions([]);
  };

  const adjustBatch = (itemId, batchId, delta) => {
    setFreezer(p=>p.map(i=>i.id!==itemId?i:{
      ...i,
      batches: i.batches.map(b=>b.id!==batchId?b:{...b,count:Math.max(0,b.count+delta)})
               .filter(b=>b.count>0)
    }).filter(i=>i.batches.length>0));
  };
  const removeItem  = id  => setFreezer(p=>p.filter(i=>i.id!==id));

  const batchLabel = (b) => {
    if(b.gramsPerUnit) return `${b.count} ${b.unit} à ${b.gramsPerUnit} g`;
    if(b.unit!=="stk") return `${b.count} ${b.unit}`;
    return `${b.count} stk`;
  };

  const totalGrams = (item) => {
    const tot = item.batches.reduce((s,b)=>b.gramsPerUnit?s+b.count*b.gramsPerUnit:s, 0);
    return tot>0?tot:null;
  };

  const showGrams = form.unit==="pk"||form.unit==="boks"||form.unit==="pose"||form.unit==="g"||form.unit==="kg";

  return (
    <div>
      <div style={{fontSize:20,fontWeight:600,color:P.ink,marginBottom:4}}>Fryser</div>
      <div style={{fontSize:12,color:P.stone,marginBottom:14}}>❄️ {freezer.length} varer registrert</div>

      {/* Skjema */}
      <Card style={{marginBottom:20,padding:"12px 14px"}}>
        <div style={{fontSize:11,fontWeight:600,color:P.dust,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>Legg til i fryseren</div>

        <div style={{marginBottom:8}}>
          <div style={{fontSize:11,color:P.stone,marginBottom:4}}>Varenavn</div>
          <div style={{position:"relative"}}>
            <input value={form.name} onChange={e=>onNameChange(e.target.value)}
              onFocus={()=>setFocusName(true)}
              onBlur={()=>setTimeout(()=>setFocusName(false),150)}
              placeholder="f.eks. Karbonadedeig" autoComplete="off"
              style={{width:"100%",boxSizing:"border-box",fontSize:16,background:P.sand,
                border:`1.5px solid ${form.name?P.hazel:P.border}`,borderRadius:8,
                padding:"8px 10px",color:P.ink,outline:"none"}}/>
            {focusName && suggestions.length>0 && (
              <div style={{position:"absolute",top:"100%",left:0,right:0,background:P.linen,
                border:`1px solid ${P.hazel}`,borderTop:"none",borderRadius:"0 0 9px 9px",zIndex:20,overflow:"hidden"}}>
                {suggestions.map((s,i)=>(
                  <div key={i} onMouseDown={()=>pickSuggestion(s)}
                    style={{padding:"8px 12px",fontSize:14,cursor:"pointer",color:P.ink}}
                    onMouseEnter={e=>e.currentTarget.style.background=P.hazelXL}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>{s}</div>
                ))}
              </div>
            )}
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <div>
            <div style={{fontSize:11,color:P.stone,marginBottom:4}}>Antall</div>
            <input value={form.count} onChange={e=>setForm(f=>({...f,count:e.target.value}))}
              type="number" min="1"
              style={{width:"100%",boxSizing:"border-box",fontSize:16,background:P.sand,
                borderRadius:8,padding:"8px 10px",textAlign:"center"}}/>
          </div>
          <div>
            <div style={{fontSize:11,color:P.stone,marginBottom:4}}>Enhet</div>
            <select value={form.unit} onChange={e=>setForm(f=>({...f,unit:e.target.value,gramsPerUnit:""}))}
              style={{width:"100%",boxSizing:"border-box",fontSize:16,background:P.sand,
                borderRadius:8,padding:"8px 6px"}}>
              {FREEZER_UNITS.map(u=><option key={u} value={u}>{u}</option>)}
            </select>
          </div>
        </div>

        {showGrams && (
          <div style={{marginBottom:8}}>
            <div style={{fontSize:11,color:P.stone,marginBottom:4}}>Gram per {form.unit} <span style={{color:P.dust,fontWeight:400}}>(valgfritt)</span></div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <input value={form.gramsPerUnit} onChange={e=>setForm(f=>({...f,gramsPerUnit:e.target.value}))}
                type="number" placeholder="f.eks. 500"
                style={{flex:1,fontSize:16,background:P.sand,borderRadius:8,padding:"8px 10px"}}/>
              <span style={{fontSize:13,color:P.stone,fontWeight:500}}>g</span>
            </div>
          </div>
        )}

        {form.name.trim() && (
          <div style={{fontSize:12,color:P.stone,marginBottom:10,padding:"6px 10px",
            background:P.mist,borderRadius:7,border:`1px solid ${P.border}`}}>
            Lagres som: <strong style={{color:P.ink}}>{form.name.trim()}</strong>
            {" — "}{form.count||1} {form.unit}{form.gramsPerUnit?` à ${form.gramsPerUnit} g`:""}
          </div>
        )}

        <button onClick={add} disabled={!form.name.trim()}
          style={{width:"100%",padding:"10px",background:form.name.trim()?P.hazel:P.mist,
            color:form.name.trim()?"white":P.dust,border:"none",borderRadius:8,
            fontSize:14,cursor:form.name.trim()?"pointer":"default",fontWeight:600}}>
          ＋ Legg til i fryseren
        </button>
      </Card>

      {freezer.length===0 && (
        <div style={{textAlign:"center",padding:"40px 0",color:P.dust}}>
          <div style={{fontSize:32,marginBottom:10}}>❄️</div>
          <div style={{fontSize:14,fontWeight:500,color:P.stone}}>Fryseren er tom</div>
        </div>
      )}

      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {freezer.map(item => {
          const tot = totalGrams(item);
          return (
            <Card key={item.id} style={{padding:"10px 14px"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <span style={{fontSize:16}}>❄️</span>
                <span style={{flex:1,fontSize:14,fontWeight:600,color:P.ink}}>{item.name}</span>
                {tot && <span style={{fontSize:11,color:"#4A8BBF",fontWeight:500}}>Totalt: {tot} g</span>}
                <button onClick={()=>removeItem(item.id)}
                  style={{background:"none",border:"none",cursor:"pointer",color:P.dust,fontSize:13,opacity:.5,padding:"0 2px"}}>
                  ✕
                </button>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:4,paddingLeft:24}}>
                {item.batches.map(b=>(
                  <div key={b.id} style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{flex:1,fontSize:13,color:P.stone}}>{batchLabel(b)}</span>
                    <button onClick={()=>adjustBatch(item.id,b.id,-1)}
                      style={{width:24,height:24,borderRadius:6,background:P.mist,
                        border:`1px solid ${P.border}`,cursor:"pointer",fontSize:14,
                        fontWeight:600,color:P.stone,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                    <span style={{fontSize:13,fontWeight:600,color:P.ink,minWidth:16,textAlign:"center"}}>{b.count}</span>
                    <button onClick={()=>adjustBatch(item.id,b.id,1)}
                      style={{width:24,height:24,borderRadius:6,background:P.mist,
                        border:`1px solid ${P.border}`,cursor:"pointer",fontSize:14,
                        fontWeight:600,color:P.stone,display:"flex",alignItems:"center",justifyContent:"center"}}>＋</button>
                  </div>
                ))}
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}



// ── Forvaltning Screen ───────────────────────────────────────────
function ForvaltningScreen({liquidity,setLiquidity,budgetGroups,setBudgetGroups,
  incomeGroups,setIncomeGroups,incomeMonths,setIncomeMonths,
  transaksjoner,setTransaksjoner,rules,setRules,actual,setActual,
  receipts,setReceipts,month,setMonth}) {
  const [sub,setSub] = useState("spillerom");
  const [editSaldoInline,setEditSaldoInline] = useState(false);
  const [saldoInputVal,setSaldoInputVal] = useState("");
  const tabs = [
    {id:"spillerom", emoji:"📊",label:"Spillerom"},
    {id:"inntekter", emoji:"📥",label:"Inntekter"},
    {id:"kostnader", emoji:"💸",label:"Kostnader"},
    {id:"import",    emoji:"🏦",label:"Import"},
    {id:"kvitteringer", emoji:"🧾",label:"Kvitteringer"},
  ];
  // "detaljer" er en skjult sub — ikke i tab-baren, men tilgjengelig via spillerom-kortet

  // ── Spillerom-visning (beslutningsside) ──────────────────────────
  const liq = liquidity||{};
  const saldo = parseFloat(liq.saldo)||0;
  const progDate = liq.prognosisDate||new Date().toISOString().slice(0,10);
  const posts = Object.values(liq.posts||{});
  const res = calcSpillerom(saldo, posts, progDate);
  const disponibelt = saldo;
  const bundet = res.utbetalinger - res.innbetalinger;
  const spillerom = res.spillerom;
  const harSaldo = saldo>0;
  const harPoster = posts.length>0;
  const fmt2 = n=>new Intl.NumberFormat("nb-NO",{style:"currency",currency:"NOK",maximumFractionDigits:0}).format(n);
  const fmtD = d=>new Date(d).toLocaleDateString("nb-NO",{day:"numeric",month:"short"});

  // Fordeling per nivå fra budsjett
  const totalMonth = (niva) => {
    const alle = budgetGroups.flatMap(g=>g.items);
    const filtered = niva==="opprettholde"
      ? alle.filter(it => {
          const n = it.meta&&it.meta.niva||"opprettholde";
          // Støtter ny modell (opprettholde) og gammel (nodvendig/valgfritt)
          return n==="opprettholde"||n==="nodvendig"||n==="valgfritt";
        })
      : alle.filter(it=>(it.meta&&it.meta.niva||"opprettholde")===niva);
    return filtered.reduce((s,it)=>s+((it.months&&it.months[month]?it.months[month].budget:0)||0),0);
  };

  // Muligheter
  const muligheter = [];
  if(spillerom>=0&&harPoster) muligheter.push({tekst:"Alle faste kostnader er dekket frem til valgt dato.",type:"positiv"});
  if(spillerom>10000) muligheter.push({tekst:"Du har spillerom til ekstra sparing.",type:"positiv"});
  if(!harSaldo) muligheter.push({tekst:"Oppdater saldo for å få en prognose.",type:"noytral"});
  if(!harPoster) muligheter.push({tekst:"Ingen prognoseposter registrert ennå.",type:"noytral"});

  // Neste storre planlagte utbetaling — basert paa kontantflyt-motoren
  const nesteUtbetaling = finnNesteStorreUtbetaling(budgetGroups||[], month);

  const NivaKort = ({emoji,label,amount,color}) => (
    <div style={{background:P.linen,border:`1px solid ${P.border}`,borderRadius:10,
      padding:"10px 12px",flex:1}}>
      <div style={{fontSize:12,marginBottom:2}}>{emoji}</div>
      <div style={{fontSize:10,color:P.dust,marginBottom:4}}>{label}</div>
      <div style={{fontSize:15,fontWeight:700,color:color||P.ink}}>{fmt2(amount)}</div>
    </div>
  );

  return (
    <div>
      {/* Intern tab-bar */}
      <div style={{display:"flex",gap:4,marginBottom:16,background:P.mist,
        borderRadius:10,padding:3,border:`1px solid ${P.border}`}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setSub(t.id)}
            style={{flex:1,padding:"7px 0",fontSize:11.5,borderRadius:8,border:"none",
              cursor:"pointer",background:sub===t.id?P.linen:"transparent",
              color:sub===t.id?P.ink:P.stone,fontWeight:sub===t.id?600:400,
              boxShadow:sub===t.id?"0 1px 4px rgba(44,35,24,0.08)":"none"}}>
            {t.emoji} {t.label}
          </button>
        ))}
      </div>

      {/* ── SPILLEROM (beslutningsside) ── */}
      {sub==="spillerom" && (
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {/* Tre beslutningskort */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            <div style={{background:P.linen,border:"1px solid "+P.border,borderRadius:10,padding:"12px 10px",textAlign:"center",cursor:"pointer"}}
              onClick={()=>{if(!editSaldoInline){setSaldoInputVal(String(liq.saldo||""));setEditSaldoInline(true);}}}>
              <div style={{fontSize:9.5,fontWeight:600,color:P.dust,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Disponibelt nå</div>
              {editSaldoInline ? (
                <input type="number" value={saldoInputVal}
                  autoFocus
                  onChange={e=>setSaldoInputVal(e.target.value)}
                  onFocus={e=>e.target.select()}
                  onBlur={()=>{const v=parseFloat(saldoInputVal)||0;setLiquidity(p=>({...p,saldo:v,saldoUpdated:Date.now()}));setEditSaldoInline(false);}}
                  onKeyDown={e=>{if(e.key==="Enter"){const v=parseFloat(saldoInputVal)||0;setLiquidity(p=>({...p,saldo:v,saldoUpdated:Date.now()}));setEditSaldoInline(false);}}}
                  enterKeyHint="done"
                  onClick={e=>e.stopPropagation()}
                  style={{fontSize:15,fontWeight:700,width:"100%",textAlign:"center",
                    background:P.sand,border:"1px solid "+P.hazel,borderRadius:6,padding:"2px 4px"}}/>
              ) : (
                <div style={{fontSize:15,fontWeight:700,color:P.ink}}>{harSaldo?fmt2(disponibelt):"–"}</div>
              )}
              <div style={{fontSize:9,color:P.dust,marginTop:3}}>{editSaldoInline?"Enter for å lagre":harSaldo?"trykk for å endre":"trykk for å sette"}</div>
            </div>
            <div onClick={()=>setSub("poster")} style={{background:P.linen,
              border:"1px solid "+P.border,borderRadius:10,padding:"12px 10px",
              textAlign:"center",cursor:"pointer"}}>
              <div style={{fontSize:9.5,fontWeight:600,color:P.dust,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Bundet</div>
              <div style={{fontSize:15,fontWeight:700,color:bundet>0?P.clay:P.stone}}>{harPoster?fmt2(bundet):"–"}</div>
              <div style={{fontSize:9,color:P.dust,marginTop:3}}>trykk for poster</div>
            </div>
            <div onClick={()=>setSub("detaljer")} style={{
              background:harSaldo&&harPoster?(spillerom>=0?`${P.olive}10`:P.clayXL):P.linen,
              border:`1px solid ${harSaldo&&harPoster?(spillerom>=0?P.oliveL:P.clayL):P.border}`,
              borderRadius:10,padding:"12px 10px",textAlign:"center",cursor:"pointer"}}>
              <div style={{fontSize:9.5,fontWeight:600,color:harSaldo&&harPoster?(spillerom>=0?P.olive:P.clay):P.dust,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Spillerom</div>
              <div style={{fontSize:15,fontWeight:700,color:harSaldo&&harPoster?(spillerom>=0?P.olive:P.clay):P.stone}}>
                {harSaldo&&harPoster?fmt2(spillerom):"–"}
              </div>
              <div style={{fontSize:9,color:P.dust,marginTop:3}}>trykk for detaljer</div>
            </div>
          </div>

          {/* Muligheter */}
          {muligheter.length>0 && (
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              {muligheter.map((m,i)=>(
                <div key={i} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"9px 12px",
                  background:m.type==="positiv"?P.olive+"08":P.mist,
                  border:"1px solid "+(m.type==="positiv"?P.oliveL:P.border),borderRadius:9}}>
                  <span style={{fontSize:13,flexShrink:0,marginTop:1}}>{m.type==="positiv"?"✓":"ℹ️"}</span>
                  <span style={{fontSize:12.5,color:m.type==="positiv"?P.olive:P.stone,lineHeight:1.5}}>{m.tekst}</span>
                </div>
              ))}
            </div>
          )}

          {/* Neste storre planlagte utbetaling — basert paa kontantflyt-motoren */}
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",
            background:P.mist,border:"1px solid "+P.border,borderRadius:9}}>
            <span style={{fontSize:13,flexShrink:0}}>📅</span>
            <div style={{flex:1}}>
              <div style={{fontSize:10,color:P.dust,marginBottom:1}}>Neste større planlagte utbetaling</div>
              {nesteUtbetaling ? (
                <div style={{fontSize:12.5,color:P.stone}}>
                  <span style={{fontWeight:600,color:P.ink}}>{nesteUtbetaling.navn}</span>
                  {" — "}{fmt(nesteUtbetaling.belop)} i {MONTHS[nesteUtbetaling.maanedIndex]}
                </div>
              ) : (
                <div style={{fontSize:12.5,color:P.stone}}>Ingen større planlagte utbetalinger.</div>
              )}
            </div>
          </div>

          {/* Fordeling per nivå */}
          <div>
            <div style={{fontSize:10.5,fontWeight:600,color:P.dust,textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:8}}>Fordeling</div>
            <div style={{display:"flex",gap:6,marginBottom:6}}>
              <NivaKort emoji="🌳" label="Bygge"        amount={totalMonth("bygge")}   color={P.olive}/>
              <NivaKort emoji="✨" label="Velge"        amount={totalMonth("velge")}   color={P.dusk}/>
            </div>
            <div style={{display:"flex",gap:6}}>
              <NivaKort emoji="🌱" label="Opprettholde" amount={totalMonth("opprettholde")} color={P.hazel}/>
              <NivaKort emoji="🛡️" label="Beskytte"    amount={totalMonth("beskytte")} color={P.clay}/>
            </div>
          </div>

          {/* Lenke til detaljer */}
          <button onClick={()=>setSub("kostnader")}
            style={{fontSize:12,color:P.hazel,background:"none",border:`1px solid ${P.hazelL}`,
              borderRadius:8,padding:"8px 14px",cursor:"pointer",fontWeight:500,textAlign:"center"}}>
            Se budsjettdetaljer →
          </button>
        </div>
      )}

      {/* ── KOSTNADER (tidligere Budsjett) ── */}
      {sub==="kostnader" && (
        <BudsjettScreen
          budgetGroups={budgetGroups} setBudgetGroups={setBudgetGroups}
          actual={actual}
          transaksjoner={transaksjoner}
          month={month} setMonth={setMonth}/>
      )}

      {/* ── INNTEKTER ── */}
      {sub==="inntekter" && (
        <InntekterScreen
          incomeGroups={incomeGroups} setIncomeGroups={setIncomeGroups}
          actual={actual}
          transaksjoner={transaksjoner}
          month={month} setMonth={setMonth}/>
      )}

      {/* ── DETALJER (Spillerom) — skjult sub, åpnes via spillerom-kortet ── */}
      {sub==="detaljer" && (
        <div>
          <button onClick={()=>setSub("spillerom")}
            style={{display:"flex",alignItems:"center",gap:5,fontSize:12.5,color:P.hazel,
              marginBottom:14,background:"none",border:"none",cursor:"pointer",padding:0,fontWeight:500}}>
            ← Tilbake
          </button>
          <SpilleromScreen liquidity={liquidity} setLiquidity={setLiquidity} budgetGroups={budgetGroups} month={month} incomeMonths={incomeMonths} incomeGroups={incomeGroups}/>
        </div>
      )}

      {/* ── BANKIMPORT ── */}
      {sub==="import" && (
        <BankimportScreen
          transaksjoner={transaksjoner}
          setTransaksjoner={setTransaksjoner}
          rules={rules}
          setRules={setRules}
          actual={actual}
          setActual={setActual}
          receipts={receipts}
          setReceipts={setReceipts}
          liquidity={liquidity}
          budgetGroups={budgetGroups}
          incomeGroups={incomeGroups}/>
      )}

      {/* ── KVITTERINGSINNBOKS ── */}
      {sub==="kvitteringer" && (
        <KvitteringInnboksScreen
          receipts={receipts}
          setReceipts={setReceipts}
          budgetGroups={budgetGroups}
          incomeGroups={incomeGroups}
          transaksjoner={transaksjoner}
          setTransaksjoner={setTransaksjoner}
          actual={actual}
          setActual={setActual}/>
      )}
    </div>
  );
}




// ── BankimportScreen ─────────────────────────────────────────────
// ── KvitteringInnboksScreen ───────────────────────────────────────
// Egen, uavhengig kvitteringsflyt. En kvittering kan registreres og
// forberedes helt uten en tilhorende banktransaksjon. Kobling mot en
// transaksjon (matching) bygges IKKE i denne sprinten — status er
// alltid "Ikke koblet" saa lenge transactionId er null.
function KvitteringInnboksScreen({receipts,setReceipts,budgetGroups,incomeGroups,transaksjoner,setTransaksjoner,actual,setActual}) {
  const [visNy,setVisNy]         = useState(false);
  const [apenId,setApenId]       = useState(null);
  const [lasterOpp,setLasterOpp] = useState(false);
  const [feilmelding,setFeilmelding] = useState("");

  // ── Kjor kvitteringsmatching naar transaksjoner endres ───────────
  // Oppdaterer KUN forslag (suggestedTransactionId/matchConfidence/status).
  // Ruorer aldri en kvittering som allerede er "matched" — brukeren
  // har da allerede bekreftet, og appen skal ikke overstyre det valget.
  React.useEffect(() => {
    if(!transaksjoner || transaksjoner.length===0) return;
    if(!receipts || receipts.length===0) return;

    let noeEndret = false;
    const oppdaterte = receipts.map(r=>{
      if(r.matchingStatus==="matched") return r;
      const kandidater = findMatchingTransactions(r, transaksjoner);
      const beste = kandidater.length>0 ? kandidater[0] : null;
      const nyForeslattId = beste ? beste.transaction.id : null;
      const nyConfidence = beste ? beste.score : 0;
      const nyStatus = beste ? "suggested" : "unmatched";
      if(r.suggestedTransactionId===nyForeslattId && r.matchingStatus===nyStatus && r.matchConfidence===nyConfidence) {
        return r; // ingen endring — ikke skriv unodvendig
      }
      noeEndret = true;
      return {...r, suggestedTransactionId:nyForeslattId, matchConfidence:nyConfidence,
        matchingStatus:nyStatus, matchingUpdatedAt:new Date().toISOString()};
    });
    if(noeEndret) setReceipts(oppdaterte);
    // eslint-disable-next-line
  }, [transaksjoner, receipts]);

  // ── Etappe 1: kvittering lukker bankimport-behandlingen ──────────
  // Ett konfliktobjekt per kvittering (nokkel: receiptId), vist inline
  // i listeraden naar en kobling ikke kan lukkes automatisk eller
  // krever et eksplisitt brukervalg. Ingen ny modal — se begrunnelse
  // i leveransenotatet (§9 i oppdraget: unngaa ekstra bekreftelser).
  const [konflikter,setKonflikter] = useState({});

  // Orkestrerer HELE koblingen som én logisk operasjon: vurder ->
  // (rydd evt. forrige kobling) -> synkroniser Actual -> oppdater
  // kvittering -> oppdater transaksjon. Selve VURDERINGEN og BYGGINGEN
  // av Actual skjer i rene, delte motorer (se toppen av filen) — denne
  // funksjonen er kun den tynne orkestreringen som faktisk skriver,
  // og kan gjenbrukes uendret av et fremtidig hendelseslag.
  const kobleKvitteringTilTransaksjon = async (receipt, transactionId, tvungetHandling) => {
    const transaction = (transaksjoner||[]).find(t=>t.id===transactionId);
    if(!transaction) return;

    const forrigeTransaksjonId = receipt.matchedTransactionId;
    const erOmkobling = forrigeTransaksjonId && forrigeTransaksjonId!==transactionId;

    const vurdering = vurderKvitteringKobling(receipt, transaction, actual, receipts);

    // Blokkerende konflikter — ingen brukervalg kan overstyre disse her.
    if(!vurdering.kanKobles) {
      setKonflikter(prev=>({...prev, [receipt.id]:{...vurdering, transactionId}}));
      return;
    }

    // Avvikende eksisterende Actual krever et eksplisitt valg, med mindre
    // valget allerede er tatt (tvungetHandling kommer fra konfliktpanelet).
    const trengerValg = vurdering.kode==="transaksjon_har_avvikende_actual" && !tvungetHandling;
    if(trengerValg) {
      setKonflikter(prev=>({...prev, [receipt.id]:{...vurdering, transactionId}}));
      return;
    }

    setKonflikter(prev=>{ const n={...prev}; delete n[receipt.id]; return n; });
    const naa = new Date().toISOString();

    // Rydd forrige kobling forst, hvis dette er en omkobling til en NY
    // transaksjon — fjern gamle Actual, gjenaapne den gamle transaksjonen.
    if(erOmkobling) {
      await setActual(prev=>synkroniserActualForKobling(prev, receipt.id, forrigeTransaksjonId, []));
      await setTransaksjoner(prev=>prev.map(t=>t.id!==forrigeTransaksjonId?t:
        {...t, status:"krever_vurdering", behandlingstype:null}));
    }

    const skalLukke = vurdering.kanLukkes ||
      (vurdering.kode==="transaksjon_har_avvikende_actual" && !!tvungetHandling);
    const brukKvitteringensFordeling = vurdering.handling==="opprett_ny_actual" ||
      tvungetHandling==="bruk_kvittering";

    // 1. Synkroniser Actual FORST — trygt aa gjenta, og en eventuell feil i
    //    steg 2/3 etterlater da aldri penger som "forsvinner" fra rapportene.
    if(skalLukke && brukKvitteringensFordeling) {
      const nyeActual = byggActualFraKvitteringSplitter(receipt, transaction);
      await setActual(prev=>synkroniserActualForKobling(prev, receipt.id, transaction.id, nyeActual));
    }
    // (handling==="bekreft_eksisterende_actual" eller tvungetHandling==="behold_eksisterende":
    //  eksisterende Actual er allerede riktig/valgt — ikke skriv noe nytt der.)

    // 2. Oppdater kvittering
    await setReceipts(prev=>prev.map(x=>x.id!==receipt.id?x:{
      ...x, matchedTransactionId:transaction.id, matchingStatus:"matched", matchingUpdatedAt:naa,
    }));

    // 3. Oppdater transaksjon — kun dersom den faktisk kan lukkes.
    //    Gjenbruker eksisterende "behandlet"-status (§7 i oppdraget) med
    //    en ny behandlingstype ("kvittering") som skiller den fra "engang".
    if(skalLukke) {
      await setTransaksjoner(prev=>prev.map(t=>t.id!==transaction.id?t:{
        ...t, status:"behandlet", behandlingstype:"kvittering",
        matchetMot:null, matchetNavn:receipt.merchant||null,
      }));
    } else {
      // Lenken er opprettet, men lukking avventer (kvitteringen mangler
      // fordeling, eller belopet stemmer ikke) — vis en ikke-blokkerende
      // informasjonslinje i stedet for en feilmelding.
      setKonflikter(prev=>({...prev, [receipt.id]:{...vurdering, transactionId, kunLenke:true}}));
    }
  };

  const KONFLIKT_TEKST = {
    transaksjon_ignorert: "Transaksjonen er arkivert. Gjenåpne den i Bankimport for å kunne koble en kvittering til den.",
    transaksjon_koblet_annen_kvittering: "Denne transaksjonen er allerede koblet til en annen kvittering.",
    transaksjon_har_avvikende_actual: "Transaksjonen er allerede fordelt annerledes enn kvitteringen. Velg hvilken fordeling som skal gjelde.",
    ikke_fordelt: "Kvitteringen er koblet, men må fordeles før kjøpet kan ferdigbehandles automatisk.",
    splitt_avvik: "Splittsummen stemmer ikke med kvitteringens totalbeløp. Rett opp fordelingen for å ferdigbehandle automatisk.",
    belop_avvik: "Kvitteringsbeløpet stemmer ikke med banktransaksjonen. Sjekk at riktig transaksjon er valgt.",
  };

  // ── Ny kvittering: skjema-felter ─────────────────────────────────
  const [nyDato,setNyDato]         = useState(new Date().toISOString().slice(0,10));
  const [nyLeverandor,setNyLeverandor] = useState("");
  const [nyTotal,setNyTotal]       = useState("");
  const [nyFil,setNyFil]           = useState(null);

  // ── Ny kvittering: postering (samme prinsipp som KvitteringDetalj,
  //    men holdt som lokal utkast-state siden receipt ikke finnes i
  //    Firebase for Lagre trykkes) ───────────────────────────────────
  const [nyAllocationMode,setNyAllocationMode] = useState(null); // "single" | "split" | null
  const [nySplits,setNySplits]     = useState([]);
  const [nySokTekst,setNySokTekst] = useState("");

  const alle = receipts||[];

  const velgFil = (e) => {
    const file = e.target.files&&e.target.files[0];
    if(file) setNyFil(file);
  };

  const nyTotalTall = parseFloat(nyTotal)||0;
  const nySplitTotal = nySplits.reduce((s,sp)=>s+(sp.amount||0),0);
  const nyDiff = nyTotalTall - nySplitTotal;

  const nyLeggTilSplit = (post) => {
    const nySplit = {
      targetType:post.targetType, targetId:post.id, targetName:post.name, amount: nyDiff>0?nyDiff:0,
      ocrDescription: "", description: "",
      learning: {approved:false, source:"manual"},
    };
    setNySplits(prev=>[...prev, nySplit]);
    setNySokTekst("");
  };
  const nyOppdaterSplit = (idx, felt, val) => {
    setNySplits(prev=>prev.map((sp,i)=>i!==idx?sp:{...sp,[felt]: felt==="amount"?(parseFloat(String(val).replace(",","."))||0):val}));
  };
  const nyFjernSplit = (idx) => {
    setNySplits(prev=>prev.filter((_,i)=>i!==idx));
  };

  const registrerKvittering = () => {
    setLasterOpp(true);
    setFeilmelding("");

    const lagKvittering = (driveInfo) => {
      const naa = new Date().toISOString();
      const nyReceipt = {
        id: uid(),
        driveFileId: driveInfo?driveInfo.driveFileId:null,
        driveWebViewLink: driveInfo?driveInfo.driveWebViewLink:null,
        driveFolderId: driveInfo?driveInfo.driveFolderId:null,
        originalFileName: nyFil?(nyFil.name||""):"",
        mimeType: nyFil?(nyFil.type||""):"",
        transactionId: null,
        merchant: nyLeverandor.trim(),
        purchaseDate: nyDato,
        total: nyTotalTall,
        allocationMode: nyAllocationMode, // "single" | "split" | null
        splits: nySplits,
        ocrStatus: "none",
        ocrText: "",
        matchingStatus: "unmatched", // "unmatched" | "suggested" | "matched"
        matchConfidence: 0,
        suggestedTransactionId: null,
        matchedTransactionId: null,
        matchingUpdatedAt: naa,
        createdAt: naa,
        updatedAt: naa,
      };
      setReceipts(prev=>[...(prev||[]), nyReceipt]);
      setVisNy(false);
      setLasterOpp(false);
      setNyDato(new Date().toISOString().slice(0,10));
      setNyLeverandor("");
      setNyTotal("");
      setNyFil(null);
      setNyAllocationMode(null);
      setNySplits([]);
      setNySokTekst("");
    };

    // Bilde er valgfritt. Kvitteringsregistrering skal aldri blokkeres
    // av manglende bilde eller manglende Drive-tilkobling.
    if(!nyFil) {
      lagKvittering(null);
      return;
    }

    lastGapiDriveClient().then(function(){
      return lastOppKvitteringsbilde(nyFil, nyDato);
    }).then(function(res){
      lagKvittering(res);
    }).catch(function(err){
      console.error("Kunne ikke laste opp kvittering:", err);
      setFeilmelding("Kunne ikke laste opp bildet til Google Drive. Kvitteringen kan lagres uten bilde, eller prøv igjen etter å ha koblet til under Verktøy → Kontoer.");
      setLasterOpp(false);
    });
  };

  const oppdaterKvittering = (id, felter) => {
    setReceipts(prev=>(prev||[]).map(r=>r.id!==id?r:{...r,...felter,updatedAt:new Date().toISOString()}));
  };

  const alleMalPoster = [
    ...(budgetGroups||[]).flatMap(g=>g.items.map(it=>({id:it.id,name:it.name,gruppe:g.label,targetType:"budget"}))),
    ...(incomeGroups||[]).flatMap(g=>g.items.map(it=>({id:it.id,name:it.name,gruppe:g.label,targetType:"income"}))),
  ];

  const fmtD = d=>d?new Date(d).toLocaleDateString("nb-NO",{day:"numeric",month:"short",year:"numeric"}):"—";

  // ── Lokale utkast-felt for registreringsskjemaet ─────────────────
  // Samme prinsipp som SplitBelopFelt/SplitBeskrivelseFelt i
  // KvitteringDetalj: lokal string-state mens brukeren skriver,
  // lagres kun ved blur/Enter — aldri per tastetrykk.
  function NySplitBelopFelt({sp, idx}) {
    const [utkast,setUtkast] = useState(String(sp.amount!=null?sp.amount:0));
    React.useEffect(()=>{ setUtkast(String(sp.amount!=null?sp.amount:0)); }, [sp.amount]);
    const lagre = () => nyOppdaterSplit(idx,"amount",utkast);
    return (
      <input type="text" inputMode="decimal" value={utkast}
        onFocus={e=>e.target.select()}
        onChange={e=>setUtkast(e.target.value)}
        onBlur={lagre}
        onKeyDown={e=>{ if(e.key==="Enter"){ lagre(); e.target.blur(); } }}
        style={{width:72,fontSize:12,textAlign:"right",background:P.sand,
          border:"1px solid "+P.border,borderRadius:6,padding:"4px 6px"}}/>
    );
  }
  function NySplitBeskrivelseFelt({sp, idx}) {
    const [utkast,setUtkast] = useState(getDisplayDescription(sp));
    const lagre = () => nyOppdaterSplit(idx,"description",utkast);
    return (
      <input value={utkast}
        onChange={e=>setUtkast(e.target.value)}
        onBlur={lagre}
        onKeyDown={e=>{ if(e.key==="Enter"){ lagre(); e.target.blur(); } }}
        placeholder="Beskrivelse" autoComplete="off"
        style={{fontSize:11,color:P.ink,background:P.sand,border:"1px solid "+P.border,
          borderRadius:6,padding:"5px 8px",width:"100%",boxSizing:"border-box",marginTop:4}}/>
    );
  }

  function KvitteringDetalj({r}) {
    const [sokTekst,setSokTekst] = useState("");
    const [leggerTilBilde,setLeggerTilBilde] = useState(false);
    const splitTotal = calculateSplitTotal(r);
    const diff = (r.total||0) - splitTotal;

    const leggTilSplit = (post) => {
      const nySplit = {
        targetType:post.targetType, targetId:post.id, targetName:post.name, amount: diff>0?diff:0,
        ocrDescription: "", description: "",
        learning: {approved:false, source:"manual"},
      };
      oppdaterKvittering(r.id, {splits:[...(r.splits||[]), nySplit]});
      setSokTekst("");
    };
    const oppdaterSplit = (idx, felt, val) => {
      const nye = (r.splits||[]).map((sp,i)=>i!==idx?sp:{...sp,[felt]: felt==="amount"?(parseFloat(String(val).replace(",","."))||0):val});
      oppdaterKvittering(r.id, {splits:nye});
    };
    const fjernSplit = (idx) => {
      oppdaterKvittering(r.id, {splits:(r.splits||[]).filter((_,i)=>i!==idx)});
    };
    const settAllocationMode = (mode) => {
      oppdaterKvittering(r.id, {allocationMode:mode});
    };

    const sokTreff = sokTekst.trim().length>0
      ? alleMalPoster.filter(p=>p.name.toLowerCase().includes(sokTekst.trim().toLowerCase()))
      : [];

    // ── Splittbeløp: lokal utkast-state per rad ──────────────────────
    // Rotarsaken til at feltet mistet fokus: onChange skrev direkte til
    // Firebase for hvert tastetrykk (oppdaterSplit -> oppdaterKvittering
    // -> setReceipts -> re-render av hele receipts-arrayet). Na lagres
    // kun ved Enter/blur/Bekreft-knapp, med en lokal string-verdi mens
    // brukeren skriver, saa feltet aldri re-mountes midt i tastingen.
    function SplitBelopFelt({sp, idx}) {
      const [utkast,setUtkast] = useState(String(sp.amount!=null?sp.amount:0));
      const lagre = () => oppdaterSplit(idx,"amount",utkast);
      return (
        <input type="text" inputMode="decimal" value={utkast}
          onFocus={e=>e.target.select()}
          onChange={e=>setUtkast(e.target.value)}
          onBlur={lagre}
          onKeyDown={e=>{ if(e.key==="Enter"){ lagre(); e.target.blur(); } }}
          style={{width:72,fontSize:12,textAlign:"right",background:P.sand,
            border:"1px solid "+P.border,borderRadius:6,padding:"4px 6px"}}/>
      );
    }

    // Beskrivelse: samme rotarsak og samme fiks som SplitBelopFelt —
    // lokal utkast-state, lagres kun ved blur/Enter. Firebase skrives
    // aldri per tastetrykk. Viser description||ocrDescription til aa
    // begynne med, men lagrer alltid brukerens tekst i description —
    // ocrDescription roeres aldri herfra (kun fremtidig OCR skriver dit).
    function SplitBeskrivelseFelt({sp, idx}) {
      const [utkast,setUtkast] = useState(getDisplayDescription(sp));
      const lagre = () => oppdaterSplit(idx,"description",utkast);
      return (
        <input value={utkast}
          onChange={e=>setUtkast(e.target.value)}
          onBlur={lagre}
          onKeyDown={e=>{ if(e.key==="Enter"){ lagre(); e.target.blur(); } }}
          placeholder="Beskrivelse" autoComplete="off"
          style={{fontSize:10,color:P.dust,background:"transparent",border:"none",padding:0,width:"100%"}}/>
      );
    }

    return (
      <div style={{border:"1px solid "+P.border,borderTop:"none",
        borderRadius:"0 0 10px 10px",padding:"12px 14px",background:P.sand}}>

        {r.driveWebViewLink ? (
          <a href={r.driveWebViewLink} target="_blank" rel="noopener noreferrer"
            style={{display:"block",marginBottom:10,fontSize:12,color:P.hazel,textDecoration:"none"}}>
            📎 Åpne bilde i Google Drive
          </a>
        ) : (
          <label style={{display:"block",marginBottom:10,padding:"8px 10px",
            background:P.mist,border:"1.5px dashed "+P.border,borderRadius:7,
            cursor:"pointer",fontSize:11.5,color:P.stone,textAlign:"center"}}>
            {leggerTilBilde?"⏳ Laster opp…":"📷 Legg til bilde nå (valgfritt)"}
            <input type="file" accept="image/*" capture="environment" style={{display:"none"}}
              onChange={e=>{
                const file = e.target.files&&e.target.files[0]; if(!file) return;
                setLeggerTilBilde(true);
                lastGapiDriveClient().then(function(){
                  return lastOppKvitteringsbilde(file, r.purchaseDate);
                }).then(function(res){
                  oppdaterKvittering(r.id, {
                    driveFileId: res.driveFileId,
                    driveWebViewLink: res.driveWebViewLink,
                    driveFolderId: res.driveFolderId,
                    originalFileName: file.name||"",
                    mimeType: file.type||"",
                  });
                  setLeggerTilBilde(false);
                }).catch(function(err){
                  console.error("Kunne ikke laste opp bilde:", err);
                  setLeggerTilBilde(false);
                });
              }}/>
          </label>
        )}

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          <div>
            <div style={{fontSize:10,color:P.dust,marginBottom:3}}>Leverandør</div>
            <input value={r.merchant||""} onChange={e=>oppdaterKvittering(r.id,{merchant:e.target.value})}
              autoComplete="off"
              style={{width:"100%",boxSizing:"border-box",fontSize:13,background:P.linen,
                padding:"7px 9px",borderRadius:7,border:"1px solid "+P.border}}/>
          </div>
          <div>
            <div style={{fontSize:10,color:P.dust,marginBottom:3}}>Dato</div>
            <input type="date" value={r.purchaseDate||""} onChange={e=>oppdaterKvittering(r.id,{purchaseDate:e.target.value})}
              style={{width:"100%",boxSizing:"border-box",fontSize:13,background:P.linen,
                padding:"7px 9px",borderRadius:7,border:"1px solid "+P.border}}/>
          </div>
          <div>
            <div style={{fontSize:10,color:P.dust,marginBottom:3}}>Totalbeløp</div>
            <input type="number" value={r.total||0} onFocus={e=>e.target.select()}
              onChange={e=>oppdaterKvittering(r.id,{total:parseFloat(e.target.value)||0})}
              style={{width:"100%",boxSizing:"border-box",fontSize:13,background:P.linen,
                padding:"7px 9px",borderRadius:7,border:"1px solid "+P.border}}/>
          </div>
        </div>

        {/* ── Behandlingsvalg: hele kvitteringen mot én post, eller splitt ── */}
        <div style={{fontSize:11,fontWeight:600,color:P.dust,textTransform:"uppercase",
          letterSpacing:"0.07em",marginBottom:6}}>
          Hvordan skal kvitteringen behandles?
        </div>
        <div style={{display:"flex",gap:6,marginBottom:12}}>
          <button onClick={()=>settAllocationMode("single")}
            style={{flex:1,padding:"8px 6px",borderRadius:8,fontSize:11.5,cursor:"pointer",
              fontWeight:r.allocationMode==="single"?600:400,
              background:r.allocationMode==="single"?P.hazelXL:"transparent",
              color:r.allocationMode==="single"?P.hazel:P.stone,
              border:"1px solid "+(r.allocationMode==="single"?P.hazel:P.border)}}>
            Én post for hele kvitteringen
          </button>
          <button onClick={()=>settAllocationMode("split")}
            style={{flex:1,padding:"8px 6px",borderRadius:8,fontSize:11.5,cursor:"pointer",
              fontWeight:r.allocationMode==="split"?600:400,
              background:r.allocationMode==="split"?P.hazelXL:"transparent",
              color:r.allocationMode==="split"?P.hazel:P.stone,
              border:"1px solid "+(r.allocationMode==="split"?P.hazel:P.border)}}>
            Må splittes på flere poster
          </button>
        </div>

        {/* ── Én post: enkelt sok+velg, ingen linjeliste ── */}
        {r.allocationMode==="single" && (
          <div style={{marginBottom:12}}>
            {(r.splits||[]).length>0 ? (
              <div style={{padding:"8px 10px",background:"#F0FFF4",border:"1px solid "+P.oliveL,borderRadius:7}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{flex:1,minWidth:0,fontSize:12,fontWeight:600,color:P.olive,
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.splits[0].targetName}</div>
                  <SplitBelopFelt sp={r.splits[0]} idx={0}/>
                  <button onClick={()=>oppdaterKvittering(r.id,{splits:[]})}
                    style={{background:"none",border:"none",cursor:"pointer",color:P.dust,fontSize:11}}>Endre</button>
                </div>
                <SplitBeskrivelseFelt sp={r.splits[0]} idx={0}/>
              </div>
            ) : (
              <div>
                <input value={sokTekst} onChange={e=>setSokTekst(e.target.value)}
                  placeholder="Søk budsjett-/inntektspost…" autoComplete="off"
                  style={{width:"100%",boxSizing:"border-box",fontSize:12,background:P.mist,
                    padding:"7px 9px",borderRadius:7,marginBottom:6}}/>
                {sokTreff.length>0 && (
                  <div style={{maxHeight:140,overflowY:"auto"}}>
                    {sokTreff.slice(0,15).map(p=>(
                      <div key={p.targetType+"-"+p.id}
                        onClick={()=>leggTilSplit(p)}
                        style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",
                          padding:"5px 8px",borderRadius:6,marginBottom:2,
                          background:P.linen,border:"1px solid "+P.border}}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:11.5,color:P.ink}}>{p.name}</div>
                          <div style={{fontSize:9.5,color:P.dust}}>{p.gruppe}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* ── Splitt: flere poster, linjeliste med redigerbart belop ── */}
        {r.allocationMode==="split" && (
          <div>
            <div style={{fontSize:11,fontWeight:600,color:P.dust,textTransform:"uppercase",
              letterSpacing:"0.07em",marginBottom:6}}>
              Splitt mot budsjettposter
            </div>

            {(r.splits||[]).map((sp,idx)=>(
              <div key={idx} style={{display:"flex",alignItems:"center",gap:6,marginBottom:5,
                padding:"6px 8px",background:P.linen,border:"1px solid "+P.border,borderRadius:7}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,color:P.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sp.targetName}</div>
                  <SplitBeskrivelseFelt sp={sp} idx={idx}/>
                </div>
                <SplitBelopFelt sp={sp} idx={idx}/>
                <button onClick={()=>fjernSplit(idx)}
                  style={{background:"none",border:"none",cursor:"pointer",color:P.dust,fontSize:12,opacity:.6}}>🗑️</button>
              </div>
            ))}

            <div style={{fontSize:11,marginBottom:8,color:diff===0?P.olive:P.clay}}>
              Splittsum: {fmt(splitTotal)} {diff!==0 && ("· gjenstår "+fmt(diff))}
            </div>

            <input value={sokTekst} onChange={e=>setSokTekst(e.target.value)}
              placeholder="Søk budsjett-/inntektspost for å legge til splitt…" autoComplete="off"
              style={{width:"100%",boxSizing:"border-box",fontSize:12,background:P.mist,
                padding:"7px 9px",borderRadius:7,marginBottom:6}}/>
            {sokTreff.length>0 && (
              <div style={{maxHeight:140,overflowY:"auto",marginBottom:8}}>
                {sokTreff.slice(0,15).map(p=>(
                  <div key={p.targetType+"-"+p.id} onClick={()=>leggTilSplit(p)}
                    style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",
                      padding:"5px 8px",borderRadius:6,marginBottom:2,
                      background:P.linen,border:"1px solid "+P.border}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:11.5,color:P.ink}}>{p.name}</div>
                      <div style={{fontSize:9.5,color:P.dust}}>{p.gruppe}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        <button onClick={()=>setApenId(null)}
          style={{width:"100%",padding:"8px",background:P.mist,border:"1px solid "+P.border,
            borderRadius:8,fontSize:12,cursor:"pointer",color:P.stone,marginTop:4}}>
          Lukk
        </button>
      </div>
    );
  }

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div>
          <div style={{fontSize:15,fontWeight:600,color:P.ink}}>🧾 Kvitteringer</div>
          <div style={{fontSize:11,color:P.stone}}>{alle.length} registrert</div>
        </div>
        <button onClick={()=>{setVisNy(v=>!v);setFeilmelding("");}}
          style={{padding:"7px 14px",background:visNy?P.mist:P.hazel,
            border:"1px solid "+(visNy?P.border:P.hazel),borderRadius:8,
            fontSize:12,cursor:"pointer",color:visNy?P.stone:"white",fontWeight:500}}>
          {visNy?"✕ Lukk":"＋ Ny kvittering"}
        </button>
      </div>

      {visNy && (
        <Card style={{padding:"14px",marginBottom:14}}>
          <label style={{display:"block",padding:"12px 14px",background:P.mist,
            border:"1.5px dashed "+P.border,borderRadius:9,cursor:"pointer",
            fontSize:13,color:P.stone,textAlign:"center",marginBottom:10}}>
            {nyFil ? "📷 "+nyFil.name : "📷 Ta bilde / velg bilde (valgfritt)"}
            <input type="file" accept="image/*" capture="environment" onChange={velgFil} style={{display:"none"}}/>
          </label>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            <div>
              <div style={{fontSize:10,color:P.dust,marginBottom:3}}>Dato</div>
              <input type="date" value={nyDato} onChange={e=>setNyDato(e.target.value)}
                style={{width:"100%",boxSizing:"border-box",fontSize:13,background:P.sand,
                  padding:"7px 9px",borderRadius:7}}/>
            </div>
            <div>
              <div style={{fontSize:10,color:P.dust,marginBottom:3}}>Totalbeløp</div>
              <input type="number" value={nyTotal} onChange={e=>setNyTotal(e.target.value)}
                onFocus={e=>e.target.select()} placeholder="0"
                style={{width:"100%",boxSizing:"border-box",fontSize:13,background:P.sand,
                  padding:"7px 9px",borderRadius:7}}/>
            </div>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:10,color:P.dust,marginBottom:3}}>Leverandør</div>
            <input value={nyLeverandor} onChange={e=>setNyLeverandor(e.target.value)}
              placeholder="F.eks. Rema 1000" autoComplete="off"
              style={{width:"100%",boxSizing:"border-box",fontSize:13,background:P.sand,
                padding:"7px 9px",borderRadius:7}}/>
          </div>

          {/* ── Postering: samme behandlingsvalg som i detaljvisningen,
               men gjort FOR kvitteringen lagres — slik at brukeren
               kan fullfore hele beslutningen i ett skjermbilde. ── */}
          <div style={{fontSize:11,fontWeight:600,color:P.dust,textTransform:"uppercase",
            letterSpacing:"0.07em",marginBottom:6,marginTop:4}}>
            Hvordan skal kvitteringen behandles?
          </div>
          <div style={{display:"flex",gap:6,marginBottom:10}}>
            <button onClick={()=>{setNyAllocationMode("single");setNySplits([]);setNySokTekst("");}}
              style={{flex:1,padding:"8px 6px",borderRadius:8,fontSize:11.5,cursor:"pointer",
                fontWeight:nyAllocationMode==="single"?600:400,
                background:nyAllocationMode==="single"?P.hazelXL:"transparent",
                color:nyAllocationMode==="single"?P.hazel:P.stone,
                border:"1px solid "+(nyAllocationMode==="single"?P.hazel:P.border)}}>
              Én post for hele kvitteringen
            </button>
            <button onClick={()=>{setNyAllocationMode("split");setNySplits([]);setNySokTekst("");}}
              style={{flex:1,padding:"8px 6px",borderRadius:8,fontSize:11.5,cursor:"pointer",
                fontWeight:nyAllocationMode==="split"?600:400,
                background:nyAllocationMode==="split"?P.hazelXL:"transparent",
                color:nyAllocationMode==="split"?P.hazel:P.stone,
                border:"1px solid "+(nyAllocationMode==="split"?P.hazel:P.border)}}>
              Må splittes på flere poster
