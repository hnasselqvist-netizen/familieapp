// ─── Ukeberegning ─────────────────────────────────────────────────
// Returnerer ISO-ukenøkkel: "2026-W25"
function getWeekKey(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - (d.getDay()+6)%7);
  const week1 = new Date(d.getFullYear(),0,4);
  const wn = 1 + Math.round(((d-week1)/86400000 - 3 + (week1.getDay()+6)%7)/7);
  return `${d.getFullYear()}-W${String(wn).padStart(2,"0")}`;
}
// Returnerer mandag i en gitt uke som Date
function getMondayOfWeek(weekKey) {
  const [year, w] = weekKey.split("-W").map(Number);
  const jan4 = new Date(year, 0, 4);
  const monday = new Date(jan4);
  monday.setDate(jan4.getDate() - (jan4.getDay()+6)%7 + (w-1)*7);
  return monday;
}
// Dato-streng for en gitt ukedag i en uke
function getDayDate(weekKey, dayIndex) {
  const mon = getMondayOfWeek(weekKey);
  const d = new Date(mon);
  d.setDate(mon.getDate() + dayIndex);
  return d;
}
function addWeeks(weekKey, n) {
  const mon = getMondayOfWeek(weekKey);
  mon.setDate(mon.getDate() + n*7);
  return getWeekKey(mon);
}
function formatShortDate(date) {
  return date.toLocaleDateString("nb-NO",{day:"numeric",month:"short"});
}

function Modal({onClose,title,children}) {
  const [height,setHeight] = React.useState(70);
  const dragging = React.useRef(false);
  const startY   = React.useRef(0);
  const startH   = React.useRef(0);

  const onDragStart = (e) => {
    dragging.current=true;
    startY.current=e.touches?e.touches[0].clientY:e.clientY;
    startH.current=height;
    const move=(ev)=>{
      if(!dragging.current)return;
      const y=ev.touches?ev.touches[0].clientY:ev.clientY;
      const delta=startY.current-y;
      const newH=Math.min(95,Math.max(25,startH.current+(delta/window.innerHeight)*100));
      setHeight(newH);
    };
    const up=()=>{dragging.current=false;window.removeEventListener("mousemove",move);window.removeEventListener("mouseup",up);window.removeEventListener("touchmove",move);window.removeEventListener("touchend",up);};
    window.addEventListener("mousemove",move);window.addEventListener("mouseup",up);
    window.addEventListener("touchmove",move,{passive:false});window.addEventListener("touchend",up);
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(44,35,24,0.35)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200,backdropFilter:"blur(2px)"}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:P.linen,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:460,height:`${height}vh`,display:"flex",flexDirection:"column",boxShadow:"0 -8px 32px rgba(44,35,24,0.12)"}}>
        <div onMouseDown={onDragStart} onTouchStart={onDragStart}
          style={{padding:"10px 0 6px",cursor:"row-resize",flexShrink:0,touchAction:"none"}}>
          <div style={{width:40,height:4,borderRadius:2,background:P.hazelL,margin:"0 auto"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0 16px 12px",borderBottom:`1px solid ${P.border}`,flexShrink:0}}>
          <span style={{fontSize:15,fontWeight:600,color:P.ink,letterSpacing:"-0.01em"}}>{title}</span>
          <button onClick={onClose} style={{background:P.mist,border:"none",cursor:"pointer",color:P.stone,width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>
            <Em e="✕"/>
          </button>
        </div>
        <div style={{overflowY:"auto",padding:"14px 16px 36px",flex:1}}>{children}</div>
      </div>
    </div>
  );
}

// ─── HJEM ────────────────────────────────────────────────────────
function HomeScreen({meals,shopping,setTab,budgetGroups,month}) {
  const planned = DAYS.filter(d=>meals[d]).length;
  const rem     = shopping.filter(i=>!i.done).length;
  const matG    = budgetGroups.find(g=>g.id==="mat");
  const matB    = matG?.items.reduce((s,i)=>s+i.months[month].budget,0)||0;
  const matS    = matG?.items.reduce((s,i)=>s+i.months[month].spent,0)||0;
  const matOver = isOver(matS,matB);

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      {/* Ukeoversikt */}
      <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <SL style={{marginBottom:0}}>Denne uken</SL>
          <span style={{fontSize:11,color:P.dust}}><Em e="✓" s={{fontSize:10}}/> {planned} av 7 planlagt</span>
        </div>
        <Card style={{padding:"14px 16px"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5}}>
            {DAYS.map((d,i)=>{
              const has=!!meals[d],today=i===0;
              return (
                <div key={d} onClick={()=>setTab("plan")} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"pointer"}}>
                  <span style={{fontSize:9.5,fontWeight:600,color:today?P.hazel:P.dust,letterSpacing:"0.04em"}}>{DAY_S[d]}</span>
                  <div style={{width:"100%",aspectRatio:"1",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",
                    background:has?`${P.olive}15`:today?P.hazelXL:P.mist,
                    color:has?P.olive:today?P.hazel:P.dust,
                    border:today?`1.5px solid ${P.hazel}`:has?`1px solid ${P.oliveL}`:`1px solid transparent`,
                    fontWeight:has?600:400,
                  }}>
                    {has?<span style={{fontSize:8,padding:"0 1px",textAlign:"center"}}>{meals[d].split(" ")[0]}</span>:<Em e="＋" s={{fontSize:12}}/>}
                  </div>
                </div>
              );
            })}
          </div>
        </Card>
      </div>

      {/* Statuskort */}
      <div>
        <SL style={{marginBottom:10}}>Oversikt</SL>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Card onClick={()=>setTab("shopping")} style={{cursor:"pointer",padding:"14px"}}>
            <IBox emoji="🧺"  color={P.hazel} size={32}/>
            <div style={{fontSize:26,fontWeight:600,color:P.ink,marginTop:10,letterSpacing:"-0.02em"}}>{rem}</div>
            <div style={{fontSize:12,fontWeight:500,color:P.stone,marginTop:1}}>Varer igjen</div>
            <div style={{fontSize:10.5,color:P.dust,marginTop:2}}>{shopping.length-rem} av {shopping.length} handlet</div>
          </Card>
          <Card onClick={()=>setTab("economy")} style={{cursor:"pointer",padding:"14px"}}>
            <IBox emoji="📈"  color={matOver?P.clay:P.olive} size={32}/>
            <div style={{fontSize:26,fontWeight:600,color:matOver?P.clay:P.ink,marginTop:10,letterSpacing:"-0.02em"}}>{pct(matS,matB)}<span style={{fontSize:14,fontWeight:400}}>%</span></div>
            <div style={{marginTop:8,marginBottom:6}}><Bar value={matS} max={matB||1} color={P.olive} h={3} over={matOver}/></div>
            <div style={{fontSize:12,fontWeight:500,color:P.stone}}>Matbudsjett</div>
            <div style={{fontSize:10.5,color:P.dust,marginTop:2}}>{fmt(matS)} av {fmt(matB)}</div>
          </Card>
        </div>
      </div>

      {/* Hurtiglenker */}
      <div>
        <SL style={{marginBottom:10}}>Moduler</SL>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {[
            {tab:"plan",    icon:"calendar-week",label:"Middagsplan", desc:"Planlegg uken og søk i kokebok",color:P.olive},
            {tab:"recipes", icon:"book-2",       label:"Kokebok",     desc:`${INIT_RECIPES.length} oppskrifter lagret`,color:P.dusk},
            {tab:"shopping",icon:"shopping-bag", label:"Handleliste", desc:`${shopping.length} varer · ${rem} gjenstår`,color:P.hazel},
            {tab:"economy", icon:"chart-pie",    label:"Økonomi",     desc:"Budsjett og faktisk forbruk",color:P.gold},

// ─── INGREDIENSPICKER ────────────────────────────────────────────
function IngredientPicker({recipe,onClose,onAdd}) {
  const [sel,setSel] = useState(()=>new Set(recipe.ingredients.map((_,i)=>i)));
  const toggle = i => setSel(p=>{const n=new Set(p);n.has(i)?n.delete(i):n.add(i);return n;});
  return (
    <Modal title={`Ingredienser — ${recipe.name}`} onClose={onClose}>
      <p style={{fontSize:12,color:P.stone,marginBottom:12,lineHeight:1.6}}>Velg hva som skal på handlelisten. Finnes varen fra før, oppdateres mengden automatisk.</p>
      <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:16}}>
        {recipe.ingredients.map((ing,i)=>{
          const on=sel.has(i); const cc=CAT_COLOR[ing.cat]||P.hazel;
          return (
            <div key={i} onClick={()=>toggle(i)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",
              background:on?`${P.olive}10`:P.mist,border:`1px solid ${on?P.olive:P.border}`,borderRadius:9,cursor:"pointer",transition:"all .12s"}}>
              <div style={{width:20,height:20,borderRadius:5,flexShrink:0,background:on?P.olive:"transparent",
                border:`1.5px solid ${on?P.olive:P.hazelL}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                {on&&<Em e="✓" s={{fontSize:11,color:"white"}}/>}
              </div>
              <div style={{flex:1}}>
                <span style={{fontSize:13,fontWeight:500,color:P.ink}}>{ing.name}</span>
                <span style={{fontSize:11,color:P.stone,marginLeft:8}}>{ing.amount}</span>
              </div>
              <div style={{width:6,height:6,borderRadius:"50%",background:cc,flexShrink:0}}/>
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={onClose} style={{flex:1,padding:"10px",background:P.mist,border:`1px solid ${P.border}`,borderRadius:9,fontSize:13,cursor:"pointer",color:P.stone,fontWeight:500}}>
          Avbryt
        </button>
        <button onClick={()=>{onAdd(recipe.ingredients.filter((_,i)=>sel.has(i)));onClose();}}
          style={{flex:2,padding:"10px",background:P.hazel,border:"none",borderRadius:9,fontSize:13,cursor:"pointer",color:"white",fontWeight:600}}>
          <Em e="🛒" s={{marginRight:6}}/> Legg til ({sel.size})
        </button>
      </div>
    </Modal>
  );
}

// ─── MIDDAGSPLAN ─────────────────────────────────────────────────
function PlanScreen({allMeals,setWeekMeals,recipes,shopping,setShopping}) {
  const todayKey  = getWeekKey(new Date());
  const [weekKey,setWeekKey] = useState(todayKey);
  const [editing,setEditing] = useState(null);
  const [query,setQuery]     = useState("");
  const [picker,setPicker]   = useState(null);

  // meals for current week — fallback to empty object
  const meals = allMeals[weekKey] || {};
  const isCurrentWeek = weekKey === todayKey;
  const todayDayIndex = (new Date().getDay()+6)%7; // 0=Mon..6=Sun

  const setMeal = (day,val) => setWeekMeals(weekKey, {...meals, [day]: val});
  const startEdit = d => { setEditing(d); setQuery(meals[d]||""); };
  const closeEdit = ()  => { setEditing(null); setQuery(""); };
  const setFree   = (d,v) => { setMeal(d,v); setQuery(v); };
  const pickRec   = (d,r) => { setMeal(d,r.name); setPicker({day:d,recipe:r}); setEditing(null); setQuery(""); };
  const clearDay  = (d,e) => { e.stopPropagation(); setMeal(d,""); };

  const addToShopping = ings => setShopping(prev=>{
    let list=[...prev];
    ings.forEach(ing=>{
      const idx=list.findIndex(s=>s.name.toLowerCase()===ing.name.toLowerCase());
      if(idx>=0) list[idx]={...list[idx],amount:`${list[idx].amount} + ${ing.amount}`};
      else list=[...list,{id:uid(),name:ing.name,amount:ing.amount,cat:ing.cat,done:false}];
    });
    return list;
  });

  const hits = query.length>0
    ? recipes.filter(r=>r.name.toLowerCase().includes(query.toLowerCase())||r.tags.some(t=>t.includes(query.toLowerCase())))
    : [];

  const mon = getMondayOfWeek(weekKey);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const weekLabel = `${formatShortDate(mon)} – ${formatShortDate(sun)}`;

  return (
    <div>
      {/* Header med ukenavigasjon */}
      <div style={{marginBottom:16}}>
        <div style={{fontSize:20,fontWeight:600,color:P.ink,letterSpacing:"-0.02em",marginBottom:6}}>Middagsplan</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <button onClick={()=>setWeekKey(addWeeks(weekKey,-1))}
            style={{background:P.mist,border:`1px solid ${P.border}`,borderRadius:8,padding:"5px 11px",cursor:"pointer",color:P.stone,fontSize:16,lineHeight:1}}>
            ‹
          </button>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:12,fontWeight:600,color:isCurrentWeek?P.hazel:P.stone}}>
              {isCurrentWeek ? "Denne uken" : weekKey.replace("-W"," · Uke ")}
            </div>
            <div style={{fontSize:11,color:P.dust,marginTop:1}}>{weekLabel}</div>
          </div>
          <button onClick={()=>setWeekKey(addWeeks(weekKey,1))}
            style={{background:P.mist,border:`1px solid ${P.border}`,borderRadius:8,padding:"5px 11px",cursor:"pointer",color:P.stone,fontSize:16,lineHeight:1}}>
            ›
          </button>
        </div>
        {!isCurrentWeek&&(
          <button onClick={()=>setWeekKey(todayKey)}
            style={{width:"100%",marginTop:8,padding:"5px",background:P.hazelXL,border:`1px solid ${P.hazelL}`,borderRadius:8,fontSize:11.5,cursor:"pointer",color:P.hazel,fontWeight:500}}>
            📅 Gå til denne uken
          </button>
        )}
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {DAYS.map((day,i)=>{
          const isEd=editing===day;
          const has=!!(meals[day]);
          const isToday=isCurrentWeek&&i===todayDayIndex;
          const isPast=isCurrentWeek&&i<todayDayIndex;
          const dayDate=getDayDate(weekKey,i);
          const matchRec=recipes.find(r=>r.name.toLowerCase()===(meals[day]||"").toLowerCase());

          return (
            <div key={day}>
              <div onClick={()=>!isEd&&startEdit(day)} style={{
                background:isPast?"var(--color-background-secondary,#F5F5F5)":P.linen,
                borderRadius:isEd&&hits.length>0?"11px 11px 0 0":11,
                border:`1px solid ${isEd?P.hazel:isToday?P.hazel:P.border}`,
                borderLeft:isToday&&!isEd?`3px solid ${P.hazel}`:`1px solid ${isEd?P.hazel:P.border}`,
                padding:"10px 12px", cursor:isEd?"default":"pointer",
                opacity:isPast?0.65:1,
                boxShadow:"0 1px 3px rgba(44,35,24,0.04)", transition:"border-color .15s",
              }}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  {/* Dageboks med riktig dato */}
                  <div style={{minWidth:44,height:44,borderRadius:9,flexShrink:0,
                    background:isToday?P.hazel:isPast?P.border:P.mist,
                    display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                    <span style={{fontSize:9,fontWeight:600,letterSpacing:"0.04em",
                      color:isToday?"rgba(255,255,255,0.7)":isPast?"white":P.dust}}>
                      {DAY_S[day]}
                    </span>
                    <span style={{fontSize:15,fontWeight:600,lineHeight:1.1,
                      color:isToday?"white":isPast?"white":P.ink}}>
                      {dayDate.getDate()}
                    </span>
                  </div>

                  <div style={{flex:1,minWidth:0}}>
                    {isEd ? (
                      <div onClick={e=>e.stopPropagation()}>
                        <input autoFocus value={query} onChange={e=>setFree(day,e.target.value)}
                          onKeyDown={e=>{if(e.key==="Escape")closeEdit();if(e.key==="Enter"&&hits.length===0)closeEdit();}}
                          placeholder="Søk i kokebok eller skriv inn…"
                          style={{width:"100%",fontSize:13,boxSizing:"border-box",background:P.sand,
                            border:`1px solid ${P.hazel}`,padding:"7px 10px",borderRadius:7,color:P.ink,outline:"none"}}/>
                      </div>
                    ) : (
                      <div>
                        <div style={{fontSize:13.5,fontWeight:has?600:400,
                          color:has?P.ink:P.dust,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                          {has?meals[day]:"Legg til middag…"}
                        </div>
                        {matchRec&&(
                          <div style={{fontSize:11,color:P.dust,marginTop:2,display:"flex",alignItems:"center",gap:6}}>
                            <Em e="⏱" s={{fontSize:10}}/> {matchRec.time} min
                            <span style={{color:P.border}}>·</span>
                            <Em e="👥" s={{fontSize:10}}/> {matchRec.servings} pers
                          </div>
                        )}
                      </div>
                    )}
                  </div>

                  <div style={{display:"flex",gap:5,alignItems:"center",flexShrink:0}}>
                    {isEd ? (
                      <button onClick={closeEdit} style={{background:P.mist,border:`1px solid ${P.border}`,
                        borderRadius:7,padding:"5px 10px",fontSize:11.5,cursor:"pointer",
                        color:P.stone,fontWeight:500,display:"flex",alignItems:"center",gap:4}}>
                        <Em e="✓" s={{fontSize:11}}/> Ferdig
                      </button>
                    ) : (
                      <>
                        {has&&matchRec&&(
                          <button onClick={e=>{e.stopPropagation();setPicker({day,recipe:matchRec});}}
                            style={{background:P.oliveXL,border:`1px solid ${P.oliveL}`,borderRadius:7,
                              padding:"5px 8px",fontSize:11,cursor:"pointer",color:P.olive,
                              display:"flex",alignItems:"center",gap:3}}>
                            <Em e="🛒" s={{fontSize:12}}/> Handle
                          </button>
                        )}
                        {has&&<button onClick={e=>clearDay(day,e)} style={{background:"none",border:"none",
                          color:P.dust,cursor:"pointer",fontSize:15,padding:"2px",lineHeight:1,opacity:.6}}>
                          <Em e="✕"/>
                        </button>}
                        {!has&&<Em e="＋" s={{color:P.dust,fontSize:16}}/>}
                      </>
                    )}
                  </div>
                </div>
              </div>

              {isEd&&hits.length>0&&(
                <div style={{border:`1px solid ${P.hazel}`,borderTop:"none",
                  borderRadius:"0 0 11px 11px",background:P.linen,overflow:"hidden"}}>
                  {hits.map((r,ri)=>(
                    {(()=>{
                      const wkMeals=allMeals[weekKey]||{};
                      const plannedDay=DAYS.find(d=>d!==day&&wkMeals[d]?.toLowerCase()===r.name.toLowerCase());
                      return (
                        <div key={r.id} onClick={()=>!plannedDay&&pickRec(day,r)}
                          style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",
                            borderTop:ri>0?`1px solid ${P.border}`:"none",
                            cursor:plannedDay?"default":"pointer",opacity:plannedDay?0.5:1}}
                          onMouseEnter={e=>{if(!plannedDay)e.currentTarget.style.background=P.hazelXL;}}
                          onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                          <IBox emoji="🍳" color={plannedDay?P.hazelL:P.dusk} size={30}/>
                          <div style={{flex:1}}>
                            <div style={{fontSize:13,fontWeight:500,color:plannedDay?P.dust:P.ink}}>{r.name}</div>
                            <div style={{fontSize:11,color:P.dust}}>
                              {plannedDay
                                ?<span style={{color:P.clay}}>⚠️ Planlagt {DAY_FULL[plannedDay].toLowerCase()}</span>
                                :<span><Em e="⏱" s={{fontSize:10}}/> {r.time} min · <Em e="👥" s={{fontSize:10}}/> {r.servings} pers</span>
                              }
                            </div>
                          </div>
                          {!plannedDay&&<Em e="↵" s={{color:P.hazelL,fontSize:14}}/>}
                        </div>
                      );
                    })()}
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
      {picker&&<IngredientPicker recipe={picker.recipe} onClose={()=>setPicker(null)} onAdd={addToShopping}/>}
    </div>
  );
}

// ─── INGREDIENS-INPUTRAD ─────────────────────────────────────────

  const [iName,setIName]     = useState("");
  const [iAmt,setIAmt]       = useState("");
  const [iCat,setICat]       = useState("Diverse");
  const add = () => {
    if(!iName.trim()) return;
    onAdd(`${iName.trim()}|${iAmt.trim()}|${iCat}`);
    setIName(""); setIAmt(""); setICat("Diverse");
  };
  return (
    <div style={{marginTop:8,padding:"10px",background:P.sand,borderRadius:9,border:`1px solid ${P.border}`}}>
      <div style={{fontSize:11,color:P.dust,marginBottom:6,fontWeight:500}}>Legg til ingrediens</div>
      <div style={{display:"flex",gap:6,marginBottom:6}}>
        <input value={iName} onChange={e=>setIName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}
          placeholder="Ingrediensnavn" style={{flex:2,fontSize:12,background:P.linen}}/>
        <input value={iAmt} onChange={e=>setIAmt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}
          placeholder="Mengde" style={{flex:1,fontSize:12,background:P.linen}}/>
      </div>
      <div style={{display:"flex",gap:6}}>
        <select value={iCat} onChange={e=>setICat(e.target.value)} style={{flex:1,fontSize:12,background:P.linen}}>
          {["Frukt og grønt","Kjøtt","Fisk og sjømat","Ost og meieri","Tørrvarer",
            "Brød og bakst","Frysevarer","Drikke","Rengjøring","Diverse"].map(c=><option key={c}>{c}</option>)}
        </select>
        <button onClick={add} style={{background:iName.trim()?P.hazel:P.mist,color:iName.trim()?"white":P.dust,
          border:"none",borderRadius:8,padding:"0 14px",cursor:iName.trim()?"pointer":"default",fontSize:13,fontWeight:600}}>
          ＋ Legg til
        </button>
      </div>
    </div>
  );
}

// ─── KOKEBOK ─────────────────────────────────────────────────────
function RecipesScreen({recipes,setRecipes,meals,setMeals}) {
  const [sel,setSel]       = useState(null);
  const [showAdd,setAdd]   = useState(false);
  const [editId,setEditId] = useState(null);
  const [filter,setFilter] = useState("Alle");
  const [search,setSearch] = useState("");
  const EMPTY_FORM = {name:"",time:"",servings:"",cat:"Middag",tags:"",url:"",ingredients:""};
  const [form,setForm]     = useState({name:"",time:"",servings:"",cat:"Middag",tags:"",url:"",ingredients:""});
  const [aiSt,setAiSt]     = useState("");
  const [recipePicker,setRecipePicker] = useState(null);

  const cats    = ["Alle","Middag","Frokost","Lunsj","Dessert","Snacks"];
  const visible = recipes
    .filter(r=>filter==="Alle"||r.cat===filter)
    .filter(r=>!search||r.name.toLowerCase().includes(search.toLowerCase())||r.tags.some(t=>t.includes(search.toLowerCase())));

  const fetchUrl = async()=>{
    if(!form.url.trim()){setAiSt("Lim inn en URL");return;}
    setAiSt("loading");
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,tools:[{type:"web_search_20250305",name:"web_search"}],
          messages:[{role:"user",content:`Besøk denne siden og hent oppskriften: ${form.url}\nReturner KUN JSON: {"name":"...","time":20,"servings":4,"cat":"Middag","tags":["enkel"],"ingredients":[{"name":"Pasta","amount":"400g","cat":"Tørrvarer"}]}`}]})});
      const d=await res.json();
      const txt=d.content?.filter(c=>c.type==="text").map(c=>c.text).join("").replace(/```json|```/g,"").trim();
      const s=txt.indexOf("{"),e=txt.lastIndexOf("}");if(s===-1)throw 0;
      const p=JSON.parse(txt.slice(s,e+1));
      setForm(f=>({...f,name:p.name||f.name,time:String(p.time||f.time),servings:String(p.servings||f.servings),
        cat:p.cat||f.cat,tags:(p.tags||[]).join(", "),
        ingredients:(p.ingredients||[]).map(i=>`${i.name}|${i.amount||""}|${i.cat||"Diverse"}`).join("\n")}));
      setAiSt("ok");
    }catch{setAiSt("error");}
  };

  const save=()=>{
    const ings=form.ingredients.split("\n").map(s=>s.trim()).filter(Boolean).map(s=>{const[n,a,c]=s.split("|");return{name:n||s,amount:a||"",cat:c||"Diverse"};});
    const recipe={name:form.name,time:parseInt(form.time)||0,servings:parseInt(form.servings)||4,
      cat:form.cat,tags:form.tags.split(",").map(s=>s.trim()).filter(Boolean),url:form.url,ingredients:ings};
    if(editId){
      setRecipes(p=>p.map(r=>r.id===editId?{...r,...recipe}:r));
      setSel(editId);
    } else {
      setRecipes(p=>[...p,{id:uid(),...recipe}]);
    }
    setForm({name:"",time:"",servings:"",cat:"Middag",tags:"",url:"",ingredients:""});
    setAiSt("");setAdd(false);setEditId(null);
  };

  const startEdit=(r)=>{
    setEditId(r.id);
    setForm({name:r.name,time:String(r.time||""),servings:String(r.servings||""),cat:r.cat||"Middag",
      tags:(r.tags||[]).join(", "),url:r.url||"",
      ingredients:(r.ingredients||[]).map(i=>`${i.name}|${i.amount||""}|${i.cat||"Diverse"}`).join("\n")});
    setAdd(true);
  };

  if(sel){
    const r=recipes.find(x=>x.id===sel);if(!r){setSel(null);return null;}
    return (
      <div>
        <button onClick={()=>setSel(null)} style={{display:"flex",alignItems:"center",gap:5,fontSize:12.5,color:P.hazel,marginBottom:16,background:"none",border:"none",cursor:"pointer",padding:0,fontWeight:500}}>
          <Em e="←" s={{fontSize:13}}/> Tilbake til kokebok
        </button>
        <div style={{fontSize:20,fontWeight:600,color:P.ink,letterSpacing:"-0.02em",marginBottom:8}}>{r.name}</div>
        <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
          <Chip color={P.olive}><Em e="⏱" s={{fontSize:10}}/> {r.time} min</Chip>
          <Chip color={P.dusk}><Em e="👥" s={{fontSize:10}}/> {r.servings} pers</Chip>
          <Chip color={P.hazel}><Em e="🏷️" s={{fontSize:10}}/> {r.cat}</Chip>
          {r.tags.map(t=><Chip key={t} color={P.hazelL}>{t}</Chip>)}
        </div>
        {r.url&&<a href={r.url} target="_blank" rel="noreferrer" style={{fontSize:12,color:P.dusk,display:"flex",alignItems:"center",gap:4,marginBottom:12}}><Em e="↗" s={{fontSize:11}}/> Originaloppskrift</a>}

        {/* Legg til i middagsplan — duplikatsjekk + ingredienspicker */}
        {(()=>{
          const alreadyThisWeek=Object.values(meals).some(m=>m&&m.toLowerCase()===r.name.toLowerCase());
          return (
            <Card style={{marginBottom:12,padding:"10px 14px"}}>
              <div style={{fontSize:12,fontWeight:600,color:P.stone,marginBottom:8}}>📅 Legg til i middagsplanen</div>
              {alreadyThisWeek&&<div style={{fontSize:11,color:P.clay,background:P.clayXL,border:`1px solid ${P.clayL}`,borderRadius:7,padding:"5px 9px",marginBottom:8}}>⚠️ Allerede planlagt denne uken</div>}
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {DAYS.map(d=>{
                  const isThisRecipe=meals[d]?.toLowerCase()===r.name.toLowerCase();
                  const hasOther=!!meals[d]&&!isThisRecipe;
                  if(hasOther) return null;
                  return (
                    <button key={d} onClick={()=>{setMeals(p=>({...p,[d]:r.name}));setRecipePicker({recipe:r,day:d});}}
                      style={{padding:"5px 12px",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:500,
                        background:isThisRecipe?P.olive:P.hazelXL,color:isThisRecipe?"white":P.hazel,
                        border:`1px solid ${isThisRecipe?P.olive:P.hazelL}`}}>
                      {DAY_S[d]}{isThisRecipe?" ✓":""}
                    </button>
                  );
                })}
              </div>
            </Card>
          );
        })()}

        <Card style={{marginBottom:12}}>
          <SL style={{marginBottom:10}}><Em e="≡" s={{fontSize:10,marginRight:5}}/>Ingredienser</SL>
          {r.ingredients.map((ing,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:i<r.ingredients.length-1?`1px solid ${P.border}`:"none"}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:CAT_COLOR[ing.cat]||P.hazel,flexShrink:0}}/>
              <span style={{flex:1,fontSize:13,fontWeight:500,color:P.ink}}>{ing.name}</span>
              <span style={{fontSize:12,color:P.stone}}>{ing.amount}</span>
              <span style={{fontSize:10,color:P.dust}}>{ing.cat}</span>
            </div>
          ))}
        </Card>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>startEdit(r)} style={{flex:1,padding:"10px",background:P.hazelXL,color:P.hazel,border:`1px solid ${P.hazelL}`,borderRadius:9,fontSize:13,cursor:"pointer",fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>✏️ Rediger</button>
          <button onClick={()=>{setRecipes(p=>p.filter(x=>x.id!==r.id));setSel(null);}} style={{flex:1,padding:"10px",background:P.clayXL,color:P.clay,border:`1px solid ${P.clayL}`,borderRadius:9,fontSize:13,cursor:"pointer",fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>🗑️ Slett</button>
        </div>
      {recipePicker&&<IngredientPicker recipe={recipePicker.recipe} onClose={()=>setRecipePicker(null)} onAdd={ings=>{if(setShopping)setShopping(prev=>{let list=[...prev];ings.forEach(ing=>{const idx=list.findIndex(s=>s.name.toLowerCase()===ing.name.toLowerCase());if(idx>=0)list[idx]={...list[idx],amount:`${list[idx].amount} + ${ing.amount}`};else list=[...list,{id:uid(),name:ing.name,amount:ing.amount,cat:ing.cat,done:false}];});return list;});}}/>}
      </div>
    );
  }

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div>
          <div style={{fontSize:20,fontWeight:600,color:P.ink,letterSpacing:"-0.02em"}}>Kokebok</div>
          <div style={{fontSize:12,color:P.stone,marginTop:2}}><Em e="🍳" s={{fontSize:11,color:P.dust}}/> {recipes.length} oppskrifter</div>
        </div>
        <button onClick={()=>setAdd(true)} style={{background:P.hazel,color:"white",border:"none",borderRadius:9,padding:"8px 14px",fontSize:12.5,cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontWeight:600}}>
          <Em e="＋"/> Legg til
        </button>
      </div>

      {/* Søk */}
      <div style={{position:"relative",marginBottom:12}}>
        <Em e="🔍" s={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:14,color:P.dust}}/>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Søk i kokebok…"
          style={{width:"100%",boxSizing:"border-box",paddingLeft:32,fontSize:13,background:P.mist,border:`1px solid ${P.border}`,borderRadius:9,color:P.ink}}/>
        {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:P.dust,fontSize:14}}><Em e="✕"/></button>}
      </div>

      <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:2}}>
        {cats.map(c=><Pill key={c} active={filter===c} onClick={()=>setFilter(c)}>{c}</Pill>)}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {visible.length===0&&(
          <div style={{textAlign:"center",padding:"44px 0",color:P.dust}}>
            <Em e="🔍" s={{fontSize:28,display:"block",margin:"0 auto 10px",opacity:.4}}/>
            <div style={{fontSize:13}}>Ingen oppskrifter her ennå</div>
          </div>
        )}
        {visible.map(r=>(
          <Card key={r.id} onClick={()=>setSel(r.id)} accent={CAT_COLOR[r.ingredients[0]?.cat]||P.hazel} style={{cursor:"pointer",padding:"10px 14px"}}>
            <div style={{display:"flex",alignItems:"center",gap:11}}>
              <IBox emoji="🍳"  color={P.dusk} size={38}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13.5,fontWeight:600,color:P.ink}}>{r.name}</div>
                <div style={{fontSize:11,color:P.dust,marginTop:2,display:"flex",gap:8}}>
                  <span><Em e="⏱" s={{fontSize:10}}/> {r.time} min</span>
                  <span><Em e="👥" s={{fontSize:10}}/> {r.servings} pers</span>
                  <span><Em e="🏷️" s={{fontSize:10}}/> {r.cat}</span>
                </div>
              </div>
              {r.url&&<Em e="🔗" s={{color:P.dusk,fontSize:13,flexShrink:0}}/>}
              <Em e="›" s={{color:P.dust,fontSize:16,flexShrink:0}}/>
            </div>
          </Card>
        ))}
      </div>

      {showAdd&&(
        <Modal title={editId?"Rediger oppskrift":"Legg til oppskrift"} onClose={()=>{setAdd(false);setAiSt("");setForm({name:"",time:"",servings:"",cat:"Middag",tags:"",url:"",ingredients:""});setEditId(null);}}>

          {/* ── URL-henting ── */}
          <div style={{marginBottom:16,padding:"11px 12px",background:P.mist,borderRadius:9,border:`1px solid ${P.border}`}}>
            <div style={{fontSize:11.5,fontWeight:600,color:P.stone,marginBottom:7,display:"flex",alignItems:"center",gap:5}}>
              <Em e="🌐" s={{fontSize:11}}/> Hent fra nettside (valgfritt)
            </div>
            <div style={{display:"flex",gap:6}}>
              <input
                value={form.url}
                onChange={e=>setForm(f=>({...f,url:e.target.value}))}
                onFocus={e=>e.target.select()}
                placeholder="https://www.matprat.no/oppskrifter/…"
                style={{flex:1,fontSize:12,background:P.linen}}/>
              <button onClick={fetchUrl} disabled={aiSt==="loading"}
                style={{background:P.dusk,color:"white",border:"none",borderRadius:7,padding:"0 12px",
                  fontSize:12,cursor:"pointer",opacity:aiSt==="loading"?.6:1,whiteSpace:"nowrap"}}>
                {aiSt==="loading"?"Henter…":"→ Hent"}
              </button>
            </div>
            {aiSt==="ok"&&<div style={{fontSize:11,marginTop:6,color:P.olive}}>✓ Hentet — sjekk og juster feltene</div>}
            {aiSt==="error"&&<div style={{fontSize:11,marginTop:6,color:P.clay}}>⚠️ Kunne ikke hente fra denne siden. Fyll inn manuelt nedenfor.</div>}
          </div>

          {/* ── Manuell registrering ── */}
          <div style={{display:"flex",flexDirection:"column",gap:12}}>

            {/* Navn */}
            <div>
              <div style={{fontSize:11.5,color:P.stone,marginBottom:4,fontWeight:600}}>Navn *</div>
              <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}
                placeholder="Tomatsuppe med egg…"
                style={{width:"100%",boxSizing:"border-box",fontSize:14,background:P.sand,padding:"9px 11px"}}/>
            </div>

            {/* Tid, porsjoner, kategori */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              <div>
                <div style={{fontSize:11.5,color:P.stone,marginBottom:4,fontWeight:600}}>Tid (min)</div>
                <input type="number" value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))}
                  placeholder="30" style={{width:"100%",boxSizing:"border-box",fontSize:13,background:P.sand}}/>
              </div>
              <div>
                <div style={{fontSize:11.5,color:P.stone,marginBottom:4,fontWeight:600}}>Porsjoner</div>
                <input type="number" value={form.servings} onChange={e=>setForm(f=>({...f,servings:e.target.value}))}
                  placeholder="4" style={{width:"100%",boxSizing:"border-box",fontSize:13,background:P.sand}}/>
              </div>
              <div>
                <div style={{fontSize:11.5,color:P.stone,marginBottom:4,fontWeight:600}}>Kategori</div>
                <select value={form.cat} onChange={e=>setForm(f=>({...f,cat:e.target.value}))}
                  style={{width:"100%",boxSizing:"border-box",fontSize:13,background:P.sand}}>
                  {["Middag","Frokost","Lunsj","Dessert","Snacks"].map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
            </div>

            {/* Ingredienser — enkel flyt med knapp */}
            <div>
              <div style={{fontSize:11.5,color:P.stone,marginBottom:6,fontWeight:600}}>Ingredienser</div>
              {/* Vis lagt-til ingredienser */}
              {form.ingredients&&form.ingredients.split("
").filter(Boolean).map((line,i)=>{
                const [n,a,c]=line.split("|");
                return (
                  <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",
                    borderBottom:`1px solid ${P.border}`}}>
                    <div style={{width:7,height:7,borderRadius:"50%",flexShrink:0,
                      background:CAT_COLOR[c]||P.hazel}}/>
                    <span style={{flex:1,fontSize:13,color:P.ink,fontWeight:500}}>{n}</span>
                    <span style={{fontSize:12,color:P.stone}}>{a}</span>
                    <span style={{fontSize:10,color:P.dust}}>{c}</span>
                    <button onClick={()=>{
                      const lines=form.ingredients.split("
").filter(Boolean);
                      lines.splice(i,1);
                      setForm(f=>({...f,ingredients:lines.join("
")}));
                    }} style={{background:"none",border:"none",cursor:"pointer",color:P.dust,fontSize:13,padding:"0 2px",opacity:.6}}>✕</button>
                  </div>
                );
              })}
              {/* Legg til ingrediens */}
              <IngredientInputRow onAdd={(ing)=>setForm(f=>({
                ...f,
                ingredients: f.ingredients ? f.ingredients+"
"+ing : ing
              }))}/>
            </div>

            {/* Tagger */}
            <div>
              <div style={{fontSize:11.5,color:P.stone,marginBottom:4,fontWeight:600}}>Tagger <span style={{fontWeight:400,color:P.dust}}>(valgfritt)</span></div>
              <input value={form.tags} onChange={e=>setForm(f=>({...f,tags:e.target.value}))}
                placeholder="enkel, favoritt, rask…"
                style={{width:"100%",boxSizing:"border-box",fontSize:13,background:P.sand}}/>
            </div>

            <button onClick={save} disabled={!form.name.trim()} style={{
              padding:"12px",background:form.name.trim()?P.hazel:P.mist,
              color:form.name.trim()?"white":P.dust,border:"none",borderRadius:9,
              fontSize:13,cursor:form.name.trim()?"pointer":"default",fontWeight:600,
              display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              {editId?"💾 Lagre endringer":"💾 Lagre oppskrift"}
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── HANDLELISTE — komprimert ────────────────────────────────────
function ShoppingScreen({shopping,setShopping,itemHistory=[]}) {
  const [newItem,setNewItem] = useState("");
  const [newAmt, setNewAmt]  = useState("");
  const [newCat, setNewCat]  = useState("Diverse");
  const [showDone,setShowDone] = useState(false);

  const pending  = shopping.filter(i=>!i.done);
  const done     = shopping.filter(i=>i.done);
  const catOrder = [...new Set(pending.map(i=>i.cat))];

  const toggle   = id => setShopping(p=>p.map(i=>i.id===id?{...i,done:!i.done}:i));
  const remove   = id => setShopping(p=>p.filter(i=>i.id!==id));
  const clearDone= () => setShopping(p=>p.filter(i=>!i.done));
  const add = () => {
    if(!newItem.trim())return;
    setShopping(p=>[...p,{id:uid(),name:newItem.trim(),amount:newAmt.trim(),cat:newCat,done:false}]);
    setNewItem("");setNewAmt("");
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div>
          <div style={{fontSize:20,fontWeight:600,color:P.ink,letterSpacing:"-0.02em"}}>Handleliste</div>
          <div style={{fontSize:12,color:P.stone,marginTop:2,display:"flex",alignItems:"center",gap:5}}>
            <Em e="✓" s={{fontSize:11,color:P.olive}}/> {done.length} fullført
            <span style={{color:P.border}}>·</span>
            <Em e="⏱" s={{fontSize:11,color:P.dust}}/> {pending.length} gjenstår
          </div>
        </div>
        {done.length>0&&(
          <button onClick={clearDone} style={{fontSize:11.5,color:P.clay,background:P.clayXL,border:`1px solid ${P.clayL}`,padding:"5px 10px",borderRadius:7,cursor:"pointer",fontWeight:500,display:"flex",alignItems:"center",gap:4}}>
            <Em e="🗑️" s={{fontSize:11}}/> Fjern fullførte
          </button>
        )}
      </div>

      {shopping.length>0&&(
        <div style={{marginBottom:14}}>
          <Bar value={done.length} max={shopping.length} color={P.olive} h={3}/>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
            <span style={{fontSize:10.5,color:P.dust}}>{pending.length} varer igjen</span>
            <span style={{fontSize:10.5,color:P.dust}}>{Math.round((done.length/shopping.length)*100)}% ferdig</span>
          </div>
        </div>
      )}

      {/* Legg til rad */}
      {(()=>{
        const suggestions=newItem.length>1
          ?itemHistory.filter(h=>h.name.toLowerCase().includes(newItem.toLowerCase())&&!shopping.some(s=>s.name.toLowerCase()===h.name.toLowerCase())).slice(0,5)
          :[];
        return (
          <div style={{marginBottom:14}}>
            <div style={{background:P.mist,padding:"8px",borderRadius:suggestions.length>0?"10px 10px 0 0":10,border:`1px solid ${P.border}`,display:"flex",gap:6,alignItems:"center"}}>
              <Em e="＋" s={{fontSize:15,color:P.dust,flexShrink:0}}/>
              <input value={newItem} onChange={e=>setNewItem(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}
                placeholder="Hva trenger du?" autoComplete="off"
                style={{flex:2,fontSize:13,background:"transparent",border:"none",outline:"none",color:P.ink,padding:"0 2px"}}/>
              <input value={newAmt} onChange={e=>setNewAmt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}
                placeholder="Mengde" autoComplete="off"
                style={{width:65,fontSize:12,background:"transparent",border:"none",outline:"none",color:P.stone,borderLeft:`1px solid ${P.border}`,paddingLeft:8}}/>
              <select value={newCat} onChange={e=>setNewCat(e.target.value)} style={{fontSize:11,background:"transparent",border:"none",outline:"none",color:P.stone,maxWidth:95,borderLeft:`1px solid ${P.border}`,paddingLeft:6}}>
                {SHOP_CATS.map(c=><option key={c}>{c}</option>)}
              </select>
              <button onClick={add} style={{background:P.hazel,color:"white",border:"none",borderRadius:7,width:30,height:30,cursor:"pointer",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <Em e="→"/>
              </button>
            </div>
            {suggestions.length>0&&(
              <div style={{border:`1px solid ${P.border}`,borderTop:"none",borderRadius:"0 0 10px 10px",background:P.linen,overflow:"hidden"}}>
                {suggestions.map((s,i)=>(
                  <div key={i} onClick={()=>{setNewItem(s.name);setNewCat(s.cat);}}
                    style={{display:"flex",alignItems:"center",gap:10,padding:"7px 12px",borderTop:i>0?`1px solid ${P.border}`:"none",cursor:"pointer"}}
                    onMouseEnter={e=>e.currentTarget.style.background=P.hazelXL}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <div style={{width:7,height:7,borderRadius:"50%",background:CAT_COLOR[s.cat]||P.hazel,flexShrink:0}}/>
                    <span style={{flex:1,fontSize:13,color:P.ink}}>{s.name}</span>
                    <span style={{fontSize:11,color:P.dust}}>{s.cat}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })()}

      {shopping.length===0&&(
        <div style={{textAlign:"center",padding:"48px 0",color:P.dust}}>
          <Em e="🛍️" s={{fontSize:32,display:"block",margin:"0 auto 10px",opacity:.35}}/>
          <div style={{fontSize:14,fontWeight:500,color:P.stone}}>Listen er tom</div>
          <div style={{fontSize:12,marginTop:3}}>Legg til varer ovenfor</div>
        </div>
      )}

      {/* Varer per kategori */}
      {catOrder.map(cat=>{
        const items=pending.filter(i=>i.cat===cat);
        const cc=CAT_COLOR[cat]||P.hazel;
        const ci=CAT_EMOJI[cat]||"📦";
        return (
          <div key={cat} style={{marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
              <Em e={CAT_EMOJI[cat]||"📦"} s={{fontSize:12}}/>
              <span style={{fontSize:10.5,fontWeight:600,color:P.dust,textTransform:"uppercase",letterSpacing:"0.08em"}}>{cat}</span>
              <div style={{flex:1,height:"0.5px",background:P.border}}/>
              <span style={{fontSize:10,color:P.dust}}>{items.length}</span>
            </div>
            {items.map((item,idx)=>(
              <div key={item.id} style={{display:"flex",alignItems:"center",gap:9,padding:"6px 2px",borderBottom:idx<items.length-1?`1px solid ${P.border}`:"none"}}>
                <button onClick={()=>toggle(item.id)} style={{width:20,height:20,borderRadius:5,flexShrink:0,cursor:"pointer",
                  background:"transparent",border:`1.5px solid ${P.hazelL}`,
                  display:"flex",alignItems:"center",justifyContent:"center",transition:"all .1s"}}/>
                <span style={{flex:1,fontSize:13,color:P.ink}}>{item.name}</span>
                {item.amount&&<span style={{fontSize:11.5,color:P.dust,flexShrink:0}}>{item.amount}</span>}
                <button onClick={()=>remove(item.id)} style={{background:"none",border:"none",color:P.dust,cursor:"pointer",fontSize:14,padding:"0 2px",lineHeight:1,opacity:.45,flexShrink:0}}><Em e="✕"/></button>
              </div>
            ))}
          </div>
        );
      })}

      {/* Fullførte */}
      {done.length>0&&(
        <div style={{marginTop:6}}>

}

// ─── ROOT ─────────────────────────────────────────────────────────
function App() {
  const [user,setUser]       = useState(undefined); // undefined = sjekker, null = ikke innlogget
  const [tab,setTab]         = useState("home");
  const [month,setMonth]     = useState(4); // Mai = forrige måned
  const [syncing,setSyncing] = useState(false);

  // Lokal state — speil av Firebase
  const [allMeals,setAllMealsLocal]       = useState({[getWeekKey(new Date())]: INIT_MEALS});
  const [recipes,setRecipesLocal]         = useState(INIT_RECIPES);
  const [shopping,setShoppingLocal]       = useState(INIT_SHOPPING);
  const [itemHistory,setItemHistoryLocal] = useState([]);
  const [budgetGroups,setBudgetGroupsLocal] = useState(BUDGET_TEMPLATE);
  const [incomeMonths,setIncomeMonthsLocal] = useState(INIT_INCOME_MONTHS);

  // ── Auth-lytter ──────────────────────────────────────────────
  useEffect(() => {
    const unsub = onAuthStateChanged(auth, u => setUser(u||null));
    return unsub;
  }, []);

  // ── Firebase-lyttere (kun når innlogget) ─────────────────────
  useEffect(() => {
    if(!user) return;
    const listeners = [];

    const listen = (path, setter, transform) => {
      const r = ref(db, `${FAM}/${path}`);
      const unsub = onValue(r, snap => {
        if(snap.exists()) setter(transform ? transform(snap.val()) : snap.val());
      });
      listeners.push(unsub);
    };

    listen("meals",    v => setAllMealsLocal(v||{}));
    listen("recipes",  v => setRecipesLocal(Object.values(v||{})));
    listen("shopping", v => setShoppingLocal(Object.values(v||{})));
    listen("itemHistory", v => setItemHistoryLocal(Object.values(v||{})));
    listen("budget",   v => {
      // Merge Firebase budget into template structure (behold template som fallback)
      setBudgetGroupsLocal(prev => prev.map(g => {
        const fbG = v?.[g.id];
        if(!fbG) return g;
        return {...g, items: g.items.map(it => {
          const fbIt = fbG[it.id];
          if(!fbIt) return it;
          return {...it, months: it.months.map((mo,mi) => fbIt[mi] ? fbIt[mi] : mo)};
        })};
      }));
    });
    listen("income",   v => {
      if(Array.isArray(v)) setIncomeMonthsLocal(v);
    });

    return () => listeners.forEach(u=>u());
  }, [user]);

  // ── Skrive-hjelpere (lokal oppdatering + Firebase-sync) ──────
  const setWeekMeals = async (weekKey, weekData) => {
    setAllMealsLocal(prev => ({...prev, [weekKey]: weekData}));
    await set(ref(db, `${FAM}/meals/${weekKey}`), weekData);
  };

  const setRecipes = async (updater) => {
    const next = typeof updater==="function" ? updater(recipes) : updater;
    setRecipesLocal(next);
    const obj = Object.fromEntries(next.map(r=>([r.id, r])));
    await set(ref(db, `${FAM}/recipes`), obj);
  };

  const setShopping = async (updater) => {
    const next = typeof updater==="function" ? updater(shopping) : updater;
    setShoppingLocal(next);
    const obj = Object.fromEntries(next.map(i=>([i.id, i])));
    await set(ref(db, `${FAM}/shopping`), obj);
    // Oppdater varehistorikk
    const newItems = next.filter(i=>!itemHistory.some(h=>h.name.toLowerCase()===i.name.toLowerCase()));
    if(newItems.length>0){
      const updated=[...itemHistory,...newItems.map(i=>({name:i.name,cat:i.cat}))];
      setItemHistoryLocal(updated);
      const hObj=Object.fromEntries(updated.map((h,i)=>([i,h])));
      await set(ref(db,`${FAM}/itemHistory`),hObj);
    }
  };

  const setBudgetGroups = async (updater) => {
    const next = typeof updater==="function" ? updater(budgetGroups) : updater;
    setBudgetGroupsLocal(next);
    // Lagre kun budget/spent per gruppe/post/måned
    const flat = {};
    next.forEach(g => {
      flat[g.id] = {};
      g.items.forEach(it => { flat[g.id][it.id] = it.months; });
    });
    await set(ref(db, `${FAM}/budget`), flat);
  };

  const setIncomeMonths = async (updater) => {
    const next = typeof updater==="function" ? updater(incomeMonths) : updater;
    setIncomeMonthsLocal(next);
    await set(ref(db, `${FAM}/income`), next);
  };

  const handleSignOut = () => signOut(auth);

  // ── Tilstander ───────────────────────────────────────────────
  if(user===undefined) return (
    <div style={{minHeight:"100vh",background:P.sand,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
      <div style={{fontSize:40}}>🏡</div>
      <div style={{fontSize:14,color:P.stone}}>Laster Familieappen…</div>
    </div>
  );

  if(user===null) return <LoginScreen/>;

  const today = new Date();
  const dateStr = today.toLocaleDateString("nb-NO",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  const dateCap = dateStr.charAt(0).toUpperCase()+dateStr.slice(1);

  return (
    <div style={{fontFamily:"var(--font-sans)",maxWidth:460,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column",background:P.sand}}>
      {/* Header */}
      <div style={{background:P.linen,borderBottom:`1px solid ${P.border}`,padding:"13px 16px 11px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10,boxShadow:"0 1px 8px rgba(44,35,24,0.05)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:9,background:P.hazelXL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>
            🏡
          </div>
          <div>
            <div style={{fontSize:16,fontWeight:600,color:P.ink,letterSpacing:"-0.02em"}}>Familieappen</div>
            <div style={{fontSize:10,color:P.dust,letterSpacing:"0.01em"}}>{dateCap}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <div style={{fontSize:10,color:P.dust,marginRight:2}}>{user.email?.split("@")[0]}</div>
          <button onClick={handleSignOut} style={{background:P.mist,border:`1px solid ${P.border}`,cursor:"pointer",padding:"5px 10px",borderRadius:8,fontSize:11,color:P.stone,fontWeight:500}}>
            Logg ut
          </button>
        </div>
      </div>

      {/* Innhold */}
      <div style={{flex:1,padding:"18px 16px 92px",overflowY:"auto"}}>
        {tab==="home"    &&<HomeScreen meals={allMeals[getWeekKey(new Date())]||{}} shopping={shopping} setTab={setTab} budgetGroups={budgetGroups} month={month}/>}
        {tab==="plan"    &&<PlanScreen allMeals={allMeals} setWeekMeals={setWeekMeals} recipes={recipes} shopping={shopping} setShopping={setShopping}/>}
        {tab==="recipes" &&<RecipesScreen recipes={recipes} setRecipes={setRecipes} meals={allMeals[getWeekKey(new Date())]||{}} setMeals={(upd)=>{ const wk=getWeekKey(new Date()); const cur=allMeals[wk]||{}; const next=typeof upd==="function"?upd(cur):upd; setWeekMeals(wk,next); }}/>}
        {tab==="shopping"&&<ShoppingScreen shopping={shopping} setShopping={setShopping} itemHistory={itemHistory}/>}
        {tab==="economy" &&<EconomyScreen budgetGroups={budgetGroups} setBudgetGroups={setBudgetGroups} incomeMonths={incomeMonths} setIncomeMonths={setIncomeMonths} month={month} setMonth={setMonth}/>}
      </div>

      <BottomNav tab={tab} setTab={setTab}/>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/familieapp/sw.js", {scope: "/familieapp/"})
      .then(r => console.log("SW registrert:", r.scope))
      .catch(e => console.log("SW feil:", e));
  });
}
</script>
</body>
</html>
